<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trần Gia Bảo</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<audio id="bgm" loop preload="auto">
  <source src="music/ocean1.mp3" type="audio/mpeg">
</audio>

<canvas id="bg"></canvas>
<div class="utility-container">

  <button id="toggleBar" class="toggle-btn">
    <i class="fa-solid fa-bars"></i>
  </button>

  <div id="utilityBar" class="utility-bar">

  <button id="word-game">
  <span id="word-letter">W</span>
</button>
<script>
document.getElementById("word-game").onclick = function () {
  window.location.href = "wordgame/wordgame.html";
};
</script>

  <button id="gamecaro" class="btn-grid">
  <svg viewBox="0 0 100 100">
    <g class="grid">
      <line x1="33" y1="0" x2="33" y2="100"/>
      <line x1="66" y1="0" x2="66" y2="100"/>
      <line x1="0" y1="33" x2="100" y2="33"/>
      <line x1="0" y1="66" x2="100" y2="66"/>
    </g>

    <circle class="o o1" cx="17" cy="50" r="9"/>
<circle class="o o2" cx="50" cy="50" r="9"/>
<circle class="o o3" cx="83" cy="50" r="9"/>
    <line class="win-line" x1="0" y1="50" x2="100" y2="50"/>

<g class="x-static" transform="translate(50,17)">
  <line x1="-6" y1="-6" x2="6" y2="6"/>
  <line x1="6" y1="-6" x2="-6" y2="6"/>
</g>

<g class="x-static" transform="translate(83,17)">
  <line x1="-6" y1="-6" x2="6" y2="6"/>
  <line x1="6" y1="-6" x2="-6" y2="6"/>
</g>
<g class="x-static" transform="translate(17,83)">
  <line x1="-6" y1="-6" x2="6" y2="6"/>
  <line x1="6" y1="-6" x2="-6" y2="6"/>
</g>
<g class="x-static" transform="translate(83,83)">
  <line x1="-6" y1="-6" x2="6" y2="6"/>
  <line x1="6" y1="-6" x2="-6" y2="6"/>
</g>
  </svg>
</button>
<script>
document.getElementById("gamecaro").onclick = function () {
  window.location.href = "caro/caro.html";
};
</script>
    <button id="memori" class="memo">
     <i class="fa-regular fa-lightbulb"></i>
    </button>

  </div>

</div>
              
<div class="content">
  <h1>TRẦN GIA BẢO</h1>
  <p>ĐANG HỌC LÀM CODE...</p>
</div>

<script src="script.js"></script>
</body>
</html>
