<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trần Gia Bảo</title>
    <meta name="description" content="Khám phá bộ sưu tập game HTML5 đa thể loại.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<!-- ===== INTRO OVERLAY ===== -->
<div id="intro-overlay">
   <div id="petal-container"></div>
  <div class="intro-text">
    <p id="intro-line1" class="typing-line"></p>
    <p id="intro-line2" class="fade-line">Một trang web game có độ khó cao đang chờ bạn thử sức</p>
  </div>
</div>
    <audio id="bgm" loop preload="auto">
        <source src="ocean.m4a" type="audio/mpeg">
    </audio>

    <canvas id="bg"></canvas>

  
    <div id="hidden-buttons" style="display:none;">
        <!-- WORD GAME -->
        <button class="util-btn" id="word-game" title="Word Game">
            <div class="tile">
                <span class="tile-letter" id="word-letter">W</span>
            </div>
        </button>

        <!-- CARO -->
        <button class="util-btn" id="gamecaro" title="Caro">
            <svg viewBox="0 0 100 100" width="36" height="36">
                <g class="grid">
                    <line x1="33" y1="0" x2="33" y2="100"/>
                    <line x1="66" y1="0" x2="66" y2="100"/>
                    <line x1="0" y1="33" x2="100" y2="33"/>
                    <line x1="0" y1="66" x2="100" y2="66"/>
                </g>
                <circle class="o o1" cx="17" cy="50" r="9"/>
                <circle class="o o2" cx="50" cy="50" r="9"/>
                <circle class="o o3" cx="83" cy="50" r="9"/>
                <line class="win-line" x1="0" y1="50" x2="100" y2="50"/>
                <g class="x-static" transform="translate(50,17)">
                    <line x1="-6" y1="-6" x2="6" y2="6"/>
                    <line x1="6" y1="-6" x2="-6" y2="6"/>
                </g>
                <g class="x-static" transform="translate(83,17)">
                    <line x1="-6" y1="-6" x2="6" y2="6"/>
                    <line x1="6" y1="-6" x2="-6" y2="6"/>
                </g>
                <g class="x-static" transform="translate(17,83)">
                    <line x1="-6" y1="-6" x2="6" y2="6"/>
                    <line x1="6" y1="-6" x2="-6" y2="6"/>
                </g>
                <g class="x-static" transform="translate(83,83)">
                    <line x1="-6" y1="-6" x2="6" y2="6"/>
                    <line x1="6" y1="-6" x2="-6" y2="6"/>
                </g>
            </svg>
        </button>

        <!-- MEMORY -->
        <button class="util-btn" id="memori" title="Memory">
            <div class="memory-container">
                <i class="fas fa-brain"></i>
                <span class="memory-dot dot-1"></span>
                <span class="memory-dot dot-2"></span>
                <span class="memory-dot dot-3"></span>
            </div>
        </button>

        <!-- TÌM BÓNG -->
        <button class="util-btn" id="magic" title="Tìm bóng">
            <div class="shell-mini">
                <span class="shell-light"></span>
                <span class="shell-spark s1"></span>
                <span class="shell-spark s2"></span>
                <span class="shell-spark s3"></span>
                <span class="shell-ball-mini"></span>
                <span class="shell-cup cup-a"></span>
                <span class="shell-cup cup-b"></span>
                <span class="shell-cup cup-c"></span>
                <span class="shell-question">?</span>
            </div>
        </button>

        <!-- CHẶN CUA -->
        <button class="util-btn" id="crab" title="Chặn cua">
            <span>🦀</span>
            <div class="crab-water"></div>
            <div class="crab-bubbles">
                <b></b><b></b><b></b><b></b><b></b>
            </div>
        </button>

        <!-- REVERSI -->
        <button class="util-btn" id="reversi" title="Reversi">
            <i class="🔴"></i>
        </button>

        <!-- MINESWEEPER -->
        <button class="util-btn" id="domin" title="Minesweeper">
            <div class="bomb-wrapper">
                <i class="fa-solid fa-bomb bomb-icon"></i>
                <span class="bomb-count"></span>
                <div class="explosion-flash"></div>
            </div>
        </button>

        <!-- HẢI CHIẾN -->
        <button class="util-btn" id="haichien" title="Hải chiến">
            <span class="ship-emoji">🚢</span>
            <svg class="tc-wave-svg" viewBox="0 0 200 18" preserveAspectRatio="none">
                <path d="M0,9 C12,3 22,3 33,9 C44,15 54,15 66,9 C77,3 87,3 99,9 C110,15 120,15 132,9 C143,3 153,3 165,9 C176,15 186,15 198,9 L200,18 L0,18 Z" fill="rgba(0,180,230,0.5)"/>
                <path d="M0,11 C10,6 20,6 30,11 C40,16 50,16 60,11 C70,6 80,6 90,11 C100,16 110,16 120,11 C130,6 140,6 150,11 C160,16 170,16 180,11 C190,6 196,7 200,11 L200,18 L0,18 Z" fill="rgba(0,140,200,0.35)"/>
            </svg>
            <div class="tc-water"></div>
        </button>

        <!-- MUSIC GAME -->
        <button class="util-btn" id="musicgame" title="Nhịp điệu âm nhạc">
            <div class="music-visualizer">
                <span></span><span></span><span></span><span></span>
            </div>
            <i class="fa-solid fa-music music-icon-main"></i>
        </button>

        <!-- NÉ ĐẠN -->
        <button class="util-btn" id="nedan" title="Né đạn">
            <div class="plane-container">
                <span class="star s1"></span>
                <span class="star s2"></span>
                <span class="star s3"></span>
                <span class="star s4"></span>
                <span class="star s5"></span>
                <span class="star s6"></span>
                <img src="picture/airplane.png" alt="Airplane" class="plane-img">
            </div>
        </button>

        <!-- GHI NHỚ EMOJI -->
        <button class="util-btn" id="ghinho" title="Ghi nhớ">?</button>

        <!-- THẤP HAY CAO -->
        <button class="util-btn" id="thaphaycao" title="Thấp hay cao">?</button>

        <!-- CỜ ĐAM -->
        <button class="util-btn" id="codam" title="Cờ đam">
            <div class="codam-piece">
                <div class="codam-ring"></div>
                <div class="codam-shine"></div>
            </div>
        </button>

        <!-- NEON REFLEX -->
        <button class="util-btn" id="neonreflex" title="Neon Reflex">
            <span class="reflex-dot r1"></span>
            <span class="reflex-dot r2"></span>
            <span class="reflex-dot r3"></span>
            <span class="reflex-dot r4"></span>
            <div class="reflex-card">
                <span class="reflex-word">GO</span>
            </div>
            <div class="reflex-flash"></div>
        </button>

        <!-- ĐẬP QUÁI -->
        <button class="util-btn" id="dapquai" title="Đập quái rừng sâu">
            <div class="whack-mini">
                <span class="whack-light"></span>
                <span class="whack-hole"></span>
                <span class="whack-monster">
                    <span class="whack-eye eye-left"></span>
                    <span class="whack-eye eye-right"></span>
                    <span class="whack-mouth"></span>
                </span>
                <span class="whack-stun"><b></b><b></b><b></b></span>
                <span class="whack-hammer"></span>
            </div>
        </button>

        <!-- UNO -->
        <button class="util-btn" id="unogame" title="UNO">
            <div class="uno-fan-mini">
                <span class="uno-card-mini c1"><b>UNO</b></span>
                <span class="uno-card-mini c2"><b>UNO</b></span>
                <span class="uno-card-mini c3"><b>UNO</b></span>
                <span class="uno-card-mini c4"><b>UNO</b></span>
                <span class="uno-card-mini c5"><b>UNO</b></span>
                <span class="uno-spark us1"></span>
                <span class="uno-spark us2"></span>
                <span class="uno-spark us3"></span>
            </div>
        </button>

        <!-- SIÊU ĐUỔI BẮT -->
        <button class="util-btn" id="sieuduoibat" title="Siêu đuổi bắt">
            <div class="chase-mini">
                <span class="chase-sea"></span>
                <span class="chase-wake"></span>
                <div class="chase-police">
                    <span class="chase-beam"></span>
                    <span class="chase-hull"></span>
                    <span class="chase-cabin"></span>
                    <span class="chase-light red"></span>
                    <span class="chase-light blue"></span>
                </div>
            </div>
        </button>

        <!-- HỨNG BI -->
        <button class="util-btn" id="hungbi" title="Hứng bi">
            <div class="dropball-mini">
                <span class="drop-line"></span>
                <span class="drop-ball green-drop"></span>
                <span class="drop-ball red-drop"></span>
                <span class="drop-gate"></span>
            </div>
        </button>

        <!-- ĐUA XÚC XẮC -->
        <button class="util-btn" id="duaxucxac" title="Đua xúc xắc bãi biển">
            <span class="dicebeach-sunray"></span>
            <span class="dicebeach-sun"></span>
            <span class="dicebeach-sand-dot d1"></span>
            <span class="dicebeach-sand-dot d2"></span>
            <span class="dicebeach-sand-dot d3"></span>
            <span class="dicebeach-sand-dot d4"></span>
            <span class="dicebeach-ball"></span>
            <span class="dicebeach-shadow"></span>
        </button>

        <!-- BLOCK JUMP 3D -->
        <button class="util-btn" id="blockjump" title="Block Jump 3D">
            <div class="bj-sky"></div>
            <div class="bj-block"></div>
            <div class="bj-rabbit">
                <div class="bj-ear ear-left"></div>
                <div class="bj-ear ear-right"></div>
                <div class="bj-body"></div>
            </div>
            <div class="bj-trail"></div>
        </button>

        <!-- BIDA -->
        <button class="util-btn" id="bidaBtn" title="Bida">
            <div class="bida-icon">
                <div class="bida-fire fire-back"></div>
                <div class="bida-fire fire-mid"></div>
                <div class="bida-fire fire-front"></div>
                <div class="bida-shadow"></div>
                <div class="ball8">
                    <div class="ball8-shine"></div>
                    <div class="ball8-center"><span>8</span></div>
                </div>
            </div>
        </button>

        <!-- KHINH KHÍ CẦU -->
        <button class="util-btn" id="khinhkhi" title="Khinh khí cầu">
            <div class="balloon-mini">
                <span class="bb-sky"></span>
                <span class="bb-cloud c1"></span>
                <span class="bb-cloud c2"></span>
                <span class="bb-mountain"></span>
                <span class="bb-tree t1"></span>
                <span class="bb-tree t2"></span>
                <span class="bb-balloon">
                    <span class="bb-body"></span>
                    <span class="bb-basket"></span>
                    <span class="bb-rope r1"></span>
                    <span class="bb-rope r2"></span>
                </span>
            </div>
        </button>

        <!-- XẾP BÓNG GAI -->
        <button class="util-btn xbg-btn" id="xepbonggai" title="Xếp bóng gai">
            <div class="xbg-icon">
                <div class="xbg-board">
                    <span class="xbg-cell"></span>
                    <span class="xbg-cell"></span>
                    <span class="xbg-cell"></span>
                    <span class="xbg-cell"></span>
                </div>
                <span class="xbg-ball xbg-ball-a"></span>
                <span class="xbg-ball xbg-ball-b"></span>
                <span class="xbg-ball xbg-ball-c"></span>
                <span class="xbg-swap-glow"></span>
            </div>
        </button>

        <!-- TRƯỢT TUYẾT -->
        <button class="util-btn snow-slide-btn" id="truottuyet" title="Trượt tuyết">
            <div class="snow-scene">
                <div class="snow-track"></div>
                <div class="snowflakes-mini"><span></span><span></span><span></span></div>
                <div class="skier-mini">
                    <div class="ski-pole pole-left"></div>
                    <div class="ski-pole pole-right"></div>
                    <div class="skier-head">
                        <div class="beanie"><span></span></div>
                        <div class="face-dot"></div>
                    </div>
                    <div class="scarf"></div>
                    <div class="jacket"></div>
                    <div class="leg leg-left"></div>
                    <div class="leg leg-right"></div>
                    <div class="ski ski-left"></div>
                    <div class="ski ski-right"></div>
                </div>
            </div>
        </button>

        <!-- QUAN SÁT CHÒM SAO -->
        <button class="util-btn constellation-btn" id="demsao" title="Quan sát chòm sao">
            <div class="constellation-icon">
                <div class="constellation-ring">
                    <span class="c-star s1"></span>
                    <span class="c-star s2"></span>
                    <span class="c-star s3"></span>
                    <span class="c-star s4"></span>
                    <span class="c-star s5"></span>
                    <span class="c-star s6"></span>
                    <span class="c-star s7"></span>
                    <svg class="constellation-lines" viewBox="0 0 100 100">
                        <polyline points="50,8 85,25 82,65 50,92 18,65 15,25 50,8"></polyline>
                    </svg>
                </div>
            </div>
        </button>

        <!-- BÓNG NẢY -->
        <button class="util-btn bounce-btn" id="bongnay" title="Bóng nảy">
            <div class="bounce-scene">
                <span class="bounce-ball red"></span>
                <span class="bounce-ball blue"></span>
                <span class="bounce-ball yellow"></span>
            </div>
        </button>

        <!-- ẾCH NHẢY HỒ -->
        <button class="util-btn" id="echnhayho" title="Ếch nhảy hồ">
            <div class="frog-icon">
                <div class="frog-body"></div>
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="cheek left"></div>
                <div class="cheek right"></div>
                <div class="mouth"></div>
            </div>
        </button>

        <!-- TRỐN KHỎI THIÊN THẠCH -->
        <button class="util-btn comet-btn" id="comet" title="Trốn khỏi thiên thạch">
            <svg viewBox="0 0 100 100" width="52" height="52">
                <circle cx="50" cy="50" r="46" fill="#161028" stroke="url(#borderGlow)" stroke-width="1.5" />
                <defs>
                    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="rgba(180,130,255,0.6)" />
                        <stop offset="50%" stop-color="rgba(100,50,200,0.2)" />
                        <stop offset="100%" stop-color="rgba(180,130,255,0.6)" />
                    </linearGradient>
                    <radialGradient id="bodyGlow" cx="50%" cy="40%" r="50%">
                        <stop offset="0%" stop-color="rgba(220,200,255,0.25)" />
                        <stop offset="100%" stop-color="rgba(20,10,50,0)" />
                    </radialGradient>
                </defs>
                <circle cx="50" cy="42" r="30" fill="url(#bodyGlow)" />
                <circle cx="20" cy="22" r="1.2" fill="white" class="star-twinkle" />
                <circle cx="75" cy="18" r="1" fill="white" class="star-twinkle" />
                <circle cx="82" cy="60" r="1.3" fill="white" class="star-twinkle" />
                <circle cx="15" cy="70" r="0.9" fill="white" class="star-twinkle" />
                <circle cx="65" cy="78" r="1.1" fill="white" class="star-twinkle" />
                <g class="comet-mini">
                    <circle cx="30" cy="35" r="3" fill="#ff8844" opacity="0.9" />
                    <ellipse cx="22" cy="33" rx="6" ry="2" fill="rgba(255,180,80,0.5)" />
                </g>
                <ellipse cx="52" cy="82" rx="16" ry="4" class="stickman-shadow" />
                <circle cx="50" cy="24" r="9" class="stickman-head" />
                <circle cx="47" cy="23" r="1.2" fill="white" />
                <circle cx="53" cy="23" r="1.2" fill="white" />
                <path d="M46,27 Q50,31 54,27" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" />
                <line x1="50" y1="33" x2="50" y2="62" class="stickman-body" />
                <line x1="50" y1="62" x2="38" y2="80" class="stickman-body" />
                <line x1="50" y1="62" x2="62" y2="80" class="stickman-body" />
                <line x1="50" y1="42" x2="32" y2="50" class="stickman-body" />
                <g class="arm-wave">
                    <line x1="50" y1="42" x2="68" y2="28" class="stickman-body" />
                    <circle cx="70" cy="26" r="2" fill="white" />
                </g>
                <line x1="50" y1="36" x2="20" y2="25" class="stickman-trail" />
                <line x1="50" y1="50" x2="24" y2="45" class="stickman-trail" style="animation-delay: 0.3s;" />
                <line x1="50" y1="60" x2="28" y2="58" class="stickman-trail" style="animation-delay: 0.6s;" />
            </svg>
        </button>
    </div>

    <!-- ===== UTILITY BAR CHÍNH ===== -->
    <div class="utility-container">
        <button id="toggleBar" class="toggle-btn">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div id="utilityBar" class="utility-bar">
            <!-- Bộ lọc thể loại -->
            <div class="filter-section">
                <button class="filter-btn active" data-genre="all">Tất cả</button>
                <button class="filter-btn" data-genre="tri-tue">🧠 Trí tuệ</button>
                <button class="filter-btn" data-genre="hanh-dong">⚡ Phản xạ</button>
                <button class="filter-btn" data-genre="chien-thuat">♟️ Chiến thuật</button>
                <button class="filter-btn" data-genre="giai-tri">🎲 Giải trí</button>
            </div>

            <!-- Lưới game động -->
            <div class="games-grid"></div>
        </div>
    </div>

    <!-- ===== NỘI DUNG CHÀO MỪNG ===== -->
    <div class="content">
        <h1>TRẦN GIA BẢO</h1>
        <p>BẠN CÓ PHẢI LÀ MỘT GAME THỦ CHÂU Á?!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
