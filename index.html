<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trần Gia Bảo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* =============================================
   CANVAS BACKGROUND
   ============================================= */
#bg {
  position: fixed;
  top:0;
  left:0;
  width: 100%;
  height: 100%;
  z-index:0;
  pointer-events: none;
  touch-action: none;
}

/* =============================================
   NỘI DUNG CHÍNH
   ============================================= */
.content {
  position: relative;
  z-index: 1;
  color: white;
  text-align: center;
  margin-top: 30vh;
  text-shadow: 0 4px 12px rgba(0,0,0,0.6);
}

.content h1 {
  font-size: clamp(2.5rem, 10vw, 6rem);
  font-weight: 900;
  letter-spacing: 0.1em;
}

.content p {
  font-size: clamp(0.8rem, 3vw, 1rem);
  font-weight: 300;
  letter-spacing: 0.25em;
  color: rgba(255,255,255,0.5);
  margin-top: 10px;
}

/* =============================================
   UTILITY CONTAINER
   ============================================= */
.utility-container {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1000;
}

/* =============================================
   NÚT MỞ / ĐÓNG
   ============================================= */
.toggle-btn {
  width: 48px;
  height: 48px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  font-size: 18px;
  border-radius: 12px;
  cursor: pointer;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}

.toggle-btn:hover {
  background: rgba(255,255,255,0.15);
}

/* =============================================
   UTILITY BAR — tự dãn theo số nút
   ============================================= */
.utility-bar {
  position: absolute;
  top: 58px;
  left: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 8px;

  width: max-content;
  min-width: 64px;

  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;

  /* ẩn ban đầu */
  transform: translateX(-130%);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1),
              opacity 0.25s ease;
}

.utility-bar.show {
  transform: translateX(0);
  opacity: 1;
  pointer-events: auto;
}

/* =============================================
   NÚT CON CHUNG — chỉ cần thêm class util-btn
   Không cần chỉnh gì thêm khi thêm nút mới
   ============================================= */
.util-btn {
  width: 52px;
  height: 52px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  color: white;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  touch-action: manipulation;
  transition: background 0.2s, transform 0.15s;
  overflow: hidden;
}

.util-btn:hover  { background: rgba(255,255,255,0.15); transform: scale(1.06); }
.util-btn:active { transform: scale(0.92); }

/* =============================================
   WORD GAME — chữ chạy
   ============================================= */
#word-game {
  animation: tilt 4s ease-in-out infinite;
}

#word-game {
  animation: tilt 4s ease-in-out infinite;
  /* KHÔNG thêm gì thêm, kế thừa hoàn toàn từ .util-btn */
}

.tile {
  width: 75%;
  height: 75%;
  border-radius: 10px;
  background: linear-gradient(145deg, #f9e784 0%, #e8c840 60%, #c9a520 100%);
  box-shadow:
    0 1px 0 #a07c10,
    0 2px 0 #8a6a0c,
    0 4px 0 #6e530a,
    0 5px 8px rgba(0,0,0,.55),
    inset 0 1px 2px rgba(255,255,255,.6);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  /* Xéo ở đây, KHÔNG overflow hidden */
  transform: perspective(180px) rotateX(12deg) rotateY(-10deg) rotate(-4deg);
  transition: box-shadow .1s, transform .1s;
}

#word-game:active .tile {
  box-shadow:
    0 0px 0 #a07c10,
    0 1px 0 #8a6a0c,
    0 2px 4px rgba(0,0,0,.5),
    inset 0 1px 2px rgba(255,255,255,.4);
  transform: perspective(180px) rotateX(12deg) rotateY(-10deg) rotate(-4deg) translateY(3px);
}

.tile::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: repeating-linear-gradient(
    112deg,
    transparent 0px,
    rgba(255,255,255,.07) 1px,
    transparent 2px,
    transparent 6px
  );
  pointer-events: none;
}

.tile-letter {
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: 26px;
  font-weight: 700;
  color: #3a2800;
  line-height: 1;
  letter-spacing: -.5px;
  text-shadow: 0 1px 0 rgba(255,255,255,.3);
  opacity: 1;
  transform: translateY(0);
}

.tile-letter.pop {
  animation: popIn .7s cubic-bezier(.22,1.4,.36,1) forwards;
}


@keyframes popIn {
  0%   { transform: translateY(10px) scale(.6);  opacity: 0; }
  55%  { transform: translateY(-3px) scale(1.15); opacity: 1; }
  80%  { transform: translateY(1px)  scale(.97);  opacity: 1; }
  100% { transform: translateY(0)    scale(1);    opacity: 1; }
}

@keyframes tilt {
  0%,100% { transform: rotate(0deg) scale(1); }
  2%      { transform: rotate(-7deg) scale(1.06); }
  4%      { transform: rotate(7deg)  scale(1.06); }
  6%      { transform: rotate(-4deg) scale(1.03); }
  8%      { transform: rotate(4deg)  scale(1.03); }
  10%     { transform: rotate(0deg)  scale(1); }
}
/* =============================================
   CARO — SVG animations
   ============================================= */
.util-btn svg {
  display: block;
  overflow: visible;
}

.grid line {
  stroke: rgba(255,255,255,0.8);
  stroke-width: 4;
}

.x-static line {
  stroke: #ff4d4d;
  stroke-width: 4;
  stroke-linecap: round;
}

.o {
  fill: none;
  stroke: #00aaff;
  stroke-width: 4;
  opacity: 0;
  transform-origin: center;
}

.o1 { animation: showO 4s infinite; }
.o2 { animation: showO 4s infinite 0.3s; }
.o3 { animation: showO 4s infinite 0.6s; }

@keyframes showO {
  0%   { opacity: 0; transform: translateY(8px) scale(0.8); }
  15%  { opacity: 1; transform: translateY(0)   scale(1.05); }
  25%  { opacity: 1; transform: scale(1); }
  55%  { opacity: 1; }
  65%  { opacity: 0; }
  100% { opacity: 0; }
}

.win-line {
  stroke: #ff4d4d;
  stroke-width: 5;
  stroke-dasharray: 100 100;
  stroke-dashoffset: 100;
  stroke-linecap: round;
  animation: drawWin 4s infinite;
}

@keyframes drawWin {
  0%,35% { stroke-dashoffset: 100; opacity: 0; }
  45%    { opacity: 1; }
  55%    { stroke-dashoffset: 0;   opacity: 1; }
  65%    { stroke-dashoffset: 0;   opacity: 1; }
  80%    { opacity: 1; }
  100%   { stroke-dashoffset: 100; opacity: 0; }
}

/* =============================================
   MEMO — tia sáng toả ra
   ============================================= */
#memori {
  position: relative;
  overflow: visible; /* cho tia thoát ra ngoài nút */
  color: #ffe066;
  border-color: rgba(255,224,102,0.25);
}

/* icon bóng đèn nhấp nháy nhẹ */
#memori i {
  animation: bulbPulse 2.5s ease-in-out infinite;
  position: relative;
  z-index: 1;
}

@keyframes bulbPulse {
  0%, 100% { opacity: 0.7;  text-shadow: none; }
  50%       { opacity: 1;    text-shadow: 0 0 10px #ffe066, 0 0 22px #ffaa00; }
}

/* 8 tia sáng — dùng pseudo + nhiều box-shadow giả tia */
#memori::before,
#memori::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* vòng glow trung tâm */
#memori::before {
  width: 52px;
  height: 52px;
  background: transparent;
  box-shadow: 0 0 0 0 rgba(255,224,102,0);
  animation: glowRing 2.5s ease-in-out infinite;
}

@keyframes glowRing {
  0%, 100% { box-shadow: 0 0 0 0   rgba(255,200,50,0);   }
  50%       { box-shadow: 0 0 14px 6px rgba(255,200,50,0.35); }
}

/* 8 tia — CSS custom properties trick */
.memo-rays {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  pointer-events: none;
  z-index: 0;
}

.memo-rays span {
  position: absolute;
  width: 3px;
  height: 10px;
  background: linear-gradient(to top, #ffe066, transparent);
  border-radius: 2px;
  top: 50%;
  left: 50%;
  transform-origin: 50% 100%;
  animation: rayShine 2.5s ease-in-out infinite;
}

/* offset từng tia theo góc */
.memo-rays span:nth-child(1)  { transform: translateX(-50%) rotate(0deg)   translateY(-32px); animation-delay: 0s; }
.memo-rays span:nth-child(2)  { transform: translateX(-50%) rotate(45deg)  translateY(-32px); animation-delay: 0.1s; }
.memo-rays span:nth-child(3)  { transform: translateX(-50%) rotate(90deg)  translateY(-32px); animation-delay: 0.2s; }
.memo-rays span:nth-child(4)  { transform: translateX(-50%) rotate(135deg) translateY(-32px); animation-delay: 0.3s; }
.memo-rays span:nth-child(5)  { transform: translateX(-50%) rotate(180deg) translateY(-32px); animation-delay: 0.4s; }
.memo-rays span:nth-child(6)  { transform: translateX(-50%) rotate(225deg) translateY(-32px); animation-delay: 0.3s; }
.memo-rays span:nth-child(7)  { transform: translateX(-50%) rotate(270deg) translateY(-32px); animation-delay: 0.2s; }
.memo-rays span:nth-child(8)  { transform: translateX(-50%) rotate(315deg) translateY(-32px); animation-delay: 0.1s; }

@keyframes rayShine {
  0%, 100% { opacity: 0;   height: 6px;  }
  40%       { opacity: 0;   height: 6px;  }
  55%       { opacity: 0.9; height: 13px; }
  70%       { opacity: 0;   height: 6px;  }
}

#magic i {
  display: inline-block; /* bắt buộc để transform hoạt động trên inline element */
  color: white;
  animation: spin-and-pause 3s ease-in-out infinite;
}

@keyframes spin-and-pause {
  0%   { transform: rotate(0deg)    scale(1); }
  40%  { transform: rotate(1080deg) scale(1); }
  60%  { transform: rotate(1080deg) scale(1.3); }
  80%  { transform: rotate(1080deg) scale(0.85); }
  90%  { transform: rotate(1080deg) scale(1.15); }
  100% { transform: rotate(1080deg) scale(1); }
}

#reversi i {
  display: block;
  width: 28px;
  height: 28px;
  margin: auto;
  border-radius: 50%;
  position: relative;
  transform-style: preserve-3d;
  animation: reversi-flip 2.8s ease-in-out infinite;
}


#reversi i::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ff6b7a, #e8354a);
  box-shadow: 0 0 8px rgba(232, 53, 74, 0.7),
              inset 0 2px 4px rgba(255,255,255,0.3);
  backface-visibility: hidden;
}

/* Mặt xanh (back) */
.util-btn#reversi i::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #6db8ff, #2d8cf0);
  box-shadow: 0 0 8px rgba(45, 140, 240, 0.7),
              inset 0 2px 4px rgba(255,255,255,0.3);
  backface-visibility: hidden;
  transform: rotateY(180deg);
}

/* Flip animation: dừng ở đỏ → lật sang xanh → dừng → lật lại */
@keyframes reversi-flip {
  0%        { transform: rotateY(0deg);    }
  35%       { transform: rotateY(0deg);    }   /* giữ mặt đỏ */
  50%       { transform: rotateY(180deg);  }   /* lật sang xanh */
  85%       { transform: rotateY(180deg);  }   /* giữ mặt xanh */
  100%      { transform: rotateY(360deg);  }   /* lật về đỏ */
}

/* Glow đổi theo mặt hiện tại */
#reversi:hover i {
  animation-play-state: paused;
}

/* Button cần relative + overflow hidden để nước không tràn ra */
#crab {
  position: relative;
  overflow: hidden;
}

/* Lớp nước phủ 75% từ dưới lên */
.crab-water {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 75%;
  background: linear-gradient(
    180deg,
    rgba(30,100,200,0.25) 0%,
    rgba(20,70,180,0.55)  60%,
    rgba(10,40,140,0.75)  100%
  );
  border-radius: 0 0 11px 11px;
  pointer-events: none;
  z-index: 0;
}

/* Gợn sóng mặt nước */
.crab-water::before {
  content: '';
  position: absolute;
  top: -5px;
  left: -10%;
  width: 120%;
  height: 0px;
  background: rgba(100,180,255,0.35);
  border-radius: 50%;
  animation: water-wave 10s ease-in-out infinite;
}

@keyframes water-wave {
  0%,100% { transform: scaleX(1)    scaleY(1);   }
  40%     { transform: scaleX(1.04) scaleY(1.1); }
  70%     { transform: scaleX(0.97) scaleY(0.9); }
}

/* Container bong bóng */
.crab-bubbles {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 75%;
  pointer-events: none;
  z-index: 1;
}

/* 5 bong bóng, mỗi cái khác vị trí / kích thước / timing */
.crab-bubbles b {
  position: absolute;
  bottom: 4px;
  border-radius: 50%;
  background: rgba(180,220,255,0.5);
  border: 1px solid rgba(200,235,255,0.8);
  opacity: 0;
  animation: bubble-rise var(--dur) ease-in var(--delay) infinite;
}

.crab-bubbles b:nth-child(1) { width:6px;  height:6px;  left:20%; --dur:1.2s; --delay:0.2s; }
.crab-bubbles b:nth-child(2) { width:8px;  height:8px;  left:40%; --dur:1.5s; --delay:0.7s; }
.crab-bubbles b:nth-child(3) { width:5px;  height:5px;  left:60%; --dur:1.1s; --delay:1.1s; }
.crab-bubbles b:nth-child(4) { width:7px;  height:7px;  left:75%; --dur:1.4s; --delay:0.4s; }
.crab-bubbles b:nth-child(5) { width:5px;  height:5px;  left:30%; --dur:1.3s; --delay:0.9s; }

@keyframes bubble-rise {
  0%   { opacity: 0;   transform: translateY(0)     translateX(0); }
  15%  { opacity: 0.9; }
  60%  { opacity: 0.6; transform: translateY(-60%)  translateX(4px); }
  100% { opacity: 0;   transform: translateY(-100%) translateX(-3px); }
}

@keyframes crab-dive {
  0%        { transform: translateY(0)    rotate(0deg)  scaleX(1);    opacity: 1; }
  15%       { transform: translateY(2px)  rotate(-6deg) scaleX(1.05); opacity: 1; }
  40%       { transform: translateY(7px)  rotate(12deg) scaleX(0.95); opacity: 0.6; }
  52%       { transform: translateY(10px) rotate(18deg) scaleX(0.9);  opacity: 0; }
  53%       { transform: translateY(-6px) rotate(0deg)  scaleX(1);    opacity: 0; }
  70%       { transform: translateY(-2px) rotate(0deg)  scaleX(1);    opacity: 1; }
  85%,100%  { transform: translateY(0)    rotate(0deg)  scaleX(1);    opacity: 1; }
}

#domin {
  position: relative;
  overflow: hidden;
  border-color: rgba(255, 61, 61, 0.3);
}

.bomb-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

/* Biểu tượng quả bom */
.bomb-icon {
  font-size: 24px;
  color: #ff3d3d;
  filter: drop-shadow(0 0 5px rgba(255, 61, 61, 0.5));
  animation: bomb-shake 6s infinite;
}

/* Con số đếm ngược */
.bomb-count {
  position: absolute;
  font-family: 'Courier New', monospace;
  font-weight: 900;
  font-size: 20px;
  color: white;
  text-shadow: 0 0 10px #ff3d3d;
  z-index: 2;
}

/* Hiệu ứng tia chớp khi nổ */
.explosion-flash {
  position: absolute;
  inset: 0;
  background: white;
  border-radius: 50%;
  transform: scale(0);
  opacity: 0;
  z-index: 3;
  pointer-events: none;
  animation: bomb-explosion 6s infinite;
}

/* 1. Hiệu ứng rung của bom */
@keyframes bomb-shake {
  0%, 15%   { transform: scale(1) rotate(0deg); opacity: 1; }
  20%       { transform: scale(1.1) rotate(5deg); }
  25%       { transform: scale(1.2) rotate(-5deg); }
  30%       { transform: scale(1.3) rotate(5deg); }
  35%       { transform: scale(1.4) rotate(-5deg); }
  40%       { transform: scale(1.5) rotate(10deg); }
  45%       { transform: scale(1.6) rotate(-10deg); }
  50%       { transform: scale(1.6) rotate(0deg); }
  52%, 100% { transform: scale(0); opacity: 0; } /* Biến mất sau khi nổ */
}

/* 2. Hiệu ứng đếm ngược 3, 2, 1 thông qua nội dung CSS */
.bomb-count::after {
  content: '';
  animation: bomb-timer 6s infinite;
}

@keyframes bomb-timer {
  0%, 15%   { content: '';   opacity: 0; }
  20%, 29%  { content: '3';  opacity: 1; }
  30%, 39%  { content: '2';  opacity: 1; }
  40%, 49%  { content: '1';  opacity: 1; }
  50%, 100% { content: '';   opacity: 0; }
}

/* 3. Hiệu ứng nổ loé sáng */
@keyframes bomb-explosion {
  0%, 49%   { transform: scale(0); opacity: 0; }
  50%       { transform: scale(0); opacity: 1; }
  51%       { transform: scale(3); opacity: 1; background: #ffaa00; }
  55%       { transform: scale(4); opacity: 0; background: white; }
  100%      { transform: scale(0); opacity: 0; }
}

/* =============================================
   TÀU CHIẾN BUTTON
   ============================================= */
#tauchien {
  border-color: rgba(0, 200, 255, 0.2);
}

#tauchien .ship-emoji {
  font-size: 24px;
  display: block;
  animation: shipRock 3s ease-in-out infinite;
  transform-origin: center bottom;
  position: relative;
  z-index: 2;
}

@keyframes shipRock {
  0%, 100% { transform: rotate(-4deg) translateY(0px); }
  25%      { transform: rotate(0deg)  translateY(-2px); }
  50%      { transform: rotate(4deg)  translateY(0px); }
  75%      { transform: rotate(0deg)  translateY(-2px); }
}

/* Sóng dưới tàu */
#tauchien .ship-wave {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  opacity: 0.6;
  animation: waveShift 2s ease-in-out infinite;
  letter-spacing: -2px;
}

@keyframes waveShift {
  0%, 100% { transform: translateX(-50%) translateY(0px); opacity: 0.5; }
  50%      { transform: translateX(-50%) translateY(2px);  opacity: 0.85; }
}

</style>
</head>

<body>

<audio id="bgm" loop preload="auto">
  <source src="music/ocean1.mp3" type="audio/mpeg">
</audio>

<canvas id="bg"></canvas>

<!-- ===== UTILITY BAR ===== -->
<div class="utility-container">

  <button id="toggleBar" class="toggle-btn">
    <i class="fa-solid fa-bars"></i>
  </button>

  <div id="utilityBar" class="utility-bar">

    <!-- Word Game -->
    <button class="util-btn" id="word-game" title="Word Game">
  <div class="tile">
    <span class="tile-letter" id="word-letter">W</span>
  </div>
</button>

    <!-- Caro -->
    <button class="util-btn" id="gamecaro" title="Caro">
      <svg viewBox="0 0 100 100" width="36" height="36">
        <g class="grid">
          <line x1="33" y1="0"   x2="33"  y2="100"/>
          <line x1="66" y1="0"   x2="66"  y2="100"/>
          <line x1="0"  y1="33"  x2="100" y2="33"/>
          <line x1="0"  y1="66"  x2="100" y2="66"/>
        </g>
        <circle class="o o1" cx="17" cy="50" r="9"/>
        <circle class="o o2" cx="50" cy="50" r="9"/>
        <circle class="o o3" cx="83" cy="50" r="9"/>
        <line class="win-line" x1="0" y1="50" x2="100" y2="50"/>
        <g class="x-static" transform="translate(50,17)">
          <line x1="-6" y1="-6" x2="6" y2="6"/>
          <line x1="6"  y1="-6" x2="-6" y2="6"/>
        </g>
        <g class="x-static" transform="translate(83,17)">
          <line x1="-6" y1="-6" x2="6" y2="6"/>
          <line x1="6"  y1="-6" x2="-6" y2="6"/>
        </g>
        <g class="x-static" transform="translate(17,83)">
          <line x1="-6" y1="-6" x2="6" y2="6"/>

  const LETTERS = [
  { ch: 'W'},
  { ch: 'O'},
  { ch: 'R'},
  { ch: 'D'},
  { ch: 'G'},
  { ch: 'A'},
  { ch: 'M'},
  { ch: 'E'},
];

let idx = 0;
const elLetter = document.getElementById('word-letter');

setInterval(() => {
  idx = (idx + 1) % LETTERS.length;
  elLetter.classList.remove('pop');
  void elLetter.offsetWidth;
  elLetter.textContent = LETTERS[idx].ch;
  elLetter.classList.add('pop');
}, 900);
