<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thấp hay Cao - Shadows Version</title>
<style>
  /* --- CÁC STYLE CSS CŨ CỦA BẠN --- */
  :root {
    --bg: #f5f0e8;
    --ink: #1a1a2e;
    --blue: #3a7bd5;
    --red: #c0392b;
    --green: #2a9d8f;
    --dash: #bbb;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body,html {
    font-family: Tahoma, sans-serif;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    touch-action: none;
    height: 100vh; 
    height: 100dvh; 
    width: 100vw;
    overflow: hidden;
    position: fixed; 
}

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(0,0,0,0.032) 28px, rgba(0,0,0,0.032) 29px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── START SCREEN ── */
  #start-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 100;
    gap: 22px;
  }

  .game-title {
    font-size: 58px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.05;
    text-align: center;
    letter-spacing: -1px;
  }

  .game-title span { color: var(--blue); }

  .title-decoration {
    font-size: 11px;
    color: #999;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .how-to {
    display: flex;
    flex-direction: column;
    gap: 9px;
    background: white;
    border: 2px solid #ddd;
    border-radius: 10px;
    padding: 14px 22px;
    font-size: 14px;
    color: var(--ink);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.08);
    max-width: 280px;
    width: 100%;
  }

  .how-to-title {
    font-weight: 700;
    font-size: 13px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }

  .how-to-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .how-to-arrow {
    font-size: 18px;
    width: 24px;
    text-align: center;
    color: var(--blue);
    font-weight: 700;
  }

  .box-sample {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 1px 8px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 13px;
  }

  .box-sample.blue  { border: 2px solid var(--blue); color: var(--blue); background: white; }
  .box-sample.red-s { border: 2px solid var(--red);  color: #111; background: #f8d7d4; }

  #btn-start {
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 14px 48px;
    font-family: Tahoma, sans-serif;
    font-size: 18px;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
  }

  #btn-start:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 rgba(0,0,0,0.2); }
  #btn-start:active { transform: translate(2px,2px);   box-shadow: 2px 2px 0 rgba(0,0,0,0.2); }

  /* ── GAME AREA ── */
  #game-area {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: none;
    flex-direction: column;
  }

  #field {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #danger-line {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    border-top: 2px dashed var(--dash);
    pointer-events: none;
    z-index: 10;
  }

  /* ── CẬP NHẬT: Hiệu ứng đổ bóng cho ô số ── */
  .num-box {
    position: absolute;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    cursor: default;
    user-select: none;
    white-space: nowrap;
    padding: 4px 11px;
    font-size: 18px;
    opacity: 0.4;
    font-family: Tahoma, sans-serif;
    transition: transform 0.1s ease, border-width 0.1s ease, box-shadow 0.1s ease;

    /* Bóng cơ bản: Nhẹ nhàng, lệch sang phải và xuống dưới */
    box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
  }

  /* CSS cho đối tượng đang được chọn (targeted) */
  .num-box.targeted {
    border-width: 4px !important;
    transform: translateX(-50%) scale(1.15) !important;
    z-index: 5;
    opacity: 1 !important;
    
    /* Bóng khi Targeted: To hơn, đậm hơn và thêm hiệu ứng glow màu xanh */
    box-shadow: 5px 5px 12px rgba(0, 0, 0, 0.2), 0 0 15px rgba(58, 123, 213, 0.3);
  }

  .num-box.blue-box {
    border: 2px solid var(--blue);
    background: white;
    color: var(--blue);
  }

  .num-box.red-box {
    border: 2px solid var(--red);
    background: #f8d7d4;
    color: #111;
  }

  .num-box.correct {
    background: var(--green) !important;
    border-color: var(--green) !important;
    color: white !important;
    animation: pop 0.3s ease;
  }

  .num-box.wrong {
    background: var(--red) !important;
    border-color: var(--red) !important;
    color: white !important;
    animation: shake 0.3s ease;
  }

  @keyframes pop {
    0%   { transform: translateX(-50%) scale(1); }
    50%  { transform: translateX(-50%) scale(1.22); }
    100% { transform: translateX(-50%) scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(calc(-50% + 0px)); }
    25%      { transform: translateX(calc(-50% - 7px)); }
    75%      { transform: translateX(calc(-50% + 7px)); }
  }

  /* ── BOTTOM PANEL ── */
  #bottom-panel {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--bg);
    border-top: 2px solid rgba(0,0,0,0.08);
    padding: 10px 16px 12px;
    z-index: 20;
    position: relative;
  }

  #stats-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 340px;
  }

  #hud {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
    min-width: 80px;
  }

  #lives-display {
    font-size: 18px;
    letter-spacing: 2px;
  }

  #speed-bar-wrap {
    width: 100%;
    max-width: 340px;
    height: 3px;
    background: rgba(0,0,0,0.08);
    border-radius: 2px;
  }

  #speed-bar {
    height: 100%;
    background: var(--blue);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s;
  }

  #player-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  #player-box {
    width: 86px;
    height: 48px;
    border: 3px solid var(--ink);
    border-radius: 6px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.18);
    font-family: Tahoma, sans-serif;
  }

  #swipe-hint {
    font-size: 11px;
    color: #aaa;
    letter-spacing: 1px;
  }

  @keyframes swipeLeft {
    0%   { transform: translateX(0); }
    40%  { transform: translateX(-28px); }
    100% { transform: translateX(0); }
  }
  @keyframes swipeRight {
    0%   { transform: translateX(0); }
    40%  { transform: translateX(28px); }
    100% { transform: translateX(0); }
  }
  .player-swipe-left  { animation: swipeLeft  0.25s ease forwards; }
  .player-swipe-right { animation: swipeRight 0.25s ease forwards; }

  #gameover-screen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(245,240,232,0.97);
    z-index: 200;
    gap: 18px;
  }

  .go-title {
    font-size: 60px;
    font-weight: 700;
    color: var(--red);
    line-height: 1;
  }

  .go-score {
    font-size: 15px;
    color: #666;
    text-align: center;
    line-height: 2;
  }

  .go-score .big {
    font-size: 42px;
    color: var(--blue);
    font-weight: 700;
    display: block;
    line-height: 1;
  }

  #btn-replay {
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 12px 40px;
    font-family: Tahoma, sans-serif;
    font-size: 16px;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
  }

  #btn-replay:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 rgba(0,0,0,0.2); }
  #btn-replay:active { transform: translate(2px,2px);   box-shadow: 2px 2px 0 rgba(0,0,0,0.2); }

  #feedback {
    position: fixed;
    top: 44%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-size: 48px;
    font-weight: 700;
    pointer-events: none;
    z-index: 150;
    opacity: 0;
    transition: opacity 0.12s;
    font-family: Tahoma, sans-serif;
  }
  
  /* Hiệu ứng di chuyển mượt mà khi bị đẩy lên */
.num-box.pushing-up {
  transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s !important;
}
  
/* Container bao ngoài để tránh tràn màn hình */
.tear-wrapper {
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none; /* Không chặn chạm/vuốt */
}

.tear-half {
    position: absolute;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: #fdfaf0; /* Màu giấy */
    background-image: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(0,0,0,0.03) 28px, rgba(0,0,0,0.03) 29px);
    overflow: hidden;
    pointer-events: none;
  z-index:9999;
}

/* Nửa trái */
.tear-left {
    left: 0;
    clip-path: polygon(0 0, 50% 0, 48% 25%, 52% 50%, 47% 75%, 50% 100%, 0 100%);
    animation: tearLeftMove 1s ease-out forwards;
}

/* Nửa phải */
.tear-right {
    left: 0;
    clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%, 47% 75%, 52% 50%, 48% 25%);
    animation: tearRightMove 1s ease-out forwards;
}

@keyframes tearLeftMove {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%) rotate(-5deg); opacity: 0; }
}

@keyframes tearRightMove {
    0% { transform: translateX(0); }
    100% { transform: translateX(100%) rotate(5deg); opacity: 0; }
}

.maintenance-overlay {
      position: fixed;
      background: white;
opacity:0.3;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;

      pointer-events: all; /* chặn toàn bộ click xuống dưới */
    }

    .maintenance-box {
      text-align: center;
opacity:1;
      padding: 30px;
      max-width: 400px;
    }

    .maintenance-box h1 {
      font-size: 28px;
      margin-bottom: 15px;
opacity:1;
    }

    .maintenance-box p {
      font-size: 16px;
opacity:1
      opacity: 0.8;
      line-height: 1.5;
    }

    .icon {
      font-size: 50px;
      margin-bottom: 20px;
opacity:1;
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }


</style>
</head>
<body>

<div id="start-screen">
  <div class="game-title">THẤP<br/><span>HAY CAO</span></div>
  <div class="title-decoration">vuốt để so sánh</div>
  <div class="how-to">
    <div class="how-to-title">Cách chơi</div>
    <div class="how-to-row">
      <div class="how-to-arrow">←</div>
      <div>Vuốt trái nếu ô rơi <strong>CAO hơn</strong></div>
    </div>
    <div class="how-to-row">
      <div class="how-to-arrow">→</div>
      <div>Vuốt phải nếu ô rơi <strong>THẤP hơn</strong></div>
    </div>
    <div style="border-top:1px dashed #eee; margin:4px 0;"></div>
    <div class="how-to-row">
      <div class="box-sample red-s">42</div>
      <div style="color:#888; font-size:13px;">Ô đỏ: Làm ngược lại logic trên</div>
    </div>
  </div>
  <button id="btn-start">BẮT ĐẦU</button>
</div>

<div id="game-area">
  <div id="field"><div id="danger-line"></div></div>
  <div id="bottom-panel">
    <div id="stats-row">
      <div id="hud">0</div>
      <div id="lives-display">❤️❤️❤️❤️❤️</div>
    </div>
    <div id="speed-bar-wrap"><div id="speed-bar"></div></div>
    <div id="player-row">
      <div id="player-box">—</div>
      <div id="swipe-hint">← THẤP HƠN &nbsp;|&nbsp; CAO HƠN →</div>
    </div>
  </div>
</div>

<div id="gameover-screen">
  <div class="go-title">HẾT RỒI!</div>
  <div class="go-score"><span class="big" id="final-score">0</span> điểm</div>
  <button id="btn-replay">CHƠI LẠI</button>
</div>

<div id="feedback"></div>
  <div class="maintenance-overlay">
    <div class="maintenance-box">
      <div class="icon">⚙️</div>
      <h1>Hệ thống đang bảo trì</h1>
      <p>
        Bảo trì để nâng cấp hệ thống.<br>
        Vui lòng quay lại sau.
      </p>
    </div>
  </div>

<script>
// --- CÁC JAVASCRIPT CŨ CỦA BẠN (ĐÃ TÍCH HỢP TRÁNH TRÙNG SỐ VÀ HIGHLIGHT TARGET) ---
// --- CONFIG & STATE ---
const NUM_LANES        = 4;
const MIN_GAP          = 120;
const BASE_SPEED       = 30;
const MAX_SPEED_PCT    = 3.0;
const SPEED_INC_PER_S  = 0.002;
const EXPR_CHANCE      = 0.15;
const RED_CHANCE       = 0.08;
const MAX_LIVES        = 6;
const SCORE_PER_SEC    = 458;
const SCORE_NORMAL     = 300;
const SCORE_EXPR       = 500;
const SCORE_RED        = 1000;
const SCORE_RED_EXPR   = 2500;

let boxes       = [];
let playerValue = 0;
let score       = 0;
let displayedScore = 0;
let lives       = MAX_LIVES;
let gameRunning = false;
let animFrame   = null;
let lastTime    = null;
let inputLocked = false; // Biến quan trọng gây lỗi kẹt input
let spawnTimer  = 0;
let totalTime   = 0;
let touchStartX = null;

const fieldEl    = () => document.getElementById('field');
const playerEl   = () => document.getElementById('player-box');
const hudEl      = () => document.getElementById('hud');
const livesEl    = () => document.getElementById('lives-display');
const speedBarEl = () => document.getElementById('speed-bar');

function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

// --- LOGIC GAME (Giữ nguyên các hàm bổ trợ) ---
function spawnInLane(lane, startY) {
  // 1. Tính tâm của làn đường như bình thường
  const laneWidth = fieldEl().clientWidth / NUM_LANES;
  let x = Math.round((lane * laneWidth) + (laneWidth / 2));

  const isRed = Math.random() < RED_CHANCE;
  const isExpr = Math.random() < EXPR_CHANCE;
  let displayText, numValue;

  // Logic tạo số/phép tính (giữ nguyên)
  let safetyBreak = 0;
  do {
    if (isExpr) {
      const e = genExpression();
      displayText = e.display;
      numValue = e.value;
    } else {
      numValue = randInt(1, 99);
      displayText = String(numValue);
    }
    safetyBreak++;
  } while (numValue === playerValue && safetyBreak < 50);

  const el = document.createElement('div');
  el.className = 'num-box ' + (isRed ? 'red-box' : 'blue-box');
  el.textContent = displayText;
  
  const y = startY !== undefined ? startY : -45 - randInt(0, 20);
  el.style.top  = y + 'px';
  el.style.left = x + 'px';
  el.style.transform = 'translateX(-50%)';
  
  fieldEl().appendChild(el);

  // 2. TỐI ƯU TRÀN CẠNH: Ràng buộc vị trí sau khi render
  // Chúng ta dùng requestAnimationFrame để đợi ô số có kích thước thực tế
  requestAnimationFrame(() => {
    const rect = el.getBoundingClientRect();
    const halfWidth = rect.width / 2;
    const screenWidth = fieldEl().clientWidth;
    const padding = 10; // Cách mép màn hình tối thiểu 10px

    let finalX = x;

    // Nếu mép trái của ô vượt ra ngoài màn hình
    if (x - halfWidth < padding) {
      finalX = halfWidth + padding;
    } 
    // Nếu mép phải của ô vượt ra ngoài màn hình
    else if (x + halfWidth > screenWidth - padding) {
      finalX = screenWidth - halfWidth - padding;
    }

    el.style.left = finalX + 'px';
  });

  boxes.push({ el, lane, y, value: numValue, isRed, isExpr });
}


function genExpression() {
  const ops = ['+', '-', '*', '/'];
  for (let i = 0; i < 60; i++) {
    const op = ops[randInt(0, 3)];
    let a, b, res;
    if (op === '+') { a = randInt(1, 89); b = randInt(1, 99 - a); res = a + b; }
    else if (op === '-') { a = randInt(2, 99); b = randInt(1, a - 1); res = a - b; }
    else if (op === '*') { a = randInt(2, 9);  b = randInt(2, 9);  res = a * b; }
    else { res = randInt(2, 19); b = randInt(2, 9); a = res * b; }
    if (res >= 1 && res <= 99 && res !== playerValue) {
      return { display: `${a}${op === '*' ? '×' : op === '/' ? '÷' : op}${b}`, value: res };
    }
  }
  return { display: playerValue === 8 ? '5+4' : '5+3', value: playerValue === 8 ? 9 : 8 };
}

function findClosestBox() {
  if (boxes.length === 0) return null;
  return boxes.reduce((prev, curr) => (curr.y > prev.y ? curr : prev), boxes[0]);
}
  
  

// --- XỬ LÝ KHI Ô CHẠM VẠCH ĐÁY (LỌT LƯỚI) ---
// --- XỬ LÝ KHI Ô CHẠM VẠCH ĐÁY (CÓ HIỆU ỨNG DI CHUYỂN LÊN) ---
function handleMiss() {
  const target = findClosestBox();
  if (target) {
    target.el.remove();
    boxes = boxes.filter(b => b !== target);
  }

  // Khoảng cách đẩy ngược lên
  const pushBackDistance = 80; 

  boxes.forEach(box => {
    // 1. Thêm class tạo hiệu ứng di chuyển mượt
    box.el.classList.add('pushing-up');
    
    // 2. Cập nhật tọa độ logic và giao diện
    box.y -= pushBackDistance;
    box.el.style.top = box.y + 'px';
    
    // 3. Sau khi hiệu ứng chạy xong (0.4s), gỡ bỏ class để trả lại quyền kiểm soát cho hàm loop
    setTimeout(() => {
      if (box.el) {
        box.el.classList.remove('pushing-up');
      }
    }, 10000);
  });

  // Trừ mạng và phản hồi
  lives--;
  livesEl().textContent = '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, MAX_LIVES - lives));
  showFeedback("");
  
  if (lives <= 0) {
    triggerGameOver();
  }
}


// --- CẬP NHẬT HÀM LOOP ---
function loop(ts) {
  if (!gameRunning) return;
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  totalTime += dt;

  score += SCORE_PER_SEC * dt;
  displayedScore = Math.min(score, displayedScore + Math.max(SCORE_PER_SEC, (score - displayedScore) * 6) * dt);
  hudEl().textContent = Math.floor(displayedScore).toLocaleString('vi-VN');

  const mult = Math.min(MAX_SPEED_PCT, 1 + totalTime * SPEED_INC_PER_S);
  speedBarEl().style.width = ((mult - 1) / (MAX_SPEED_PCT - 1) * 100) + '%';

   const target = findClosestBox();
  let missed = false;

  boxes.forEach(box => {
    box.y += (BASE_SPEED * Math.min(MAX_SPEED_PCT, 1 + totalTime * SPEED_INC_PER_S)) * dt;
    box.el.style.top = box.y + 'px';
    
    // Hiệu ứng mờ/rõ dựa trên vị trí
    if (box.y >= 0) box.el.style.opacity = "1";
    else box.el.style.opacity = "0.4";

    if (box === target) box.el.classList.add('targeted');
    else box.el.classList.remove('targeted');

    // Kiểm tra chạm đáy (sử dụng mép dưới của ô số)
    if (box.y + 45 >= fieldEl().clientHeight) {
      missed = true;
    }
  });

  if (missed) {
    handleMiss();
    if (!gameRunning) return; 
  }

  // --- QUẢN LÝ SINH Ô (QUÉT LANE ĐỘC LẬP - ĐẢM BẢO ĐỘ KHÓ) ---
  spawnTimer += dt;
  
  // 1. TỐC ĐỘ SPAWN (Rất quan trọng để giữ độ khó)
  // Giảm thời gian chờ xuống mức rất thấp. Càng chơi lâu, game càng cố gắng thả ô nhanh nhất có thể.
  const spawnDelayLimit = Math.max(0.3, 1.8 - totalTime * 0.02);

  if (spawnTimer >= spawnDelayLimit) {
    
    // 2. ĐỊNH NGHĨA KHOẢNG CÁCH AN TOÀN (Tính bằng Pixel)
    const SAME_LANE_GAP = 110;     // Khoảng cách an toàn TRONG CÙNG 1 LANE (tránh nối đuôi quá sát)
    const ADJACENT_LANE_GAP = 65;  // Khoảng cách an toàn VỚI LANE HAI BÊN (tránh đè ngang/chéo)

    const validLanes = [];

    // 3. KIỂM TRA ĐỘC LẬP TỪNG LANE (Dành cho 5 Lanes)
    for (let i = 0; i < NUM_LANES; i++) {
      let isBlocked = false;

      // Quét qua tất cả các ô đang có trên màn hình
      for (let box of boxes) {
        // Luật 1: Cùng lane -> Phải cách xa nhau ít nhất SAME_LANE_GAP
        if (box.lane === i && box.y < SAME_LANE_GAP) {
          isBlocked = true;
          break; // Bị chặn, không cần kiểm tra thêm ô khác
        }
        
        // Luật 2: Lane hàng xóm (trái/phải) -> Phải cách xa nhau ít nhất ADJACENT_LANE_GAP
        if ((box.lane === i - 1 || box.lane === i + 1) && box.y < ADJACENT_LANE_GAP) {
          isBlocked = true;
          break;
        }
      }

      // Nếu lane này vượt qua cả 2 bài test, đưa nó vào danh sách sẵn sàng
      if (!isBlocked) {
        validLanes.push(i);
      }
    }

    // 4. THỰC THI SPAWN
    if (validLanes.length > 0) {
      // Chọn ngẫu nhiên 1 lane trong số các lane an toàn
      const pickedLane = validLanes[randInt(0, validLanes.length - 1)];
      spawnInLane(pickedLane);
      
      // QUAN TRỌNG: Chỉ reset timer KHI VÀ CHỈ KHI thả được ô.
      // Nếu các lane đang kẹt, timer vẫn giữ nguyên để chờ lane trống là thả ngay!
      spawnTimer = 0; 
    }
  }

  animFrame = requestAnimationFrame(loop);
}

// --- CẬP NHẬT HÀM TRIGGER GAME OVER ---
function triggerGameOver() {
  gameRunning = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  
  // Hiển thị màn hình kết thúc
  document.getElementById('final-score').textContent = Math.floor(score).toLocaleString('vi-VN');
  document.getElementById('gameover-screen').style.display = 'flex';
  
  // Dọn dẹp sạch các ô còn lại trên màn hình
  fieldEl().querySelectorAll('.num-box').forEach(e => e.remove());
  boxes = [];
}


// --- XỬ LÝ ĐÁP ÁN (CHỈ CHO PHÉP KHI Ô ĐÃ HIỆN NGUYÊN VẸN) ---
function handleAnswer(isSwipeRight) {
  if (!gameRunning) return;

  const target = findClosestBox();
  
  // KIỂM TRA ĐIỀU KIỆN XUẤT HIỆN:
  // Nếu tọa độ y < 0, nghĩa là ô vẫn còn đang "lú" một phần ở cạnh trên màn hình.
  // Chúng ta sẽ chặn vuốt để tránh người chơi đoán mò.
  if (!target || target.y < 0) {
    console.log("Ô số chưa vào vùng chiến đấu!");
    return; 
  }

  // Nếu đã vượt qua kiểm tra, xử lý như bình thường
  boxes = boxes.filter(b => b !== target);

  let guessIsHigher = !isSwipeRight; 
  const effectiveHigher = target.isRed ? !guessIsHigher : guessIsHigher;
  const correct = effectiveHigher ? (target.value > playerValue) : (target.value < playerValue);

  // Hiệu ứng vuốt của hộp người chơi
  playerEl().classList.remove('player-swipe-left','player-swipe-right');
  void playerEl().offsetWidth;
  playerEl().classList.add(isSwipeRight ? 'player-swipe-right' : 'player-swipe-left');

  if (correct) {
    playerValue = target.value;
    playerEl().textContent = playerValue;

    const pts = target.isExpr ? (target.isRed ? SCORE_RED_EXPR : SCORE_EXPR) : (target.isRed ? SCORE_RED : SCORE_NORMAL);
    score += pts;
    showFeedback('+' + pts, target.isRed ? '#c0392b' : '#2a9d8f');

    target.el.classList.add('correct');
    setTimeout(() => target.el.remove(), 250);
  } else {
    loseLife(target);
  }
}


function loseLife(badBox) {
  if (badBox) {
    badBox.el.classList.add('wrong');
    setTimeout(() => badBox.el.remove(), 300);
  }
  
  lives--;
  livesEl().textContent = '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, MAX_LIVES - lives));
  showFeedback('✗', '#c0392b');
  
  if (lives <= 0) {
    triggerGameOver();
  }
}

// --- SỬA LẠI HÀM INIT ĐỂ KHÔNG CÒN BIẾN KHÓA ---



// --- RESET GAME (SỬA LỖI CHÍNH) ---
function initGame() {
  // 1. Reset các biến logic về mặc định
  inputLocked = false; 
  touchStartX = null;
  gameRunning = false;
  lastTime = null;
  if (animFrame) cancelAnimationFrame(animFrame);

  // 2. Dọn dẹp màn hình
  fieldEl().querySelectorAll('.num-box').forEach(e => e.remove());
  boxes = []; 
  score = 0; 
  displayedScore = 0; 
  lives = MAX_LIVES; 
  totalTime = 0;
  spawnTimer = 0;

  // 3. Cập nhật giao diện
  livesEl().textContent = '❤️'.repeat(MAX_LIVES);
  playerValue = randInt(1, 99); 
  playerEl().textContent = playerValue;
  
  // 4. Khởi tạo ô mới và bắt đầu vòng lặp
  for (let l = 0; l < NUM_LANES; l++) spawnInLane(l, -(l * 148 + 55));
  gameRunning = true; 
  animFrame = requestAnimationFrame(loop);
}


function showFeedback(char, color) {
  const el = document.getElementById('feedback');
  el.textContent = char; el.style.color = color; el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 600);
}

// --- CẢI THIỆN ĐỘ NHẠY KHI VUỐT ---
window.addEventListener('touchstart', e => { 
  touchStartX = e.touches[0].clientX; 
}, { passive: false });

window.addEventListener('touchmove', e => {
  // Ngăn cuộn trang khi đang chơi game để tăng độ mượt
  if (gameRunning) e.preventDefault(); 
}, { passive: false });

window.addEventListener('touchend', e => {
  if (touchStartX === null || !gameRunning || inputLocked) return;
  
  const dx = e.changedTouches[0].clientX - touchStartX;
  const threshold = 15; // Giảm xuống 15px để nhạy hơn
  
  if (Math.abs(dx) > threshold) {
    handleAnswer(dx > 0); // dx > 0 là vuốt sang phải
  }
  touchStartX = null;
}, { passive: false });

// Điều khiển bằng bàn phím
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  handleAnswer(false);
  if (e.key === 'ArrowRight') handleAnswer(true);
});

// Các nút bấm chuyển màn hình
document.getElementById('btn-start').addEventListener('click', () => {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-area').style.display = 'flex';
  initGame();
});

document.getElementById('btn-replay').addEventListener('click', () => {
  document.getElementById('gameover-screen').style.display = 'none';
  initGame();
});

</script>
