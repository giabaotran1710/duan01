<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Khinh Khí Cầu</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:linear-gradient(#74d7ff,#dff8ff);
  font-family:'Tahoma',sans-serif;
}
canvas{display:block}
#start{
  position:fixed;
  inset:0;
  z-index:10;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  background:transparent;
  pointer-events:none;
}

#playBtn{
  position:relative;
  overflow:hidden;

  padding:5px 34px;
  border:2px solid rgba(255,255,255,.95);
  border-radius:999px;

  font-size:20px;
  font-weight:900;
  letter-spacing:.5px;

  color:#07324d;
  background:rgba(255,255,255,.82);

  box-shadow:
    0 10px 28px rgba(0,0,0,.22),
    inset 0 1px 0 rgba(255,255,255,.8);

  backdrop-filter:blur(4px);

  pointer-events:auto;
}

/* shine */
#playBtn::before{
  content:"";
  position:absolute;
  top:-40%;
  left:-120%;

  width:65%;
  height:180%;

  background:linear-gradient(
    120deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,.18) 35%,
    rgba(255,255,255,.9) 50%,
    rgba(255,255,255,.18) 65%,
    rgba(255,255,255,0) 100%
  );

  transform:rotate(18deg);

  animation:shineMove 4.5s linear infinite;
}

@keyframes shineMove{
  0%{
    left:-120%;
  }
  100%{
    left:160%;
  }
}
  
#score{
  position:fixed;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  z-index:20;

  min-width:100px;
  min-height: 10px;
  padding:3px 22px;

  display:flex;
  align-items:center;
  justify-content:center;

  border:1px solid rgba(255,255,255,1);
  border-radius:50px;

  background:rgba(255,255,255,.4);
  backdrop-filter:blur(0px);

  color:#000;
  font-weight:900;
  font-size:24px;

  box-shadow:
    0 6px 18px rgba(0,0,0,.18),
    inset 0 0px 0 rgba(255,255,255,.5);
}
  
 #deviceBlock{
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:linear-gradient(180deg,#061b33,#020914);
  color:white;
  text-align:center;
}

#deviceBlock.show{
  display:flex;
}

.block-box{
  max-width:340px;
  padding:24px 20px;
  border-radius:22px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
  box-shadow:0 16px 40px rgba(0,0,0,.35);
}

.block-icon{
  font-size:48px;
  margin-bottom:14px;
}

.block-title{
  font-size:22px;
  font-weight:900;
  margin-bottom:10px;
}

.block-text{
  font-size:14px;
  line-height:1.5;
  color:rgba(255,255,255,.75);
}
  
#score.game-over{
  top:28%;
  transform:translateX(-50%) scale(1.65);

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  padding:0;
  min-width:0;

  border:none;
  background:transparent;
  box-shadow:none;

  color:#07324d;
  transition:top .65s cubic-bezier(.22,1.35,.36,1),
             transform .65s cubic-bezier(.22,1.35,.36,1);
}

.score-label{
  font-size:14px;
  font-weight:800;
  line-height:1.1;
  -webkit-text-stroke: 1px rgba(255,255,255,.9);
  paint-order: stroke fill;
}

.score-value{
  font-size:30px;
  font-weight:900;
  line-height:1.1;
  -webkit-text-stroke: 1px rgba(255,255,255,.95);
  paint-order: stroke fill;
}
  
  .mode-panel{
  padding:12px 14px;
  margin-bottom:16px;
  border-radius:18px;
  background:rgba(255,255,255,.38);
  border:1px solid rgba(255,255,255,.75);
  box-shadow:0 8px 24px rgba(0,0,0,.16);
  backdrop-filter:blur(4px);
  pointer-events:auto;
}

.mode-title{
  text-align:center;
  font-size:12px;
  font-weight:900;
  color:#07324d;
  margin-bottom:8px;
}

.mode-box{
  display:flex;
  gap:8px;
}

.mode-btn{
  position:relative;
  overflow:hidden;

  padding:7px 10px;
  border:1px solid rgba(255,255,255,.9);
  border-radius:999px;

  background:rgba(255,255,255,.55);
  color:#07324d;

  font-weight:900;
  font-size:12px;
  letter-spacing:.2px;

  box-shadow:none;
  backdrop-filter:none;
}

.mode-btn.active{
  background:#07324d;
  color:white;
  border-color:#ffffff;
  box-shadow:0 0 0 2px rgba(255,255,255,.45),
             0 0 14px rgba(7,50,77,.35);
}
#start.game-over-menu{
  justify-content:center;
}

#start.game-over-menu .mode-panel{
  order:2;
  margin-top:14px;
  margin-bottom:0;
}

#start.game-over-menu #playBtn{
  order:1;
}
</style>
</head>

<body>
 <div id="deviceBlock">
  <div class="block-box">
    <div class="block-icon">📱</div>
    <div class="block-title">Có lỗi xảy ra!</div>
    <div class="block-text">
      Trò chơi chỉ tương thích ở chế độ màn hình dọc.
    </div>
  </div>
</div>

<div id="start">
 <div class="mode-panel">
  <div class="mode-title">CHỌN CHẾ ĐỘ</div>

  <div class="mode-box">
    <button class="mode-btn active" data-mode="normal">THƯỜNG</button>
    <button class="mode-btn" data-mode="hard">KHÓ</button>
    <button class="mode-btn" data-mode="extreme">SIÊU KHÓ</button>
  </div>
</div>

<button id="playBtn">BẮT ĐẦU</button>
</div>

<div id="score">0m</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const start = document.getElementById("start");
const playBtn = document.getElementById("playBtn");

let W,H,dpr;
  


function resize(){
  dpr = window.devicePixelRatio || 1;
  W = innerWidth;
  H = innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
addEventListener("resize",resize);

let tilt = 0;
let gameRunning = false;
let distance = 0;
let skyTime = 0;
let dayTime = 0;
let cameraY = 0;
let introPlaying = false;
let introProgress = 0;
let gameStarted = false;
let launchStartY = 0;
  
let currentMode = "normal";

const modeConfig = {
  normal: {
    balloonY: -40,
    obstacleSpeedBonus: 0,
    spawnLimit: 55,
    edgeLimit: 100,
    minBlockW: 38,
    maxBlockW: 72
  },

  hard: {
    balloonY: -100,
    obstacleSpeedBonus: 0.45,
    spawnLimit: 43,
    edgeLimit: 75,
    minBlockW: 42,
    maxBlockW: 82
  },

  extreme: {
    balloonY: -150,
    obstacleSpeedBonus: 0.9,
    spawnLimit: 34,
    edgeLimit: 55,
    minBlockW: 46,
    maxBlockW: 94
  }
};

document.querySelectorAll(".mode-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentMode = btn.dataset.mode;
  });
});

 const dayPhases = [
  {
    name:"Rạng sáng",
    top:"#203b78",
    mid:"#ff9f7a",
    bottom:"#ffe6b8",
    mountain:"rgba(45,120,160,.38)",
    ground:"#3f9f78",
    cloud:"rgba(255,235,210,.78)"
  },
  {
    name:"Sáng",
    top:"#42c8f5",
    mid:"#b8f3ff",
    bottom:"#eaffff",
    mountain:"rgba(70,185,205,.35)",
    ground:"#49b37f",
    cloud:"rgba(255,255,255,.85)"
  },
  {
    name:"Trưa",
    top:"#1ebfff",
    mid:"#9eefff",
    bottom:"#ffffff",
    mountain:"rgba(55,180,205,.32)",
    ground:"#55c783",
    cloud:"rgba(255,255,255,.9)"
  },
  {
    name:"Chiều",
    top:"#ff9f55",
    mid:"#ffc178",
    bottom:"#ffe2b2",
    mountain:"rgba(180,115,95,.36)",
    ground:"#5baa70",
    cloud:"rgba(255,238,210,.82)"
  },
  {
    name:"Tối",
    top:"#13275f",
    mid:"#27508f",
    bottom:"#8c9fc0",
    mountain:"rgba(40,80,120,.42)",
    ground:"#2f7a5d",
    cloud:"rgba(220,235,255,.48)"
  },
  {
    name:"Đêm",
    top:"#06132e",
    mid:"#10285a",
    bottom:"#24436d",
    mountain:"rgba(20,55,90,.55)",
    ground:"#1f5d4d",
    cloud:"rgba(210,225,255,.34)"
  },
  {
    name:"Khuya",
    top:"#020817",
    mid:"#071735",
    bottom:"#13284a",
    mountain:"rgba(10,35,70,.6)",
    ground:"#173f38",
    cloud:"rgba(200,220,255,.24)"
  }
];
  
const balloon = {
  x: W / 2,
  y: H * 0.7,
  r: 20,
  vx: 0
};

let obstacles = [];
let clouds = [];
let stars = [];

function resetGame(){
  balloon.x = W / 2;
balloon.y = H - 95;
balloon.vx = 0;

distance = 0;
cameraY = 0;
introPlaying = false;
introProgress = 0;
gameStarted = false;
  obstacles = [];
  clouds = [];

  for(let i=0;i<8;i++){
    clouds.push({
      x:Math.random()*W,
      y:Math.random()*H,
      s:30+Math.random()*45,
      speed:.3+Math.random()*.5
    });
  }
}
  
function lerp(a,b,t){
  return a + (b - a) * t;
}
  
 function generateStars(){
  stars = [];

  for(let i=0;i<65;i++){
    stars.push({
      x:Math.random()*W,
      y:Math.random()*(H*.58),
      r:Math.random()*1.8 + .4,
      alpha:Math.random()*0.8 + 0.2,
      twinkle:Math.random()*0.03
    });
  }
}

function hexToRgb(hex){
  hex = hex.replace("#","");
  return {
    r:parseInt(hex.substring(0,2),16),
    g:parseInt(hex.substring(2,4),16),
    b:parseInt(hex.substring(4,6),16)
  };
}

function mixColor(a,b,t){
  const ca = hexToRgb(a);
  const cb = hexToRgb(b);

  const r = Math.round(lerp(ca.r, cb.r, t));
  const g = Math.round(lerp(ca.g, cb.g, t));
  const b2 = Math.round(lerp(ca.b, cb.b, t));

  return `rgb(${r},${g},${b2})`;
}

function getPhase(){
  const speed = 0.00195;
  const startIndex = 1; // 1 = Sáng

  dayTime = (startIndex + skyTime * speed) % dayPhases.length;

  const i = Math.floor(dayTime);
  const next = (i + 1) % dayPhases.length;
  const t = dayTime - i;

  return {
    name: dayPhases[i].name,
    top: mixColor(dayPhases[i].top, dayPhases[next].top, t),
    mid: mixColor(dayPhases[i].mid, dayPhases[next].mid, t),
    bottom: mixColor(dayPhases[i].bottom, dayPhases[next].bottom, t),
    mountain: dayPhases[i].mountain,
    ground: dayPhases[i].ground,
    cloud: dayPhases[i].cloud
  };
}

function spawnObstacle(){
  const cfg = modeConfig[currentMode];

  obstacles.push({
    x: Math.random() * (W - 60) + 30,
    y: -40,
    w: cfg.minBlockW + Math.random() * (cfg.maxBlockW - cfg.minBlockW),
    h: 22,
    speed: 2.4 + distance / 900 + cfg.obstacleSpeedBonus
  });
}

function drawBackground(){
  const phase = getPhase();

  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0, phase.top);
  sky.addColorStop(.55, phase.mid);
  sky.addColorStop(1, phase.bottom);

  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,H);

  if(phase.name === "Tối" || phase.name === "Đêm" || phase.name === "Khuya" || phase.name === "Rạng sáng"){
  drawStars();
  drawMoon();
}

  drawMountains(phase);
}

function drawMountains(phase){
  ctx.fillStyle = "rgba(48,170,190,.32)";
  ctx.beginPath();
  ctx.moveTo(0,H-120);
  for(let x=0;x<=W;x+=120){
    ctx.quadraticCurveTo(x+60,H-190-Math.sin(x)*35,x+120,H-120);
  }
  ctx.lineTo(W,H);
  ctx.lineTo(0,H);
  ctx.fill();

  ctx.fillStyle = "rgba(24,145,165,.28)";
  ctx.beginPath();
  ctx.moveTo(0,H-70);
  for(let x=0;x<=W;x+=140){
    ctx.quadraticCurveTo(x+70,H-150-Math.cos(x)*25,x+140,H-70);
  }
  ctx.lineTo(W,H);
  ctx.lineTo(0,H);
  ctx.fill();
}



function drawCoin(x,y){
  ctx.save();
  ctx.translate(x,y);

  const g = ctx.createRadialGradient(-7,-7,2,0,0,25);
  g.addColorStop(0,"#fff27a");
  g.addColorStop(.45,"#ffd21f");
  g.addColorStop(1,"#f4a000");

  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0,0,24,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = "#f49b00";
  ctx.lineWidth = 4;
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,.3)";
  ctx.beginPath();
  ctx.arc(-8,-9,7,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#ffb700";
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a = -Math.PI/2 + i * Math.PI * 2 / 5;
    const b = a + Math.PI / 5;
    ctx.lineTo(Math.cos(a)*10, Math.sin(a)*10);
    ctx.lineTo(Math.cos(b)*4, Math.sin(b)*4);
  }
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawUI(){
  ctx.fillStyle = "rgba(255,255,255,.28)";
  ctx.roundRect(W/2-95,22,190,58,20);
  ctx.fill();

  ctx.fillStyle = "#07324d";
  ctx.font = "900 34px Arial";
  ctx.textAlign = "center";
  ctx.fillText(Math.floor(distance) + " m", W/2, 61);

  drawCoin(42,42);

  ctx.fillStyle = "#07324d";
  ctx.font = "900 34px Arial";
  ctx.textAlign = "left";
  ctx.fillText("12", 82, 54);

  ctx.fillStyle = "rgba(0,90,140,.35)";
  ctx.roundRect(W-78,22,54,54,15);
  ctx.fill();

  ctx.fillStyle = "white";
  ctx.roundRect(W-58,35,8,28,5);
  ctx.roundRect(W-42,35,8,28,5);
  ctx.fill();
}
  
  function drawBalloon(){
  ctx.save();
  ctx.translate(balloon.x, balloon.y);

  ctx.scale(0.40,0.40);

  // bóng chính
  ctx.beginPath();
  ctx.moveTo(0,-70);
  ctx.bezierCurveTo(-58,-68,-70,-12,-33,28);
  ctx.bezierCurveTo(-22,40,22,40,33,28);
  ctx.bezierCurveTo(70,-12,58,-68,0,-70);
  ctx.closePath();

  const base = ctx.createLinearGradient(-45,-70,45,35);
  base.addColorStop(0,"#ffef62");
  base.addColorStop(.5,"#f3422f");
  base.addColorStop(1,"#a92318");
  ctx.fillStyle = base;
  ctx.fill();

  ctx.lineWidth = 4;
  ctx.strokeStyle = "#9b3a20";
  ctx.stroke();

  // sọc vàng đỏ
  const stripes = [
    [-42,-58,-30,25,"#f03c2f"],
    [-22,-68,-12,34,"#ffe95a"],
    [0,-70,0,36,"#f03c2f"],
    [22,-68,12,34,"#ffe95a"],
    [42,-58,30,25,"#f03c2f"]
  ];

  stripes.forEach(([topX,topY,bottomX,bottomY,color],i)=>{
    ctx.beginPath();
    ctx.moveTo(topX,topY);
    ctx.bezierCurveTo(topX-10,topY+30,bottomX-8,bottomY-15,bottomX,bottomY);
    ctx.bezierCurveTo(bottomX+8,bottomY-15,topX+10,topY+30,topX,topY);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = "rgba(120,45,20,.25)";
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  // ánh sáng dưới
  ctx.fillStyle = "rgba(255,190,55,.28)";
  ctx.beginPath();
  ctx.ellipse(0,18,36,10,0,0,Math.PI*2);
  ctx.fill();

  // cổ bóng
  ctx.fillStyle = "#9a5b22";
  ctx.beginPath();
  ctx.moveTo(-22,28);
  ctx.lineTo(22,28);
  ctx.lineTo(14,42);
  ctx.lineTo(-14,42);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#c98232";
  ctx.fillRect(-20,37,40,8);

  // dây
  ctx.strokeStyle = "#6f4a2a";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-17,43);
  ctx.lineTo(-13,82);
  ctx.moveTo(17,43);
  ctx.lineTo(13,82);
  ctx.moveTo(-8,45);
  ctx.lineTo(-8,82);
  ctx.moveTo(8,45);
  ctx.lineTo(8,82);
  ctx.stroke();

  // rổ
  ctx.fillStyle = "#8b4a1e";
  ctx.beginPath();
  ctx.roundRect(-18,78,36,24,7);
  ctx.fill();

  ctx.fillStyle = "#b76b2a";
  ctx.fillRect(-20,76,40,8);

  ctx.fillStyle = "#ffcc42";
  ctx.beginPath();
  ctx.moveTo(0,82);
  ctx.lineTo(5,94);
  ctx.lineTo(-5,94);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}
  
function drawMovingCloud(c){
  ctx.fillStyle = getPhase().cloud;
  ctx.beginPath();
  ctx.arc(c.x, c.y, c.s*.35, 0, Math.PI*2);
  ctx.arc(c.x+c.s*.3, c.y-5, c.s*.45, 0, Math.PI*2);
  ctx.arc(c.x+c.s*.65, c.y, c.s*.35, 0, Math.PI*2);
  ctx.fill();
}

function drawObstacle(o){
  ctx.fillStyle = "#2f855a";
  ctx.fillRect(o.x, o.y, o.w, o.h);

  ctx.fillStyle = "#38a169";
  ctx.beginPath();
  ctx.moveTo(o.x, o.y);
  ctx.lineTo(o.x + o.w/2, o.y - 18);
  ctx.lineTo(o.x + o.w, o.y);
  ctx.closePath();
  ctx.fill();
}

function hitRectCircle(rect, circle){
  const cx = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
  const cy = Math.max(rect.y - 18, Math.min(circle.y, rect.y + rect.h));
  const dx = circle.x - cx;
  const dy = circle.y - cy;
  return dx*dx + dy*dy < circle.r*circle.r;
}

let spawnTimer = 0;
let edgeCampTimer = 0;
  
function drawStartScene(){
  ctx.clearRect(0,0,W,H);

  cameraY = 0;
  drawBackground();


drawBalloon();

  ctx.fillStyle = getPhase().cloud;
  ctx.beginPath();
  ctx.roundRect(W/2 - 150, 88, 300, 86, 22);
  ctx.fill();

  ctx.fillStyle = "#07324d";
  ctx.textAlign = "center";
  ctx.font = "900 28px Arial";
  ctx.fillText("KHINH KHÍ CẦU", W/2, 125);

  ctx.font = "700 14px Arial";
  ctx.fillText("Nghiêng điện thoại để né vật cản", W/2, 153);
}
  
function getNightFade(){
  const nightStart = 4; // Tối
  const dawnStart = 0;  // Rạng sáng

  // Tối -> Đêm -> Khuya: hiện dần
  if(dayTime >= nightStart){
    const nightProgress = dayTime - nightStart;
    return Math.max(0, Math.min(1, nightProgress / 2.2));
  }

  // Rạng sáng: biến mất dần từ 1 -> 0
  if(dayTime >= dawnStart && dayTime < 1){
    return Math.max(0, Math.min(1, 1 - dayTime));
  }

  return 0;
}

function drawStars(){
  const fade = getNightFade();
  if(fade <= 0) return;

  stars.forEach(s=>{
    s.alpha += (Math.random()-.5)*s.twinkle;
    s.alpha = Math.max(.15,Math.min(1,s.alpha));

    ctx.fillStyle = `rgba(255,255,255,${s.alpha * fade})`;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
}
  
function drawMoon(){
  const fade = getNightFade();
  if(fade <= 0) return;

  ctx.save();
  ctx.globalAlpha = fade;

  const x = W - 72;
  const y = 90;

  ctx.fillStyle = "rgba(255,245,200,.95)";
  ctx.beginPath();
  ctx.arc(x,y,24,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "rgba(6,19,46,.92)";
  ctx.beginPath();
  ctx.arc(x+10,y-6,23,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}
  
 function menuLoop(){
  if(!gameRunning && !deviceBlock.classList.contains("show") && playBtn.textContent === "BẮT ĐẦU"){
    drawStartScene();
  }

  requestAnimationFrame(menuLoop);
}
  
function resetGameDataOnly(){
  balloon.vx = 0;
  distance = 0;
  cameraY = 0;
  introPlaying = false;
  introProgress = 0;
  gameStarted = false;
  spawnTimer = 0;
  obstacles = [];

  clouds = [];
  for(let i=0;i<8;i++){
    clouds.push({
      x:Math.random()*W,
      y:Math.random()*H,
      s:30+Math.random()*45,
      speed:.3+Math.random()*.5
    });
  }
}
  
function spawnEdgeBlock(){
  const leftSide = balloon.x < W / 2;

  const blockX = leftSide ? 8 : W - 58;
  const blockW = 50;

  // kiểm tra đã có đất gần mép đó chưa
  const existed = obstacles.some(o =>
    Math.abs(o.x - blockX) < 35 &&
    o.y < 120
  );

  if(existed) return;

  obstacles.push({
    x: blockX,
    y: -35,
    w: blockW,
    h: 20,
  speed: 2.7 + distance / 900 + modeConfig[currentMode].obstacleSpeedBonus,
    edgeBlock:true
  });
}
  
function loop(){
  if(!gameRunning) return;

  ctx.clearRect(0,0,W,H);
  drawBackground();

if(introPlaying){
  introProgress += 0.026;

  const t = Math.min(introProgress, 1);
  const ease = 1 - Math.pow(1 - t, 3);

  balloon.y = launchStartY - (150 * ease);
  cameraY = ease * 120;

  if(t >= 1){
  introPlaying = false;
  gameStarted = true;
  distance = cameraY / 1.2;
}
}else{
  distance += 0.6;
  skyTime += 0.6;
  cameraY = Math.min(distance * 1.2, H + 260);
}

scoreEl.textContent = Math.floor(distance) + "m";

  // nền mây
  clouds.forEach(c=>{
    c.y += c.speed;
    if(c.y > H + 50){
      c.y = -50;
      c.x = Math.random()*W;
    }
    drawMovingCloud(c);
  });

  // điều khiển nghiêng
if(gameStarted){
  balloon.vx += tilt * 0.09;
  balloon.vx *= 0.88;
  balloon.vx = Math.max(-8, Math.min(8, balloon.vx));
  balloon.x += balloon.vx;
}else{
  balloon.vx = 0;
}

  if(balloon.x < balloon.r) balloon.x = balloon.r;
  if(balloon.x > W - balloon.r) balloon.x = W - balloon.r;
    const edgeZone = 42;

if(gameStarted && (balloon.x < edgeZone || balloon.x > W - edgeZone)){
  edgeCampTimer++;

  if(edgeCampTimer > modeConfig[currentMode].edgeLimit){
    spawnEdgeBlock();
    edgeCampTimer = 0;
  }
}else{
  edgeCampTimer = 0;
}

  if(gameStarted){
  spawnTimer++;
  if(spawnTimer > modeConfig[currentMode].spawnLimit){
    spawnObstacle();
    spawnTimer = 0;
  }
}

  obstacles.forEach(o=>{
    o.y += o.speed;
    drawObstacle(o);

    if(gameStarted && hitRectCircle(o, balloon)){
  showGameOver();
}
  });

  obstacles = obstacles.filter(o=>o.y < H + 60);
  drawModeLabel();
  drawBalloon();

  requestAnimationFrame(loop);
}

  function drawModeLabel(){
  let text = "THƯỜNG";

  if(currentMode === "hard"){
    text = "KHÓ";
  }

  if(currentMode === "extreme"){
    text = "SIÊU KHÓ";
  }

  ctx.save();

  ctx.font = "900 18px Tahoma";
  ctx.textAlign = "left";
  ctx.lineJoin = "round";

  // viền trắng
  ctx.strokeStyle = "rgba(255,255,255,.95)";
  ctx.lineWidth = 4;
  ctx.strokeText(text, 18, 38);

  // màu chữ
  if(currentMode === "normal"){
    ctx.fillStyle = "#0d7f46";
  }else if(currentMode === "hard"){
    ctx.fillStyle = "#d97706";
  }else{
    ctx.fillStyle = "#d61f1f";
  }

  ctx.fillText(text, 18, 38);

  ctx.restore();
}
  
function startGame(){
  start.classList.remove("game-over-menu");
  scoreEl.classList.remove("game-over");
if(playBtn.textContent === "BẮT ĐẦU"){
  scoreEl.textContent = "0m";
}
  playBtn.textContent = "BẮT ĐẦU";
  start.style.display = "none";

  gameRunning = true;
  introPlaying = true;
  introProgress = 0;
  gameStarted = false;

  if(playBtn.textContent === "BẮT ĐẦU"){
  distance = 0;
}
  cameraY = 0;
  edgeCampTimer = 0;
  spawnTimer = 0;
  obstacles = [];
  clouds = [];
for(let i=0;i<8;i++){
  clouds.push({
    x:Math.random()*W,
    y:Math.random()*H,
    s:30+Math.random()*45,
    speed:.3+Math.random()*.5
  });
}

  balloon.x = W / 2;
  balloon.y = H + modeConfig[currentMode].balloonY;
  balloon.vx = 0;

  launchStartY = balloon.y;
generateStars();
  loop();
}
  
function handleTilt(e){
  tilt = e.gamma || 0;
  tilt = Math.max(-25, Math.min(25, tilt));
}

  const deviceBlock = document.getElementById("deviceBlock");

function isMobileDevice(){
  const ua = navigator.userAgent.toLowerCase();

  const mobileUA =
    /android|iphone|ipod|windows phone|blackberry|mobile/i.test(ua);

  const hasTouch =
    navigator.maxTouchPoints && navigator.maxTouchPoints > 1;

  const smallScreen =
    Math.min(window.innerWidth, window.innerHeight) <= 520;

  return mobileUA && hasTouch && smallScreen;
}

function isPortrait(){
  return window.innerHeight > window.innerWidth;
}

function checkDevice(){
  const blocked = !isMobileDevice() || !isPortrait();

  deviceBlock.classList.toggle("show", blocked);

  if(blocked){
    gameRunning = false;
    start.style.display = "none";
}else{
  if(!gameRunning){
    start.style.display = "flex";
  }
}
}
  
 function drawMountains(phase){
   ctx.save();
  ctx.translate(0, cameraY);

  const groundY = H - 86;

  // Núi xa
  ctx.fillStyle = phase.mountain;
  ctx.beginPath();
  ctx.moveTo(0, groundY - 70);
  ctx.quadraticCurveTo(W*.18, groundY - 150, W*.36, groundY - 72);
  ctx.quadraticCurveTo(W*.52, groundY - 10, W*.68, groundY - 86);
  ctx.quadraticCurveTo(W*.82, groundY - 170, W, groundY - 75);
  ctx.lineTo(W,H);
  ctx.lineTo(0,H);
  ctx.closePath();
  ctx.fill();

  // Núi gần
  ctx.fillStyle = "rgba(30,155,180,.36)";
  ctx.beginPath();
  ctx.moveTo(0, groundY - 20);
  ctx.quadraticCurveTo(W*.16, groundY - 110, W*.34, groundY - 36);
  ctx.quadraticCurveTo(W*.50, groundY + 28, W*.66, groundY - 44);
  ctx.quadraticCurveTo(W*.82, groundY - 120, W, groundY - 28);
  ctx.lineTo(W,H);
  ctx.lineTo(0,H);
  ctx.closePath();
  ctx.fill();

  // Mặt đất
  ctx.fillStyle = phase.ground;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.quadraticCurveTo(W*.16, groundY - 28, W*.32, groundY);
  ctx.quadraticCurveTo(W*.50, groundY + 28, W*.68, groundY - 4);
  ctx.quadraticCurveTo(W*.86, groundY - 34, W, groundY - 8);
  ctx.lineTo(W,H);
  ctx.lineTo(0,H);
  ctx.closePath();
  ctx.fill();

  // Bụi cây trái/phải
  drawBush(25, H - 45, 1.25);
  drawBush(W - 70, H - 42, 1.35);
  drawBush(W - 165, H - 30, .9);

  // Cây
  drawTree(W * .22, H - 72, .9);
  drawTree(W * .72, H - 80, 1.05);
  drawTree(W * .78, H - 56, .75);
  ctx.restore();
}
  
  function drawTree(x,y,s){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(s,s);

  ctx.fillStyle = "#26785f";
  ctx.beginPath();
  ctx.roundRect(-6,-58,12,58,8);
  ctx.fill();

  ctx.fillStyle = "#2fa77c";
  ctx.beginPath();
  ctx.ellipse(0,-68,16,38,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "rgba(255,255,255,.12)";
  ctx.beginPath();
  ctx.ellipse(-5,-82,5,15,-.25,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawBush(x,y,s){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(s,s);

  ctx.fillStyle = "#2aa879";
  ctx.beginPath();
  ctx.arc(-28,10,28,Math.PI,0);
  ctx.arc(0,-4,36,Math.PI,0);
  ctx.arc(32,8,28,Math.PI,0);
  ctx.lineTo(60,28);
  ctx.lineTo(-56,28);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "rgba(0,110,90,.22)";
  ctx.beginPath();
  ctx.arc(-14,18,24,Math.PI,0);
  ctx.arc(24,18,22,Math.PI,0);
  ctx.lineTo(50,28);
  ctx.lineTo(-40,28);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}
  
  function resetToMenu(){
  gameRunning = false;
  introPlaying = false;
  introProgress = 0;
  gameStarted = false;

  distance = 0;
  cameraY = 0;
  spawnTimer = 0;
  obstacles = [];

  balloon.x = W / 2;
  balloon.y = H + modeConfig[currentMode].balloonY;
  balloon.vx = 0;

  scoreEl.textContent = "0m";
  start.style.display = "flex";

  drawStartScene();
}
  
function showGameOver(){
  gameRunning = false;
  introPlaying = false;
  gameStarted = false;

  scoreEl.innerHTML = `
    <div class="score-label">KHOẢNG CÁCH BAY ĐƯỢC</div>
    <div class="score-value">${Math.floor(distance)}m</div>
  `;

  scoreEl.classList.add("game-over");

  playBtn.textContent = "CHƠI LẠI";
  start.classList.add("game-over-menu");
  start.style.display = "flex";
}
  
  
menuLoop();
window.addEventListener("resize", checkDevice);
window.addEventListener("orientationchange", checkDevice);
checkDevice();
  
playBtn.onclick = async ()=>{
  checkDevice();

  if(deviceBlock.classList.contains("show")) return;

  if(typeof DeviceOrientationEvent !== "undefined" &&
     typeof DeviceOrientationEvent.requestPermission === "function"){
    const permission = await DeviceOrientationEvent.requestPermission();
    if(permission !== "granted") return;
  }

  window.addEventListener("deviceorientation", handleTilt);
  startGame();
};
</script>
