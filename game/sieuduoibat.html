<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const minimap = document.getElementById("minimap");
const mctx = minimap.getContext("2d");

const scoreEl = document.getElementById("score");
const finalScoreEl = document.getElementById("finalScore");
const gameOverBox = document.getElementById("gameOver");
const modeTag = document.getElementById("modeTag");
  
let W,H,dpr;

function resize(){
  dpr = window.devicePixelRatio || 1;
  W = innerWidth;
  H = innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  
  minimap.width = 92 * dpr;
minimap.height = 92 * dpr;
mctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
addEventListener("resize",resize);

let keys = {
  left:false,
  right:false
};

function setTurnByPointer(e){
  const x = e.clientX;
  keys.left = x < W / 2;
  keys.right = x >= W / 2;
}

canvas.addEventListener("pointerdown",e=>{
  setTurnByPointer(e);
});

canvas.addEventListener("pointermove",e=>{
  if(e.buttons || e.pressure > 0){
    setTurnByPointer(e);
  }
});

canvas.addEventListener("pointerup",()=>{
  keys.left = false;
  keys.right = false;
});

canvas.addEventListener("pointercancel",()=>{
  keys.left = false;
  keys.right = false;
});

let player, camera, police, rocks, particles, explosions;
let gameOver = false;
let startTime = 0;
let lastTime = 0;
let policeTimer = 0;
let rockTimer = 0;
let waveOffset = 0;

let surviveTime = 0;
let difficulty = 0;
let policeSpawnCooldown = 0;

let gameStarted = false;
let selectedMode = "normal";

const MODES = {
  normal:{
    difficultySeconds:100,

    playerMaxSpeed:7.5,

    minPolice:1,
    maxPolice:3,
    needPoliceStart:1,
    needPoliceEnd:3,

    policeSpeedStart:3.1,
    policeSpeedEnd:8.2,

    policeTimerStart:60,
    policeTimerMin:40,

    rockTimerStart:70,
    rockTimerMin:45,

    frontChanceStart:0.08,
    frontChanceEnd:0.14,

    policeDistStart:0.65,
    policeDistEnd:0.5
  },

  hard:{
    difficultySeconds:50,

    playerMaxSpeed:7.5,

    minPolice:2,
    maxPolice:4,
    needPoliceStart:1,
    needPoliceEnd:4,

    policeSpeedStart:3.7,
    policeSpeedEnd:8.5,

    policeTimerStart:60,
    policeTimerMin:35,

    rockTimerStart:62,
    rockTimerMin:40,

    frontChanceStart:0.1,
    frontChanceEnd:0.17,

    policeDistStart:0.65,
    policeDistEnd:0.50
  }
};

let currentMode = MODES.normal;
let nightAlpha = 0;

const NIGHT = {
  firstStart: 30,   // giây 30 bắt đầu tối hẳn
  cycle: 30,        // cứ mỗi 30 giây lặp lại
  fadeIn: 5,        // 5 giây trước khi tối hẳn sẽ tối dần
  duration: 15,     // tối hẳn trong 15 giây
  fadeOut: 6,       // sáng dần trong 6 giây
  maxAlpha: 0.68    // độ tối tối đa
};
  
function init(){
  player = {
    x:0,
    y:0,
    angle:-Math.PI/2,
    baseSpeed:4.2,
  maxSpeed:currentMode.playerMaxSpeed,
  speed:4.2,

    turnSpeed:0.114,
steerVelocity:0,
avoidAssist:0,
radius:18
  };

  camera = {x:0,y:0};

  police = [];
  rocks = [];
  particles = [];
explosions = [];

  gameOver = false;
  startTime = performance.now();
  lastTime = startTime;
  policeTimer = 0;
  rockTimer = 0;
  waveOffset = 0;
  surviveTime = 0;
  difficulty = 0;
  policeSpawnCooldown = 120;
  nightAlpha = 0;

  gameOverBox.style.display = "none";
}

  function startGame(mode){
  selectedMode = mode;
  currentMode = MODES[selectedMode] || MODES.normal;
    if(selectedMode === "hard"){
  modeTag.textContent = "Khó";
  modeTag.classList.add("hard");
}else{
  modeTag.textContent = "Thường";
  modeTag.classList.remove("hard");
}

  document.getElementById("modeSelect").style.display = "none";

  init();
  gameStarted = true;
}
  
function restartGame(){
  startGame(selectedMode);
}
  
  function backToMenu(){
  gameStarted = false;
  gameOver = false;

  keys.left = false;
  keys.right = false;

  gameOverBox.style.display = "none";
  document.getElementById("modeSelect").style.display = "flex";

  scoreEl.textContent = "0";

  init();
}

function exitGame(){
  location.href = "https://giabao1710.click";
}

function loop(t){
  const dt = Math.min((t - lastTime) / 16.67, 2);
  lastTime = t;

  if(gameStarted && !gameOver){
    update(dt,t);
  }

  draw(t);
  requestAnimationFrame(loop);
}
  
  function getRockAvoidTurn(){
  let avoidTurn = 0;
  let danger = 0;

  const lookAhead = 170 + player.speed * 22;
  const sideRange = 58;

  const forwardX = Math.cos(player.angle);
  const forwardY = Math.sin(player.angle);

  const rightX = Math.cos(player.angle + Math.PI / 2);
  const rightY = Math.sin(player.angle + Math.PI / 2);

  for(const r of rocks){
    const dx = r.x - player.x;
    const dy = r.y - player.y;

    const forwardDist = dx * forwardX + dy * forwardY;
    const sideDist = dx * rightX + dy * rightY;

    if(forwardDist <= 0 || forwardDist > lookAhead){
      continue;
    }

    const dangerWidth = r.hitRadius + sideRange;

    if(Math.abs(sideDist) < dangerWidth){
      const frontPower = 1 - forwardDist / lookAhead;
      const sidePower = 1 - Math.abs(sideDist) / dangerWidth;

      const power = frontPower * sidePower;

      const direction = sideDist > 0 ? -1 : 1;

      avoidTurn += direction * power;
      danger = Math.max(danger, power);
    }
  }

  return {
    turn: Math.max(-1, Math.min(1, avoidTurn)),
    danger: Math.max(0, Math.min(1, danger))
  };
}
function update(dt,t){
  waveOffset += 0.03 * dt;

  // Độ khó tăng dần theo thời gian
  // 0 giây  = difficulty 0
  // 90 giây = difficulty 1
  surviveTime = (t - startTime) / 1000;
  difficulty = Math.min(surviveTime / currentMode.difficultySeconds, 1);
  updateNightCycle();
  // Càng sống lâu, tàu người chơi càng chạy nhanh
const avoid = getRockAvoidTurn();

const normalSpeed =
  player.baseSpeed + (player.maxSpeed - player.baseSpeed) * difficulty;

// Sát mõm đá thì giảm tốc nhẹ để kịp né
player.speed = normalSpeed * (1 - avoid.danger * 0.22);

  let inputTurn = 0;

if(keys.left){
  inputTurn -= 1;
}

if(keys.right){
  inputTurn += 1;
}


// Khi càng sát đá, lực hỗ trợ càng mạnh
const assistPower = 0.65 + avoid.danger * 0.75;

// Khi nguy hiểm, phản hồi lái nhanh hơn
const steerSmooth = 0.10 + avoid.danger * 0.18;

// Khi nguy hiểm, cho phép bẻ lái gắt hơn
const maxSteer = 1.2 + avoid.danger * 0.75;

const targetTurn = inputTurn + avoid.turn * assistPower;

player.steerVelocity += (targetTurn - player.steerVelocity) * steerSmooth * dt;
player.steerVelocity *= 0.90 - avoid.danger * 0.08;

player.steerVelocity = Math.max(-maxSteer, Math.min(maxSteer, player.steerVelocity));

player.angle += player.steerVelocity * player.turnSpeed * dt;
  player.x += Math.cos(player.angle) * player.speed * dt;
  player.y += Math.sin(player.angle) * player.speed * dt;

  camera.x = player.x - W/2;
  camera.y = player.y - H/2;

  spawnObjects(dt);
updatePolice(dt);
checkPoliceRockCollision();
updateParticles(dt);
updateExplosions(dt);
checkCollision();

  const score = Math.floor((t - startTime) / 1000);
  scoreEl.textContent = score;
}
  
  function updateNightCycle(){

  // Chỉ chế độ khó mới có ban đêm
  if(selectedMode !== "hard"){
    nightAlpha = 0;
    return;
  }

  const firstFadeStart = NIGHT.firstStart - NIGHT.fadeIn;

  // Trước giai đoạn tối dần đầu tiên
  if(surviveTime < firstFadeStart){
    nightAlpha = 0;
    return;
  }

  // Tối dần trước lần tối đầu tiên
  // Ví dụ: 25s -> 30s
  if(surviveTime < NIGHT.firstStart){
    const fadeProgress =
      (surviveTime - firstFadeStart) / NIGHT.fadeIn;

    nightAlpha = NIGHT.maxAlpha * fadeProgress;
    return;
  }

  const passed = surviveTime - NIGHT.firstStart;
  const phase = passed % NIGHT.cycle;

  // Tối hẳn
  // Ví dụ: 30s -> 45s
  if(phase < NIGHT.duration){
    nightAlpha = NIGHT.maxAlpha;
  }

  // Sáng dần
  // Ví dụ: 45s -> 51s
  else if(phase < NIGHT.duration + NIGHT.fadeOut){
    const fadeProgress =
      (phase - NIGHT.duration) / NIGHT.fadeOut;

    nightAlpha = NIGHT.maxAlpha * (1 - fadeProgress);
  }

  // Tối dần trước chu kỳ tối tiếp theo
  // Ví dụ: 55s -> 60s
  else if(phase >= NIGHT.cycle - NIGHT.fadeIn){
    const fadeProgress =
      (phase - (NIGHT.cycle - NIGHT.fadeIn)) / NIGHT.fadeIn;

    nightAlpha = NIGHT.maxAlpha * fadeProgress;
  }

  // Trời sáng
  else{
    nightAlpha = 0;
  }
}
  
function spawnObjects(dt){

  rockTimer -= dt;
  policeTimer -= dt;
  policeSpawnCooldown -= dt;

  // Càng chơi lâu đá càng xuất hiện nhanh hơn
  if(rockTimer <= 0){
    spawnRock();

    // Đầu game: 32 frame
    // Cuối game: 16 frame
    rockTimer = Math.max(
  currentMode.rockTimerMin,
  currentMode.rockTimerStart - difficulty * (currentMode.rockTimerStart - currentMode.rockTimerMin)
);
  }

  // 2 giây đầu an toàn, chưa spawn police
  if(policeSpawnCooldown > 0){
    return;
  }

  // Số police tối đa tăng dần theo thời gian
  // Đầu game: 2 chiếc
  // Cuối game: 5 chiếc
  const maxPolice = Math.floor(
  currentMode.minPolice + difficulty * (currentMode.maxPolice - currentMode.minPolice)
);

  if(police.length >= maxPolice){
    return;
  }

  const nearPolice = police.filter(p=>{
    const dx = p.x - player.x;
    const dy = p.y - player.y;
    return Math.hypot(dx,dy) < 800;
  });

  // Số police cần duy trì cũng tăng theo thời gian
  // Đầu game: 1 chiếc gần người chơi
  // Sau đó: 2 đến 3 chiếc
  const needPolice = Math.min(
  maxPolice,
  Math.floor(
    currentMode.needPoliceStart + difficulty * (currentMode.needPoliceEnd - currentMode.needPoliceStart)
  )
);

  if(nearPolice.length < needPolice && policeTimer <= 0){
    spawnPolice();

    // Càng chơi lâu police sinh nhanh hơn
    // Đầu game: 85 frame
    // Cuối game: 42 frame
    policeTimer = Math.max(
  currentMode.policeTimerMin,
  currentMode.policeTimerStart - difficulty * (currentMode.policeTimerStart - currentMode.policeTimerMin)
);
  }
}
  
function spawnPolice(){

  let a;

  const frontChance =
    currentMode.frontChanceStart +
    difficulty * (currentMode.frontChanceEnd - currentMode.frontChanceStart);

  // Vẫn ưu tiên chặn phía trước, nhưng sẽ sinh ngoài màn hình
  if(Math.random() < frontChance){
    a = player.angle + (Math.random() - 0.5) * 1.8;
  }else{
    a = Math.random() * Math.PI * 2;
  }

  const dirX = Math.cos(a);
  const dirY = Math.sin(a);

  // Tính khoảng cách từ tâm màn hình tới mép màn hình theo hướng spawn
  const halfW = W / 2;
  const halfH = H / 2;

  const distToVerticalEdge =
    Math.abs(dirX) < 0.001 ? Infinity : halfW / Math.abs(dirX);

  const distToHorizontalEdge =
    Math.abs(dirY) < 0.001 ? Infinity : halfH / Math.abs(dirY);

  const distToScreenEdge = Math.min(
    distToVerticalEdge,
    distToHorizontalEdge
  );

  // Police luôn xuất hiện ngoài màn hình thêm một đoạn
  const outsideMargin = 220 + Math.random() * 180;

  const dist = distToScreenEdge + outsideMargin;

  police.push({
    x: player.x + dirX * dist,
    y: player.y + dirY * dist,
    angle: Math.random() * Math.PI * 2,

    speed:
      currentMode.policeSpeedStart +
      difficulty * (currentMode.policeSpeedEnd - currentMode.policeSpeedStart) +
      Math.random() * 0.6,

    radius:19,

    seen:false,
    remove:false,
    lightOffset: Math.random() * Math.PI * 2
  });
}
  
  function createRockShape(baseRadius){
  const points = [];
  const count = 7 + Math.floor(Math.random() * 5);

  for(let i=0;i<count;i++){
    const angle = (i / count) * Math.PI * 2;
    const angleJitter = (Math.random() - 0.5) * 0.35;
    const radius = baseRadius * (0.58 + Math.random() * 0.62);

    points.push({
      a: angle + angleJitter,
      r: radius
    });
  }

  points.sort((a,b)=>a.a - b.a);

  return points;
}

function createRockCracks(baseRadius){
  const cracks = [];
  const count = 2 + Math.floor(Math.random() * 3);

  for(let i=0;i<count;i++){
    const a = Math.random() * Math.PI * 2;
    const len = baseRadius * (0.28 + Math.random() * 0.28);

    cracks.push({
      a,
      len
    });
  }

  return cracks;
}

function spawnRock(){
  const dist = Math.max(W,H) * 0.65;
  const a = Math.random() * Math.PI * 2;

  const baseRadius = 26 + Math.random() * 26;

  rocks.push({
    x: player.x + Math.cos(a) * dist,
    y: player.y + Math.sin(a) * dist,

    r: baseRadius,
    hitRadius: baseRadius * 0.78,

    rot: Math.random() * Math.PI * 2,
    shape: createRockShape(baseRadius),
    cracks: createRockCracks(baseRadius),

    shadeOffsetX: -baseRadius * (0.12 + Math.random() * 0.12),
    shadeOffsetY: -baseRadius * (0.12 + Math.random() * 0.12)
  });

  rocks = rocks.filter(r=>{
    const dx = r.x - player.x;
    const dy = r.y - player.y;
    return Math.hypot(dx,dy) < 1800;
  });
}

function updatePolice(dt){
  police.forEach(p=>{
    const dx = player.x - p.x;
    const dy = player.y - p.y;
    const target = Math.atan2(dy,dx);

    let diff = target - p.angle;
    diff = Math.atan2(Math.sin(diff),Math.cos(diff));

    p.angle += diff * 0.045 * dt;
    p.x += Math.cos(p.angle) * p.speed * dt;
    p.y += Math.sin(p.angle) * p.speed * dt;

    const screenX = sx(p.x);
    const screenY = sy(p.y);

    const margin = 80;

    const onScreen =
      screenX > -margin &&
      screenX < W + margin &&
      screenY > -margin &&
      screenY < H + margin;

    // Nếu police đã từng xuất hiện rồi mà đi khuất → đánh dấu xóa
    if(p.seen && !onScreen){
      p.remove = true;
    }

    // Chỉ đánh dấu seen khi police thật sự lọt vào màn hình
    if(
      screenX > 0 &&
      screenX < W &&
      screenY > 0 &&
      screenY < H
    ){
      p.seen = true;
    }
  });

  // Xóa vĩnh viễn police đã khuất
  police = police.filter(p=>!p.remove);
}
  
  function checkPoliceRockCollision(){

  police.forEach(p=>{

    for(const r of rocks){
      const d = Math.hypot(p.x - r.x, p.y - r.y);

      if(d < p.radius + r.hitRadius){

        // Police nổ và bị xóa
        p.remove = true;

        createExplosion(p.x, p.y);

        break;
      }
    }
  });

  police = police.filter(p=>!p.remove);
}
  
  function createExplosion(x,y){

  explosions.push({
    x,
    y,
    life:0,
    maxLife:32,
    size:28 + Math.random() * 10
  });

  // Mảnh vụn bay ra
  for(let i=0;i<18;i++){
    const a = Math.random() * Math.PI * 2;
    const sp = 2 + Math.random() * 4;

    particles.push({
      x,
      y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 25 + Math.random() * 15,
      boom:true
    });
  }
}

function updateParticles(dt){
  particles.forEach(p=>{
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  });

  particles = particles.filter(p=>p.life > 0);

  for(let i=0;i<2;i++){
    particles.push({
      x: player.x - Math.cos(player.angle) * 24 + (Math.random()-.5)*12,
      y: player.y - Math.sin(player.angle) * 24 + (Math.random()-.5)*12,
      vx: -Math.cos(player.angle) * (1+Math.random()*1.2),
      vy: -Math.sin(player.angle) * (1+Math.random()*1.2),
      life: 25
    });
  }
}
  
  function updateExplosions(dt){

  explosions.forEach(e=>{
    e.life += dt;
  });

  explosions = explosions.filter(e=>e.life < e.maxLife);
}

function checkCollision(){
  for(const p of police){
    if(dist(player,p) < player.radius + p.radius - 5){
      endGame();
    }
  }

  for(const r of rocks){
    const d = Math.hypot(player.x-r.x, player.y-r.y);
    if(d < player.radius + r.hitRadius){
      endGame();
    }
  }
}

function endGame(){
  gameOver = true;
  finalScoreEl.textContent = scoreEl.textContent;
  gameOverBox.style.display = "flex";
}

function dist(a,b){
  return Math.hypot(a.x-b.x,a.y-b.y);
}

function sx(x){ return x - camera.x; }
function sy(y){ return y - camera.y; }

function draw(t){
  drawSea();

  if(!gameStarted){
    return;
  }

  drawParticles();

  rocks.forEach(drawRock);
  police.forEach(drawPolice);
  drawExplosions();
  drawPlayer();

  // Chế độ khó: phủ màn đêm
  if(nightAlpha > 0){
    drawNightOverlay();
    police.forEach(drawPoliceNightLights);
  }
drawMiniMap();
  if(!gameOver){
    drawHint();
  }
}
  
  function drawNightOverlay(){
  ctx.save();

  ctx.globalAlpha = nightAlpha;
  ctx.fillStyle = "#020817";
  ctx.fillRect(0, 0, W, H);

  ctx.restore();
}
  
  function drawMiniMap(){
  const size = 92;
  const center = size / 2;
  const scale = 0.045;

  mctx.clearRect(0,0,size,size);

  // Nền
  mctx.fillStyle = "rgba(0,12,28,.75)";
  mctx.fillRect(0,0,size,size);

  // Lưới nhẹ
  mctx.strokeStyle = "rgba(255,255,255,.08)";
  mctx.lineWidth = 1;

  for(let i=23;i<size;i+=23){
    mctx.beginPath();
    mctx.moveTo(i,0);
    mctx.lineTo(i,size);
    mctx.stroke();

    mctx.beginPath();
    mctx.moveTo(0,i);
    mctx.lineTo(size,i);
    mctx.stroke();
  }

  // Vòng quét
  mctx.strokeStyle = "rgba(0,217,255,.22)";
  mctx.beginPath();
  mctx.arc(center, center, 34, 0, Math.PI * 2);
  mctx.stroke();

  // Đá ngầm
  for(const r of rocks){
    const mx = center + (r.x - player.x) * scale;
    const my = center + (r.y - player.y) * scale;

    if(mx < 3 || mx > size-3 || my < 3 || my > size-3) continue;

    mctx.fillStyle = "#9aa0a6";
    mctx.beginPath();
    mctx.arc(mx,my,1.6,0,Math.PI*2);
    mctx.fill();
  }

  // Police
  for(const p of police){
    const mx = center + (p.x - player.x) * scale;
    const my = center + (p.y - player.y) * scale;

    if(mx < 3 || mx > size-3 || my < 3 || my > size-3) continue;

    mctx.fillStyle = "#ff3b3b";
    mctx.beginPath();
    mctx.arc(mx,my,2.5,0,Math.PI*2);
    mctx.fill();

    mctx.strokeStyle = "rgba(255,60,60,.65)";
    mctx.beginPath();
    mctx.arc(mx,my,0.0,0,Math.PI*2);
    mctx.stroke();
  }

  // Người chơi ở giữa
  mctx.save();
  mctx.translate(center, center);
  mctx.rotate(player.angle);

  mctx.fillStyle = "#ffd447";
  mctx.beginPath();
  mctx.moveTo(6,0);
  mctx.lineTo(-5,-4);
  mctx.lineTo(-3,0);
  mctx.lineTo(-5,4);
  mctx.closePath();
  mctx.fill();

  mctx.restore();

  // Viền
  mctx.strokeStyle = "rgba(255,255,255,.22)";
  mctx.lineWidth = 1;
  mctx.strokeRect(.5,.5,size-1,size-1);
}
  
  function drawGlowCircle(x, y, radius, color, alpha){
  const g = ctx.createRadialGradient(x, y, 0, x, y, radius);
  g.addColorStop(0, color);
  g.addColorStop(0.45, color);
  g.addColorStop(1, "rgba(0,0,0,0)");

  ctx.globalAlpha = alpha;
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
}

function drawPoliceNightLights(p){
  const time = performance.now() * 0.018;
  const pulseRed = 0.55 + Math.sin(time + p.lightOffset) * 0.45;
  const pulseBlue = 0.55 + Math.sin(time + p.lightOffset + Math.PI) * 0.45;

  ctx.save();
  ctx.translate(sx(p.x), sy(p.y));
  ctx.rotate(p.angle);

  ctx.globalCompositeOperation = "lighter";

  // Đèn đỏ
  drawGlowCircle(
    -8,
    -16,
    30,
    "rgba(255,40,40,0.9)",
    nightAlpha * pulseRed
  );

  // Đèn xanh
  drawGlowCircle(
    6,
    -16,
    30,
    "rgba(40,140,255,0.9)",
    nightAlpha * pulseBlue
  );

  // Đèn nhỏ ngay trên nóc tàu
  ctx.globalAlpha = nightAlpha;
  ctx.fillStyle = "#ff3333";
  ctx.beginPath();
  ctx.arc(-8, -16, 3.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#208cff";
  ctx.beginPath();
  ctx.arc(6, -16, 3.5, 0, Math.PI * 2);
  ctx.fill();

  // Ánh đèn pha mờ phía trước
  ctx.globalAlpha = nightAlpha * 0.18;
  ctx.fillStyle = "rgba(160,220,255,0.35)";
  ctx.beginPath();
  ctx.moveTo(22, -6);
  ctx.lineTo(120, -34);
  ctx.lineTo(120, 34);
  ctx.lineTo(22, 6);
  ctx.closePath();
  ctx.fill();

  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = "source-over";
  ctx.restore();
}
  
function drawSea(){
  // Nền nước trong, có chiều sâu
  const deep = ctx.createLinearGradient(0, 0, 0, H);
  deep.addColorStop(0, "#0b8fc2");
  deep.addColorStop(0.38, "#0670a4");
  deep.addColorStop(0.72, "#034d78");
  deep.addColorStop(1, "#022a4a");

  ctx.fillStyle = deep;
  ctx.fillRect(0, 0, W, H);

  // Ánh sáng trong nước
  const light = ctx.createRadialGradient(
    W * 0.35, H * 0.18, 20,
    W * 0.35, H * 0.18, Math.max(W, H) * 0.9
  );
  light.addColorStop(0, "rgba(120,240,255,0.28)");
  light.addColorStop(0.35, "rgba(40,190,230,0.13)");
  light.addColorStop(1, "rgba(0,0,0,0)");

  ctx.fillStyle = light;
  ctx.fillRect(0, 0, W, H);

  // Dòng nước lớn, tạo cảm giác biển đang trôi
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.strokeStyle = "rgba(200,255,255,0.55)";
  ctx.lineWidth = 2;

  for(let y = -80; y < H + 100; y += 54){
    ctx.beginPath();

    for(let x = -40; x < W + 60; x += 18){
      const worldX = x + camera.x * 0.08;
      const worldY = y + camera.y * 0.05;

      const yy =
        y +
        Math.sin(worldX * 0.012 + waveOffset * 1.2) * 5 +
        Math.sin(worldY * 0.018 + waveOffset * 0.7) * 2;

      if(x === -40) ctx.moveTo(x, yy);
      else ctx.lineTo(x, yy);
    }

    ctx.stroke();
  }

  ctx.restore();

  // Sóng nhỏ lớp gần mặt nước
  ctx.save();
  ctx.globalAlpha = 0.1;
  ctx.strokeStyle = "rgba(255,255,255,0.85)";
  ctx.lineWidth = 1;

  for(let y = -40; y < H + 60; y += 28){
    ctx.beginPath();

    for(let x = -30; x < W + 40; x += 14){
      const worldX = x + camera.x * 0.16;
      const yy =
        y +
        Math.sin(worldX * 0.03 + waveOffset * 2.2) * 4 +
        Math.cos((x + camera.y) * 0.017 + waveOffset) * 3;

      if(x === -30) ctx.moveTo(x, yy);
      else ctx.lineTo(x, yy);
    }

    ctx.stroke();
  }

  ctx.restore();

  // Các mảng highlight loang như nước trong
  ctx.save();
  ctx.globalCompositeOperation = "screen";
  ctx.globalAlpha = 0.18;

  for(let i = 0; i < 20; i++){
    const px =
      ((i * 173 + waveOffset * 38 - camera.x * 0.04) % (W + 180)) - 90;

    const py =
      ((i * 97 + Math.sin(waveOffset + i) * 30 - camera.y * 0.03) % (H + 160)) - 80;

    const g = ctx.createRadialGradient(px, py, 0, px, py, 70);
    g.addColorStop(0, "rgba(160,255,255,0.22)");
    g.addColorStop(0.45, "rgba(80,220,255,0.08)");
    g.addColorStop(1, "rgba(0,0,0,0)");

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(px, py, 70, 18, Math.sin(i) * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();

  // Bóng dưới nước tạo cảm giác 3D
  ctx.save();
  ctx.globalAlpha = 0.16;
  ctx.fillStyle = "rgba(0,15,40,0.45)";

  for(let i = 0; i < 3; i++){
    const px =
      ((i * 241 - waveOffset * 22 + camera.x * 0.03) % (W + 220)) - 110;

    const py =
      ((i * 131 + camera.y * 0.025) % (H + 200)) - 100;

    ctx.beginPath();
    ctx.ellipse(px, py, 95, 28, Math.cos(i) * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();

  // Lớp vân caustic nhẹ: ánh sáng gợn dưới nước
  ctx.save();
  ctx.globalCompositeOperation = "screen";
  ctx.globalAlpha = 0.11;
  ctx.strokeStyle = "rgba(180,255,255,0.75)";
  ctx.lineWidth = 1.2;

  for(let i = 0; i < 1; i++){
    const baseY =
      ((i * 42 + waveOffset * 18 - camera.y * 0.04) % (H + 80)) - 40;

    ctx.beginPath();

    for(let x = -30; x < W + 40; x += 16){
      const yy =
        baseY +
        Math.sin(x * 0.045 + i + waveOffset * 1.6) * 5 +
        Math.sin(x * 0.018 - waveOffset) * 3;

      if(x === -30) ctx.moveTo(x, yy);
      else ctx.lineTo(x, yy);
    }

    ctx.stroke();
  }

  ctx.restore();

  // Viền tối nhẹ quanh màn hình để tăng chiều sâu
  const vignette = ctx.createRadialGradient(
    W / 2, H / 2, Math.min(W, H) * 0.25,
    W / 2, H / 2, Math.max(W, H) * 0.75
  );
  vignette.addColorStop(0, "rgba(0,0,0,0)");
  vignette.addColorStop(1, "rgba(0,10,30,0.36)");

  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
}
  
  function drawExplosions(){

  explosions.forEach(e=>{
    const progress = e.life / e.maxLife;
    const x = sx(e.x);
    const y = sy(e.y);

    ctx.save();
    ctx.globalAlpha = 1 - progress;

    // Vòng lửa ngoài
    ctx.fillStyle = "#ff6a00";
    ctx.beginPath();
    ctx.arc(x, y, e.size * progress * 1.8, 0, Math.PI * 2);
    ctx.fill();

    // Lõi sáng
    ctx.fillStyle = "#fff176";
    ctx.beginPath();
    ctx.arc(x, y, e.size * progress, 0, Math.PI * 2);
    ctx.fill();

    // Vòng khói
    ctx.strokeStyle = "rgba(255,255,255,.6)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x, y, e.size * progress * 2.3, 0, Math.PI * 2);
    ctx.stroke();

    ctx.restore();
  });
}

function drawParticles(){

  particles.forEach(p=>{
    ctx.globalAlpha = Math.max(p.life/25,0);

    if(p.boom){
      ctx.fillStyle = Math.random() < 0.5 ? "#ffdd55" : "#ff5533";
    }else{
      ctx.fillStyle = "white";
    }

    ctx.beginPath();
    ctx.arc(
      sx(p.x),
      sy(p.y),
      p.boom ? 4 : 3,
      0,
      Math.PI*2
    );
    ctx.fill();

    ctx.globalAlpha = 1;
  });
}

function drawPlayer(){
  drawBoatWake(player.x, player.y, player.angle, "#ffffff", 0.35);
  drawSpeedBoat(player.x, player.y, player.angle);
}

function drawPolice(p){
  drawBoatWake(p.x, p.y, p.angle, "#b9f3ff", 0.28);
  drawPoliceBoat(p.x, p.y, p.angle);
}

function roundRectPath(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBoatWake(x, y, a, color, alpha){
  ctx.save();
  ctx.translate(sx(x), sy(y));
  ctx.rotate(a);

  const time = performance.now() * 0.006;

  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  // Vệt nước chính hình chữ V
  for(let side of [-1, 1]){
    ctx.globalAlpha = alpha * 0.75;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;

    ctx.beginPath();
    ctx.moveTo(-24, side * 8);

    ctx.quadraticCurveTo(
      -48,
      side * 16,
      -82,
      side * 28
    );

    ctx.stroke();

    // Vệt phụ mờ hơn bên ngoài
    ctx.globalAlpha = alpha * 0.32;
    ctx.lineWidth = 1;

    ctx.beginPath();
    ctx.moveTo(-32, side * 14);

    ctx.quadraticCurveTo(
      -60,
      side * 25,
      -105,
      side * 42
    );

    ctx.stroke();
  }

  // Luồng nước trắng ngay sau động cơ
  ctx.globalAlpha = alpha * 0.65;
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;

  ctx.beginPath();
  ctx.moveTo(-26, 0);
  ctx.lineTo(-70, Math.sin(time) * 2);
  ctx.stroke();

  // Bọt nước nhỏ, nằm dọc theo luồng sau tàu
  ctx.fillStyle = color;

  for(let i=0;i<10;i++){
    const bx = -34 - i * 6;
    const by = (Math.random() - 0.5) * (5 + i * 0.7);
    const size = Math.max(1, 3 - i * 0.18);

    ctx.globalAlpha = alpha * (0.5 - i * 0.035);

    ctx.beginPath();
    ctx.arc(bx, by, size, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawRock(r){
  const x = sx(r.x);
  const y = sy(r.y);

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(r.rot);

  // Bóng đá dưới nước
  ctx.save();
  ctx.translate(6, 8);
  ctx.scale(1.08, 0.82);
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = "#0d1a24";

  ctx.beginPath();
  for(let i=0;i<r.shape.length;i++){
    const p = r.shape[i];
    const px = Math.cos(p.a) * p.r;
    const py = Math.sin(p.a) * p.r;

    if(i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Thân đá chính
  const grad = ctx.createLinearGradient(-r.r, -r.r, r.r, r.r);
  grad.addColorStop(0, "#777d84");
  grad.addColorStop(0.45, "#4f555c");
  grad.addColorStop(1, "#2e343a");

  ctx.fillStyle = grad;

  ctx.beginPath();
  for(let i=0;i<r.shape.length;i++){
    const p = r.shape[i];
    const px = Math.cos(p.a) * p.r;
    const py = Math.sin(p.a) * p.r;

    if(i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();

  // Viền tối
  ctx.strokeStyle = "rgba(10,10,10,0.55)";
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Mảng sáng trên đá
  ctx.fillStyle = "rgba(255,255,255,0.14)";
  ctx.beginPath();

  for(let i=0;i<r.shape.length;i++){
    const p = r.shape[i];
    const px = Math.cos(p.a) * p.r * 0.52 + r.shadeOffsetX;
    const py = Math.sin(p.a) * p.r * 0.42 + r.shadeOffsetY;

    if(i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }

  ctx.closePath();
  ctx.fill();

  // Vết nứt cố định
  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 1.4;

  for(const c of r.cracks){
    ctx.beginPath();
    ctx.moveTo(
      Math.cos(c.a) * c.len * 0.15,
      Math.sin(c.a) * c.len * 0.15
    );
    ctx.lineTo(
      Math.cos(c.a) * c.len,
      Math.sin(c.a) * c.len
    );
    ctx.stroke();
  }

  // Mép nước quanh đá
  ctx.strokeStyle = "rgba(255,255,255,0.18)";
  ctx.lineWidth = 2;

  ctx.beginPath();
  for(let i=0;i<r.shape.length;i++){
    const p = r.shape[i];
    const px = Math.cos(p.a) * (p.r + 3);
    const py = Math.sin(p.a) * (p.r + 3);

    if(i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.stroke();

  ctx.restore();
}
function drawHint(){
  ctx.save();
  ctx.fillStyle = "rgba(255,255,255,.75)";
  ctx.font = "14px Arial";
  ctx.textAlign = "center";
  ctx.fillText("Chạm / giữ màn hình để rẽ — thả ra để chạy thẳng", W/2, H-28);
  ctx.restore();
}
  
function isAllowedMobile(){

  const ua = navigator.userAgent;

  const isPhoneUA =
    /Android.*Mobile|iPhone|iPod/i.test(ua);

  const hasTouch =
    navigator.maxTouchPoints > 0;

  const isPortrait =
    innerHeight > innerWidth;

  const isPhoneSize =
    Math.min(innerWidth, innerHeight) <= 500 &&
    Math.max(innerWidth, innerHeight) <= 950;

  return isPhoneUA && hasTouch && isPortrait && isPhoneSize;
}

function checkDeviceBlock(){
  const block = document.getElementById("pcBlock");

  if(!isAllowedMobile()){
    block.style.display = "flex";
    document.body.style.overflow = "hidden";

    gameOver = true;
    return;
  }

  block.style.display = "none";
}

checkDeviceBlock();

window.addEventListener("resize", checkDeviceBlock);
window.addEventListener("orientationchange", checkDeviceBlock);

// Khởi động vòng lặp game một lần duy nhất
init();
gameStarted = false;
requestAnimationFrame(loop);
</script>
