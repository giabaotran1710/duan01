<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Emoji Memory Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #080812;
    --surface: #10101e;
    --card-bg: #16162a;
    --card-hover: #1f1f3a;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --border: rgba(124,58,237,0.35);
    --glow: 0 0 30px rgba(124,58,237,0.3);
    --correct: #10b981;
    --wrong: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 40px;
    background-image:
      radial-gradient(ellipse at 15% 15%, rgba(124,58,237,0.1) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(6,182,212,0.07) 0%, transparent 55%);
  }

  header { text-align: center; padding: 28px 16px 10px; }

  h1 {
    font-family: 'Exo 2', sans-serif;
    font-weight: 900;
    font-size: clamp(24px, 5vw, 42px);
    letter-spacing: 0.06em;
    background: linear-gradient(135deg, #a78bfa 0%, #06b6d4 50%, #f59e0b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
  }
  .subtitle { color: var(--text-dim); font-size: 11px; margin-top: 5px; letter-spacing: 0.18em; }

  /* ── Scoreboard ── */
  #scoreboard {
    display: flex; gap: 24px; padding: 12px 28px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; margin: 12px 0 8px;
    flex-wrap: wrap; justify-content: center;
  }
  .stat { text-align: center; }
  .stat-val { font-family: 'Exo 2', sans-serif; font-weight: 900; font-size: 26px; color: var(--accent2); line-height: 1.1; }
  .stat-label { color: var(--text-dim); font-size: 10px; letter-spacing: 0.12em; }

  /* ── Timer bar ── */
  #timer-bar-wrap {
    width: min(460px, 94vw); height: 7px;
    background: rgba(255,255,255,0.06); border-radius: 4px;
    overflow: hidden; margin: 4px 0 10px;
  }
  #timer-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.25s linear, background 0.5s;
    border-radius: 4px;
  }

  /* ── Target emoji display ── */
  #target-box {
    width: min(460px, 94vw);
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 14px;
    display: none;
    align-items: center;
    gap: 18px;
    animation: fadeIn 0.3s ease;
    box-shadow: var(--glow);
  }
  #target-box.active { display: flex; }

  #target-emoji {
    font-size: clamp(42px, 10vw, 68px);
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(124,58,237,0.6));
    animation: emojiPulse 1.8s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes emojiPulse {
    0%, 100% { transform: scale(1);    filter: drop-shadow(0 0 8px rgba(124,58,237,0.5)); }
    50%       { transform: scale(1.08); filter: drop-shadow(0 0 18px rgba(124,58,237,0.9)); }
  }

  .target-info { flex: 1; }
  .target-label {
    font-family: 'Exo 2', sans-serif; font-weight: 900;
    font-size: clamp(13px, 2.5vw, 17px);
    color: var(--accent3); letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .target-sub {
    font-family: 'Tahoma', sans-serif;
    font-size: clamp(15px, 2vw, 24px);
    color: var(--text-dim); line-height: 1.4;
  }

  #result-msg {
    font-family: 'Exo 2', sans-serif; font-size: 15px; font-weight: 700;
    min-height: 22px; text-align: center; padding: 0 12px;
    transition: opacity 0.2s;
  }

  /* ── Phase label ── */
  #phase-label {
    font-family: 'Exo 2', sans-serif; font-weight: 700;
    font-size: 15px; letter-spacing: 0.1em;
    color: var(--accent3); margin-bottom: 14px;
    min-height: 22px; text-align: center; padding: 0 16px;
  }

  /* ── Grid ── */
  #grid-wrap {
    width: min(460px, 94vw);
    aspect-ratio: 1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 10px; padding: 14px;
    background: rgba(124,58,237,0.07);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--glow);
  }

  /* ── 3-D flip card ── */
  .card-wrap { perspective: 700px; aspect-ratio: 1; }

  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.45,0.05,0.55,0.95);
    border-radius: 12px;
    cursor: default;
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 2px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }

  /* FRONT — emoji */
  .card-front {
    background: var(--card-bg);
    font-size: clamp(26px, 7vw, 54px);
    border-color: rgba(124,58,237,0.2);
  }

  /* BACK — ? (clickable during quiz) */
  .card-back {
    background: var(--surface);
    transform: rotateY(180deg);
    font-family: 'Exo 2', sans-serif; font-weight: 900;
    font-size: clamp(18px, 4.5vw, 36px);
    color: var(--accent);
    border-color: rgba(124,58,237,0.18);
  }

  /* Clickable state during quiz */
  .card-wrap.clickable .card { cursor: pointer; }
  .card-wrap.clickable:hover .card-back {
    background: var(--card-hover);
    border-color: var(--accent);
  }
  .card-wrap.clickable:hover .card {
    transform: rotateY(180deg) scale(1.07);
    z-index: 2;
  }
  .card-wrap.clickable:hover { z-index: 2; position: relative; }

  /* Correct answer reveal */
  .card-wrap.correct-reveal .card-front {
    border-color: var(--correct) !important;
    box-shadow: 0 0 22px rgba(16,185,129,0.6) !important;
    background: rgba(16,185,129,0.1) !important;
  }
  .card-wrap.correct-reveal .card { animation: correctPop 0.4s ease; }

  /* Wrong click shake */
  .card-wrap.wrong-shake .card { animation: shake 0.4s ease; }
  .card-wrap.wrong-shake .card-back {
    border-color: var(--wrong) !important;
    background: rgba(239,68,68,0.15) !important;
    box-shadow: 0 0 14px rgba(239,68,68,0.4) !important;
  }

  @keyframes correctPop {
    0%   { transform: rotateY(0deg) scale(1); }
    40%  { transform: rotateY(0deg) scale(1.15); }
    100% { transform: rotateY(0deg) scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: rotateY(180deg) translateX(0); }
    20%     { transform: rotateY(180deg) translateX(-5px); }
    40%     { transform: rotateY(180deg) translateX(5px); }
    60%     { transform: rotateY(180deg) translateX(-4px); }
    80%     { transform: rotateY(180deg) translateX(4px); }
  }

  /* coord label */
  .coord {
    position: absolute; top: 3px; left: 5px;
    font-size: 9px; color: rgba(148,163,184,0.38);
    font-family: 'Space Mono', monospace;
    pointer-events: none; line-height: 1;
  }

  /* Already-found cards (dimmed) */
  .card-wrap.found .card-front {
    opacity: 0.35;
    border-color: transparent !important;
    box-shadow: none !important;
  }

  /* ── Streak badge ── */
  .streak-badge {
    display: inline-block;
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    color: #fff; font-family: 'Exo 2', sans-serif; font-weight: 900;
    font-size: 11px; padding: 2px 9px; border-radius: 20px;
    letter-spacing: 0.1em; margin-left: 7px; vertical-align: middle;
  }

  /* ── Buttons ── */
  #ctrl-row {
    display: flex; gap: 12px; margin: 14px 0 0;
    flex-wrap: wrap; justify-content: center;
  }
  .btn {
    font-family: 'Exo 2', sans-serif; font-weight: 700; font-size: 14px;
    letter-spacing: 0.09em; padding: 12px 28px; border-radius: 11px;
    border: none; cursor: pointer; transition: all 0.18s; text-transform: uppercase;
  }
  #btn-start {
    background: linear-gradient(135deg, var(--accent), #4f46e5);
    color: #fff; box-shadow: 0 4px 18px rgba(124,58,237,0.38);
  }
  #btn-start:hover { transform: translateY(-2px); box-shadow: 0 9px 26px rgba(124,58,237,0.52); }



  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  
  #btn-skip {
  background: linear-gradient(135deg, var(--accent3), #d97706);
  color: #fff;
  box-shadow: 0 4px 14px rgba(245, 158, 11, 0.3);
}
#btn-skip:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(245, 158, 11, 0.45);
}
  
    footer { position:fixed;bottom:5px;left:10px;font-size:10px;color:#aaa;opacity:1;font-family:monospace;z-index:99999; }

</style>
</head>
<body>

<header>
  <h1>🧠 Emoji Memory</h1>
  <div class="subtitle">5×5 GRID · 25 EMOJIS · GBOARD</div>
</header>

<div id="scoreboard">
  <div class="stat"><div class="stat-val" id="s-correct" style="color: var(--correct);">0</div><div class="stat-label">ĐÚNG</div></div>
  <div class="stat"><div class="stat-val" id="s-wrong" style="color: var(--wrong);">0</div><div class="stat-label">SAI</div></div>
  <div class="stat"><div class="stat-val" id="s-round">0</div><div class="stat-label">LƯỢT</div></div>
  <div class="stat"><div class="stat-val" id="s-streak">0</div><div class="stat-label">CHUỖI</div></div>
  <div class="stat"><div class="stat-val" id="s-countdown">–</div><div class="stat-label">GIÂY</div></div>
</div>


<div id="timer-bar-wrap"><div id="timer-bar"></div></div>
<div id="phase-label">Nhấn CHƠI để bắt đầu!</div>

<!-- Target emoji prompt -->
<div id="target-box">
  <div id="target-emoji"></div>
  <div class="target-info">
    <div class="target-label">Ô chứa biểu tượng này ở đâu?</div>
    <div class="target-sub" id="target-sub">Lượt <b id="s-round2"></b></div>
  </div>
</div>

<div id="result-msg"></div>

<div id="grid-wrap"></div>

<div id="ctrl-row">
  <button class="btn" id="btn-start" onclick="startGame()">▶ CHƠI</button>
  <button class="btn" id="btn-skip" style="display: none;" onclick="skipMemorize()">BỎ QUA</button>
</div>
<footer>Version:D20260505-H11M57T391 »»» developed by Tran Gia Bao</footer>

<script>
const EMOJIS = [
  "😀","😂","😍","🤩","😎",
  "🥳","😱","🤔","😴","😈",
  "👻","💀","🤖","👽","🤡",
  "🐶","🐱","🐻","🦊","🐸",
  "🍕","🎮","🚀","🎸","⚽","🐢"
];

const ROWS = 5, COLS = 5, TOTAL = 25;

let board = [];
let cardWraps = [];
let phase = "idle";
let correctCount = 0; // Thay cho score
let wrongCount = 0;   // Biến mới để đếm số lỗi
let round = 0, streak = 0;
let targetIdx = -1;
let answered = false;
let foundIndices = new Set();   // correctly found so far (stay open, dimmed)
let revealedIndices = new Set();// asked so far (won't ask again)
let timerInterval = null;

  
  function skipMemorize() {
  // 1. Xóa bộ đếm thời gian đang chạy
  clearInterval(timerInterval);
  
  // 2. Ẩn nút Bỏ qua ngay lập tức
  document.getElementById("btn-skip").style.display = "none";
  
  // 3. Reset thanh Progress bar
  document.getElementById("timer-bar").style.width = "0%";
  document.getElementById("s-countdown").textContent = "–";
  
  // 4. Chuyển ngay sang giai đoạn úp thẻ và bắt đầu câu hỏi
  document.getElementById("phase-label").textContent = "";
  hideAllAnimated(() => {
    phase = "question";
    nextQuestion();
  });
}

// ── Build grid ─────────────────────────────────────────────────────────────────
function buildGrid() {
  const wrap = document.getElementById("grid-wrap");
  wrap.innerHTML = "";
  cardWraps = [];

  board = [...EMOJIS];
  for (let i = board.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [board[i], board[j]] = [board[j], board[i]];
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + c;
      const cw = document.createElement("div");
      cw.className = "card-wrap";
      cw.dataset.idx = idx;

      const card = document.createElement("div");
      card.className = "card flipped";

      const front = document.createElement("div");
      front.className = "card-face card-front";
      const coord = document.createElement("span");
      coord.className = "coord";
      coord.textContent = `${r+1},${c+1}`;
      front.appendChild(coord);
      front.appendChild(document.createTextNode(board[idx]));

      const back = document.createElement("div");
      back.className = "card-face card-back";
      back.textContent = "?";

      card.appendChild(front);
      card.appendChild(back);
      cw.appendChild(card);
      wrap.appendChild(cw);
      cardWraps.push(cw);
    }
  }
}

// ── Flip all open (stagger) ────────────────────────────────────────────────────
function revealAllAnimated(onDone) {
  cardWraps.forEach((cw, i) => {
    setTimeout(() => cw.querySelector(".card").classList.remove("flipped"), i * 50);
  });
  setTimeout(onDone, (TOTAL - 1) * 50 + 650);
}

// ── Flip all face-down (random order, skip found) ──────────────────────────────
function hideAllAnimated(onDone) {
  const order = [...Array(TOTAL).keys()];
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  order.forEach((idx, step) => {
    setTimeout(() => {
      if (!foundIndices.has(idx)) {
        cardWraps[idx].querySelector(".card").classList.add("flipped");
      }
    }, step * 40);
  });
  setTimeout(onDone, (TOTAL - 1) * 40 + 650);
}

// ── Timer bar ──────────────────────────────────────────────────────────────────
function startTimerBar(seconds, onDone) {
  clearInterval(timerInterval);
  const bar = document.getElementById("timer-bar");
  const cd  = document.getElementById("s-countdown");
  let remaining = seconds;
  bar.style.transition = "none";
  bar.style.width = "100%";
  bar.style.background = "linear-gradient(90deg,#7c3aed,#06b6d4)";
  cd.textContent = Math.ceil(remaining);
  setTimeout(() => {
    bar.style.transition = "width 0.25s linear, background 0.5s";
    timerInterval = setInterval(() => {
      remaining -= 0.25;
      bar.style.width = Math.max(0, (remaining / seconds) * 100) + "%";
      cd.textContent = Math.ceil(remaining);
      if (remaining <= 5) bar.style.background = "linear-gradient(90deg,#ef4444,#f59e0b)";
      if (remaining <= 0) {
        clearInterval(timerInterval);
        cd.textContent = "0";
        bar.style.width = "0%";
        onDone();
      }
    }, 250);
  }, 30);
}

// ── Enable / disable clicking on back-face cards ───────────────────────────────
function setClickable(enable) {
  cardWraps.forEach((cw, i) => {
    if (foundIndices.has(i)) return; // found cards stay inert
    if (enable) {
      cw.classList.add("clickable");
      cw.onclick = () => handleCardClick(i);
    } else {
      cw.classList.remove("clickable");
      cw.onclick = null;
    }
  });
}

// ── Start game ─────────────────────────────────────────────────────────────────
function startGame() {
correctCount = 0; wrongCount = 0; round = 0; streak = 0;
  foundIndices = new Set();
  revealedIndices = new Set();
  updateStats();
  buildGrid();

  document.getElementById("btn-start").style.display = "none";

  document.getElementById("target-box").classList.remove("active");
  document.getElementById("result-msg").textContent = "";
  document.getElementById("s-countdown").textContent = "–";
  document.getElementById("timer-bar").style.width = "0%";
  document.getElementById("phase-label").textContent = "";

  revealAllAnimated(() => {
    document.getElementById("phase-label").textContent = "👀 Hãy ghi nhớ những biểu tượng sau...";
    document.getElementById("btn-skip").style.display = "inline-block";
    startTimerBar(20, () => {
       document.getElementById("btn-skip").style.display = "none";
      document.getElementById("phase-label").textContent = "Hết thời gian";
      document.getElementById("s-countdown").textContent = "–";
      hideAllAnimated(() => {
        phase = "question";
        nextQuestion();
      });
    });
  });
}

// ── Show next question ─────────────────────────────────────────────────────────
function nextQuestion() {

  document.getElementById("result-msg").textContent = "";
  answered = false;

  // Build pool of not-yet-asked cards
  const pool = [];
  for (let i = 0; i < TOTAL; i++) {
    if (!revealedIndices.has(i)) pool.push(i);
  }

  if (pool.length === 0) {
    endGame();
    return;
  }

  targetIdx = pool[Math.floor(Math.random() * pool.length)];
  revealedIndices.add(targetIdx);
  round++;
  updateStats();

  // Show target
  document.getElementById("target-emoji").textContent = board[targetIdx];
  document.getElementById("s-round2").textContent = round;
  document.getElementById("target-box").classList.add("active");
  document.getElementById("phase-label").textContent =
    "🔍 Tìm và click vào ô chứa emoji trên!";
  setClickable(true);
}

function handleCardClick(clickedIdx) {
  if (answered) return;
  // Bỏ qua nếu thẻ đã được tìm thấy trước đó
  if (foundIndices.has(clickedIdx)) return;

  answered = true;
  setClickable(false);

  if (clickedIdx === targetIdx) {
    // ✅ TRƯỜNG HỢP TRẢ LỜI ĐÚNG
    correctCount++;
    streak++;
    updateStats(); // Cập nhật bảng điểm ngay

    const cw = cardWraps[clickedIdx];
    cw.querySelector(".card").classList.remove("flipped"); // Lật thẻ lên
    cw.classList.add("correct-reveal");
    foundIndices.add(clickedIdx);

    // ĐÃ XÓA BIẾN ${pts} Ở ĐÂY ĐỂ TRÁNH LỖI
    document.getElementById("result-msg").innerHTML =
      `✅ <span style="color:var(--correct)">Chính xác!</span>` +
      (streak > 1 ? `<span class="streak-badge">🔥 ${streak} CHUỖI</span>` : "");

    setTimeout(() => {
      cardWraps[clickedIdx].classList.add("found");
      cardWraps[clickedIdx].classList.remove("correct-reveal");
      scheduleNext(3);
    }, 800);

  } else {
    // ❌ TRƯỜNG HỢP TRẢ LỜI SAI
    streak = 0;
    wrongCount++;
    updateStats();

    const cwWrong = cardWraps[clickedIdx];
    cwWrong.classList.add("wrong-shake");
    setTimeout(() => cwWrong.classList.remove("wrong-shake"), 500);

    document.getElementById("result-msg").innerHTML =
      `❌ <span style="color:var(--wrong)">Sai rồi!</span>`;

    const correctCw = cardWraps[targetIdx];
    const correctCardInner = correctCw.querySelector(".card");
    
    // Hiệu ứng lật thẻ đúng
    correctCardInner.classList.remove("flipped");
    
    setTimeout(() => {
      correctCw.classList.add("correct-reveal");
    }, 500);

    setTimeout(() => {
      correctCw.classList.remove("correct-reveal");
      correctCw.classList.add("found");
      foundIndices.add(targetIdx);
      scheduleNext(3);
    }, 1500);
  }
}


// ── Auto-advance countdown ─────────────────────────────────────────────────────
function scheduleNext(seconds) {
  let remaining = seconds;
  const resultEl = document.getElementById("result-msg");
  const tick = () => {
    const base = resultEl.dataset.base || resultEl.innerHTML;
    resultEl.dataset.base = base;
    resultEl.innerHTML = base + ` <span style="color:var(--text-dim);font-size:13px">(tiếp theo: ${remaining}s)</span>`;
    if (remaining <= 0) {
      delete resultEl.dataset.base;
      nextQuestion();
      return;
    }
    remaining--;
    setTimeout(tick, 1000);
  };
  tick();
}

// ── End game ───────────────────────────────────────────────────────────────────
function endGame() {
  document.getElementById("target-box").classList.remove("active");
  document.getElementById("phase-label").textContent =
    `🎉 Hoàn thành! Điểm số: ${correctCount}`;
  document.getElementById("result-msg").textContent = "";
  const btn = document.getElementById("btn-start");
  btn.style.display = "inline-block";
  btn.textContent = "🔄 CHƠI LẠI";
}

// ── Stats ──────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById("s-correct").textContent = correctCount;
  document.getElementById("s-wrong").textContent   = wrongCount;
  document.getElementById("s-round").textContent   = round;
  document.getElementById("s-streak").textContent  = streak;
}


// Init: show face-down grid
buildGrid();
</script>
</body>
</html>
