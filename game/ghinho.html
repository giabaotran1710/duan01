<!DOCTYPE html> 
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Emoji Memory Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #080812; --surface: #10101e; --card-bg: #16162a; --card-hover: #1f1f3a;
    --accent: #7c3aed; --accent2: #06b6d4; --accent3: #f59e0b;
    --text: #e2e8f0; --text-dim: #94a3b8;
    --border: rgba(124,58,237,0.35); --glow: 0 0 30px rgba(124,58,237,0.3);
    --correct: #10b981; --wrong: #ef4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding-bottom: 48px;
    background-image:
      radial-gradient(ellipse at 15% 15%, rgba(124,58,237,0.1) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(6,182,212,0.07) 0%, transparent 55%);
  }

  header { text-align:center; padding:22px 16px 8px; }
  h1 {
    font-family:'Exo 2',sans-serif; font-weight:900;
    font-size:clamp(22px,5vw,40px); letter-spacing:0.06em;
    background:linear-gradient(135deg,#a78bfa 0%,#06b6d4 50%,#f59e0b 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    text-transform:uppercase;
  }
  .subtitle { color:var(--text-dim); font-size:11px; margin-top:4px; letter-spacing:0.18em; }

  /* ── Scoreboard ── */
  #scoreboard {
    display:flex; gap:10px; padding:10px 16px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; margin:10px 0 6px;
    flex-wrap:wrap; justify-content:center; align-items:center;
  }
  .stat { text-align:center; }
  .stat-val { font-family:'Exo 2',sans-serif; font-weight:900; font-size:24px; color:var(--accent2); line-height:1.1; }
  .stat-label { color:var(--text-dim); font-size:10px; letter-spacing:0.1em; }
  .divider { width:1px; height:36px; background:rgba(255,255,255,0.08); }

  /* ── Mode toggles ── */
  .mode-group { display:flex; flex-direction:column; align-items:center; gap:3px; }
  .mode-label-top { font-size:9px; color:var(--text-dim); letter-spacing:0.1em; font-family:'Exo 2',sans-serif; }
  .mode-btn {
    background:var(--card-bg); border:2px solid rgba(124,58,237,0.28);
    border-radius:18px; padding:4px 12px;
    font-family:'Exo 2',sans-serif; font-weight:900;
    font-size:11px; letter-spacing:0.08em; color:var(--text-dim);
    cursor:pointer; transition:all 0.18s; text-transform:uppercase; white-space:nowrap;
  }
  .mode-btn:hover { border-color:var(--accent); color:var(--text); }
  .mode-btn.mode-normal {
    background:var(--card-bg); border-color:rgba(124,58,237,0.28); color:var(--text-dim);
  }
  .mode-btn.mode-hard {
    background:linear-gradient(135deg,#ef4444,#b91c1c);
    border-color:#ef4444; color:#fff;
    box-shadow:0 0 14px rgba(239,68,68,0.45);
  }
  .mode-btn.mode-ultra {
    background:linear-gradient(135deg,#6d28d9,#1d4ed8);
    border-color:#818cf8; color:#fff;
    box-shadow:0 0 18px rgba(109,40,217,0.6);
    animation:ultraPulse 1.5s ease-in-out infinite;
  }
  @keyframes ultraPulse {
    0%,100% { box-shadow:0 0 14px rgba(109,40,217,0.5); }
    50%     { box-shadow:0 0 26px rgba(129,140,248,0.8); }
  }

  /* ── Timer bar ── */
  #timer-bar-wrap {
    width:min(500px,96vw); height:7px;
    background:rgba(255,255,255,0.06); border-radius:4px;
    overflow:hidden; margin:4px 0 8px;
  }
  #timer-bar {
    height:100%; width:0%;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width 0.25s linear, background 0.5s; border-radius:4px;
  }

  /* ── Target box ── */
  #target-box {
    width:min(500px,96vw); background:var(--surface);
    border:2px solid var(--border); border-radius:16px;
    padding:14px 18px; margin-bottom:10px;
    display:none; align-items:center; gap:16px;
    animation:fadeIn 0.3s ease; box-shadow:var(--glow);
  }
  #target-box.active { display:flex; }
  #target-emoji {
    font-size:clamp(40px,9vw,64px); line-height:1; flex-shrink:0;
    filter:drop-shadow(0 0 12px rgba(124,58,237,0.6));
    animation:emojiPulse 1.8s ease-in-out infinite;
  }
  @keyframes emojiPulse {
    0%,100% { transform:scale(1);    filter:drop-shadow(0 0 8px rgba(124,58,237,0.5)); }
    50%     { transform:scale(1.08); filter:drop-shadow(0 0 18px rgba(124,58,237,0.9)); }
  }
  .target-info { flex:1; }
  .target-label {
    font-family:'Exo 2',sans-serif; font-weight:900;
    font-size:clamp(12px,2.4vw,16px); color:var(--accent3);
    letter-spacing:0.08em; text-transform:uppercase; margin-bottom:3px;
  }
  .target-sub { font-family:'Tahoma',sans-serif; font-size:clamp(13px,2vw,18px); color:var(--text-dim); }

  /* ── Set badge ── */
  #set-badge {
    font-family:'Exo 2',sans-serif; font-weight:700; font-size:11px;
    padding:3px 10px; border-radius:20px; letter-spacing:0.1em;
    display:none; margin-bottom:6px;
  }
  #set-badge.active { display:inline-block; }

  #result-msg {
    font-family:'Exo 2',sans-serif; font-size:15px; font-weight:700;
    min-height:22px; text-align:center; padding:0 12px; margin-bottom:6px;
  }
  #phase-label {
    font-family:'Exo 2',sans-serif; font-weight:700;
    font-size:14px; letter-spacing:0.08em; color:var(--accent3);
    margin-bottom:10px; min-height:20px; text-align:center; padding:0 16px;
  }

  /* ── Grid ── */
  #grid-wrap {
    width:min(500px,96vw); aspect-ratio:1; display:grid;
    gap:8px; padding:12px;
    background:rgba(124,58,237,0.07);
    border:1px solid var(--border); border-radius:18px;
    box-shadow:var(--glow);
  }

  /* ── Cards ── */
  .card-wrap { perspective:700px; aspect-ratio:1; }
  .card {
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d;
    transition:transform 0.5s cubic-bezier(0.45,0.05,0.55,0.95);
    border-radius:10px; cursor:default;
  }
  .card.flipped { transform:rotateY(180deg); }
  .card-face {
    position:absolute; inset:0; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border:2px solid transparent;
    transition:border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }

  /* Font size controlled via CSS variable set on grid-wrap */
  .card-front {
    background:var(--card-bg);
    font-size:var(--card-font, clamp(20px,5.5vw,46px));
    border-color:rgba(124,58,237,0.2);
  }
  .card-back {
    background:var(--surface); transform:rotateY(180deg);
    font-family:'Exo 2',sans-serif; font-weight:900;
    font-size:clamp(14px,3.5vw,28px); color:var(--accent);
    border-color:rgba(124,58,237,0.18);
  }

  .card-wrap.clickable .card { cursor:pointer; }
  .card-wrap.clickable:hover .card-back { background:var(--card-hover); border-color:var(--accent); }
  .card-wrap.clickable:hover .card { transform:rotateY(180deg) scale(1.07); z-index:2; }
  .card-wrap.clickable:hover { z-index:2; position:relative; }

  .card-wrap.correct-reveal .card-front {
    border-color:var(--correct) !important;
    box-shadow:0 0 22px rgba(16,185,129,0.6) !important;
    background:rgba(16,185,129,0.1) !important;
  }
  .card-wrap.correct-reveal .card { animation:correctPop 0.4s ease; }
  .card-wrap.wrong-shake .card { animation:shake 0.4s ease; }
  .card-wrap.wrong-shake .card-back {
    border-color:var(--wrong) !important;
    background:rgba(239,68,68,0.15) !important;
    box-shadow:0 0 14px rgba(239,68,68,0.4) !important;
  }
  @keyframes correctPop {
    0%   { transform:rotateY(0deg) scale(1); }
    40%  { transform:rotateY(0deg) scale(1.15); }
    100% { transform:rotateY(0deg) scale(1); }
  }
  @keyframes shake {
    0%,100% { transform:rotateY(180deg) translateX(0); }
    20%     { transform:rotateY(180deg) translateX(-5px); }
    40%     { transform:rotateY(180deg) translateX(5px); }
    60%     { transform:rotateY(180deg) translateX(-4px); }
    80%     { transform:rotateY(180deg) translateX(4px); }
  }
  .coord {
    position:absolute; top:2px; left:4px;
    font-size:8px; color:rgba(148,163,184,0.35);
    font-family:'Space Mono',monospace; pointer-events:none; line-height:1;
  }
  .card-wrap.found .card-front { opacity:0.3; border-color:transparent !important; box-shadow:none !important; }

  .streak-badge {
    display:inline-block;
    background:linear-gradient(135deg,#f59e0b,#ef4444);
    color:#fff; font-family:'Exo 2',sans-serif; font-weight:900;
    font-size:11px; padding:2px 9px; border-radius:20px;
    letter-spacing:0.1em; margin-left:7px; vertical-align:middle;
  }

  /* ── Buttons ── */
  #ctrl-row { display:flex; gap:12px; margin:12px 0 0; flex-wrap:wrap; justify-content:center; }
  .btn {
    font-family:'Exo 2',sans-serif; font-weight:700; font-size:14px;
    letter-spacing:0.09em; padding:11px 26px; border-radius:11px;
    border:none; cursor:pointer; transition:all 0.18s; text-transform:uppercase;
  }
  #btn-start {
    background:linear-gradient(135deg,var(--accent),#4f46e5);
    color:#fff; box-shadow:0 4px 18px rgba(124,58,237,0.38);
  }
  #btn-start:hover { transform:translateY(-2px); box-shadow:0 9px 26px rgba(124,58,237,0.52); }
  #btn-skip {
    background:linear-gradient(135deg,var(--accent3),#d97706);
    color:#fff; display:none; box-shadow:0 4px 14px rgba(245,158,11,0.3);
  }
  #btn-skip:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(245,158,11,0.45); }

  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  footer { position:fixed; bottom:5px; left:10px; font-size:10px; color:#aaa; font-family:monospace; z-index:99999; }
</style>
</head>

<header>

<div id="timer-bar-wrap"><div id="timer-bar"></div></div>
<div id="phase-label">Nhấn CHƠI để bắt đầu!</div>
<span id="set-badge"></span>

<div id="target-box">

</div>

<div id="result-msg"></div>
<div id="grid-wrap"></div>

<div id="ctrl-row">

  <button class="btn" id="btn-skip"  onclick="skipMemorize()">BỎ QUA</button>
</div>

"🏴󠁧󠁢󠁳󠁣󠁴󠁿","🏴󠁧󠁢󠁥󠁮󠁧󠁿","🏴󠁧󠁢󠁷󠁬󠁳󠁿",
];

const SET_NAMES = Object.keys(EMOJI_SETS);

// ── Mode: 'normal' | 'hard' | 'ultra' ────────────────────────────────────────
let mode = 'normal';
let currentSetIndex = 0;

function gridSize()   { return mode==='hard' ? 6 : mode==='ultra' ? 7 : 5; }
function totalCards() { return mode==='hard' ? 36 : mode==='ultra' ? 49 : 25; }
function memorySecs() { return mode==='hard' ? 30 : mode==='ultra' ? 60 : 20; }

// Card font size per mode (same visual size across all)
function cardFont() {
  return mode==='ultra' ? 'clamp(20px,5.5vw,35px)': mode==='hard' ? 'clamp(30px,5.5vw,48px)' : 'clamp(37px,5.5vw,55px)';}

let board=[], cardWraps=[];
let phase='idle';
let correctCount=0, wrongCount=0, round=0, streak=0;
let targetIdx=-1, answered=false;
let foundIndices=new Set(), revealedIndices=new Set();
let timerInterval=null;

// ── Cycle mode: normal → hard → ultra → normal ────────────────────────────────
function cycleMode() {
  if (phase !== 'idle') return;
  const order = ['normal','hard','ultra'];
  mode = order[(order.indexOf(mode)+1) % order.length];
  updateModeButton();
  refreshGridPreview();
}

function updateModeButton() {
  const btn = document.getElementById('btn-mode');
  const labels = { normal:'BÌNH THƯỜNG', hard:'🔥 KHÓ', ultra:'💀 SIÊU KHÓ' };
  btn.textContent = labels[mode];
  btn.className = 'mode-btn mode-' + mode;
  const subtitles = {
    normal: '',
    hard:   '',
    ultra:  ''
  };
  document.getElementById('grid-subtitle').textContent = subtitles[mode];
}

function refreshGridPreview() {
  const src = mode==='ultra' ? [...FLAGS_EMOJIS]
            : mode==='hard'  ? [...EMOJI_SETS[SET_NAMES[currentSetIndex % SET_NAMES.length]]]
            : [...EMOJIS];
  for (let i=src.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1)); [src[i],src[j]]=[src[j],src[i]];
  }
  buildGrid(src.slice(0, totalCards()));
}
// ── Pick emoji set ─────────────────────────────────────────────────────────────
function pickSet() {
  if (mode === 'ultra') {
    const pool = [...FLAGS_EMOJIS];
    for (let i=pool.length-1; i>0; i--) {
      const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]];
    }
    return { name: 'Cờ các Quốc gia', emojis: pool.slice(0, totalCards()) };
  }
  if (mode === 'hard') {
    const name = SET_NAMES[currentSetIndex % SET_NAMES.length];
    currentSetIndex++;
    const pool = [...EMOJI_SETS[name]];
    for (let i=pool.length-1; i>0; i--) {
      const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]];
    }
    return { name, emojis: pool.slice(0, totalCards()) };
  }
  // normal: dùng EMOJIS
  const pool = [...EMOJIS];
  for (let i=pool.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  return { name: 'Dùng chung', emojis: pool.slice(0, totalCards()) };
}

// ── Build grid ────────────────────────────────────────────────────────────────
function buildGrid(emojis) {
  const N = gridSize();
  const wrap = document.getElementById('grid-wrap');
  wrap.innerHTML = '';
  wrap.style.gridTemplateColumns = `repeat(${N},1fr)`;
  wrap.style.gridTemplateRows    = `repeat(${N},1fr)`;
  wrap.style.setProperty('--card-font', cardFont());
  cardWraps = [];

  board = [...emojis];
  for (let i=board.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1)); [board[i],board[j]]=[board[j],board[i]];
  }

  for (let r=0; r<N; r++) {
    for (let c=0; c<N; c++) {
      const idx = r*N+c;
      const cw = document.createElement('div');
      cw.className = 'card-wrap';
      const card = document.createElement('div');
      card.className = 'card flipped';
      const front = document.createElement('div');
      front.className = 'card-face card-front';
      const coord = document.createElement('span');
      coord.className = 'coord';
      coord.textContent = `${r+1},${c+1}`;
      front.appendChild(coord);
      front.appendChild(document.createTextNode(board[idx]));
      const back = document.createElement('div');
      back.className = 'card-face card-back';
      back.textContent = '?';
      card.appendChild(front); card.appendChild(back);
      cw.appendChild(card); wrap.appendChild(cw);
      cardWraps.push(cw);
    }
  }
}

// ── Animations ────────────────────────────────────────────────────────────────
function revealAllAnimated(onDone) {
  cardWraps.forEach((cw,i) => {
    setTimeout(() => cw.querySelector('.card').classList.remove('flipped'), i*40);
  });
  setTimeout(onDone, (cardWraps.length-1)*40+600);
}

function hideAllAnimated(onDone) {
  const order = [...Array(cardWraps.length).keys()];
  for (let i=order.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]];
  }
  order.forEach((idx,step) => {
    setTimeout(() => {
      if (!foundIndices.has(idx))
        cardWraps[idx].querySelector('.card').classList.add('flipped');
    }, step*30);
  });
  setTimeout(onDone, (order.length-1)*30+600);
}

// ── Timer ──────────────────────────────────────────────────────────────────────
function startTimerBar(seconds, onDone) {
  clearInterval(timerInterval);
  const bar=document.getElementById('timer-bar'), cd=document.getElementById('s-countdown');
  let remaining=seconds;
  bar.style.transition='none'; bar.style.width='100%';
  bar.style.background='linear-gradient(90deg,#7c3aed,#06b6d4)';
  cd.textContent=Math.ceil(remaining);
  setTimeout(() => {
    bar.style.transition='width 0.25s linear, background 0.5s';
    timerInterval=setInterval(() => {
      remaining-=0.25;
      bar.style.width=Math.max(0,(remaining/seconds)*100)+'%';
      cd.textContent=Math.ceil(remaining);
      if (remaining<=10) bar.style.background='linear-gradient(90deg,#ef4444,#f59e0b)';
      if (remaining<=0) {
        clearInterval(timerInterval); cd.textContent='0'; bar.style.width='0%'; onDone();
      }
    },250);
  },30);
}

function skipMemorize() {
  clearInterval(timerInterval);
  document.getElementById('btn-skip').style.display='none';
  document.getElementById('timer-bar').style.width='0%';
  document.getElementById('s-countdown').textContent='–';
  document.getElementById('phase-label').textContent='';
  hideAllAnimated(() => { phase='question'; nextQuestion(); });
}

// ── Clickable ─────────────────────────────────────────────────────────────────
function setClickable(enable) {
  cardWraps.forEach((cw,i) => {
    if (foundIndices.has(i)) return;
    if (enable) { cw.classList.add('clickable'); cw.onclick=()=>handleCardClick(i); }
    else        { cw.classList.remove('clickable'); cw.onclick=null; }
  });
}

// ── Start game ────────────────────────────────────────────────────────────────
function startGame() {
  
  correctCount=0; wrongCount=0; round=0; streak=0;
  foundIndices=new Set(); revealedIndices=new Set();
  updateStats();

  const {name, emojis} = pickSet();

  const badge=document.getElementById('set-badge');
  const hue=(currentSetIndex*47)%360;
  badge.textContent=`BỘ: ${name}`;
  badge.style.cssText=`background:hsl(${hue},65%,32%);color:#fff;border:1px solid hsl(${hue},65%,48%)`;
  badge.classList.add('active');

  buildGrid(emojis);

  document.getElementById('btn-start').style.display='none';
  document.getElementById('target-box').classList.remove('active');
  document.getElementById('result-msg').textContent='';
  document.getElementById('s-countdown').textContent='–';
  document.getElementById('timer-bar').style.width='0%';
  document.getElementById('phase-label').textContent='';
  // Lock mode toggle during game
  document.getElementById('btn-mode').style.pointerEvents='none';
  document.getElementById('btn-mode').style.opacity='0.45';

  revealAllAnimated(() => {
    document.getElementById('phase-label').textContent='👀 Hãy ghi nhớ những biểu tượng sau...';
    document.getElementById('btn-skip').style.display='inline-block';
    startTimerBar(memorySecs(), () => {
      document.getElementById('btn-skip').style.display='none';
      document.getElementById('phase-label').textContent='Hết thời gian';
      document.getElementById('s-countdown').textContent='–';
      hideAllAnimated(() => { phase='question'; nextQuestion(); });
      if (name) {
  badge.textContent = `BỘ: ${name}`;
  badge.classList.add('active');
} else {
  badge.classList.remove('active');
}
    });
  });
}

// ── Next question ─────────────────────────────────────────────────────────────
function nextQuestion() {
  document.getElementById('result-msg').textContent='';
  answered=false;
  const TOTAL=totalCards();
  const pool=[];
  for (let i=0; i<TOTAL; i++) if (!revealedIndices.has(i)) pool.push(i);
  if (pool.length===0) { endGame(); return; }
  targetIdx=pool[Math.floor(Math.random()*pool.length)];
  revealedIndices.add(targetIdx);
  round++; updateStats();
  document.getElementById('target-emoji').textContent=board[targetIdx];
  document.getElementById('s-round2').textContent=round;
  document.getElementById('target-box').classList.add('active');
  document.getElementById('phase-label').textContent='🔍 Tìm và click vào ô chứa emoji trên!';
  setClickable(true);
}

// ── Handle click ──────────────────────────────────────────────────────────────
function handleCardClick(clickedIdx) {
  if (answered) return;
  if (foundIndices.has(clickedIdx)) return;
  answered=true; setClickable(false);

  if (clickedIdx===targetIdx) {
    correctCount++; streak++; updateStats();
    const cw=cardWraps[clickedIdx];
    cw.querySelector('.card').classList.remove('flipped');
    cw.classList.add('correct-reveal');
    foundIndices.add(clickedIdx);
    document.getElementById('result-msg').innerHTML=
      `✅ <span style="color:var(--correct)">Chính xác!</span>`+
      (streak>1?`<span class="streak-badge">🔥 ${streak} CHUỖI</span>`:'');
    setTimeout(() => {
      cardWraps[clickedIdx].classList.add('found');
      cardWraps[clickedIdx].classList.remove('correct-reveal');
      scheduleNext(3);
    },800);

  } else {
    streak=0; wrongCount++; updateStats();
    const cwWrong=cardWraps[clickedIdx];
    cwWrong.classList.add('wrong-shake');
    setTimeout(()=>cwWrong.classList.remove('wrong-shake'),500);
    document.getElementById('result-msg').innerHTML=
      `❌ <span style="color:var(--wrong)">Sai rồi!</span>`;
    // Flip correct card open immediately
    const correctCw=cardWraps[targetIdx];
    correctCw.querySelector('.card').classList.remove('flipped');
    setTimeout(()=>correctCw.classList.add('correct-reveal'),100);
    setTimeout(()=>{
      correctCw.classList.remove('correct-reveal');
      correctCw.classList.add('found');
      foundIndices.add(targetIdx);
      scheduleNext(3);
    },1800);
  }
}

// ── Auto-advance ──────────────────────────────────────────────────────────────
function scheduleNext(seconds) {
  let remaining=seconds;
  const resultEl=document.getElementById('result-msg');
  const base=resultEl.innerHTML;
  resultEl.dataset.base=base;
  const tick=()=>{
    resultEl.innerHTML=resultEl.dataset.base+
      ` <span style="color:var(--text-dim);font-size:13px">(tiếp theo: ${remaining}s)</span>`;
    if (remaining<=0) { delete resultEl.dataset.base; nextQuestion(); return; }
    remaining--;
    setTimeout(tick,1000);
  };
  tick();
}

// ── End game ──────────────────────────────────────────────────────────────────
function endGame() {
  document.getElementById('target-box').classList.remove('active');
  document.getElementById('set-badge').classList.remove('active');
  document.getElementById('phase-label').textContent=
    `🎉 Hoàn thành! ✅ ${correctCount} đúng  ❌ ${wrongCount} sai`;
  document.getElementById('result-msg').textContent='';
  const btn=document.getElementById('btn-start');
  btn.style.display='inline-block'; btn.textContent='🔄 CHƠI LẠI';
  phase='idle';
  document.getElementById('btn-mode').style.pointerEvents='auto';
  document.getElementById('btn-mode').style.opacity='1';
}

function updateStats() {
  document.getElementById('s-correct').textContent=correctCount;
  document.getElementById('s-wrong').textContent=wrongCount;
  document.getElementById('s-round').textContent=round;
  document.getElementById('s-streak').textContent=streak;
}

// Init
updateModeButton();
refreshGridPreview();
</script>
