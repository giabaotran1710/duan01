<script>
/* =====================================================
   DICE CORE
===================================================== */
function renderDice(v){
  dice.innerHTML="";

  (pipMap[v]||pipMap[1]).forEach(p=>{
    const s=document.createElement("span");
    s.className="pip "+p;
    dice.appendChild(s);
  });
}

function randomDice(){
  return Math.floor(Math.random()*6)+1;
}

function getOpponentKey(who){
  return who==="player" ? "ai" : "player";
}

function pickRandomFrom(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function buildDicePool(who){
  const rt=itemRuntime[who];

  if(rt.forceNextRollValue){
    return [rt.forceNextRollValue];
  }

  let pool=[1,2,3,4,5,6];

  if(Array.isArray(rt.limitNextRollValues)){
    pool=pool.filter(v=>rt.limitNextRollValues.includes(v));
  }

  if(rt.forceNextRollParity==="even"){
    pool=pool.filter(v=>v%2===0);
  }

  if(rt.forceNextRollParity==="odd"){
    pool=pool.filter(v=>v%2===1);
  }

  if(pool.length<=0){
    pool=[1,2,3,4,5,6];
  }

  return pool;
}

function createRollData(who){
  const rt=itemRuntime[who];
  const rollCount=rt.rollTwiceNext ? 2 : 1;
  const rolls=[];

  for(let i=0;i<rollCount;i++){
    const pool=buildDicePool(who);
    rolls.push(pickRandomFrom(pool));
  }

  const total=rolls.reduce((sum,v)=>sum+v,0);

  rt.forceNextRollValue=null;
  rt.forceNextRollParity=null;
  rt.limitNextRollValues=null;
  rt.rollTwiceNext=false;

  return {rolls,total};
}

async function rollDiceByData(rollData){
  if(rollData.rolls.length===1){
    await rollDiceVisual(rollData.rolls[0]);
    return;
  }

  for(let i=0;i<rollData.rolls.length;i++){
    await rollDiceVisual(rollData.rolls[i]);

    if(i<rollData.rolls.length-1){
      updateStatus(
        "Tung hai lần",
        `Lần ${i+1}: ${rollData.rolls[i]} điểm. Tung tiếp lần ${i+2}...`
      );

      await sleep(500);
    }
  }
}

function createDiceBurst(){
  for(let i=0;i<18;i++){
    const s=document.createElement("span");
    s.className="burst";

    const angle=Math.random()*Math.PI*2;
    const dist=34+Math.random()*38;

    s.style.setProperty("--dx",Math.cos(angle)*dist+"px");
    s.style.setProperty("--dy",Math.sin(angle)*dist+"px");
    s.style.background=Math.random()>.45 ? "#fff176" : "#ffffff";

    diceWrap.appendChild(s);

    setTimeout(()=>{
      s.remove();
    },750);
  }
}

function rollDiceVisual(finalValue){
  return new Promise(resolve=>{
    dice.classList.remove("pop");
    dice.classList.add("rolling");

    let elapsed=0;
    const duration=1050;

    const timer=setInterval(()=>{
      elapsed+=70;
      renderDice(randomDice());

      if(elapsed>=duration){
        clearInterval(timer);

        dice.classList.remove("rolling");
        renderDice(finalValue);

        void dice.offsetWidth;
        dice.classList.add("pop");

        createDiceBurst();

        setTimeout(()=>{
          dice.classList.remove("pop");
          resolve();
        },420);
      }
    },70);
  });
}

/* =====================================================
   TURN EFFECTS
===================================================== */
function tickEndOfTurnEffects(who){
  if(itemRuntime[who].invisibleTurns>0){
    itemRuntime[who].invisibleTurns--;
  }

  if(itemRuntime[who].blockFinishTurns>0){
    itemRuntime[who].blockFinishTurns--;
  }
}

async function completeTurn(who){
  tickEndOfTurnEffects(who);
  await registerCompletedTurn(who);
}

function canApplyHarmfulEffect(userKey,targetKey,item){
  if(!item.harmful){
    return true;
  }

  const effectType=item.effect?.type;
  const bypassInvisible=effectType==="remove_status" && item.effect.status==="invisible";

  if(!bypassInvisible && itemRuntime[targetKey].invisibleTurns>0){
    updateStatus(
      "Không thể tác động",
      `${tokens[targetKey].name} đang tàng hình nên không bị hiệu ứng xấu.`
    );

    return false;
  }

  if(item.shieldable && itemState[targetKey].shields>0){
    itemState[targetKey].shields--;
    updateStats();

    updateStatus(
      "Khiên đã chặn!",
      `${tokens[targetKey].name} mất 1 khiên và không bị ảnh hưởng bởi thẻ ${item.icon} ${item.name}.`
    );

    return false;
  }

  return true;
}
  
function getTrapAtPos(pos){
  return boardTraps.find(trap=>trap.pos===pos) || null;
}

async function checkTrapLanding(who){
  const token=tokens[who];
  const trap=getTrapAtPos(token.pos);

  if(!trap){
    return false;
  }

  itemRuntime[who].trapJailTurns=Math.max(
    itemRuntime[who].trapJailTurns || 0,
    2
  );

  updateStatus(
    "Dính bẫy!",
    `${tokens[who].name} dừng đúng ô ${token.pos} có bẫy và bị giam 2 lượt.`
  );

  await sleep(1000);
  return true;
}

function checkStopFlag(who){
  const token=tokens[who];

  const index=boardFlags.findIndex(flag=>{
    return flag.targetOwner===who && flag.pos===token.pos;
  });

  if(index<0){
    return false;
  }

  const flag=boardFlags[index];
  boardFlags.splice(index,1);

  updateStatus(
    "Dính cờ chặn!",
    `${tokens[who].name} đi tới ô ${flag.pos} và bị buộc dừng lại.`
  );

  return true;
}

/* =====================================================
   ITEM EFFECT ENGINE - FIXED
===================================================== */
async function moveSelfByItem(who,steps,itemName="Thẻ di chuyển"){
  await moveTokenByItem(who,steps,itemName);

  if(tokens[who].pos===100){
    endGame(who);
    return;
  }

  const trapped=await checkTrapLanding(who);

  if(!trapped){
    await checkKickOpponent(who,steps);
  }
}

async function applyItemEffect(who,item){
  const effect=item.effect;
  const opponentKey=getOpponentKey(who);

  if(!effect || !effect.type){
    updateStatus(
      "Thẻ chưa hoàn chỉnh",
      `Thẻ ${item.name} chưa có effect.type.`
    );

    return false;
  }

  switch(effect.type){
    case "move_self_steps":{
      await moveSelfByItem(who,effect.steps,item.name);
      return true;
    }

    case "move_self_and_skip_next_turn":{
      await moveSelfByItem(who,effect.steps,item.name);

      itemRuntime[who].skipRollTurns+=(effect.skipTurns || 1);

      updateStatus(
        "Bứt tốc!",
        `${tokens[who].name} đã tiến ${effect.steps} bước. Lượt sau sẽ không thể tung xúc xắc.`
      );

      return true;
    }

    case "force_next_roll_parity":{
      const targetKey=effect.owner==="opponent" ? opponentKey : who;

      if(targetKey===opponentKey && !canApplyHarmfulEffect(who,opponentKey,item)){
        return true;
      }

      itemRuntime[targetKey].forceNextRollParity=effect.parity;

      updateStatus(
        "Đã khóa xúc xắc",
        `${tokens[targetKey].name} sẽ chỉ tung ra số ${effect.parity==="even" ? "chẵn" : "lẻ"} ở lượt sau.`
      );

      return true;
    }

    case "limit_roll_values_this_turn":{
      itemRuntime[who].limitNextRollValues=[...effect.values];

      updateStatus(
        "Giới hạn xúc xắc",
        `${tokens[who].name} sẽ chỉ tung ra ${effect.values.join("/")} trong lượt này.`
      );

      return true;
    }

    case "roll_twice_this_turn":{
      itemRuntime[who].rollTwiceNext=true;

      updateStatus(
        "Tung hai lần",
        `${tokens[who].name} sẽ được tung xúc xắc 2 lần trong lượt này.`
      );

      return true;
    }

    case "tower_up":{
      itemRuntime[who].towerFloors+=(effect.floors || 1);

      updateStatus(
        "Leo tháp",
        `${tokens[who].name} đã leo lên ${itemRuntime[who].towerFloors} tầng tháp.`
      );

      return true;
    }

    case "add_status":{
      if(effect.status==="invisible"){
        itemRuntime[who].invisibleTurns=Math.max(
          itemRuntime[who].invisibleTurns,
          effect.turns || 3
        );

        updateStatus(
          "Tàng hình!",
          `${tokens[who].name} tàng hình trong ${itemRuntime[who].invisibleTurns} lượt.`
        );

        return true;
      }

      return true;
    }

    case "remove_status":{
      if(!canApplyHarmfulEffect(who,opponentKey,item)){
        return true;
      }

      if(effect.status==="invisible"){
        itemRuntime[opponentKey].invisibleTurns=0;

        updateStatus(
          "Lộ diện!",
          `${tokens[opponentKey].name} đã bị phá tàng hình.`
        );

        return true;
      }

      return true;
    }

    case "move_opponent_steps":{
      if(!canApplyHarmfulEffect(who,opponentKey,item)){
        return true;
      }

      const steps=Math.abs(effect.steps || 0);
      await moveTokenBackward(opponentKey,steps);

      updateStatus(
        "Đẩy lùi!",
        `${tokens[opponentKey].name} bị lùi ${steps} bước.`
      );

      return true;
    }

    case "force_next_roll_value":{
      if(!canApplyHarmfulEffect(who,opponentKey,item)){
        return true;
      }

      itemRuntime[opponentKey].forceNextRollValue=effect.value;

      updateStatus(
        "Ép xúc xắc!",
        `Lượt sau ${tokens[opponentKey].name} sẽ tung ra ${effect.value}.`
      );

      return true;
    }

    case "place_stop_flag":{
      if(!canApplyHarmfulEffect(who,opponentKey,item)){
        return true;
      }

      const flagPos=Math.max(1,tokens[who].pos || 1);

      boardFlags.push({
        pos:flagPos,
        owner:who,
        targetOwner:opponentKey
      });

      updateStatus(
        "Cắm cờ!",
        `${tokens[who].name} đã cắm cờ tại ô ${flagPos}. ${tokens[opponentKey].name} đi tới đó sẽ bị dừng.`
      );

      return true;
    }

    case "skip_next_roll":{
      if(!canApplyHarmfulEffect(who,opponentKey,item)){
        return true;
      }

      itemRuntime[opponentKey].skipRollTurns+=(effect.turns || 1);

      updateStatus(
        "Cấm tung!",
        `${tokens[opponentKey].name} sẽ mất lượt tung xúc xắc tiếp theo.`
      );

      return true;
    }

    case "block_finish_next_turn":{
      if(!canApplyHarmfulEffect(who,opponentKey,item)){
        return true;
      }

      itemRuntime[opponentKey].blockFinishTurns=Math.max(
        itemRuntime[opponentKey].blockFinishTurns,
        effect.turns || 1
      );

      updateStatus(
        "Khóa vạch đích!",
        `${tokens[opponentKey].name} sẽ bị chặn nếu cố về đích ở lượt sau.`
      );

      return true;
    }

    case "swap_positions":{
      if(!canApplyHarmfulEffect(who,opponentKey,item)){
        return true;
      }

      const temp=tokens[who].pos;
      tokens[who].pos=tokens[opponentKey].pos;
      tokens[opponentKey].pos=temp;

      syncTokensToBoard();

      updateStatus(
        "Đổi chỗ!",
        `${tokens[who].name} và ${tokens[opponentKey].name} đã đổi vị trí.`
      );

      return true;
    }

    default:{
      updateStatus(
        "Chưa hỗ trợ",
        `Effect ${effect.type} chưa được xử lý.`
      );

      console.warn("Effect chưa hỗ trợ:",effect,item);
      return false;
    }
  }
}

/* =====================================================
   AI ITEM ENGINE - SMART CARD USAGE
===================================================== */
function getNeedToFinish(who){
  return Math.max(0,100-tokens[who].pos);
}

function countHarmfulCards(who){
  return itemState[who].inventory.filter(item=>item.harmful).length;
}

function isParityMatch(value,parity){
  if(parity==="even"){
    return value%2===0;
  }

  if(parity==="odd"){
    return value%2===1;
  }

  return false;
}

function getParityName(parity){
  return parity==="even" ? "chẵn" : "lẻ";
}

function scoreAIItem(item){
  const effect=item.effect || {};
  const type=effect.type;

  const aiPos=tokens.ai.pos;
  const playerPos=tokens.player.pos;

  const aiNeed=getNeedToFinish("ai");
  const playerNeed=getNeedToFinish("player");

  const gap=playerPos-aiPos;

  const playerHasShield=item.harmful && item.shieldable && itemState.player.shields>0;
  const playerInvisible=itemRuntime.player.invisibleTurns>0;
  const isRevealInvisible=type==="remove_status" && effect.status==="invisible";

  let score=-999;
  let reason="chưa có lợi để dùng lúc này";

  if(item.harmful && playerInvisible && !isRevealInvisible){
    return {
      score:-999,
      reason:"người chơi đang tàng hình, dùng thẻ bất lợi sẽ phí"
    };
  }

  switch(type){
    case "move_self_steps":{
      const steps=effect.steps || 0;

      if(steps<=0 || aiPos+steps>100){
        score=-999;
        reason="dùng sẽ bị dư hoặc không có tác dụng";
        break;
      }

      if(aiPos+steps===100){
        score=1200;
        reason="dùng thẻ để về đích ngay";
        break;
      }

      score=steps*14;
      reason=`tiến ${steps} bước để tăng lợi thế`;

      if(gap>0){
        score+=Math.min(gap,20)*3;
        reason=`đang bị dẫn, tiến ${steps} bước để rút ngắn khoảng cách`;
      }

      if(aiNeed<=12){
        score+=steps*10;
        reason=`đang gần đích, tiến ${steps} bước để áp sát vạch đích`;
      }

      if(aiPos+steps>=90){
        score+=40;
        reason=`tiến ${steps} bước để vào vùng nước rút`;
      }

      break;
    }

    case "move_self_and_skip_next_turn":{
      const steps=effect.steps || 0;

      if(steps<=0 || aiPos+steps>100){
        score=-999;
        reason="dùng sẽ bị dư bước";
        break;
      }

      if(aiPos+steps===100){
        score=1300;
        reason="dùng Bứt Tốc để về đích ngay, bỏ qua nhược điểm mất lượt";
      }else{
        score=-999;
        reason="giữ lại vì chưa thể về đích ngay, dùng sẽ tự bất lợi";
      }

      break;
    }

case "force_next_roll_parity":{
  const targetKey=effect.owner==="opponent" ? "player" : "ai";

  if(targetKey==="ai"){
    if(aiNeed>=1 && aiNeed<=6 && isParityMatch(aiNeed,effect.parity)){
      score=250;
      reason=`AI cần ${aiNeed} để về đích, ép xúc xắc ${getParityName(effect.parity)} để tăng cơ hội`;
    }else if(gap>8 && aiNeed>6 && effect.parity==="even"){
      score=70;
      reason="AI đang bị dẫn, ép số chẵn để có cơ hội đi xa hơn";
    }
  }else{

    const trapSteps=getTrapStepsAhead("player",6)
      .filter(step=>isParityMatch(step,effect.parity));

    if(trapSteps.length>0){
      const bestStep=trapSteps[0];

      score=430;
      reason=`ép xúc xắc ${getParityName(effect.parity)} để người chơi có khả năng rơi vào bẫy ô ${playerPos+bestStep}`;
      break;
    }

    if(playerNeed>=1 && playerNeed<=6){
      if(!isParityMatch(playerNeed,effect.parity)){
        score=330;
        reason=`người chơi cần ${playerNeed} để thắng, ép xúc xắc ${getParityName(effect.parity)} để chặn về đích`;
      }else{
        score=-999;
        reason="không dùng vì có thể giúp người chơi về đích";
      }
    }else if(gap>8){
      score=90;
      reason="người chơi đang dẫn xa, ép nhịp xúc xắc để giảm độ linh hoạt";
    }
  }

  break;
}

    case "limit_roll_values_this_turn":{
      const values=Array.isArray(effect.values) ? effect.values : [];

      if(values.length<=0){
        score=-999;
        reason="thẻ giới hạn xúc xắc thiếu danh sách giá trị";
        break;
      }

      const minVal=Math.min(...values);
      const maxVal=Math.max(...values);

      if(values.includes(aiNeed) && aiNeed>=1 && aiNeed<=6){
        score=310;
        reason=`AI cần ${aiNeed} để về đích, giới hạn xúc xắc giúp tăng cơ hội ra đúng số`;
      }else if(aiNeed<minVal){
        score=-999;
        reason="giữ lại vì dùng lúc này dễ bị dư điểm";
      }else if(maxVal>=4 && aiNeed>6 && gap>5){
        score=105;
        reason="AI đang bị dẫn, dùng xúc xắc lớn để tăng tốc";
      }else if(maxVal<=3 && aiNeed<=3){
        score=135;
        reason="AI gần đích, dùng xúc xắc nhỏ để tránh dư điểm";
      }

      break;
    }

    case "roll_twice_this_turn":{
      if(aiNeed>=2 && aiNeed<=12){
        score=aiNeed>=7 ? 280 : 170;
        reason=`AI có thể về đích bằng tổng 2 lần tung, cần tổng ${aiNeed}`;
      }else if(aiNeed>12 && gap>6){
        score=115;
        reason="AI đang bị dẫn, tung hai lần để tăng tốc";
      }else{
        score=-999;
        reason="không dùng vì dễ dư điểm hoặc chưa cần thiết";
      }

      break;
    }

    case "tower_up":{
      score=-999;
      reason="thẻ tháp hiện chưa có tác dụng chiến thuật trực tiếp";
      break;
    }

    case "add_status":{
      if(effect.status==="invisible"){
        if(itemRuntime.ai.invisibleTurns>0){
          score=-999;
          reason="AI đang tàng hình rồi, chưa cần dùng tiếp";
          break;
        }

        const playerBadCards=countHarmfulCards("player");

        if(playerBadCards>0){
          score=160+playerBadCards*35;
          reason=`người chơi có ${playerBadCards} thẻ bất lợi, AI tàng hình để phòng thủ`;
        }else if(playerNeed<=10){
          score=130;
          reason="người chơi gần về đích, AI tàng hình để tránh bị phá";
        }else if(gap>0){
          score=95;
          reason="AI đang bị dẫn, tàng hình để giảm rủi ro bị tác động xấu";
        }
      }

      break;
    }

    case "remove_status":{
      if(effect.status==="invisible" && itemRuntime.player.invisibleTurns>0){
        score=650;
        reason="người chơi đang tàng hình, cần phá tàng hình ngay";
      }else{
        score=-999;
        reason="người chơi không tàng hình, dùng sẽ phí";
      }

      break;
    }

    case "move_opponent_steps":{
      const steps=Math.abs(effect.steps || 0);

      if(playerPos<=0 || steps<=0){
        score=-999;
        reason="người chơi chưa ở trên đường đua";
        break;
      }

      if(playerNeed<=6){
        score=460+steps*20;
        reason=`người chơi sắp về đích, đẩy lùi ${steps} bước để chặn thắng`;
      }else if(gap>0){
        score=130+steps*18+Math.min(gap,20)*3;
        reason=`người chơi đang dẫn, đẩy lùi ${steps} bước để kéo lại thế trận`;
      }else if(Math.abs(aiPos-playerPos)<=6){
        score=90+steps*10;
        reason=`đẩy lùi ${steps} bước để tránh bị áp sát/đá`;
      }

      break;
    }

    case "force_next_roll_value":{
      const value=effect.value;
      if(value>=1 && value<=6 && isTrapPosition(playerPos+value)){
  score=620;
  reason=`ép người chơi tung ${value} để rơi vào bẫy ô ${playerPos+value}`;
  break;
}

      if(playerNeed>=1 && playerNeed<=6){
        if(value>playerNeed){
          score=460+(value-playerNeed)*12;
          reason=`người chơi cần ${playerNeed}, ép ra ${value} để bị dư điểm`;
        }else if(value!==playerNeed){
          score=300;
          reason=`người chơi cần ${playerNeed}, ép ra ${value} để không thể về đích`;
        }else{
          score=-999;
          reason="không dùng vì sẽ giúp người chơi về đích";
        }
      }else if(gap>0){
        score=120-value*9;
        reason=`người chơi đang dẫn, ép ra ${value} để giảm tốc`;
      }

      break;
    }

    case "place_stop_flag":{
      const dist=aiPos-playerPos;

      if(aiPos>0 && dist>0 && dist<=6){
        score=240;
        reason=`AI đang đứng trước người chơi ${dist} ô, cắm cờ tại ô ${aiPos} để chặn đường`;
      }else if(playerNeed<=8 && aiPos>0){
        score=120;
        reason="người chơi gần đích, cắm cờ để tạo bẫy phòng thủ";
      }else{
        score=-999;
        reason="vị trí hiện tại chưa đẹp để cắm cờ";
      }

      break;
    }

    case "skip_next_roll":{
      if(playerNeed<=6){
        score=580;
        reason="người chơi sắp thắng, cấm tung xúc xắc để chặn ngay";
      }else if(gap>0){
        score=240+Math.min(gap,20)*4;
        reason="người chơi đang dẫn, cấm tung để AI bắt kịp";
      }else if(playerNeed<=12){
        score=165;
        reason="người chơi gần đích, cấm tung để giảm áp lực";
      }

      break;
    }

    case "block_finish_next_turn":{
      if(playerNeed<=6){
        score=620;
        reason="người chơi có thể về đích lượt sau, khóa vạch đích ngay";
      }else if(playerNeed<=12 && gap>0){
        score=170;
        reason="người chơi đang áp sát đích, khóa vạch đích để phòng thủ";
      }else{
        score=-999;
        reason="người chơi chưa đủ gần đích để cần khóa";
      }

      break;
    }

    case "swap_positions":{
      if(gap>=8){
        score=500+gap*6;
        reason=`người chơi đang dẫn ${gap} ô, đổi chỗ để đảo ngược thế trận`;
      }else if(playerNeed<=12 && playerPos>aiPos){
        score=460;
        reason="người chơi gần đích và đang dẫn, đổi chỗ để cướp lợi thế";
      }else if(gap>3){
        score=150+gap*5;
        reason="người chơi đang dẫn nhẹ, đổi chỗ để lấy vị trí tốt hơn";
      }else{
        score=-999;
        reason="đổi chỗ lúc này không có lợi";
      }

      break;
    }

    default:{
      score=-999;
      reason=`AI chưa hiểu effect ${type}`;
      break;
    }
  }

  if(playerHasShield && score>0){
    score=Math.max(85,Math.min(score,180));
    reason="người chơi có khiên, dùng thẻ này để phá 1 khiên trước";
  }

  return {score,reason};
}

function aiChooseBestItem(){
  const inventory=itemState.ai.inventory;

  if(!inventory.length){
    return null;
  }

  const ranked=inventory
    .map((item,index)=>{
      const result=scoreAIItem(item);

      return {
        item,
        index,
        score:result.score
      };
    })
    .filter(entry=>entry.score>=75)
    .sort((a,b)=>b.score-a.score);

  if(!ranked.length){
    return null;
  }

  return ranked[0];
}

async function aiUseBestItemIfNeeded(){
  if(state.gameOver || state.turn!=="ai"){
    return false;
  }

  try{
    const choice=aiChooseBestItem();

    if(!choice){
      await sleep(650);
      return false;
    }

    const {item,index}=choice;

    updateStatus(
      "AI đang suy nghĩ",
      "AI đã chọn được thẻ và chuẩn bị kích hoạt..."
    );

    await sleep(500);

    await showCardConsumeEffect("ai",item);

    const used=await applyItemEffect("ai",item);

    if(used){
      itemState.ai.inventory.splice(index,1);
      updateStats();

      if(openedInventoryOwner==="ai"){
        renderInventoryList("ai");
      }

      await sleep(700);
    }

    return used;
  }catch(err){
    console.error("Lỗi AI dùng thẻ:",err);

    await sleep(650);
    return false;
  }
}
/* =====================================================
   MAIN TURN FLOW
===================================================== */
async function handlePlayerRoll(){
  if(state.busy || state.gameOver || state.turn!=="player"){
    return;
  }

  state.busy=true;
  setDiceEnabled(false);

  try{
    await runTurn("player");

    if(!state.gameOver){
      state.turn="ai";

      updateStatus(
        "Đến lượt AI",
        "AI đang suy nghĩ..."
      );

      await sleep(650);

      await aiUseBestItemIfNeeded();

      if(!state.gameOver){
        updateStatus(
          "Đến lượt AI",
          "AI chuẩn bị tung xúc xắc..."
        );

        await sleep(650);
        await runTurn("ai");
      }
    }
  }catch(err){
    console.error("Lỗi trong lượt chơi:",err);

    updateStatus(
      "Có lỗi lượt chơi",
      "Đã bỏ qua lỗi và trả lượt cho bạn. Mở Console để xem chi tiết."
    );

    await sleep(900);
  }

  if(!state.gameOver){
    state.turn="player";
    state.busy=false;
    setDiceEnabled(true);

    updateStatus(
      "Lượt của bạn",
      "Tới lượt bạn rồi. Chạm vào xúc xắc để tung!"
    );
  }else{
    state.busy=false;
    setDiceEnabled(false);
  }
}

async function runTurn(who){
  const token=tokens[who];
  const isPlayer=who==="player";
  if((itemRuntime[who].trapJailTurns || 0)>0){
  itemRuntime[who].trapJailTurns--;

  updateStatus(
    isPlayer ? "Bạn đang bị giam!" : "AI đang bị giam!",
    `${token.name} bị mắc bẫy nên mất lượt này. Còn ${itemRuntime[who].trapJailTurns} lượt bị giam.`
  );

  await sleep(1200);

  tickEndOfTurnEffects(who);
  return;
}

  if(itemRuntime[who].skipRollTurns>0){
    itemRuntime[who].skipRollTurns--;

    updateStatus(
      isPlayer ? "Bạn bị cấm tung!" : "AI bị cấm tung!",
      `${token.name} mất lượt tung xúc xắc.`
    );

    await sleep(1100);
    await completeTurn(who);
    return;
  }

  const rollData=createRollData(who);
  const value=rollData.total;

  updateStatus(
    isPlayer ? "Lượt của bạn" : "Lượt của AI",
    isPlayer ? "Bạn đang tung xúc xắc..." : "AI đang tung xúc xắc..."
  );

  await rollDiceByData(rollData);

  const rollText=rollData.rolls.length>1
    ? `${rollData.rolls.join(" + ")} = ${value}`
    : `${value}`;

  const need=100-token.pos;

  if(value>need){
    updateStatus(
      isPlayer ? "Lượt của bạn" : "Lượt của AI",
      `${token.name} tung được ${rollText} điểm, nhưng chỉ cần ${need} điểm để về đích. Dư điểm nên mất lượt!`
    );

    await sleep(1200);
    await completeTurn(who);
    return;
  }

  updateStatus(
    isPlayer ? "Lượt của bạn" : "Lượt của AI",
    `${token.name} tung được ${rollText} điểm!`
  );

  await sleep(300);
  await moveToken(who,value);

if(token.pos===100){
  endGame(who);
  return;
}

/* Chỉ kiểm tra bẫy sau khi đã dừng ở ô cuối cùng */
const trapped=await checkTrapLanding(who);

if(!trapped){
  await checkKickOpponent(who,value);
}

await completeTurn(who);
}

/* =====================================================
   TOKEN MOVEMENT
===================================================== */
async function moveToken(who,steps){
  const token=tokens[who];

  for(let i=0;i<steps;i++){
    if(token.pos>=100){
      break;
    }

    const nextPos=token.pos+1;

    if(nextPos===100 && itemRuntime[who].blockFinishTurns>0){
      itemRuntime[who].blockFinishTurns=0;

      updateStatus(
        "Bị chặn về đích!",
        `${token.name} đã bị khóa vạch đích nên không thể về đích trong lượt này.`
      );

      await sleep(1000);
      break;
    }

    token.pos++;
    updateStats();

    const t=getTokenTarget(who,token.pos);
    await animateHop(token,t.x,t.y);

    if(checkStopFlag(who)){
      await sleep(900);
      break;
    }

    if(token.pos>=100){
      break;
    }
  }
}

async function checkKickOpponent(who,diceValue){
  const attacker=tokens[who];
  const opponentKey=who==="player" ? "ai" : "player";
  const opponent=tokens[opponentKey];

  if(attacker.pos<=0 || attacker.pos>=100){
    return;
  }

  if(opponent.pos<=0 || opponent.pos>=100){
    return;
  }

  if(attacker.pos===opponent.pos){
    if(itemRuntime[opponentKey].invisibleTurns>0){
      updateStatus(
        "Không thể đá!",
        `${opponent.name} đang tàng hình nên ${attacker.name} không thể đá.`
      );

      await sleep(800);
      return;
    }

    updateStatus(
      who==="player" ? "Bạn đá AI!" : "AI đá bạn!",
      `${attacker.name} đáp xuống đúng vị trí của ${opponent.name}. ${opponent.name} bị đá lùi ${diceValue} ô!`
    );

    await sleep(750);
    await moveTokenBackward(opponentKey,diceValue);
    await sleep(450);
  }
}

async function moveTokenBackward(who,steps){
  const token=tokens[who];

  for(let i=0;i<steps;i++){
    if(token.pos<=0){
      break;
    }

    token.pos--;
    updateStats();

    const target=getTokenTarget(who,token.pos);
    await animateHop(token,target.x,target.y);
      if(checkTrap(who)){
  await sleep(1000);
  break;
}
  }
}

function animateHop(token,tx,ty){
  return new Promise(resolve=>{
    token.animating=true;

    const sx=token.x;
    const sy=token.y;
    const duration=230;
    const start=performance.now();
    const jump=Math.min(22,board.cell*.42);

    function step(now){
      const raw=Math.min(1,(now-start)/duration);

      const ease=raw<.5
        ? 2*raw*raw
        : 1-Math.pow(-2*raw+2,2)/2;

      token.x=sx+(tx-sx)*ease;
      token.y=sy+(ty-sy)*ease-Math.sin(raw*Math.PI)*jump;

      if(raw<1){
        requestAnimationFrame(step);
      }else{
        token.x=tx;
        token.y=ty;
        token.animating=false;
        resolve();
      }
    }

    requestAnimationFrame(step);
  });
}

function animateWalk(token,tx,ty){
  return new Promise(resolve=>{
    token.animating=true;

    const sx=token.x;
    const sy=token.y;
    const duration=310;
    const start=performance.now();

    function step(now){
      const raw=Math.min(1,(now-start)/duration);

      const ease=raw<.5
        ? 2*raw*raw
        : 1-Math.pow(-2*raw+2,2)/2;

      token.x=sx+(tx-sx)*ease;
      token.y=sy+(ty-sy)*ease;

      if(raw<1){
        requestAnimationFrame(step);
      }else{
        token.x=tx;
        token.y=ty;
        token.animating=false;
        resolve();
      }
    }

    requestAnimationFrame(step);
  });
}

async function moveTokenByItem(who,steps,itemName="Thẻ di chuyển"){
  const token=tokens[who];

  for(let i=0;i<steps;i++){
    if(token.pos>=100){
      break;
    }

    const nextPos=token.pos+1;

    if(nextPos===100 && itemRuntime[who].blockFinishTurns>0){
      itemRuntime[who].blockFinishTurns=0;

      updateStatus(
        "Bị chặn về đích!",
        `${token.name} bị khóa vạch đích nên không thể về đích bằng thẻ.`
      );

      await sleep(850);
      break;
    }

    token.pos++;
    updateStats();

    updateStatus(
      "Đang dùng thẻ",
      `${token.name} dùng ${itemName}: tiến ${i+1}/${steps} bước.`
    );

    const target=getTokenTarget(who,token.pos);

    await animateWalk(token,target.x,target.y);
    await sleep(90);

    if(checkTrap(who)){
  await sleep(1000);
  break;
}

if(checkStopFlag(who)){
  await sleep(850);
  break;
}

    if(token.pos>=100){
      break;
    }
  }
}

   UI + GAME STATE
===================================================== */
function updateStatus(turn,text){
  turnText.textContent=turn;
  message.textContent=text;
}

function setDiceEnabled(enabled){
  diceClickArea.classList.toggle("locked",!enabled);
  diceClickArea.classList.toggle("ready",enabled && !state.gameOver && state.turn==="player");
  diceClickArea.setAttribute("aria-disabled",String(!enabled));

function endGame(who){
  state.gameOver=true;

  if(who==="player"){
    endTitle.textContent="🏆 Bạn thắng!";
    endText.textContent="Bạn đã về đích trước AI. Quá cháy!";
  }else{
    endTitle.textContent="🤖 AI thắng!";
    endText.textContent="AI đã về đích trước. Chơi lại để phục thù nhé!";
  }

  spawnConfetti();

  setTimeout(()=>{
    endModal.classList.remove("hidden");
  },450);
}
  
/* =====================================================
   BOARD TRAPS
===================================================== */
function initBoardTraps(){
  boardTraps.length=0;

  for(let row=0;row<10;row++){
    const start=row*10+1;
    const end=row*10+10;
    const candidates=[];

    for(let pos=start;pos<=end;pos++){
      if(pos===1 || pos===100){
        continue;
      }

      candidates.push(pos);
    }

    if(candidates.length>0){
      boardTraps.push({
        row:row+1,
        pos:pickRandomFrom(candidates)
      });
    }
  }

  console.table(boardTraps.map(trap=>({
    row:trap.row,
    pos:trap.pos
  })));
}

function isTrapPosition(pos){
  return boardTraps.some(trap=>trap.pos===pos);
}

function getTrapAt(pos){
  return boardTraps.find(trap=>trap.pos===pos) || null;
}

function checkTrap(who){
  const token=tokens[who];

  if(token.pos<=1 || token.pos>=100){
    return false;
  }

  const trap=getTrapAt(token.pos);

  if(!trap){
    return false;
  }

  itemRuntime[who].trapJailTurns=Math.max(
    itemRuntime[who].trapJailTurns || 0,
    TRAP_JAIL_TURNS
  );

  updateStatus(
    "Dính bẫy!",
    `${token.name} giẫm vào bẫy tại ô ${trap.pos} và bị giam ${TRAP_JAIL_TURNS} lượt!`
  );

  return true;
}

function getTrapStepsAhead(who,maxStep=6){
  const pos=tokens[who].pos;
  const steps=[];

  for(let step=1;step<=maxStep;step++){
    const targetPos=pos+step;

    if(targetPos>=100){
      continue;
    }

    if(isTrapPosition(targetPos)){
      steps.push(step);
    }
  }

  return steps;
}

function getTrapStepsBackward(who,maxStep=6){
  const pos=tokens[who].pos;
  const steps=[];

  for(let step=1;step<=maxStep;step++){
    const targetPos=pos-step;

    if(targetPos<=1){
      continue;
    }

    if(isTrapPosition(targetPos)){
      steps.push(step);
    }
  }

  return steps;
}

function restartGame(){
  tokens.player.pos=0;
  tokens.ai.pos=0;

  itemState.player.inventory=[];
  itemState.player.shields=0;
  itemState.player.completedTurns=0;

  itemState.ai.inventory=[];
  itemState.ai.shields=0;
  itemState.ai.completedTurns=0;

  for(const key of ["player","ai"]){
    itemRuntime[key].forceNextRollValue=null;
    itemRuntime[key].forceNextRollParity=null;
    itemRuntime[key].limitNextRollValues=null;
    itemRuntime[key].rollTwiceNext=false;
    itemRuntime[key].skipRollTurns=0;
    itemRuntime[key].invisibleTurns=0;
    itemRuntime[key].blockFinishTurns=0;
    itemRuntime[key].towerFloors=0;
    itemRuntime[key].trapJailTurns=0;
  }

  boardFlags.length=0;

  initCardDeck();
  initBoardTraps();

  state.turn="player";
  state.busy=false;
  state.gameOver=false;
  state.confetti.length=0;
  state.particles.length=0;

  renderDice(1);
  computeBoard();
  syncTokensToBoard();
  updateStats();

  updateStatus(
    "Lượt của bạn",
    "Chạm vào xúc xắc để bắt đầu cuộc đua trên bãi biển!"
  );

  setDiceEnabled(true);
  endModal.classList.add("hidden");
}
