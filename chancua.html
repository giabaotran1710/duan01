<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chặn Cua </title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Nunito:wght@600;700;900&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:#05202e}
  body{font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}

  .bg-ocean{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 110%,#1a5a7a 0%,#05202e 65%);z-index:0}
  .bubbles{position:fixed;inset:0;pointer-events:none;z-index:1}
  .bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.5),rgba(110,200,230,.15));border:1px solid rgba(110,200,230,.3);animation:bubUp linear infinite}
  @keyframes bubUp{0%{transform:translateY(0) scale(1);opacity:.6}100%{transform:translateY(-110vh) scale(1.4);opacity:0}}

  #title-screen{position:relative;z-index:10;text-align:center;padding:24px 16px}
  .t-main{font-family:'Dela Gothic One',sans-serif;font-size:clamp(2.8rem,9vw,5.5rem);color:#f5e6c8;text-shadow:0 0 40px rgba(245,230,200,.35),4px 5px 0 #0a3a50;line-height:1}
  .t-crab{display:inline-block;animation:tcB 1.6s ease-in-out infinite}
  @keyframes tcB{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-14px) rotate(6deg)}}
  .t-sub{color:#8adcc8;font-size:.95rem;margin-top:6px;font-weight:700;letter-spacing:1.5px;opacity:.8}
  .start-btn{margin-top:26px;padding:14px 52px;background:linear-gradient(135deg,#e84545,#ff7a5c);border:none;border-radius:50px;cursor:pointer;font-family:'Dela Gothic One',sans-serif;font-size:1.25rem;color:#fff;letter-spacing:1px;box-shadow:0 6px 28px rgba(232,69,69,.55);transition:transform .14s;animation:puls 2.2s ease-in-out infinite}
  .start-btn:hover{transform:scale(1.07)}
  @keyframes puls{0%,100%{box-shadow:0 6px 28px rgba(232,69,69,.55),0 0 0 0 rgba(232,69,69,.4)}50%{box-shadow:0 6px 28px rgba(232,69,69,.55),0 0 0 16px rgba(232,69,69,0)}}
  .howto{margin-top:18px;max-width:360px;background:rgba(7,45,64,.9);border-radius:14px;padding:14px 18px;color:#8adcc8;font-size:.84rem;line-height:1.75;border:1px solid rgba(138,220,200,.15)}
  .howto b{color:#f5e6c8}

  #game-screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center}
  .hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:14px;align-items:center;z-index:20;background:rgba(5,32,46,.88);border-radius:40px;padding:7px 20px;border:1px solid rgba(138,220,200,.15);white-space:nowrap}
  .hud-lbl{color:rgba(138,220,200,.55);font-size:.72rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
  .hud-val{color:#f5e6c8;font-family:'Dela Gothic One',sans-serif;font-size:1.1rem;min-width:2ch;text-align:center}
  .hud-sep{width:1px;height:24px;background:rgba(138,220,200,.12)}
  .turn-badge{font-size:.72rem;font-weight:700;letter-spacing:.8px;padding:3px 12px;border-radius:16px;text-transform:uppercase}
  .tb-player{background:rgba(100,255,80,.12);color:#7fff5e;border:1px solid rgba(100,255,80,.28)}
  .tb-crab{background:rgba(255,80,80,.12);color:#ff6060;border:1px solid rgba(255,80,80,.28)}

  .btns{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:20}
  .btn-s{padding:7px 18px;border-radius:20px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;transition:transform .1s}
  .btn-s:hover{transform:scale(1.06)}
  .btn-restart{background:#7a6550;color:#fff}
  .btn-menu{background:transparent;color:#8adcc8;border:1px solid rgba(138,220,200,.28)}

  #gameCanvas{display:block;cursor:pointer;user-select:none;position:absolute;top:50%;left:50%;transform-origin:center center}

  #overlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(5,20,30,.82);backdrop-filter:blur(7px)}
  .obox{background:#0d4f6b;border-radius:22px;padding:34px 42px;text-align:center;border:1px solid rgba(138,220,200,.2);box-shadow:0 16px 60px rgba(0,0,0,.65);max-width:320px}
  .oem{font-size:3.4rem;line-height:1;margin-bottom:10px}
  .otit{font-family:'Dela Gothic One',sans-serif;font-size:1.75rem;color:#f5e6c8;margin-bottom:7px}
  .osub{color:#8adcc8;font-size:.95rem;margin-bottom:20px;opacity:.85}
  .obtn{padding:11px 34px;border-radius:36px;border:none;cursor:pointer;font-family:'Dela Gothic One',sans-serif;font-size:.95rem;color:#fff;background:linear-gradient(135deg,#e84545,#ff7a5c);box-shadow:0 4px 16px rgba(232,69,69,.4);transition:transform .12s}
  .obtn:hover{transform:scale(1.06)}
</style>
</head>
<body>
<div class="bg-ocean"></div>
<div class="bubbles" id="bubbles"></div>

<div id="title-screen">
  <div class="t-main"><span class="t-crab">🦀</span> Chặn Cua</div>
  <div class="t-sub">~ Đố bạn chặn được tui đó.... ~</div>
  <button class="start-btn" id="startBtn">Bắt Đầu Chơi</button>
  <div class="howto">
    <b>Cách chơi:</b> Mỗi lượt đặt <b>một viên đá 🪨</b> để chặn con cua.<br>
    Con cua tự tìm đường <b>bò ra rìa bản đồ</b> (vùng nước xanh).<br>
    Bao vây hoàn toàn → <b>Thắng!</b> &nbsp;|&nbsp; Cua thoát ra → <b>Thua!</b>
  </div>
</div>

<div id="game-screen">
  <div class="hud">
    <div><div class="hud-lbl">Lượt</div><div class="hud-val" id="hTurn">0</div></div>
    <div class="hud-sep"></div>
    <div id="hBadge" class="turn-badge tb-player">Lượt của bạn</div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div class="btns">
    <button class="btn-s btn-restart" id="restartBtn">🔄 Chơi lại</button>
    <button class="btn-s btn-menu" id="menuBtn">🏠 Menu</button>
  </div>
</div>

<div id="overlay">
  <div class="obox">
    <div class="oem" id="oEm">🎉</div>
    <div class="otit" id="oTit">Thắng rồi!</div>
    <div class="osub" id="oSub">Con cua bị bắt!</div>
    <button class="obtn" id="oBtn">Chơi lại</button>
  </div>
</div>

<script>
/* ── BUBBLES ── */
(()=>{
  const c=document.getElementById('bubbles');
  for(let i=0;i<20;i++){
    const b=document.createElement('div');b.className='bubble';
    const s=Math.random()*12+4;
    b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:-${s}px;animation-duration:${Math.random()*14+9}s;animation-delay:-${Math.random()*14}s`;
    c.appendChild(b);
  }
})();

/* ── GRID ── */
const ROWS=[9,10,11,12,13,14,13,14,13,14,13,14,13,14,13,14,13,14,13,14,13,14,13,12,11,10,9];
const SMARTNESS=0.88;

function buildGrid(rows) {
  const cells = [];
  // 1. Khởi tạo lưới lục giác
  for (let r = 0; r < rows.length; r++) {
    for (let c = 0; c < rows[r]; c++) {
      const isBorder = (r === 0 || r === rows.length - 1 || c === 0 || c === rows[r] - 1);
      cells.push({ r, c, stone: false, isBorder });
    }
  }

  // 2. Xác định vị trí con cua (ở giữa bản đồ)
  const midR = Math.floor(rows.length / 2);
  const midC = Math.floor(rows[midR] / 2);
  const crabCell = cells.find(cl => cl.r === midR && cl.c === midC);

  // 3. Spawn đá ngẫu nhiên (từ 8 đến 13 cục)
  // Chỉ chọn những ô không phải là viền (isBorder) và không phải vị trí con cua
  const availableCells = cells.filter(cl => !cl.isBorder && !(cl.r === midR && cl.c === midC));
  
  // Xáo trộn danh sách các ô trống
  for (let i = availableCells.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [availableCells[i], availableCells[j]] = [availableCells[j], availableCells[i]];
  }

  // Lấy số lượng đá ngẫu nhiên từ 8 đến 13
  const numStones = Math.floor(Math.random() * (15 - 10 + 1)) + 10;
  
  // Đặt đá vào các ô đã chọn
  for (let i = 0; i < Math.min(numStones, availableCells.length); i++) {
    availableCells[i].stone = true;
  }

  return { cells, crabR: midR, crabC: midC };
}

function getCell(cells,r,c){return cells.find(x=>x.r===r&&x.c===c)||null}

function neighbours(r, c, rows) {
  const res = [];
  // Hai ô liền kề cùng hàng
  res.push({ r: r, c: c - 1 }, { r: r, c: c + 1 });

  // Các ô liền kề hàng trên
  if (r - 1 >= 0) {
    const diff = rows[r - 1] - rows[r];
    if (diff > 0) { // Hàng trên rộng hơn
      res.push({ r: r - 1, c: c }, { r: r - 1, c: c + 1 });
    } else if (diff < 0) { // Hàng trên hẹp hơn
      res.push({ r: r - 1, c: c - 1 }, { r: r - 1, c: c });
    }
  }

  // Các ô liền kề hàng dưới
  if (r + 1 < rows.length) {
    const diff = rows[r + 1] - rows[r];
    if (diff > 0) { // Hàng dưới rộng hơn
      res.push({ r: r + 1, c: c }, { r: r + 1, c: c + 1 });
    } else if (diff < 0) { // Hàng dưới hẹp hơn
      res.push({ r: r + 1, c: c - 1 }, { r: r + 1, c: c });
    }
  }

  // Lọc bỏ các tọa độ bị lỗi (nằm ngoài bản đồ)
  return res.filter(n => n.r >= 0 && n.r < rows.length && n.c >= 0 && n.c < rows[n.r]);
}


function crabAI(crabR,crabC,rows,cells,smart){
  const key=(r,c)=>`${r},${c}`;
  const par={[key(crabR,crabC)]:null};
  const q=[[crabR,crabC]];
  let found=null;
  while(q.length&&!found){
    const[r,c]=q.shift();
    const cell=getCell(cells,r,c);
    if(!cell||cell.stone)continue;
    if(cell.isBorder&&!(r===crabR&&c===crabC)){found=[r,c];break;}
    neighbours(r,c,rows).forEach(nb=>{
      const k=key(nb.r,nb.c);
      if(k in par)return;
      const nc=getCell(cells,nb.r,nb.c);
      if(!nc||nc.stone)return;
      par[k]=[r,c];q.push([nb.r,nb.c]);
    });
  }
  if(!found)return null;
  let cur=found;
  while(par[key(cur[0],cur[1])]){
    const p=par[key(cur[0],cur[1])];
    if(p[0]===crabR&&p[1]===crabC)break;
    cur=p;
  }
  if(Math.random()>smart){
    const v=neighbours(crabR,crabC,rows).filter(nb=>{const nc=getCell(cells,nb.r,nb.c);return nc&&!nc.stone;});
    return v.length?v[Math.floor(Math.random()*v.length)]:null;
  }
  return{r:cur[0],c:cur[1]};
}

/* ── HEX LAYOUT ── */
let HS=28,HW,HH,HVG;
function calcHS(){
  const avW=window.innerWidth-20, avH=window.innerHeight-90;
  const maxC=Math.max(...ROWS), numR=ROWS.length;
  const sW=avW/(maxC*Math.sqrt(3)+0.5);
  const sH=avH/(numR*1.5+0.5);
  HS=Math.floor(Math.min(sW,sH,38));
  HW=HS*Math.sqrt(3); HH=HS*2; HVG=HH*.75;
}
function hcx(r,c,offX,offY){
  const maxC=Math.max(...ROWS), cols=ROWS[r];
  const rx=(maxC-cols)/2*HW;
  return{x:offX+rx+c*HW+HW/2, y:offY+r*HVG+HS};
}

/* ── DRAW HEX ── */
function hexPath(ctx,x,y,s){
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);i===0?ctx.moveTo(x+s*Math.cos(a),y+s*Math.sin(a)):ctx.lineTo(x+s*Math.cos(a),y+s*Math.sin(a));}
  ctx.closePath();
}

/* ── REALISTIC CRAB ── */
function drawCrab(ctx,x,y,S,legPhase){
  ctx.save();
  ctx.translate(x,y);
  const R=S*.50;

  // shadow
  ctx.save();ctx.globalAlpha=.22;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(0,R*1.05,R*1.15,R*.28,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // ── 8 walking legs (4 per side) ──
  const legDefs=[
    [R*.72,-R*.32,0.30,R*.68,R*.52],
    [R*.82,-R*.02,0.13,R*.74,R*.58],
    [R*.80, R*.26,-0.12,R*.68,R*.52],
    [R*.62, R*.52,-0.38,R*.58,R*.46],
  ];
  [-1,1].forEach(side=>{
    legDefs.forEach(([lx,ly,ba,l1,l2],i)=>{
      const ph=legPhase+(i%2===0?0:Math.PI);
      const sw=Math.sin(ph)*.20;
      const a1=(ba+sw)*side;
      const liftY=Math.abs(Math.sin(ph+i*.4))*S*.12;
      const ex1=lx*side+Math.cos(a1)*l1*side;
      const ey1=ly+Math.sin(Math.abs(a1))*l1-liftY;
      const a2=a1-0.52*side;
      const ex2=ex1+Math.cos(a2)*l2*side;
      const ey2=ey1+Math.sin(Math.abs(a2))*l2+S*.05;

      ctx.strokeStyle=i%2===0?'#b02020':'#962020';
      ctx.lineWidth=S*.09;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(lx*side,ly);ctx.lineTo(ex1,ey1);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex1,ey1);ctx.lineTo(ex2,ey2);ctx.stroke();
      // dactylus tip
      ctx.beginPath();ctx.arc(ex2,ey2,S*.055,0,Math.PI*2);
      ctx.fillStyle='#6a1010';ctx.fill();
    });
  });

  // ── chelipeds (claws) ──
  [-1,1].forEach(side=>{
    const bx=R*.68*side, by=-R*.58;
    const sw=Math.sin(legPhase*.65)*.16*side;
    const aa=(-0.62+sw)*side;
    const al=R*1.05;
    const ex=bx+Math.cos(aa)*al, ey=by-Math.sin(Math.abs(aa))*al*.85;

    ctx.strokeStyle='#c83030';ctx.lineWidth=S*.16;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(ex,ey);ctx.stroke();

    // two claw fingers
    const open=0.28+Math.abs(Math.sin(legPhase*.4))*.12;
    [[aa-open*side,R*.62],[aa+(open*.35)*side,R*.52]].forEach(([ca,cl],fi)=>{
      const tx=ex+Math.cos(ca)*cl*side, ty=ey-Math.sin(Math.abs(ca))*cl;
      ctx.strokeStyle=fi===0?'#d03535':'#a82020';
      ctx.lineWidth=fi===0?S*.13:S*.10;
      ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(tx,ty);ctx.stroke();
      if(fi===0){ctx.beginPath();ctx.arc(tx,ty,S*.09,0,Math.PI*2);ctx.fillStyle='#7a1010';ctx.fill();}
    });
  });

  // ── carapace ──
  const sg=ctx.createRadialGradient(-R*.20,-R*.22,R*.04,-R*.05,R*.08,R*1.1);
  sg.addColorStop(0,'#ff9878');sg.addColorStop(.3,'#e84545');sg.addColorStop(.72,'#c22828');sg.addColorStop(1,'#881818');
  ctx.beginPath();ctx.ellipse(0,0,R,R*.70,0,0,Math.PI*2);
  ctx.fillStyle=sg;ctx.fill();
  ctx.strokeStyle='#761212';ctx.lineWidth=S*.085;ctx.stroke();

  // shell grooves
  ctx.strokeStyle='rgba(160,20,20,.42)';ctx.lineWidth=S*.055;
  ctx.beginPath();ctx.moveTo(-R*.70,0);ctx.lineTo(R*.70,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-R*.62);ctx.lineTo(0,R*.62);ctx.stroke();
  [.37,.67].forEach(fr=>{
    ctx.beginPath();ctx.arc(0,0,R*fr,-Math.PI*.76,Math.PI*.76);ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,R*fr,Math.PI*.24,Math.PI+Math.PI*.76);ctx.stroke();
  });
  // specular
  ctx.save();ctx.globalAlpha=.18;
  ctx.beginPath();ctx.ellipse(-R*.18,-R*.22,R*.35,R*.18,-0.4,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();ctx.restore();

  // ── abdomen ──
  ctx.beginPath();ctx.ellipse(0,R*.56,R*.36,R*.26,0,0,Math.PI*2);
  const ag=ctx.createRadialGradient(0,R*.48,0,0,R*.56,R*.36);
  ag.addColorStop(0,'#e84545');ag.addColorStop(1,'#8a1818');
  ctx.fillStyle=ag;ctx.fill();ctx.strokeStyle='#761212';ctx.lineWidth=S*.075;ctx.stroke();
  // segments
  ctx.strokeStyle='rgba(120,15,15,.5)';ctx.lineWidth=S*.05;
  [-R*.14,R*.03].forEach(sy2=>{
    ctx.beginPath();ctx.moveTo(-R*.28,sy2+R*.56);ctx.lineTo(R*.28,sy2+R*.56);ctx.stroke();
  });

  // ── eyestalks ──
  [-1,1].forEach(side=>{
    const sx=R*.42*side,sy=-R*.60;
    const rx=R*.26*side,ry=-R*.36;
    ctx.strokeStyle='#c03030';ctx.lineWidth=S*.10;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(sx,sy);ctx.stroke();
    // sclera
    ctx.beginPath();ctx.arc(sx,sy,S*.195,0,Math.PI*2);
    ctx.fillStyle='#fff8e8';ctx.fill();
    ctx.strokeStyle='#761212';ctx.lineWidth=S*.075;ctx.stroke();
    // iris
    ctx.beginPath();ctx.arc(sx+side*S*.04,sy,S*.115,0,Math.PI*2);
    ctx.fillStyle='#1a0a0a';ctx.fill();
    // highlight
    ctx.beginPath();ctx.arc(sx+side*S*.01,sy-S*.065,S*.045,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.72)';ctx.fill();
  });

  // ── rostrum ──
  ctx.beginPath();ctx.moveTo(-S*.09,-R*.70);ctx.lineTo(0,-R*.90);ctx.lineTo(S*.09,-R*.70);ctx.closePath();
  ctx.fillStyle='#c22828';ctx.fill();ctx.strokeStyle='#761212';ctx.lineWidth=S*.065;ctx.stroke();

  ctx.restore();
}

/* ── BLOCKY SHARP ROCK ── */
function drawRock(ctx,x,y,S){
  const s=S*.44;
  // drop shadow
  ctx.save();ctx.globalAlpha=.3;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(x+2,y+s*.92,s*1.08,s*.26,0,0,Math.PI*2);ctx.fill();ctx.restore();

  // VERTICES of the rock – sharp angular polygon
  const pts=[
    [-s*.50,-s*.16],[-s*.24,-s*.74],
    [s*.12, -s*.80],[s*.54, -s*.50],
    [s*.70,  s*.10],[s*.44,  s*.64],
    [-s*.12, s*.70],[-s*.64, s*.38],
  ];

  // dark side face (left-bottom)
  ctx.beginPath();
  ctx.moveTo(x+pts[6][0],y+pts[6][1]);
  ctx.lineTo(x+pts[7][0],y+pts[7][1]);
  ctx.lineTo(x+pts[0][0],y+pts[0][1]);
  ctx.lineTo(x+pts[1][0],y+pts[1][1]);
  ctx.closePath();
  ctx.fillStyle='#332516';ctx.fill();

  // mid-dark face (right)
  ctx.beginPath();
  ctx.moveTo(x+pts[3][0],y+pts[3][1]);
  ctx.lineTo(x+pts[4][0],y+pts[4][1]);
  ctx.lineTo(x+pts[5][0],y+pts[5][1]);
  ctx.lineTo(x+pts[6][0],y+pts[6][1]);
  ctx.closePath();
  ctx.fillStyle='#4a3520';ctx.fill();

  // top main face — lit from top-left
  ctx.beginPath();
  [0,1,2,3,4,5].forEach((i,idx)=>{idx===0?ctx.moveTo(x+pts[i][0],y+pts[i][1]):ctx.lineTo(x+pts[i][0],y+pts[i][1]);});
  ctx.closePath();
  const rg=ctx.createLinearGradient(x-s*.45,y-s*.72,x+s*.5,y+s*.35);
  rg.addColorStop(0,'#dccfaa');rg.addColorStop(.28,'#baa882');rg.addColorStop(.68,'#8a7450');rg.addColorStop(1,'#5c4028');
  ctx.fillStyle=rg;ctx.fill();

  // sharp hard outline — miter joints
  ctx.beginPath();
  pts.forEach(([px,py],i)=>i===0?ctx.moveTo(x+px,y+py):ctx.lineTo(x+px,y+py));
  ctx.closePath();
  ctx.strokeStyle='#1e1008';ctx.lineWidth=s*.17;
  ctx.lineJoin='miter';ctx.miterLimit=12;ctx.stroke();

  // internal hard facet lines
  [[0,1],[2,3],[4,5],[5,6]].forEach(([a,b])=>{
    ctx.beginPath();ctx.moveTo(x+pts[a][0],y+pts[a][1]);ctx.lineTo(x+pts[b][0],y+pts[b][1]);
    ctx.strokeStyle='rgba(15,8,2,.5)';ctx.lineWidth=s*.09;ctx.lineJoin='miter';ctx.stroke();
  });

  // bright top edge highlight
  ctx.beginPath();
  ctx.moveTo(x+pts[7][0],y+pts[7][1]);
  ctx.lineTo(x+pts[0][0],y+pts[0][1]);
  ctx.lineTo(x+pts[1][0],y+pts[1][1]);
  ctx.lineTo(x+pts[2][0],y+pts[2][1]);
  ctx.strokeStyle='rgba(255,242,200,.50)';ctx.lineWidth=s*.12;ctx.lineJoin='miter';ctx.stroke();

  // tiny top sparkle
  ctx.beginPath();ctx.arc(x-s*.10,y-s*.36,s*.065,0,Math.PI*2);
  ctx.fillStyle='rgba(255,248,215,.58)';ctx.fill();
}

/* ── RENDER ── */
function render(G){
  const{ctx,canvas,cells,offX,offY,crabR,crabC,hoverR,hoverC,crabAnim}=G;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const t=Date.now()/1e3;

  // Vẽ các ô lục giác
  cells.forEach(cell=>{
    const{r,c,stone,isBorder}=cell;
    const{x,y}=hcx(r,c,offX,offY);
    const isHov=r===hoverR&&c===hoverC&&!stone&&!(r===crabR&&c===crabC);
    let fill,border;
    if(isBorder){
      const sh=Math.sin(t*1.7+c*.65+r*.38)*.06;
      fill=`hsl(${200+sh*18},${62+sh*10}%,${44+sh*8}%)`;
      border='#1e6898';
    }else{
      fill=isHov?'#90c870':'#aec88a';
      border=isHov?'#46922e':'#72a448';
    }
    hexPath(ctx,x,y,HS-1);
    ctx.fillStyle=fill;ctx.fill();
    ctx.strokeStyle=border;ctx.lineWidth=isHov?2:1.4;ctx.stroke();
    // Đổ bóng nổi
    ctx.save();ctx.globalAlpha=.055;
    hexPath(ctx,x,y+1.6,HS-2.8);ctx.fillStyle='#000';ctx.fill();
    ctx.restore();
  });

  // Hiển thị đá bằng Icon Emoji
  cells.filter(c=>c.stone).forEach(cell=>{
    const{x,y}=hcx(cell.r,cell.c,offX,offY);
    ctx.font = `${HS * 1.3}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("🪨", x, y + 2); // Cộng nhẹ trục y để căn giữa ô
  });

  // Hiển thị cua bằng Icon Emoji cùng hiệu ứng nhún
  if(crabR!==null){
    const{x,y}=hcx(crabR,crabC,offX,offY);
    const prog=crabAnim.t;
    const ax=x+(crabAnim.fromX||0)*(1-prog);
    const ay=y+(crabAnim.fromY||0)*(1-prog);
    const hop=-Math.sin(prog*Math.PI)*HS*.22;
    
    ctx.save();
    ctx.globalAlpha=1;
    ctx.font = `${HS * 1.5}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("🦀", ax, ay + hop);
    ctx.restore();
  }

  // Hiệu ứng nước lấp lánh ở viền
  ctx.save();ctx.globalAlpha=.05;
  cells.filter(c=>c.isBorder).forEach(cell=>{
    const{x,y}=hcx(cell.r,cell.c,offX,offY);
    hexPath(ctx,x+Math.sin(t*2.1+cell.c*.8)*2,y,HS-2);
    ctx.fillStyle='#fff';ctx.fill();
  });
  ctx.restore();
}

/* ── GAME ── */
let G=null,RAF=null;

function initGame(){
  calcHS();
  const grid=buildGrid(ROWS);
  const canvas=document.getElementById('gameCanvas');
  const maxC=Math.max(...ROWS);
  
  // Tính toán kích thước gốc (logical size)
  const W=Math.ceil(maxC*HW+HW*.5+16);
  const H=Math.ceil(ROWS.length*HVG+HH*.5+16);

  // Lấy tỷ lệ điểm ảnh của thiết bị (Device Pixel Ratio) để chống rỗ
  const dpr = window.devicePixelRatio || 1;
  
  // Gán độ phân giải thực tế (rất lớn, cực nét)
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  
  // Ép kích thước hiển thị CSS bằng kích thước gốc
  canvas.style.width = `${W}px`;
  canvas.style.height = `${H}px`;

  // Thu phóng toàn bộ khung game để vừa với màn hình
  const scW=window.innerWidth/W;
  const scH=(window.innerHeight-80)/H;
  const sc=Math.min(scW,scH,1);
  canvas.style.transform=`translate(-50%,-50%) scale(${sc})`;

  const ctx=canvas.getContext('2d');
  // Phóng to context để các nét vẽ khớp với độ phân giải cao
  ctx.scale(dpr, dpr);

  // Lưu lại baseW và baseH để dùng cho việc tính toán click chuột sau này
  G={canvas,ctx,offX:8,offY:8,
     cells:grid.cells,
     crabR:grid.crabR,crabC:grid.crabC,
     hoverR:-1,hoverC:-1,
     turn:0,phase:'player',
     crabAnim:{t:1,fromX:0,fromY:0,legPhase:0},
     baseW: W, baseH: H}; 
     
  updateHUD();
  if(RAF)cancelAnimationFrame(RAF);
  const loop=()=>{
    if(!G)return;
    if(G.crabAnim.t<1){G.crabAnim.t=Math.min(1,G.crabAnim.t+.07);G.crabAnim.legPhase+=.24;}
    else if(G.phase==='player'||G.phase==='over'){G.crabAnim.legPhase+=.018;}
    render(G);RAF=requestAnimationFrame(loop);
  };
  loop();
}


function updateHUD(){
  document.getElementById('hTurn').textContent=G.turn;
  const b=document.getElementById('hBadge');
  if(G.phase==='player'){b.textContent='Lượt của bạn';b.className='turn-badge tb-player';}
  else{b.textContent='Cua đang bò...';b.className='turn-badge tb-crab';}
}

function trapped(){
  return neighbours(G.crabR,G.crabC,ROWS).every(nb=>{const c=getCell(G.cells,nb.r,nb.c);return!c||c.stone;});
}

function doMove() {
  if (!G || G.phase !== 'crab') return;

  const start = { r: G.crabR, c: G.crabC };
  const queue = [[start]];
  const visited = new Set([`${start.r},${start.c}`]);
  let bestPath = null;

  // Thuật toán BFS tìm đường thoát ngắn nhất ra vùng nước (isBorder)
  while (queue.length > 0) {
    const path = queue.shift();
    const curr = path[path.length - 1];

    // Nếu chạm tới vùng nước, đây chính là con đường ngắn nhất
    if (G.cells.find(c => c.r === curr.r && c.c === curr.c).isBorder) {
      bestPath = path;
      break;
    }

    const nbs = neighbours(curr.r, curr.c, ROWS);
    for (const nb of nbs) {
      const cell = G.cells.find(c => c.r === nb.r && c.c === nb.c);
      const key = `${nb.r},${nb.c}`;
      // Chỉ đi vào ô không có đá và chưa thăm
      if (cell && !cell.stone && !visited.has(key)) {
        visited.add(key);
        queue.push([...path, nb]);
      }
    }
  }

  let target;
  if (bestPath && bestPath.length > 1) {
    // Nếu tìm thấy đường thoát, đi theo bước đầu tiên của con đường đó
    target = bestPath[1];
  } else {
    // Nếu bị bao vây hoặc không thấy đường, chọn đại một ô trống liền kề (vùng vẫy tuyệt vọng)
    const nbs = neighbours(G.crabR, G.crabC, ROWS).filter(nb => {
      const cell = G.cells.find(c => c.r === nb.r && c.c === nb.c);
      return cell && !cell.stone;
    });
    if (nbs.length === 0) { optWin(); return; }
    target = nbs[Math.floor(Math.random() * nbs.length)];
  }

  // Thực hiện di chuyển
  const fromPos = hcx(G.crabR, G.crabC, G.offX, G.offY);
  const toPos = hcx(target.r, target.c, G.offX, G.offY);

  G.crabAnim = {
    t: 0,
    fromX: fromPos.x - toPos.x,
    fromY: fromPos.y - toPos.y,
    legPhase: 0
  };

  G.crabR = target.r;
  G.crabC = target.c;

  // Kiểm tra nếu cua đã ra đến vùng nước
  const finalCell = G.cells.find(c => c.r === G.crabR && c.c === G.crabC);
  if (finalCell.isBorder) {
    setTimeout(() => endGame('lose'), 300);
  } else {
    G.phase = 'player';
    updateHUD();
  }
}


function placeStone(cell) {
  // 1. Kiểm tra các điều kiện chặn:
  // - Game chưa khởi tạo hoặc không phải lượt người chơi (!G || G.phase !== 'player')
  // - Ô đã có đá (cell.stone)
  // - Ô là vị trí hiện tại của con cua (cell.r === G.crabR && cell.c === G.crabC)
  // - Ô nằm ở vùng nước/viền (cell.isBorder) -> ĐÂY LÀ ĐIỀU KIỆN BẠN CẦN NGĂN CHẶN
  if (!G || G.phase !== 'player' || cell.stone || (cell.r === G.crabR && cell.c === G.crabC) || cell.isBorder) {
    return;
  }

  // 2. Thực hiện đặt đá
  cell.stone = true;
  G.turn++; // Tăng số lượt đi
  updateHUD(); // Cập nhật hiển thị số bước đi lên màn hình

  // 3. Kiểm tra xem người chơi đã thắng chưa (cua bị bao vây hoàn toàn)
  if (trapped()) {
    endGame('win');
    return;
  }

  // 4. Chuyển lượt sang con cua
  G.phase = 'crab';
  updateHUD();
  
  // 5. Gọi hàm di chuyển của cua sau một khoảng delay nhỏ (400ms) để mượt mà hơn
  // Lưu ý: Đảm bảo tên hàm di chuyển của bạn là doMove (khớp với code cũ)
  setTimeout(doMove, 100);
}


function endGame(res){
  G.phase='over';
  document.getElementById('oEm').textContent=res==='win'?'🎉':'🦀';
  document.getElementById('oTit').textContent=res==='win'?'Bắt được rồi!':'Cua đã thoát!';
  document.getElementById('oSub').textContent=res==='win'?`Bao vây sau ${G.turn} lượt!`:'Con cua bò ra biển rồi...';
  document.getElementById('overlay').style.display='flex';
}

/* ── INPUT ── */
function pxToCell(px,py){
  if(!G)return null;
  const canvas=document.getElementById('gameCanvas');
  const rect=canvas.getBoundingClientRect();
  
  // Dùng kích thước gốc (baseW, baseH) chia cho kích thước hiển thị thực tế (rect.width)
  // để lấy tỷ lệ chính xác 100%, bỏ qua ảnh hưởng của dpr
  const sx = G.baseW / rect.width;
  const sy = G.baseH / rect.height;
  
  let best=null,bestD=Infinity;
  G.cells.forEach(cell=>{
    const{x,y}=hcx(cell.r,cell.c,G.offX,G.offY);
    const d=Math.hypot(px*sx-x,py*sy-y);
    if(d<HS*.93&&d<bestD){bestD=d;best=cell;}
  });
  return best;
}


const gc=document.getElementById('gameCanvas');
gc.addEventListener('mousemove',e=>{
  if(!G||G.phase!=='player')return;
  const r=gc.getBoundingClientRect();
  const c=pxToCell(e.clientX-r.left,e.clientY-r.top);
  G.hoverR=c?c.r:-1;G.hoverC=c?c.c:-1;
});
gc.addEventListener('mouseleave',()=>{if(G){G.hoverR=-1;G.hoverC=-1;}});
gc.addEventListener('click',e=>{
  if(!G||G.phase!=='player')return;
  const r=gc.getBoundingClientRect();
  const c=pxToCell(e.clientX-r.left,e.clientY-r.top);
  if(c)placeStone(c);
});
gc.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!G||G.phase!=='player')return;
  const r=gc.getBoundingClientRect(),t=e.changedTouches[0];
  const c=pxToCell(t.clientX-r.left,t.clientY-r.top);
  if(c)placeStone(c);
},{passive:false});

/* ── BUTTONS ── */
document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('title-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  initGame();
});
const restart=()=>{document.getElementById('overlay').style.display='none';initGame();};
document.getElementById('restartBtn').addEventListener('click',restart);
document.getElementById('oBtn').addEventListener('click',restart);
document.getElementById('menuBtn').addEventListener('click',()=>{
  if(RAF){cancelAnimationFrame(RAF);RAF=null;}G=null;
  document.getElementById('overlay').style.display='none';
  document.getElementById('game-screen').style.display='none';
  document.getElementById('title-screen').style.display='block';
});
window.addEventListener('resize',()=>{if(G)initGame();});
</script>
