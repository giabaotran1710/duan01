<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cờ Caro PVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body{
  margin:0;
  font-family:Calibri;
  text-align:center;
  background:#0f172a;
  color:white;
}

#board{
  display:grid;
  grid-template-columns: repeat(15, 1fr);
  width: 95vw;
  max-width: 420px;
  margin:20px auto;
}

.cell{
  width:100%;
  aspect-ratio:1/1;
  border:1px solid #555;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size: min(4vw, 18px);
  box-sizing:border-box;
}


.X{ color:#00d4ff; font-weight:bold; }
.O{ color:#ff4d4d; font-weight:bold; }

.last{ 
  background:#888;
  font-weight:1000;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#dice{ font-size:150px; margin-top:1px; }

button{
  width: 100px;
  height: 35px;
  padding:10px 5px;
  background:#0188ff;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
  display: inline-block;
  margin-top: 5px;
  transition: all 0.25s ease;
  allign-item: center;
}
 .win{
  position: relative; /* 🔥 bắt buộc để ::after hoạt động */
  z-index: 3;
}

.win::after{
  content:"";
  position:absolute;
  inset:0;
  background:#FFD15B;
  opacity:0;

  animation: winFade 0.6s ease forwards;
  animation-delay:1s;

  pointer-events:none;
}
  
#status{
  font-size:20px;
  margin-top:10px;
}

.show{
  animation: slideUp 0.5s ease;
}

@keyframes slideUp{
  from{ transform:translateY(40px); opacity:0; }
  to{ transform:translateY(0); opacity:1; }
}
  #scoreBar{
  position:relative;
  width:100%;
  height:16px;
  margin-top:10px;
  display: none;
  background:#222;
  border-radius:0px;
  overflow:hidden;
}

/* Thanh X */
#scoreX{
  position:absolute;
  left:0;
  top:0;
  height:100%;
  width:50%; /* default */

  background:#00d4ff;
  transition: width 0.4s ease;
}

/* Thanh O */
#scoreO{
  position:absolute;
  right:0;
  top:0;
  height:100%;
  width:50%; /* default */

  background:#ff4d4d;
  transition: width 0.6s ease-out;
}

/* TEXT */
#scoreText{
  position:absolute;
  inset:0;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:0 6px;
  pointer-events:none;
  font-size:16px;
  font-weight:999;

  z-index:2;
}
  #gameContainer{
  width:95vw;
  max-width:420px;
  margin:0 auto;
}



/* màu chữ */
#textX{
  color:black;
  text-align: left;
  flex: none;
  
}

#textO{
  color:black;
  text-align: right;
  flex: none;
}

  #scoreX, #scoreO{
  height:100%;
  transition: width 0.5s ease-out;
  will-change: width;
  min-width:2px;
}

#scoreX{
  background:#00d4ff;
  min-width:1%;
  z-index:1;
}

#scoreO{
  background:#ff4d4d;
  min-width:1%;
  z-index:1;
}
  
  #toggleScore{
  position:fixed;
  top:10px;
  right:10px;
  z-index:20;

  width:40px;
  height:40px;
  border-radius:50%; /* 🔥 vòng tròn */

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:20px;
  background:rgba(255,255,255,0.1);
  border:2px solid white; /* 🔥 viền */

  cursor:pointer;
  transition:0.2s;
}

/* hover cho đẹp */
#toggleScore:hover{
  background:rgba(255,255,255,0.2);
}

/* trạng thái tắt */
#toggleScore.off{
  opacity:0.4;
  border-color:#888;
}

  #commentary {
  display: inline-block;
  margin-top:20px;
  padding: 2px 16px;
  font-size: 13px;
  border: 2px solid #333;
  color: pink;
  border-radius: 999px; /* 🔥 bo tròn kiểu island */

  white-space: nowrap; /* 🔥 giữ 1 dòng */
  overflow: hidden;

  transform-origin: center;
  transition: transform 1s ease, opacity 0.2s;
}

/* trạng thái thu nhỏ */
#commentary.shrink {
  transform: scaleX(0.9); /* 🔥 co ngang */
  opacity: 0.6;
}
  
  
 #blub{
   font-size:10px;
   color: yellow;
   margin-top:2px;
   animation: slideUp 2s ease;}
   
  .button:disabled{
  cursor: not-allowed;
  opacity: 0.4;
  filter: grayscale(1) brightness(0.8);
  transform: scale(0.98);
}
  .button:disabled:hover{
  transform: none;
  background: inherit;
}
   
   #confettiCanvas{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 99999;
}
  
  #statusTop{
  transition: all 0.5s ease;
  position: relative;
  z-index: 5;
}

/* 🔥 trạng thái WIN */
#statusTop.win{
  position: fixed;
  top: 48%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1.5);

  background: rgba(0,0,0,0.8);
  padding: 10px 10px;
  border-radius: 12px;

}


</style>
</head>

<body>
<h2>CỜ CARO</h2>
  <button id="toggleScore">💡</button>
<div id="gameContainer">

  <div id="statusTop">Đang chờ...</div>
  <div id="commentary"></div>

  <div id="board"></div>

  <button id="btnUndo" onclick="undoMove()">↩️ Hoàn tác</button>
  <button id="btnReset" onclick="resetGame()">Chơi lại</button>

<div id="scoreBar">
  <div id="scoreX"></div>
  <div id="scoreO"></div>

  <div id="scoreText">
    <span id="textX">0</span>
    <span id="textO">0</span>
  </div>
</div>

</div>
<div id="board-wrapper" style="position:relative;">
</div>
<div id="overlay">
<button id="startBtn" onclick="startGame()">🎲 BẮT ĐẦU</button>
  <div id="dice"></div>
  <div id="status">Tung xúc xắc để xem ai đi trước</div>
  <div id="blub">Gợi ý: Ấn vào biểu tượng bóng đèn để xem đánh giá nước đi</div>
</div>
  <canvas id="confettiCanvas"></canvas>
<script>
  
 
const SIZE = 15;

let board = [];
let cells = [];
let gameOver = false;
let lastCell = null;

let human = "X";
let ai = "O";
let currentTurn = "X";
let aiThinking = false;

let rawX = scoreX;
let rawO = scoreO;
let moveHistory = [];
let canUndo = false;     // đã có nước đi chưa
let undoUsed = false;    // đã dùng undo trong lượt này chưa
let cache = new Map();

// 🔥 nếu có số âm → dịch toàn bộ lên
let minScore = Math.min(rawX, rawO);

if(minScore < 0){
  rawX += Math.abs(minScore);
  rawO += Math.abs(minScore);
}
  let total = rawX + rawO;

let percentX = 50;
let percentO = 50;

if(total > 0){
  percentX = Math.round(rawX / total * 100);
  percentO = 100 - percentX;
}
  
const boardDiv = document.getElementById("board");
const statusOverlay = document.getElementById("status");
const statusTop = document.getElementById("statusTop");
const overlay = document.getElementById("overlay");
const commentaryDiv = document.getElementById("commentary");
const resetBtn = document.getElementById("btnReset");
  
  function undoMove(){
  if(!canUndo || undoUsed || gameOver) return;

  // 🔥 chỉ cho undo 1 lần
  undoUsed = true;

  let steps = (moveHistory.length >= 2) ? 2 : 1;

  for(let i=0;i<steps;i++){
    let last = moveHistory.pop();
    if(!last) break;

    let [r,c] = last;

    board[r][c] = "";

    const cell = cells[r][c];
    cell.textContent = "";
    cell.classList.remove("X","O","last","win");
  }

  // cập nhật lastCell
  if(moveHistory.length > 0){
    let [r,c] = moveHistory[moveHistory.length-1];
    lastCell = cells[r][c];
    lastCell.classList.add("last");
  }else{
    lastCell = null;
  }

  currentTurn = human;
  statusTop.textContent = "Lượt của bạn ("+human+")";

  updateScore();
}

function showStatus(text){
  statusOverlay.textContent = text;
  statusOverlay.classList.remove("show");
  void statusOverlay.offsetWidth;
  statusOverlay.classList.add("show");
}



// ===== BOARD =====
function createBoard(){
  board = [];
  cells = [];
  boardDiv.innerHTML = "";

  for(let r=0;r<SIZE;r++){
    board[r]=[];
    cells[r]=[];

    for(let c=0;c<SIZE;c++){
      board[r][c]="";

      const cell=document.createElement("div");
      cell.className="cell";
      cell.onclick=()=>playerMove(r,c);

      boardDiv.appendChild(cell);
      cells[r][c]=cell;
    }
  }
}

// ===== UTILS =====
function getEmptyCells(){
  let arr=[];
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c]==="") arr.push([r,c]);
    }
  }
  return arr;
}

function hasNeighbor(r,c){
  for(let dr=-1;dr<=1;dr++){
    for(let dc=-1;dc<=1;dc++){
      let nr=r+dr, nc=c+dc;
      if(nr>=0 && nr<SIZE && nc>=0 && nc<SIZE){
        if(board[nr][nc] !== "") return true;
      }
    }
  }
  return false;
}

// ===== START =====
function startGame(){
  document.getElementById("startBtn").style.display = "none";

  let faces=["X","X","X","O","O","O"];
  let dice=document.getElementById("dice");

  let interval=setInterval(()=>{
    dice.textContent=faces[Math.floor(Math.random(0)*6)];
  },100);

  setTimeout(()=>{
    clearInterval(interval);

    let result=faces[Math.floor(Math.random(0)*6)];
    dice.textContent=result;

    if(result==="X"){
      human="X";
      ai="O";
      currentTurn="X";
      playerStartTime = Date.now();
      showStatus("Bạn đi trước (X)");
      statusTop.textContent="Lượt của bạn (X)";
      commentary.textContent="Có vẻ như bạn là một cao thủ chơi cờ Caro 🧐";
    }else{
      human="O";
      ai="X";
      currentTurn="X";
      commentary.textContent="Nói trước. Tôi sẽ không nhường đâu!";
      showStatus("AI.GiaBao đi trước (X)");
      statusTop.textContent="🤖 AI.GiaBao đang đi...";
    }

    setTimeout(()=>{
      overlay.style.display="none";

      if(currentTurn === ai){
        setTimeout(aiMove,300);
      }
    },800);

  },3000);
}

function place(r,c,player){
  board[r][c] = player;
  moveHistory.push([r,c,player]);
  
  const cell = cells[r][c];
  cell.textContent = player;
  cell.classList.add(player);

  if(lastCell) lastCell.classList.remove("last");
  cell.classList.add("last");
  lastCell = cell;
  try{
  showComment(r, c, player);
}catch(e){
  console.error("Comment error:", e);
}
  updateScore();
}
  
  function updateUndoButton(){
  if(!canUndo || undoUsed){
    undoBtn.disabled = true;
  }else{
    undoBtn.disabled = false;
  }
}
  
  
function getOccupiedCount(){
  let count = 0;
  for(let r=0; r<SIZE; r++){
    for(let c=0; c<SIZE; c++){
      if(board[r][c] !== "") count++;
    }
  }
  return count;
}
// ===== PLAYER =====
function playerMove(r,c){
  if(gameOver || board[r][c]!=="" || currentTurn!==human) return;

  place(r,c,human);
  currentTurn=ai;

  if(checkWin(r,c,human)){
  statusTop.textContent="🎉 Bạn thắng!";
   statusTop.classList.add("win");
   resetBtn.textContent = "Ván mới";
  launchConfetti();

  gameOver=true;
  return;
}

  statusTop.textContent="🤖 AI.GiaBao đang suy nghĩ...";
  setTimeout(aiMove,300);
}

// ===== AI =====
function aiMove(){
  if(gameOver || currentTurn!==ai || aiThinking) return;

  aiThinking = true;
  // 📌 lấy vùng giữa (ví dụ 3x3: 7–9 nếu SIZE ~ 15)
let center = Math.floor(SIZE / 2);

// tạo vùng trung tâm 3x3
let possibleMoves = [];

for(let i = center - 1; i <= center + 1; i++){
  for(let j = center - 1; j <= center + 1; j++){
    if(board[i][j] === ""){
      possibleMoves.push([i, j]);
    }
  }
}

if(possibleMoves.length > 0){
  [r, c] = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
}

  // 🚀 1. THẮNG NGAY
  let winNow = findWin(ai);
  if(winNow){
    [r,c] = winNow;
    place(r,c,ai);

    statusTop.textContent = "🤖 AI.GiaBao thắng!";
    statusTop.classList.add("win");
    resetBtn.textContent = "Chơi lại";
    launchConfetti();
    gameOver = true;

    aiThinking = false;
    return;
  }

  // 🚀 2. CHẶN NGAY
  let blockNow = findWin(human);
  if(blockNow){
    [r,c] = blockNow;
    place(r,c,ai);

    currentTurn = human;
    statusTop.textContent = "Lượt của bạn ("+human+")";
    aiThinking = false;
    return;
  }

  // 🚀 3. TẠO 4 MỞ
  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){
      if(board[i][j] !== "") continue;

      board[i][j] = ai;

      if(isOpenFour(i,j,ai)){
        board[i][j] = "";

        place(i,j,ai);
        currentTurn = human;
        statusTop.textContent = "Lượt của bạn ("+human+")";

        aiThinking = false;
        return;
      }

      board[i][j] = "";
    }
  }

  // 🚀 4. AI CHÍNH
  let move = smartAI(ai);

  if(!move || board[move[0]][move[1]]!==""){
    let empty = getEmptyCells();
    if(empty.length===0){
      aiThinking = false;
      return;
    }
    move = empty[Math.floor(Math.random()*empty.length)];
  }

  [r,c] = move;
  place(r,c,ai);

  // 🚀 5. CHECK WIN
    if(checkWin(r,c,ai)){
  statusTop.textContent="🤖 AI.GiaBao thắng!";
     resetBtn.textContent = "Chơi lại";
    statusTop.classList.add("win");
   launchConfetti();
  gameOver = true;
  aiThinking = false;
  return;
}

  // 🚀 6. TURN
  currentTurn = human;
  statusTop.textContent = "Lượt của bạn ("+human+")";
  playerStartTime = Date.now();
  aiThinking = false;
}

  function getSmartMoves(){
  let moves = getEmptyCells().filter(([r,c]) => hasNeighbor(r,c));

  // 🔥 chỉ giữ top N nước tốt nhất
  let scored = moves.map(([r,c]) => {
    let score = evaluate(r,c,ai) + evaluate(r,c,human);
    return {r,c,score};
  });

  scored.sort((a,b) => b.score - a.score);

  return scored.slice(0, 10).map(m => [m.r, m.c]); // 🔥 chỉ lấy top 8
}
  
// ===== SMART AI =====
const MAX_DEPTH = 4; // có thể tăng lên 4 nếu máy mạnh

function smartAI(player){
  let bestScore = -Infinity;
  let bestMove = null;

  let moves = getSmartMoves();

  for (let [r,c] of moves){
    board[r][c] = player;

    let score = minimax(MAX_DEPTH - 1, false, player, -Infinity, Infinity);

    board[r][c] = "";

    if (score > bestScore){
      bestScore = score;
      bestMove = [r,c];
    }
  }

  // fallback nếu không có nước tốt
  if (!bestMove){
    let empty = getEmptyCells();
    return empty[Math.floor(Math.random()*empty.length)];
  }

  return bestMove;
}
  
// ===== MINIMAX =====
function minimax(depth, isMaximizing, aiPlayer, alpha, beta){
 let key = JSON.stringify(board) + depth + isMaximizing;

  if(cache.has(key)){
    return cache.get(key);}
  let humanPlayer = (aiPlayer === "X") ? "O" : "X";

  // check terminal
  if (depth === 0) return evaluateBoard(aiPlayer);

  let winner = checkWinnerGlobal();
  if (winner === aiPlayer) return 100000;
  if (winner === humanPlayer) return -100000;

  let moves = getEmptyCells();
  moves = moves.filter(([r,c]) => hasNeighbor(r,c));
  moves.sort((a,b)=>{
  return evaluate(b[0],b[1],aiPlayer) - evaluate(a[0],a[1],aiPlayer);
});

  if (isMaximizing){
    let maxEval = -Infinity;

    for (let [r,c] of moves){
      board[r][c] = aiPlayer;

      let eval = minimax(depth - 1, false, aiPlayer, alpha, beta);

      board[r][c] = "";

      maxEval = Math.max(maxEval, eval);
      alpha = Math.max(alpha, eval);

      if (beta <= alpha) break; // cắt tỉa
    }

    return maxEval;
  } else {
    let minEval = Infinity;

    for (let [r,c] of moves){
      board[r][c] = humanPlayer;

      let eval = minimax(depth - 1, true, aiPlayer, alpha, beta);

      board[r][c] = "";

      minEval = Math.min(minEval, eval);
      beta = Math.min(beta, eval);

      if (beta <= alpha) break; // cắt tỉa
    }

    return minEval;
  }
}
//HAM NAY BAT BUOC CO...
  function isOpenFour(r,c,player){
  const dirs = [
    [1,0],[0,1],[1,1],[1,-1]
  ];

  for(let [dr,dc] of dirs){
    let count = 1;
    let openEnds = 0;

    // tiến
    let i=r+dr, j=c+dc;
    while(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]===player){
      count++; i+=dr; j+=dc;
    }
    if(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]===""){
      openEnds++;
    }

    // lùi
    i=r-dr; j=c-dc;
    while(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]===player){
      count++; i-=dr; j-=dc;
    }
    if(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]===""){
      openEnds++;
    }

    // 🔥 4 mở thật sự
    if(count === 4 && openEnds === 2){
      return true;
    }
  }

  return false;
}

  // #KHONG THE XOA
  function evaluateBoard(player){
  let score = 0;
  let enemy = (player === "X") ? "O" : "X";

  for (let r=0;r<SIZE;r++){
    for (let c=0;c<SIZE;c++){
      if (board[r][c] !== player) continue;

      score += evaluate(r,c,player) * 1.2;
    }
  }

  for (let r=0;r<SIZE;r++){
    for (let c=0;c<SIZE;c++){
      if (board[r][c] !== enemy) continue;

      score -= evaluate(r,c,enemy) * 1.1;
    }
  }

  return score;
}
  function checkWinnerGlobal(){
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c] !== "" && checkWin(r,c,board[r][c])){
        return board[r][c];
      }
    }
  }
  return null;
}

// ===== EVALUATE =====
// HAM NAY BAT BUOC PHAI CO
function evaluate(r,c,player){
  let score =
    scoreDirection(r,c,1,0,player)+
    scoreDirection(r,c,0,1,player)+
    scoreDirection(r,c,1,1,player)+
    scoreDirection(r,c,1,-1,player);

  // 🔥 PHẠT ĐÁNH Ở RÌA
  if(r === 0 || c === 0 || r === SIZE-1 || c === SIZE-1){
    score -= 100;
  }

  return score;
}

function scoreDirection(r,c,dr,dc,player){
  let count=1, open=0;

  let i=r+dr,j=c+dc;
  while(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]===player){
    count++; i+=dr; j+=dc;
  }
  if(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]==="") open++;

  i=r-dr; j=c-dc;
  while(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]===player){
    count++; i-=dr; j-=dc;
  }
  if(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]==="") open++;

  // 🔥 WIN
if(count>=5) return 100000;

// 🔥 4 mở 2 đầu (cực mạnh)
if(count===4 && open===2) return 20000;

// ⚠️ 4 cụt 1 đầu (yếu hơn rất nhiều)
if(count===4 && open===1) return 500;

// ❌ 4 chết (2 đầu bị chặn)
if(count===4 && open===0) return 0;

// 🔥 3 mở
if(count===3 && open===2) return 5000;

// ⚠️ 3 cụt
if(count===3 && open===1) return 200;

// 2
if(count===2 && open===2) return 50;
if(count===2 && open===1) return 10;

return 1;
}

// ===== WIN =====
function checkWin(r,c,player){
  return (
    count(r,c,1,0,player)+count(r,c,-1,0,player)>=4 ||
    count(r,c,0,1,player)+count(r,c,0,-1,player)>=4 ||
    count(r,c,1,1,player)+count(r,c,-1,-1,player)>=4 ||
    count(r,c,1,-1,player)+count(r,c,-1,1,player)>=4
  );
}

function count(r,c,dr,dc,player){
  let i=r+dr,j=c+dc,cnt=0;
  while(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]===player){
    cnt++; i+=dr; j+=dc;
  }
  return cnt;
}

function findWin(player){
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c]!=="") continue;

      board[r][c]=player;
      if(checkWin(r,c,player)){
        board[r][c]="";
        return [r,c];
      }
      board[r][c]="";
    }
  }
  return null;
}



  function updateScore(){
  let scoreX = 0;
  let scoreO = 0;

  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c] === "X"){
        scoreX += evaluate(r,c,"X");
      }
      if(board[r][c] === "O"){
        scoreO += evaluate(r,c,"O");
      }
    }
  }

  let total = scoreX + scoreO;

  let percentX = 50;
  let percentO = 50;

  if(total > 0){
    percentX = Math.round(scoreX / total * 100);
    percentO = 100 - percentX;
  }

  // 👉 chiều dài thanh vẫn theo %
  document.getElementById("scoreX").style.width = percentX + "%";
  document.getElementById("scoreO").style.width = percentO + "%";

  // 🔥 hiển thị ĐIỂM THẬT
  document.getElementById("textX").textContent = scoreX;
document.getElementById("textO").textContent = scoreO;
}

  function analyzeMoveLite(r, c, player){
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];

  let open3 = 0;
  let open4 = 0;

  for(let [dr,dc] of dirs){
    let count = 1;
    let openEnds = 0;

    // 👉 tiến
    let i = r + dr, j = c + dc;
    while(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j] === player){
      count++; i+=dr; j+=dc;
    }
    if(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j] === ""){
      openEnds++;
    }

    // 👉 lùi
    i = r - dr; j = c - dc;
    while(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j] === player){
      count++; i-=dr; j-=dc;
    }
    if(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j] === ""){
      openEnds++;
    }

    // 🔥 nhận diện
    if(count === 4 && openEnds === 2){
      open4++;
    }
    else if(count === 3 && openEnds === 2){
      open3++;
    }
  }

  return { open3, open4 };
}

const canvas = document.getElementById("confettiCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

function randomColor(){
  const colors = ["#ff4d4d", // đỏ
  "#00d4ff", // xanh dương
  "#00ff88", // xanh lá
  "#ffd700", // vàng
  "#ff00ff", // hồng tím
  "#ff8800", // cam
  "#ffffff", // trắng
  "#a855f7", // tím
  "#22c55e", // xanh neon
  "#f43f5e"  // đỏ
  ];
  return colors[Math.floor(Math.random()*colors.length)];
}

function launchConfetti(){
  confetti = [];

  for(let i=0;i<700;i++){
    let fromLeft = Math.random() < 0.5;

    confetti.push({
      x: fromLeft ? 0 : canvas.width,
      y: canvas.height,

      vx: (Math.random()*6 + 2) * (fromLeft ? 1 : -1), // bắn ngang
      vy: -(Math.random()*7 + 6), // bắn lên

      gravity: 0.05,
      size: Math.random()*9 + 2,

      color: randomColor(),

      angle: Math.random()*360,
      spin: Math.random()*15 - 5,

      shape: Math.random() < 0.5 ? "rect" : "line"
    });
  }

  animateConfetti();
}

function animateConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  confetti.forEach(p=>{
    // physics
    p.vx *= 0.985;
    p.vy += p.gravity;
    p.x += p.vx;
    p.y += p.vy;
    p.angle += p.spin;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle * Math.PI/180);

    ctx.fillStyle = p.color;

    if(p.shape === "rect"){
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
    }else{
      ctx.fillRect(-p.size/2, -p.size/2, p.size * 0.2, p.size * 1.5);
    }

    ctx.restore();
  });

  // lọc hạt còn trên màn hình
  confetti = confetti.filter(p => p.y < canvas.height + 20);

  if(confetti.length > 0){
    requestAnimationFrame(animateConfetti);
  }
}
