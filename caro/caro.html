<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Caro vs Máy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:#0f172a;
  color:white;
}

/* ===== BOARD ===== */
#board{
  display:grid;
  grid-template-columns: repeat(20, 28px);
  justify-content:center;
  margin:20px auto;
}

.cell{
  width:28px;
  height:28px;
  border:1px solid #555;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:16px;
}

.cell:hover{
  background:#1e3a8a;
}

.X{ color:#00d4ff; font-weight:bold; }
.O{ color:#ff4d4d; font-weight:bold; }

.last{
  background:#444 !important;
}

/* ===== OVERLAY ===== */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#dice{
  font-size:50px;
  margin-top:20px;
}

button{
  padding:10px 20px;
  background:#0188ff;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

#status{
  font-size:22px;
  margin-top:10px;
}

#statusTop{
  font-size:20px;
  margin-top:10px;
}

.show{
  animation: slideUp 0.5s ease;
}

@keyframes slideUp{
  from{
    transform: translateY(40px);
    opacity:0;
  }
  to{
    transform: translateY(0);
    opacity:1;
  }
}
</style>
</head>

<body>

<h2>🤖 Caro vs Máy</h2>
<div id="statusTop">Nhấn bắt đầu</div>
<div id="board"></div>

<button onclick="resetGame()">Chơi lại</button>

<!-- OVERLAY -->
<div id="overlay">
  <button onclick="startGame()">🎲 Bắt đầu</button>
  <div id="dice"></div>
  <div id="status">Nhấn bắt đầu</div>
</div>

<script src="AIx.js"></script>

<script>
const SIZE = 20;

let board = [];
let cells = [];
let gameOver = false;
let lastCell = null;

let human = "X";
let ai = "O";

const boardDiv = document.getElementById("board");
const statusOverlay = document.getElementById("status");
const statusTop = document.getElementById("statusTop");

// ===== STATUS ANIMATION =====
function showStatus(text){
  statusOverlay.textContent = text;

  statusOverlay.classList.remove("show");
  void statusOverlay.offsetWidth;
  statusOverlay.classList.add("show");
}

// ===== TẠO BÀN =====
function createBoard(){
  board = [];
  cells = [];
  boardDiv.innerHTML = "";

  for(let r=0;r<SIZE;r++){
    board[r] = [];
    cells[r] = [];

    for(let c=0;c<SIZE;c++){
      board[r][c] = "";

      const cell = document.createElement("div");
      cell.className = "cell";
      cell.onclick = () => playerMove(r,c);

      boardDiv.appendChild(cell);
      cells[r][c] = cell;
    }
  }
}

// ===== START GAME =====
function startGame(){
  let faces = ["X","X","X","O","O","O"];
  let dice = document.getElementById("dice");

  let interval = setInterval(()=>{
    dice.textContent = faces[Math.floor(Math.random()*6)];
  },100);

  setTimeout(()=>{
    clearInterval(interval);

    let result = faces[Math.floor(Math.random()*6)];
    dice.textContent = result;

    if(result === "X"){
      human = "X";
      ai = "O";

      showStatus("Bạn đi trước (X)");
      statusTop.textContent = "Lượt của bạn (X)";
    }else{
      human = "O";
      ai = "X";

      showStatus("Máy đi trước (X)");
      statusTop.textContent = "🤖 Máy đang đi...";
    }

    // ẩn overlay sau 1 chút để người chơi đọc
    setTimeout(()=>{
      document.getElementById("overlay").style.display = "none";

      if(ai === "X"){
        setTimeout(aiMove, 300);
      }
    }, 800);

  },3000);
}

// ===== NGƯỜI CHƠI =====
function playerMove(r,c){
  if(gameOver || board[r][c] !== "") return;

  place(r,c,human);

  if(checkWin(r,c,human)){
    statusTop.textContent = "🎉 Bạn thắng!";
    gameOver = true;
    return;
  }

  statusTop.textContent = "🤖 Máy đang nghĩ...";
  setTimeout(aiMove, 300);
}

// ===== MÁY =====
function aiMove(){
  if(gameOver) return;

  let move;

  if(ai === "X"){
    move = getAIMove(board, "X"); // AIx.js
  }else{
    move = basicAI(board, "O");
  }

  if(!move) return;

  const [r,c] = move;
  place(r,c,ai);

  if(checkWin(r,c,ai)){
    statusTop.textContent = "🤖 Máy thắng!";
    gameOver = true;
    return;
  }

  statusTop.textContent = "Lượt của bạn (" + human + ")";
}

// ===== AI O ĐƠN GIẢN =====
function basicAI(board, player){
  let enemy = player === "X" ? "O" : "X";

  let move = findWin(board, player);
  if(move) return move;

  move = findWin(board, enemy);
  if(move) return move;

  return [10,10];
}

// ===== PLACE =====
function place(r,c,player){
  board[r][c] = player;

  const cell = cells[r][c];
  cell.textContent = player;
  cell.classList.add(player);

  if(lastCell) lastCell.classList.remove("last");
  cell.classList.add("last");
  lastCell = cell;
}

// ===== WIN =====
function checkWin(r,c,player){
  return (
    count(r,c,1,0,player)+count(r,c,-1,0,player)>=4 ||
    count(r,c,0,1,player)+count(r,c,0,-1,player)>=4 ||
    count(r,c,1,1,player)+count(r,c,-1,-1,player)>=4 ||
    count(r,c,1,-1,player)+count(r,c,-1,1,player)>=4
  );
}

function count(r,c,dr,dc,player){
  let i=r+dr, j=c+dc, cnt=0;

  while(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]===player){
    cnt++;
    i+=dr;
    j+=dc;
  }

  return cnt;
}

// ===== FIND WIN =====
function findWin(board, player){
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c] !== "") continue;

      board[r][c] = player;
      let win = checkWin(r,c,player);
      board[r][c] = "";

      if(win) return [r,c];
    }
  }
  return null;
}

// ===== RESET =====
function resetGame(){
  gameOver = false;
  lastCell = null;
  statusTop.textContent = "Nhấn bắt đầu";
  createBoard();
  document.getElementById("overlay").style.display = "flex";
}

// INIT
createBoard();
</script>
