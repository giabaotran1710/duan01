<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cờ Caro PVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:#0f172a;
  color:white;
}

#board{
  display:grid;
  grid-template-columns: repeat(15, 1fr);
  width: 95vw;
  max-width: 420px;
  margin:20px auto;
}

.cell{
  width:100%;
  aspect-ratio:1/1;
  border:1px solid #555;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size: min(4vw, 18px);
  box-sizing:border-box;
}


.X{ color:#00d4ff; font-weight:bold; }
.O{ color:#ff4d4d; font-weight:bold; }

.last{ 
  background:#888;
  font-weight:1000;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#dice{ font-size:150px; margin-top:1px; }

button{
  width: 135px;
  height: 40px;
  padding:10px 1px;
  background:#0188ff;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
  display: inline-block;
  margin-top: 5px;
  transition: all 0.25s ease;
}
  
 .win{
  position: relative; /* 🔥 bắt buộc để ::after hoạt động */
  z-index: 3;
}

.win::after{
  content:"";
  position:absolute;
  inset:0;
  background:#FFD15B;
  opacity:0;

  animation: winFade 0.6s ease forwards;
  animation-delay:1s;

  pointer-events:none;
}
  
#status{
  font-size:20px;
  margin-top:10px;
}

.show{
  animation: slideUp 0.5s ease;
}

@keyframes slideUp{
  from{ transform:translateY(40px); opacity:0; }
  to{ transform:translateY(0); opacity:1; }
}
  #scoreBar{
  width:90%;
  height:15px;
  margin:15px auto;
  display:flex;
  background:#222;
  display: none;
  margin-top:-460px;
}

#scoreX{
  height:100%;
  background:#00d4ff;
  width:50%
}

#scoreO{
  height:100%;
  background:#ff4d4d;
  width:50%;
}

/* 🔥 text cố định */
#scoreText{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:999;
  pointer-events:none;
  padding:0 5px;
  margin-top: -397px;
  font-size: 14px;
}

/* màu chữ */
#textX{
  color:black;
  margin-left:20px;
}

#textO{
  color:black;
  margin-right:20px;
}

  #scoreX, #scoreO{
  min-width: 1px;
  transition: width 0.5s ease-out; /* 🔥 mượt ở đây */
}
  
  #toggleScore{
  position:fixed;
  top:10px;
  right:10px;
  z-index:20;

  width:40px;
  height:40px;
  border-radius:50%; /* 🔥 vòng tròn */

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:20px;
  background:rgba(255,255,255,0.1);
  border:2px solid white; /* 🔥 viền */

  cursor:pointer;
  transition:0.2s;
}

/* hover cho đẹp */
#toggleScore:hover{
  background:rgba(255,255,255,0.2);
}

/* trạng thái tắt */
#toggleScore.off{
  opacity:0.4;
  border-color:#888;
}

  #warning{
  font-size:14px;
  color:#ffcc00;
  margin-top:5px;
  min-height:18px; /* tránh layout nhảy */
  opacity:0.9;
  translateY: -100px
}
  
  #winLine{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}
 #blub{
   font-size:10px;
   color: yellow;
   margin-top:2px;
   animation: slideUp 2s ease;
   
  .button:disabled{
  cursor: not-allowed;
  opacity: 0.4;
  filter: grayscale(1) brightness(0.8);
  transform: scale(0.98);
}
  .button:disabled:hover{
  transform: none;
  background: inherit;
}


</style>
</head>

<body>
<h2>CỜ CARO</h2>
  <button id="toggleScore">💡</button>
<div id="statusTop">Đang chờ...</div>
  <div id="warning"></div>
<div id="board"></div>
<button id="btnUndo" onclick="undoMove()">↩️ Hoàn tác</button>
  <button onclick="resetGame()">Chơi lại</button>
 <div id="scoreBar">
  <div id="scoreX"></div>
  <div id="scoreO"></div>
   <!-- 🔥 TEXT FIXED -->
  <div id="scoreText">
    <span id="textX">0</span>
    <span id="textO">0</span>
  </div>
</div>
</div>
<div id="board-wrapper" style="position:relative;">
  <div id="board"></div>
</div>
<div id="overlay">
<button id="startBtn" onclick="startGame()">🎲 BẮT ĐẦU VỚI MÁY</button>
  <div id="dice"></div>
  <div id="status">Tung xúc xắc để xem ai đi trước</div>
  <div id="blub">Gợi ý: Ấn vào biểu tượng bóng đèn để xem đánh giá nước đi</div>
</div>
<script>


const SIZE = 15;

let board = [];
let cells = [];
let gameOver = false;
let lastCell = null;

let human = "X";
let ai = "O";
let currentTurn = "X";
let aiThinking = false;

let rawX = scoreX;
let rawO = scoreO;
let moveHistory = [];
let canUndo = false;     // đã có nước đi chưa
let undoUsed = false;    // đã dùng undo trong lượt này chưa


// 🔥 nếu có số âm → dịch toàn bộ lên
let minScore = Math.min(rawX, rawO);

if(minScore < 0){
  rawX += Math.abs(minScore);
  rawO += Math.abs(minScore);
}
  let total = rawX + rawO;

let percentX = 50;
let percentO = 50;

if(total > 0){
  percentX = Math.round(rawX / total * 100);
  percentO = 100 - percentX;
}
  
const boardDiv = document.getElementById("board");
const statusOverlay = document.getElementById("status");
const statusTop = document.getElementById("statusTop");
const overlay = document.getElementById("overlay");
const warningDiv = document.getElementById("warning");
  const undoBtn = document.getElementById("btnUndo");

function showStatus(text){
  statusOverlay.textContent = text;
  statusOverlay.classList.remove("show");
  void statusOverlay.offsetWidth;
  statusOverlay.classList.add("show");
}



// ===== BOARD =====
function createBoard(){
  board = [];
  cells = [];
  boardDiv.innerHTML = "";

  for(let r=0;r<SIZE;r++){
    board[r]=[];
    cells[r]=[];

    for(let c=0;c<SIZE;c++){
      board[r][c]="";

      const cell=document.createElement("div");
      cell.className="cell";
      cell.onclick=()=>playerMove(r,c);

      boardDiv.appendChild(cell);
      cells[r][c]=cell;
    }
  }
}

// ===== UTILS =====
function getEmptyCells(){
  let arr=[];
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c]==="") arr.push([r,c]);
    }
  }
  return arr;
}

function hasNeighbor(r,c){
  for(let dr=-1;dr<=1;dr++){
    for(let dc=-1;dc<=1;dc++){
      let nr=r+dr, nc=c+dc;
      if(nr>=0 && nr<SIZE && nc>=0 && nc<SIZE){
        if(board[nr][nc] !== "") return true;
      }
    }
  }
  return false;
}

// ===== START =====
function startGame(){
  document.getElementById("startBtn").style.display = "none";

  let faces=["X","X","X","O","O","O"];
  let dice=document.getElementById("dice");

  let interval=setInterval(()=>{
    dice.textContent=faces[Math.floor(Math.random(0)*6)];
  },100);

  setTimeout(()=>{
    clearInterval(interval);

    let result=faces[Math.floor(Math.random(0)*6)];
    dice.textContent=result;

    if(result==="X"){
      human="X";
      ai="O";
      currentTurn="X";
      showStatus("Bạn đi trước (X)");
      statusTop.textContent="Lượt của bạn (X)";
    }else{
      human="O";
      ai="X";
      currentTurn="X";
      showStatus("AI.GiaBao đi trước (X)");
      statusTop.textContent="🤖 AI.GiaBao đang đi...";
    }

    setTimeout(()=>{
      overlay.style.display="none";

      if(currentTurn === ai){
        setTimeout(aiMove,300);
      }
    },800);

  },3000);
}

function place(r,c,player){
  board[r][c] = player;
  moveHistory.push([r,c,player]);
  const cell = cells[r][c];
  cell.textContent = player;
  cell.classList.add(player);

  if(lastCell) lastCell.classList.remove("last");
  cell.classList.add("last");
  lastCell = cell;
  updateScore();
}
  
  function undoMove(){
  if(!canUndo || undoUsed || gameOver) return;

  // 🔥 chỉ cho undo 1 lần
  undoUsed = true;

  let steps = (moveHistory.length >= 2) ? 2 : 1;

  for(let i=0;i<steps;i++){
    let last = moveHistory.pop();
    if(!last) break;

    let [r,c] = last;

    board[r][c] = "";

    const cell = cells[r][c];
    cell.textContent = "";
    cell.classList.remove("X","O","last","win");
  }

  // cập nhật lastCell
  if(moveHistory.length > 0){
    let [r,c] = moveHistory[moveHistory.length-1];
    lastCell = cells[r][c];
    lastCell.classList.add("last");
  }else{
    lastCell = null;
  }

  currentTurn = human;
  statusTop.textContent = "Lượt của bạn ("+human+")";

  updateScore();
}
function getOccupiedCount(){
  let count = 0;
  for(let r=0; r<SIZE; r++){
    for(let c=0; c<SIZE; c++){
      if(board[r][c] !== "") count++;
    }
  }
  return count;
}
  
  function updateUndoButton(){
  if(!canUndo || undoUsed){
    undoBtn.disabled = true;
  }else{
    undoBtn.disabled = false;
  }
}
  
// ===== PLAYER =====
function playerMove(r,c){
  if(gameOver || board[r][c]!=="" || currentTurn!==human) return;

  place(r,c,human);
  canUndo = true;
undoUsed = false; // 🔥 reset mỗi lượt mới
  currentTurn=ai;

  if(checkWin(r,c,human)){
  statusTop.textContent="🎉 Bạn thắng!";

  let winLine = getWinLine(r, c, human);

if(winLine){
  highlightWinCells(winLine);
}

  gameOver=true;
  return;
}

  statusTop.textContent="🤖 AI.GiaBao đang suy nghĩ...";
  setTimeout(aiMove,300);
}

// ===== AI =====
function aiMove(){
  if(gameOver || currentTurn!==ai || aiThinking) return;

  aiThinking = true;
  // 📌 lấy vùng giữa (ví dụ 3x3: 7–9 nếu SIZE ~ 15)
let center = Math.floor(SIZE / 2);

// tạo vùng trung tâm 3x3
let possibleMoves = [];

for(let i = center - 1; i <= center + 1; i++){
  for(let j = center - 1; j <= center + 1; j++){
    if(board[i][j] === ""){
      possibleMoves.push([i, j]);
    }
  }
}

if(possibleMoves.length > 0){
  [r, c] = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
}

  // 🚀 1. THẮNG NGAY
  let winNow = findWin(ai);
  if(winNow){
    [r,c] = winNow;
    place(r,c,ai);

    statusTop.textContent = "🤖 AI.GiaBao thắng!";
    gameOver = true;

    aiThinking = false;
    return;
  }

  // 🚀 2. CHẶN NGAY
  let blockNow = findWin(human);
  if(blockNow){
    [r,c] = blockNow;
    place(r,c,ai);

    currentTurn = human;
    statusTop.textContent = "Lượt của bạn ("+human+")";
    aiThinking = false;
    return;
  }
  // CHAN 3 DUONG 3 MO
  for(let [r,c] of getEmptyCells()){
  if(!hasNeighbor(r,c)) continue;

  board[r][c] = human;

  let threes = countOpenThrees(r,c,human);

  board[r][c] = "";

  if(threes >= 2){
    place(r,c,ai); // 🔥 chặn ngay
    currentTurn = human;
    return;
  }
}
  
  // 🚀 2.5: CHẶN THEO MỨC NGUY HIỂM (3 mở / 4 mở)
let bestThreat = -Infinity;
let bestBlock = null;

for(let [r,c] of getEmptyCells()){
  if(!hasNeighbor(r,c)) continue;

  // giả lập người chơi đánh
  board[r][c] = human;

  let threatScore = evaluate(r,c,human);

  board[r][c] = "";

  // 🔥 ưu tiên chặn theo mức điểm
  if(threatScore > bestThreat){
    bestThreat = threatScore;
    bestBlock = [r,c];
  }
}

// 🚨 nếu là 4 mở → chặn NGAY
if(bestThreat >= 20000){
  let [r,c] = bestBlock;
  place(r,c,ai);

  currentTurn = human;
  statusTop.textContent = "Lượt của bạn ("+human+")";
  aiThinking = false;
  return;
}

// chỉ chặn 3 mở nếu AI không có nước tấn công mạnh
if(bestThreat >= 5000){
  let attackMove = smartAI(ai);

  if(attackMove){
    let [ar,ac] = attackMove;

    board[ar][ac] = ai;
    let attackScore = evaluate(ar,ac,ai);
    board[ar][ac] = "";

    if(attackScore > 8000){
      // 👉 tấn công mạnh hơn → KHÔNG chặn
    }else{
      // 👉 chặn
      let [r,c] = bestBlock;
      place(r,c,ai);

      currentTurn = human;
      statusTop.textContent = "Lượt của bạn ("+human+")";
      aiThinking = false;
      return;
    }
  }
}
  //TAO 3 DUONG 3 MO
  for(let [r,c] of getEmptyCells()){
  if(!hasNeighbor(r,c)) continue;

  board[r][c] = ai;

  let threes = countOpenThrees(r,c,ai);

  board[r][c] = "";

  if(threes >= 2){ // double đã mạnh, triple là win
    place(r,c,ai);
    currentTurn = human;
    return;
  }
}

  // 🚀 3. TẠO 4 MỞ
  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){
      if(board[i][j] !== "") continue;

      board[i][j] = ai;

      if(isOpenFour(i,j,ai)){
        board[i][j] = "";

        place(i,j,ai);
        currentTurn = human;
        statusTop.textContent = "Lượt của bạn ("+human+")";

        aiThinking = false;
        return;
      }

      board[i][j] = "";
    }
  }
    // 🚨 PHÁT HIỆN NGUY HIỂM (3 mở / 4 mở)
let dangerMoves = detectThreatMove(human);

if(dangerMoves.length > 0){
  let [r,c] = dangerMoves[0];

  place(r,c,ai);

  currentTurn = human;
  statusTop.textContent = "Lượt của bạn ("+human+")";

  aiThinking = false;
  return;
}

  // 🚀 4. AI CHÍNH
  let move = smartAI(ai);

  if(!move || board[move[0]][move[1]]!==""){
    let empty = getEmptyCells();
    if(empty.length===0){
      aiThinking = false;
      return;
    }
    move = empty[Math.floor(Math.random()*empty.length)];
  }

  [r,c] = move;
  place(r,c,ai);

  // 🚀 5. CHECK WIN
    if(checkWin(r,c,ai)){
  let winLine = getWinLine(r, c, ai);

if(winLine){
  setTimeout(()=>{
  highlightWinCells(winLine);
},5000);
}
  statusTop.textContent="🤖 AI.GiaBao thắng!";
  gameOver = true;
  aiThinking = false;
  return;
}

  // 🚀 6. TURN
  currentTurn = human;
  statusTop.textContent = "Lượt của bạn ("+human+")";
  aiThinking = false;
}

  function detectThreatMove(player){
  let moves = getEmptyCells();
  let threats = [];

  for(let [r,c] of moves){
    if(!hasNeighbor(r,c)) continue;

    board[r][c] = player;

    let score = evaluate(r,c,player);

    board[r][c] = "";

    // 🔥 NGƯỠNG nhận diện nguy hiểm
    if(score >= 4000){ // tương đương 3 mở mạnh
      threats.push([r,c]);
    }
  }

  return threats;
}
// ===== SMART AI =====
const MAX_DEPTH = 4; // có thể tăng lên 4 nếu máy mạnh

function smartAI(player){
  let bestScore = -Infinity;
  let bestMove = null;

  let moves = getEmptyCells();

  // ưu tiên ô gần quân cờ (giảm độ rộng tìm kiếm)
  moves = moves.filter(([r,c]) => hasNeighbor(r,c));

  for (let [r,c] of moves){
    board[r][c] = player;

    let score = minimax(MAX_DEPTH - 1, false, player, -Infinity, Infinity);

    board[r][c] = "";

    if (score > bestScore){
      bestScore = score;
      bestMove = [r,c];
    }
  }

  // fallback nếu không có nước tốt
  if (!bestMove){
    let empty = getEmptyCells();
    return empty[Math.floor(Math.random()*empty.length)];
  }

  return bestMove;
}
  function predictWinInMoves(player, depth){
  let enemy = player === "X" ? "O" : "X";

  if(depth === 0) return null;

  let moves = getEmptyCells();

  for(let [r,c] of moves){
    if(!hasNeighbor(r,c)) continue;

    board[r][c] = player;

    // nếu đi phát thắng luôn
    if(checkWin(r,c,player)){
      board[r][c] = "";
      return 1;
    }

    // giả lập: người chơi phản công
    let allLose = true;

    let enemyMoves = getEmptyCells();

    for(let [er,ec] of enemyMoves){
      if(!hasNeighbor(er,ec)) continue;

      board[er][ec] = enemy;

      // nếu người chơi có thể thoát → không phải ép thắng
      let result = predictWinInMoves(player, depth-1);

      board[er][ec] = "";

      if(!result){
        allLose = false;
        break;
      }
    }

    board[r][c] = "";

    if(allLose){
      return depth;
    }
  }

  return null;
}
// ===== MINIMAX =====
function minimax(depth, isMaximizing, aiPlayer, alpha, beta){
  let humanPlayer = (aiPlayer === "X") ? "O" : "X";

  // check terminal
  if (depth === 0) return evaluateBoard(aiPlayer);

  let winner = checkWinnerGlobal();
  if (winner === aiPlayer) return 100000;
  if (winner === humanPlayer) return -100000;

  let moves = getEmptyCells();
  moves = moves.filter(([r,c]) => hasNeighbor(r,c));

  if (isMaximizing){
    let maxEval = -Infinity;

    for (let [r,c] of moves){
      board[r][c] = aiPlayer;

      let eval = minimax(depth - 1, false, aiPlayer, alpha, beta);

      board[r][c] = "";

      maxEval = Math.max(maxEval, eval);
      alpha = Math.max(alpha, eval);

      if (beta <= alpha) break; // cắt tỉa
    }

    return maxEval;
  } else {
    let minEval = Infinity;

    for (let [r,c] of moves){
      board[r][c] = humanPlayer;

      let eval = minimax(depth - 1, true, aiPlayer, alpha, beta);

      board[r][c] = "";

      minEval = Math.min(minEval, eval);
      beta = Math.min(beta, eval);

      if (beta <= alpha) break; // cắt tỉa
    }

    return minEval;
  }
}
function isOpenThree(r,c,dr,dc,player){
  let count = 1;
  let open = 0;

  let i=r+dr, j=c+dc;
  while(inBoard(i,j) && board[i][j]===player){
    count++; i+=dr; j+=dc;
  }
  if(inBoard(i,j) && board[i][j]==="") open++;

  i=r-dr; j=c-dc;
  while(inBoard(i,j) && board[i][j]===player){
    count++; i-=dr; j-=dc;
  }
  if(inBoard(i,j) && board[i][j]==="") open++;

  return (count===3 && open===2);
}
  
  function countOpenThrees(r,c,player){
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  let total = 0;

  for(let [dr,dc] of dirs){
    if(isOpenThree(r,c,dr,dc,player)){
      total++;
    }
  }

  return total;
}
  function isOpenFour(r,c,player){
  const dirs = [
    [1,0],[0,1],[1,1],[1,-1]
  ];

  for(let [dr,dc] of dirs){
    let count = 1;
    let openEnds = 0;

    // tiến
    let i=r+dr, j=c+dc;
    while(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]===player){
      count++; i+=dr; j+=dc;
    }
    if(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]===""){
      openEnds++;
    }

    // lùi
    i=r-dr; j=c-dc;
    while(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]===player){
      count++; i-=dr; j-=dc;
    }
    if(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]===""){
      openEnds++;
    }

    // 🔥 4 mở thật sự
    if(count === 4 && openEnds === 2){
      return true;
    }
  }

  return false;
}
  
  function countOpenThrees(player){
  let count = 0;

  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c] !== "") continue;

      board[r][c] = player;

      let openThree = 0;

      const dirs = [[1,0],[0,1],[1,1],[1,-1]];

      for(let [dr,dc] of dirs){
        let cnt = 1, open = 0;

        let i=r+dr, j=c+dc;
        while(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]===player){
          cnt++; i+=dr; j+=dc;
        }
        if(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]==="") open++;

        i=r-dr; j=c-dc;
        while(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]===player){
          cnt++; i-=dr; j-=dc;
        }
        if(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]==="") open++;

        if(cnt === 3 && open === 2){
          openThree++;
        }
      }

      if(openThree >= 2){
        count++;
      }

      board[r][c] = "";
    }
  }

  return count;
}
  function evaluateBoard(player){
  let score = 0;
  let enemy = (player === "X") ? "O" : "X";

  for (let r=0;r<SIZE;r++){
    for (let c=0;c<SIZE;c++){
      if (board[r][c] !== player) continue;

      score += evaluate(r,c,player) * 1.2;
    }
  }

  for (let r=0;r<SIZE;r++){
    for (let c=0;c<SIZE;c++){
      if (board[r][c] !== enemy) continue;

      score -= evaluate(r,c,enemy) * 1.1;
    }
  }

  return score;
}
  function checkWinnerGlobal(){
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c] !== "" && checkWin(r,c,board[r][c])){
        return board[r][c];
      }
    }
  }
  return null;
}

// ===== EVALUATE =====
function evaluate(r,c,player){
  let score =
    scoreDirection(r,c,1,0,player)+
    scoreDirection(r,c,0,1,player)+
    scoreDirection(r,c,1,1,player)+
    scoreDirection(r,c,1,-1,player);

  
  // 🔥 PHẠT ĐÁNH Ở RÌA
  if(r === 0 || c === 0 || r === SIZE-1 || c === SIZE-1){
    score -= 100;
  }

  return score;
}

function scoreDirection(r,c,dr,dc,player){
  let count=1, open=0;

  let i=r+dr,j=c+dc;
  while(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]===player){
    count++; i+=dr; j+=dc;
  }
  if(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]==="") open++;

  i=r-dr; j=c-dc;
  while(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]===player){
    count++; i-=dr; j-=dc;
  }
  if(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]==="") open++;

  // 🔥 WIN
if(count>=5) return 100000;

// 🔥 4 mở 2 đầu (cực mạnh)
if(count===4 && open===2) return 20000;

// ⚠️ 4 cụt 1 đầu (yếu hơn rất nhiều)
if(count===4 && open===1) return 500;

// ❌ 4 chết (2 đầu bị chặn)
if(count===4 && open===0) return 0;

// 🔥 3 mở
if(count===3 && open===2) return 5000;
    

// ⚠️ 3 cụt
if(count===3 && open===1) return 200;

// 2
if(count===2 && open===2) return 50;
if(count===2 && open===1) return 10;

return 1;
}

// ===== WIN =====
function checkWin(r,c,player){
  return (
    count(r,c,1,0,player)+count(r,c,-1,0,player)>=4 ||
    count(r,c,0,1,player)+count(r,c,0,-1,player)>=4 ||
    count(r,c,1,1,player)+count(r,c,-1,-1,player)>=4 ||
    count(r,c,1,-1,player)+count(r,c,-1,1,player)>=4
  );
}

function count(r,c,dr,dc,player){
  let i=r+dr,j=c+dc,cnt=0;
  while(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]===player){
    cnt++; i+=dr; j+=dc;
  }
  return cnt;
}

function findWin(player){
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c]!=="") continue;

      board[r][c]=player;
      if(checkWin(r,c,player)){
        board[r][c]="";
        return [r,c];
      }
      board[r][c]="";
    }
  }
  return null;
}

  function updateScore(){
  let scoreX = 0;
  let scoreO = 0;

  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c] === "X"){
        scoreX += evaluate(r,c,"X");
      }
      if(board[r][c] === "O"){
        scoreO += evaluate(r,c,"O");
      }
    }
  }

  let total = scoreX + scoreO;

  let percentX = 50;
  let percentO = 50;

  if(total > 0){
    percentX = Math.round(scoreX / total * 100);
    percentO = 100 - percentX;
  }

  // 👉 chiều dài thanh vẫn theo %
  document.getElementById("scoreX").style.width = percentX + "%";
  document.getElementById("scoreO").style.width = percentO + "%";

  // 🔥 hiển thị ĐIỂM THẬT
  document.getElementById("textX").textContent = scoreX;
document.getElementById("textO").textContent = scoreO;
}

  let showScore = false;

const toggleBtn = document.getElementById("toggleScore");
const scoreBar = document.getElementById("scoreBar");

// trạng thái ban đầu
toggleBtn.classList.add("off");

toggleBtn.onclick = () => {
  showScore = !showScore;

  if(showScore){
    scoreBar.style.display = "flex";
    toggleBtn.classList.remove("off");


  }else{
    scoreBar.style.display = "none";
    toggleBtn.classList.add("off");

  }
};
  function getWinLine(r, c, player){
  const dirs = [
    [1,0], [0,1], [1,1], [1,-1]
  ];

  for(let [dr,dc] of dirs){
    let line = [[r,c]];

    // đi 1 phía
    let i = r+dr, j = c+dc;
    while(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]===player){
      line.push([i,j]);
      i+=dr; j+=dc;
    }

    // đi phía ngược lại
    i = r-dr; j = c-dc;
    while(i>=0 && i<SIZE && j>=0 && j<SIZE && board[i][j]===player){
      line.unshift([i,j]);
      i-=dr; j-=dc;
    }

    if(line.length >= 5){
      return line.slice(0,5); // chỉ lấy đúng 5 ô
    }
  }

  return null;
}
  

  function highlightWinCells(line){
  line.forEach(([r,c])=>{
    const cell = cells[r][c];
    cell.classList.add("win");
  });
}
