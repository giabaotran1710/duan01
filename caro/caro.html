<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Caro vs Máy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:#0f172a;
  color:white;
}

#board{
  display:grid;
  grid-template-columns: repeat(20, 4.5vw);
  justify-content:center;
  margin:20px auto;
}

.cell{
  width:4.5vw;
  height:4.5vw;
  max-width:28px;
  max-height:28px;
  border:1px solid #555;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:14px;
  box-sizing:border-box;
}

.cell:hover{ background:#1e3a8a; }

.X{ color:#00d4ff; font-weight:bold; }
.O{ color:#ff4d4d; font-weight:bold; }

.last{ background:#444 !important; }

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#dice{ font-size:50px; margin-top:20px; }

button{
  padding:10px 20px;
  background:#0188ff;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

#status{
  font-size:20px;
  margin-top:10px;
}

.show{
  animation: slideUp 0.5s ease;
}

@keyframes slideUp{
  from{ transform:translateY(40px); opacity:0; }
  to{ transform:translateY(0); opacity:1; }
}
</style>
</head>

<body>

<h2>🤖 Caro vs Máy</h2>
<div id="statusTop">Đang chờ...</div>
<div id="board"></div>
<button onclick="resetGame()">Chơi lại</button>

<div id="overlay">
  <button onclick="startGame()">🎲 BẮT ĐẦU</button>
  <div id="dice"></div>
  <div id="status">Tung xúc xắc để xem ai đi trước</div>
</div>

<script>
const SIZE = 20;

let board = [];
let cells = [];
let gameOver = false;
let lastCell = null;

let human = "X";
let ai = "O";
let currentTurn = "X";

const boardDiv = document.getElementById("board");
const statusOverlay = document.getElementById("status");
const statusTop = document.getElementById("statusTop");
const overlay = document.getElementById("overlay");

// ===== STATUS =====
function showStatus(text){
  statusOverlay.textContent = text;
  statusOverlay.classList.remove("show");
  void statusOverlay.offsetWidth;
  statusOverlay.classList.add("show");
}

// ===== BOARD =====
function createBoard(){
  board = [];
  cells = [];
  boardDiv.innerHTML = "";

  for(let r=0;r<SIZE;r++){
    board[r]=[];
    cells[r]=[];

    for(let c=0;c<SIZE;c++){
      board[r][c]="";

      const cell=document.createElement("div");
      cell.className="cell";
      cell.onclick=()=>playerMove(r,c);

      boardDiv.appendChild(cell);
      cells[r][c]=cell;
    }
  }
}

// ===== UTILS =====
function getEmptyCells(){
  let arr=[];
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c]==="") arr.push([r,c]);
    }
  }
  return arr;
}

function hasNeighbor(r,c){
  for(let dr=-1;dr<=1;dr++){
    for(let dc=-1;dc<=1;dc++){
      let nr=r+dr, nc=c+dc;
      if(nr>=0 && nr<SIZE && nc>=0 && nc<SIZE){
        if(board[nr][nc] !== "") return true;
      }
    }
  }
  return false;
}

// ===== START =====
function startGame(){
  let faces=["X","X","X","O","O","O"];
  let dice=document.getElementById("dice");

  let interval=setInterval(()=>{
    dice.textContent=faces[Math.floor(Math.random()*6)];
  },100);

  setTimeout(()=>{
    clearInterval(interval);

    let result=faces[Math.floor(Math.random()*6)];
    dice.textContent=result;

    if(result==="X"){
      human="X";
      ai="O";
      currentTurn="X";
      showStatus("Bạn đi trước (X)");
      statusTop.textContent="Lượt của bạn (X)";
    }else{
      human="O";
      ai="X";
      currentTurn="X";
      showStatus("Máy đi trước (X)");
      statusTop.textContent="🤖 Máy đang đi...";
    }

    setTimeout(()=>{
      overlay.style.display="none";

      if(currentTurn === ai){
        setTimeout(aiMove,300);
      }
    },800);

  },3000);
}
function place(r,c,player){
  board[r][c] = player;

  const cell = cells[r][c];
  cell.textContent = player;
  cell.classList.add(player);

  if(lastCell) lastCell.classList.remove("last");
  cell.classList.add("last");
  lastCell = cell;
}

// ===== PLAYER =====
function playerMove(r,c){
  if(gameOver || board[r][c]!=="" || currentTurn!==human) return;

  place(r,c,human);
  currentTurn=ai;

  if(checkWin(r,c,human)){
    statusTop.textContent="🎉 Bạn thắng!";
    gameOver=true;
    return;
  }

  statusTop.textContent="🤖 Máy đang nghĩ...";
  setTimeout(aiMove,300);
}

// ===== AI =====
function aiMove(){
  if(gameOver || currentTurn!==ai) return;

  let move=smartAI(ai);

  if(!move || board[move[0]][move[1]]!==""){
    let empty=getEmptyCells();
    if(empty.length===0) return;
    move=empty[Math.floor(Math.random()*empty.length)];
  }

  const[r,c]=move;
  place(r,c,ai);
  currentTurn=human;

  if(checkWin(r,c,ai)){
    statusTop.textContent="🤖 Máy thắng!";
    gameOver=true;
    return;
  }

  statusTop.textContent="Lượt của bạn ("+human+")";
}

// ===== SMART AI =====
function smartAI(player){
  let enemy=player==="X"?"O":"X";

  let move=findWin(player);
  if(move) return move;

  move=findWin(enemy);
  if(move) return move;

  let bestScore=-Infinity;
  let bestMove=null;

  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c]!=="") continue;
      if(!hasNeighbor(r,c)) continue;

      let score=
        evaluate(r,c,player)+
        evaluate(r,c,enemy)*0.9;

      if(score>bestScore){
        bestScore=score;
        bestMove=[r,c];
      }
    }
  }

  if(!bestMove){
    let empty=getEmptyCells();
    return empty[Math.floor(Math.random()*empty.length)];
  }

  return bestMove;
}

// ===== EVALUATE =====
function evaluate(r,c,player){
  return (
    scoreDirection(r,c,1,0,player)+
    scoreDirection(r,c,0,1,player)+
    scoreDirection(r,c,1,1,player)+
    scoreDirection(r,c,1,-1,player)
  );
}

function scoreDirection(r,c,dr,dc,player){
  let count=1, open=0;

  let i=r+dr,j=c+dc;
  while(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]===player){
    count++; i+=dr; j+=dc;
  }
  if(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]==="") open++;

  i=r-dr; j=c-dc;
  while(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]===player){
    count++; i-=dr; j-=dc;
  }
  if(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]==="") open++;

  return getScore(count,open);
}

function getScore(count,open){
  if(count>=5) return 100000;
  if(count===4) return open===2?10000:1000;
  if(count===3) return open===2?500:100;
  if(count===2) return open===2?50:10;
  return 1;
}

// ===== WIN =====
function checkWin(r,c,player){
  return (
    count(r,c,1,0,player)+count(r,c,-1,0,player)>=4 ||
    count(r,c,0,1,player)+count(r,c,0,-1,player)>=4 ||
    count(r,c,1,1,player)+count(r,c,-1,-1,player)>=4 ||
    count(r,c,1,-1,player)+count(r,c,-1,1,player)>=4
  );
}

function count(r,c,dr,dc,player){
  let i=r+dr,j=c+dc,cnt=0;
  while(i>=0&&i<SIZE&&j>=0&&j<SIZE&&board[i][j]===player){
    cnt++; i+=dr; j+=dc;
  }
  return cnt;
}

function findWin(player){
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c]!=="") continue;

      board[r][c]=player;
      if(checkWin(r,c,player)){
        board[r][c]="";
        return [r,c];
      }
      board[r][c]="";
    }
  }
  return null;
}

// ===== RESET =====
function resetGame(){
  gameOver=false;
  lastCell=null;
  human="X";
  ai="O";
  currentTurn="X";

  createBoard();

  statusTop.textContent="Đang chờ...";
  statusOverlay.textContent="Tung xúc xắc để xem ai đánh trước";
  document.getElementById("dice").textContent="";
  overlay.style.display="flex";
}

// INIT
createBoard();
</script>

</body>
</html>
