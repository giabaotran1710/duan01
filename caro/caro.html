<script>
// ==================== THAM SỐ ====================
const SIZE = 15;
const MAX_DEPTH = 20;
const TIME_LIMIT = 1500;
const CANDIDATE_LIMIT = 30; // tăng ứng viên
const QUIESCENCE_DEPTH = 4;

let board = [];
let cells = [];
let gameOver = false;
let lastCell = null;
let human = "X", ai = "O", currentTurn = "X";
let aiThinking = false, pvpMode = false;
let moveHistory = [];
let canUndo = false, undoUsed = false, undoLeft = 3, maxUndo = 3;
let playerStartTime = 0;
let drawMilestones = new Set();

const boardDiv = document.getElementById("board");
const statusOverlay = document.getElementById("status");
const statusTop = document.getElementById("statusTop");
const overlay = document.getElementById("overlay");
const commentaryDiv = document.getElementById("commentary");
const resetBtn = document.getElementById("btnReset");
const btnUndo = document.getElementById("btnUndo");
const diceContainer = document.getElementById("dice-container");
const diceEl = document.getElementById("dice");
const drawPopup = document.getElementById("draw-popup");
const btnDrawAccept = document.getElementById("btn-draw-accept");
const btnDrawReject = document.getElementById("btn-draw-reject");

// ==================== ZOBRIST HASHING ====================
const zobristTable = (() => {
  const t = [];
  for (let r = 0; r < SIZE; r++) {
    t[r] = [];
    for (let c = 0; c < SIZE; c++) {
      t[r][c] = { X: Math.floor(Math.random() * 2 ** 30), O: Math.floor(Math.random() * 2 ** 30) };
    }
  }
  return t;
})();
let boardHash = 0;

// ==================== BẢNG CHUYỂN VỊ ====================
const TT = new Map();
const FLAG_EXACT = 0, FLAG_LOWERBOUND = 1, FLAG_UPPERBOUND = 2;

// ==================== KILLER & HISTORY HEURISTIC ====================
const killerMoves = Array(MAX_DEPTH + 1).fill(null).map(() => [null, null]);
const historyTable = new Map();

// ==================== ĐÁNH GIÁ ====================
const WEIGHTS = {
  FIVE: 1000000, OPEN_FOUR: 100000, FOUR_ONE: 10000,
  OPEN_THREE: 10000, THREE_ONE: 1000, OPEN_TWO: 500,
  TWO_ONE: 100, OPEN_ONE: 20
};

function getSequenceScore(len, openEnds) {
  if (len >= 5) return WEIGHTS.FIVE;
  if (len === 4 && openEnds === 2) return WEIGHTS.OPEN_FOUR;
  if (len === 4 && openEnds === 1) return WEIGHTS.FOUR_ONE;
  if (len === 3 && openEnds === 2) return WEIGHTS.OPEN_THREE;
  if (len === 3 && openEnds === 1) return WEIGHTS.THREE_ONE;
  if (len === 2 && openEnds === 2) return WEIGHTS.OPEN_TWO;
  if (len === 2 && openEnds === 1) return WEIGHTS.TWO_ONE;
  if (len === 1 && openEnds === 2) return WEIGHTS.OPEN_ONE;
  return 0;
}

function scoreCell(r, c, player) {
  if (board[r][c] !== "") return 0;
  board[r][c] = player;
  let s = scoreDirection(r, c, 1, 0, player) + scoreDirection(r, c, 0, 1, player) +
          scoreDirection(r, c, 1, 1, player) + scoreDirection(r, c, 1, -1, player);
  board[r][c] = "";
  return s;
}

function evaluateCell(r, c, player) {
  if (board[r][c] !== player) return 0;
  return scoreDirection(r, c, 1, 0, player) + scoreDirection(r, c, 0, 1, player) +
         scoreDirection(r, c, 1, 1, player) + scoreDirection(r, c, 1, -1, player);
}

function scoreDirection(r, c, dr, dc, player) {
  let count = 1, open = 0;
  let i = r + dr, j = c + dc;
  while (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === player) { count++; i += dr; j += dc; }
  if (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === "") open++;
  i = r - dr; j = c - dc;
  while (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === player) { count++; i -= dr; j -= dc; }
  if (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === "") open++;
  return getSequenceScore(count, open);
}

function evaluateBoard(player) {
  let score = 0;
  const enemy = player === "X" ? "O" : "X";
  const dirs = [[1, 0], [0, 1], [1, 1], [1, -1]];
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c] === "") continue;
      const current = board[r][c];
      for (const [dr, dc] of dirs) {
        const pr = r - dr, pc = c - dc;
        if (pr >= 0 && pr < SIZE && pc >= 0 && pc < SIZE && board[pr][pc] === current) continue;
        let len = 0, openEnds = 0;
        let cr = r, cc = c;
        while (cr >= 0 && cr < SIZE && cc >= 0 && cc < SIZE && board[cr][cc] === current) { len++; cr += dr; cc += dc; }
        if (cr >= 0 && cr < SIZE && cc >= 0 && cc < SIZE && board[cr][cc] === "") openEnds++;
        const br = r - dr, bc = c - dc;
        if (br >= 0 && br < SIZE && bc >= 0 && bc < SIZE && board[br][bc] === "") openEnds++;
        const seqScore = getSequenceScore(len, openEnds);
        if (current === player) score += seqScore; else score -= seqScore;
      }
    }
  }
  const aiFork = countForks(player);
  const humanFork = countForks(enemy);
  score += aiFork * 50000;
  score -= humanFork * 60000;
  return score;
}

function countForks(player) {
  let forkCount = 0;
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c] !== "") continue;
      let openThrees = 0;
      for (const [dr, dc] of dirs) {
        if (isOpenThreeAt(r, c, dr, dc, player)) openThrees++;
      }
      if (openThrees >= 2) forkCount++;
    }
  }
  return forkCount;
}

function isOpenThreeAt(r, c, dr, dc, player) {
  board[r][c] = player;
  let len = 1, openEnds = 0;
  let i = r + dr, j = c + dc;
  while (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === player) { len++; i += dr; j += dc; }
  if (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === "") openEnds++;
  i = r - dr; j = c - dc;
  while (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === player) { len++; i -= dr; j -= dc; }
  if (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === "") openEnds++;
  board[r][c] = "";
  return len === 3 && openEnds === 2;
}

// ==================== NƯỚC ỨNG VIÊN (CẢI TIẾN BÁM SÁT) ====================
function hasNeighbor2(r, c) {
  for (let dr = -2; dr <= 2; dr++) {
    for (let dc = -2; dc <= 2; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] !== "") return true;
    }
  }
  return false;
}

function getCandidateMoves() {
  let moves = [];
  const occupied = getOccupiedCount();

  if (occupied < 6) {
    // Giai đoạn khai cuộc: lấy mọi ô trống trong phạm vi 2 của bất kỳ quân nào, ưu tiên gần đối thủ
    const enemyPositions = [];
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] === human) enemyPositions.push([r, c]);
        else if (board[r][c] === ai) enemyPositions.push([r, c]); // cũng xét cả quân mình để bám
      }
    }
    const candidateSet = new Set();
    for (const [er, ec] of enemyPositions) {
      for (let dr = -2; dr <= 2; dr++) {
        for (let dc = -2; dc <= 2; dc++) {
          const nr = er + dr, nc = ec + dc;
          if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === "") {
            candidateSet.add(`${nr},${nc}`);
          }
        }
      }
    }
    moves = Array.from(candidateSet).map(s => s.split(',').map(Number));
  } else {
    // Giai đoạn sau: dùng hasNeighbor2 như cũ
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] !== "" || !hasNeighbor2(r, c)) continue;
        moves.push([r, c]);
      }
    }
  }

  const scored = moves.map(([r, c]) => {
    const atk = scoreCell(r, c, ai);
    const def = scoreCell(r, c, human);
    return { move: [r, c], score: Math.max(atk, def * 1.3) }; // tăng trọng số phòng thủ
  });
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, CANDIDATE_LIMIT).map(item => item.move);
}

// ==================== CHIẾN THUẬT CƠ BẢN ====================
function findWin(player) {
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c] !== "") continue;
      board[r][c] = player;
      if (checkWin(r, c, player)) { board[r][c] = ""; return [r, c]; }
      board[r][c] = "";
    }
  }
  return null;
}

function isOpenFour(r, c, player) {
  const dirs = [[1, 0], [0, 1], [1, 1], [1, -1]];
  for (const [dr, dc] of dirs) {
    let cnt = 1, openEnds = 0;
    let i = r + dr, j = c + dc;
    while (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === player) { cnt++; i += dr; j += dc; }
    if (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === "") openEnds++;
    i = r - dr; j = c - dc;
    while (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === player) { cnt++; i -= dr; j -= dc; }
    if (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === "") openEnds++;
    if (cnt === 4 && openEnds === 2) return true;
  }
  return false;
}

function findOpenFour(player) {
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c] !== "") continue;
      board[r][c] = player;
      if (isOpenFour(r, c, player)) { board[r][c] = ""; return [r, c]; }
      board[r][c] = "";
    }
  }
  return null;
}

function countThreats(r, c, player) {
  if (board[r][c] !== "") return 0;
  board[r][c] = player;
  let threats = 0;
  const dirs = [[1, 0], [0, 1], [1, 1], [1, -1]];
  for (const [dr, dc] of dirs) {
    const val = scoreDirection(r, c, dr, dc, player);
    if (val >= WEIGHTS.OPEN_THREE) threats++;
  }
  board[r][c] = "";
  return threats;
}

function findDoubleThreat(player) {
  let best = null, bestScore = 0;
  for (const [r, c] of getCandidateMoves()) {
    if (board[r][c] !== "") continue;
    const t = countThreats(r, c, player);
    if (t >= 2 && t > bestScore) { bestScore = t; best = [r, c]; }
  }
  return best;
}

// ==================== KIỂM TRA THẮNG ====================
function checkWin(r, c, player) {
  return (
    count(r, c, 1, 0, player) + count(r, c, -1, 0, player) >= 4 ||
    count(r, c, 0, 1, player) + count(r, c, 0, -1, player) >= 4 ||
    count(r, c, 1, 1, player) + count(r, c, -1, -1, player) >= 4 ||
    count(r, c, 1, -1, player) + count(r, c, -1, 1, player) >= 4
  );
}

function count(r, c, dr, dc, player) {
  let i = r + dr, j = c + dc, cnt = 0;
  while (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === player) { cnt++; i += dr; j += dc; }
  return cnt;
}

// ==================== QUIESCENCE SEARCH ====================
function quiescence(alpha, beta, isMaximizing, player, depth) {
  const enemy = player === "X" ? "O" : "X";
  if (depth <= 0 || Date.now() - startTime > TIME_LIMIT) {
    return isMaximizing ? evaluateBoard(player) : -evaluateBoard(enemy);
  }
  const standPat = isMaximizing ? evaluateBoard(player) : -evaluateBoard(enemy);
  if (isMaximizing) {
    if (standPat >= beta) return beta;
    if (standPat > alpha) alpha = standPat;
  } else {
    if (standPat <= alpha) return alpha;
    if (standPat < beta) beta = standPat;
  }
  const candidates = [];
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c] !== "" || !hasNeighbor2(r, c)) continue;
      const atk = scoreCell(r, c, isMaximizing ? player : enemy);
      const def = scoreCell(r, c, isMaximizing ? enemy : player);
      if (atk >= WEIGHTS.OPEN_FOUR || def >= WEIGHTS.OPEN_FOUR) candidates.push([r, c]);
    }
  }
  if (candidates.length === 0) return standPat;
  candidates.sort((a, b) => {
    const sa = Math.max(scoreCell(a[0], a[1], player), scoreCell(a[0], a[1], enemy));
    const sb = Math.max(scoreCell(b[0], b[1], player), scoreCell(b[0], b[1], enemy));
    return sb - sa;
  });
  for (const [r, c] of candidates) {
    const currentPlayer = isMaximizing ? player : enemy;
    board[r][c] = currentPlayer;
    boardHash ^= zobristTable[r][c][currentPlayer];
    const score = quiescence(alpha, beta, !isMaximizing, player, depth - 1);
    board[r][c] = "";
    boardHash ^= zobristTable[r][c][currentPlayer];
    if (isMaximizing) {
      if (score >= beta) return beta;
      if (score > alpha) alpha = score;
    } else {
      if (score <= alpha) return alpha;
      if (score < beta) beta = score;
    }
  }
  return isMaximizing ? alpha : beta;
}

// ==================== MINIMAX + ID + TIME ====================
let startTime = 0;
let bestMoveGlobal = null;

function getBestMove() {
  try {
    if (getOccupiedCount() === 0) return [Math.floor(SIZE / 2), Math.floor(SIZE / 2)];
    let move;
    move = findWin(ai); if (move) return move;
    move = findWin(human); if (move) return move;
    move = findOpenFour(ai); if (move) return move;
    move = findOpenFour(human); if (move) return move;
    move = findDoubleThreat(ai); if (move) return move;
    move = findDoubleThreat(human); if (move) return move;
    startTime = Date.now();
    bestMoveGlobal = null;
    TT.clear();
    killerMoves.forEach(arr => arr.fill(null));
    historyTable.clear();
    let currentDepth = 1;
    while (currentDepth <= MAX_DEPTH) {
      if (Date.now() - startTime > TIME_LIMIT) break;
      let bestScore = -Infinity;
      let tempBest = null;
      const candidates = getCandidateMoves();
      orderMoves(candidates, ai, 0);
      for (const [r, c] of candidates) {
        if (board[r][c] !== "") continue;
        board[r][c] = ai;
        boardHash ^= zobristTable[r][c][ai];
        const score = minimax(currentDepth - 1, false, ai, -Infinity, Infinity, 0);
        board[r][c] = "";
        boardHash ^= zobristTable[r][c][ai];
        if (score > bestScore) { bestScore = score; tempBest = [r, c]; }
        if (Date.now() - startTime > TIME_LIMIT) break;
      }
      if (tempBest && (Date.now() - startTime <= TIME_LIMIT || currentDepth === 1)) {
        bestMoveGlobal = tempBest;
      }
      currentDepth++;
    }
    if (!bestMoveGlobal) {
      const empty = getEmptyCells().filter(([r, c]) => hasNeighbor2(r, c));
      return empty.length > 0 ? empty[0] : [Math.floor(SIZE / 2), Math.floor(SIZE / 2)];
    }
    return bestMoveGlobal;
  } catch (e) {
    console.error("Lỗi trong getBestMove:", e);
    const empty = getEmptyCells().filter(([r, c]) => hasNeighbor2(r, c));
    return empty.length > 0 ? empty[0] : [Math.floor(SIZE / 2), Math.floor(SIZE / 2)];
  }
}

function orderMoves(moves, player, depth) {
  moves.forEach(([r, c], index) => {
    let priority = 0;
    if (scoreCell(r, c, ai) >= WEIGHTS.FIVE) priority += 20000;
    if (scoreCell(r, c, human) >= WEIGHTS.FIVE) priority += 18000;
    if (isOpenFour(r, c, ai)) priority += 15000;
    if (isOpenFour(r, c, human)) priority += 14000;
    const ttEntry = TT.get(boardHash);
    if (ttEntry && ttEntry.bestMove && ttEntry.bestMove[0] === r && ttEntry.bestMove[1] === c) priority += 10000;
    if (killerMoves[depth]) {
      if (killerMoves[depth][0] && killerMoves[depth][0][0] === r && killerMoves[depth][0][1] === c) priority += 5000;
      if (killerMoves[depth][1] && killerMoves[depth][1][0] === r && killerMoves[depth][1][1] === c) priority += 3000;
    }
    const key = `${r},${c},${player}`;
    priority += (historyTable.get(key) || 0);
    moves[index].priority = priority;
  });
  moves.sort((a, b) => b.priority - a.priority);
  moves.forEach(m => delete m.priority);
}

function minimax(depth, isMaximizing, player, alpha, beta, qDepth) {
  const enemy = player === "X" ? "O" : "X";
  const winner = checkWinnerGlobal();
  if (winner === player) return 900000 + depth * 1000;
  if (winner === enemy) return -900000 - depth * 1000;
  if (depth === 0) return quiescence(alpha, beta, isMaximizing, player, QUIESCENCE_DEPTH);
  const ttEntry = TT.get(boardHash);
  if (ttEntry && ttEntry.depth >= depth) {
    if (ttEntry.flag === FLAG_EXACT) return ttEntry.score;
    if (ttEntry.flag === FLAG_LOWERBOUND && ttEntry.score > alpha) alpha = ttEntry.score;
    if (ttEntry.flag === FLAG_UPPERBOUND && ttEntry.score < beta) beta = ttEntry.score;
    if (alpha >= beta) return ttEntry.score;
  }
  const candidates = getCandidateMoves();
  if (candidates.length === 0) return evaluateBoard(player);
  const currentPlayer = isMaximizing ? player : enemy;
  orderMoves(candidates, currentPlayer, depth);
  let bestScore = isMaximizing ? -Infinity : Infinity;
  let bestMove = null;
  let flag = FLAG_EXACT;
  for (const [r, c] of candidates) {
    if (board[r][c] !== "") continue;
    board[r][c] = currentPlayer;
    boardHash ^= zobristTable[r][c][currentPlayer];
    const score = minimax(depth - 1, !isMaximizing, player, alpha, beta, qDepth + 1);
    board[r][c] = "";
    boardHash ^= zobristTable[r][c][currentPlayer];
    if (isMaximizing) {
      if (score > bestScore) { bestScore = score; bestMove = [r, c]; }
      alpha = Math.max(alpha, score);
    } else {
      if (score < bestScore) { bestScore = score; bestMove = [r, c]; }
      beta = Math.min(beta, score);
    }
    if (alpha >= beta) {
      const ki = depth;
      if (killerMoves[ki]) {
        if (!killerMoves[ki][0] || (killerMoves[ki][0][0] !== r || killerMoves[ki][0][1] !== c)) {
          killerMoves[ki][1] = killerMoves[ki][0];
          killerMoves[ki][0] = [r, c];
        }
      }
      const key = `${r},${c},${currentPlayer}`;
      historyTable.set(key, (historyTable.get(key) || 0) + depth * depth);
      flag = isMaximizing ? FLAG_LOWERBOUND : FLAG_UPPERBOUND;
      break;
    }
  }
  TT.set(boardHash, { depth, score: bestScore, flag, bestMove });
  return bestScore;
}

function checkWinnerGlobal() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (board[r][c] !== "" && checkWin(r, c, board[r][c])) return board[r][c];
  return null;
}

// ==================== HỖ TRỢ ====================
function getOccupiedCount() {
  let cnt = 0;
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (board[r][c] !== "") cnt++;
  return cnt;
}

function getEmptyCells() {
  const arr = [];
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (board[r][c] === "") arr.push([r, c]);
  return arr;
}

// ==================== GIAO DIỆN ====================
function createBoard() {
  board = [];
  cells = [];
  boardDiv.innerHTML = "";
  for (let r = 0; r < SIZE; r++) {
    board[r] = [];
    cells[r] = [];
    for (let c = 0; c < SIZE; c++) {
      board[r][c] = "";
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.onclick = () => playerMove(r, c);
      boardDiv.appendChild(cell);
      cells[r][c] = cell;
    }
  }
  boardDiv.classList.remove("disabled");
}

function place(r, c, player) {
  board[r][c] = player;
  moveHistory.push([r, c, player]);
  const cell = cells[r][c];
  cell.textContent = player;
  cell.classList.add(player);
  if (lastCell) lastCell.classList.remove("last");
  cell.classList.add("last");
  lastCell = cell;
  try { showComment(r, c, player); } catch (e) {}
  updateScore();
}

function highlightWin(r, c, player) {
  const dirs = [[1, 0], [0, 1], [1, 1], [1, -1]];
  for (const [dr, dc] of dirs) {
    let line = [[r, c]];
    let i = r + dr, j = c + dc;
    while (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === player) { line.push([i, j]); i += dr; j += dc; }
    i = r - dr; j = c - dc;
    while (i >= 0 && i < SIZE && j >= 0 && j < SIZE && board[i][j] === player) { line.push([i, j]); i -= dr; j -= dc; }
    if (line.length >= 5) { line.forEach(([row, col]) => cells[row][col].classList.add("win-cell")); return; }
  }
}

function playerMove(r, c) {
  if (gameOver || board[r][c] !== "") return;
  if (pvpMode) {
    if (currentTurn !== "X" && currentTurn !== "O") return;
    const player = currentTurn;
    place(r, c, player);
    canUndo = true; undoUsed = false; updateUndoButton();
    if (checkWin(r, c, player)) {
      highlightWin(r, c, player);
      statusTop.textContent = `🎉 ${player} thắng!`; statusTop.classList.add("win");
      resetBtn.textContent = "Ván mới"; launchConfetti(); gameOver = true; updateUndoButton();
      boardDiv.classList.remove("disabled");
      return;
    }
    currentTurn = player === "X" ? "O" : "X";
    setStatus("pvp-" + currentTurn);
    return;
  }
  if (currentTurn !== human) return;
  place(r, c, human);
  canUndo = true; undoUsed = false; updateUndoButton();
  currentTurn = ai;
  if (checkWin(r, c, human)) {
    highlightWin(r, c, human);
    statusTop.textContent = "🎉 Người chơi thắng!"; statusTop.classList.add("win");
    resetBtn.textContent = "Ván mới"; launchConfetti(); gameOver = true; updateUndoButton();
    boardDiv.classList.remove("disabled");
    return;
  }
  setStatus("ai-thinking");
  boardDiv.classList.add("disabled");
  setTimeout(aiMove, 50);
}

function aiMove() {
  if (gameOver || currentTurn !== ai || aiThinking) return;
  aiThinking = true;
  const move = getBestMove();
  if (!move) { aiThinking = false; boardDiv.classList.remove("disabled"); return; }
  const [r, c] = move;
  place(r, c, ai);
  if (checkWin(r, c, ai)) {
    highlightWin(r, c, ai);
    statusTop.textContent = "🤖 AI.GiaBao thắng!"; statusTop.classList.add("win");
    resetBtn.textContent = "Chơi lại"; launchConfetti(); gameOver = true; aiThinking = false; updateUndoButton();
    boardDiv.classList.remove("disabled");
    return;
  }
  currentTurn = human;
  setStatus("your-turn");
  playerStartTime = Date.now();
  aiThinking = false;
  boardDiv.classList.remove("disabled");

  const total = getOccupiedCount();
  if ([100, 150, 175].includes(total) && !drawMilestones.has(total)) {
    drawMilestones.add(total);
    offerDraw();
  }
}

}

function undoMove() {
  if (gameOver) return;
  if (pvpMode) {
    if (moveHistory.length === 0) return;
    const last = moveHistory.pop();
    const [r, c] = last;
    board[r][c] = ""; cells[r][c].textContent = ""; cells[r][c].classList.remove("X", "O", "last", "win-cell");
    if (moveHistory.length > 0) { lastCell = cells[moveHistory[moveHistory.length-1][0]][moveHistory[moveHistory.length-1][1]]; lastCell.classList.add("last"); }
    else lastCell = null;
    currentTurn = currentTurn === "X" ? "O" : "X";
    setStatus("pvp-" + currentTurn);
    updateScore(); updateUndoButton();
  } else {
    if (undoLeft <= 0) { document.getElementById("undolimit").textContent = "Người chơi đã sử dụng hết lượt"; updateUndoButton(); return; }
    if (moveHistory.length < 2) return;
    const lastAI = moveHistory.pop();
    board[lastAI[0]][lastAI[1]] = ""; cells[lastAI[0]][lastAI[1]].textContent = ""; cells[lastAI[0]][lastAI[1]].classList.remove("X", "O", "last", "win-cell");
    const lastHuman = moveHistory.pop();
    board[lastHuman[0]][lastHuman[1]] = ""; cells[lastHuman[0]][lastHuman[1]].textContent = ""; cells[lastHuman[0]][lastHuman[1]].classList.remove("X", "O", "last", "win-cell");
    if (moveHistory.length > 0) { lastCell = cells[moveHistory[moveHistory.length-1][0]][moveHistory[moveHistory.length-1][1]]; lastCell.classList.add("last"); }
    else lastCell = null;
    undoLeft--; undoUsed = true;
    currentTurn = human; boardDiv.classList.remove("disabled");
    setStatus("your-turn"); commentaryDiv.textContent = "↩️ Người chơi vừa hoàn tác";
    updateUndoUI(); updateScore(); updateUndoButton();
  }
}

function updateUndoButton() {
  let active = false;
  if (pvpMode) active = !gameOver && moveHistory.length > 0;
  else active = !gameOver && !undoUsed && canUndo && getOccupiedCount() >= 10 && undoLeft > 0;
  btnUndo.disabled = !active;
  btnUndo.classList.toggle("active", active);
}

function updateUndoUI() {
  const div = document.getElementById("undolimit");
  if (pvpMode) div.style.display = "none";
  else { div.style.display = "block"; div.textContent = `Số lần còn: ${undoLeft}/${maxUndo}`; }
}

function updateScore() {
  let scoreX = 0, scoreO = 0;
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c] === "X") scoreX += evaluateCell(r, c, "X");
      if (board[r][c] === "O") scoreO += evaluateCell(r, c, "O");
    }
  }
  const total = scoreX + scoreO;
  let percentX = 50, percentO = 50;
  if (total > 0) {
    percentX = Math.round(scoreX / total * 100);
    percentO = 100 - percentX;
  }
  document.getElementById("scoreX").style.width = percentX + "%";
  document.getElementById("scoreO").style.width = percentO + "%";
  document.getElementById("textX").textContent = scoreX;
  document.getElementById("textO").textContent = scoreO;
}

  createBoard();

  const result = Math.random() < 0.5 ? "X" : "O";
  const faces = result === "X" ? xFaces : oFaces;
  const chosenFace = faces[Math.floor(Math.random() * faces.length)];
  const base = faceTransformsToFront[chosenFace];
  let baseRx = base.rx, baseRy = base.ry;
  const extraTurnsX = (Math.floor(Math.random() * 4) + 2) * 360;
  const extraTurnsY = (Math.floor(Math.random() * 4) + 2) * 360;
  const finalRx = baseRx + extraTurnsX;
  const finalRy = baseRy + extraTurnsY;
  const finalTransform = `rotateX(${finalRx}deg) rotateY(${finalRy}deg)`;

  diceEl.style.transition = "none";
  diceEl.style.transform = "rotateX(0deg) rotateY(0deg)";
  diceEl.offsetHeight;
  diceEl.style.transition = "transform 3s cubic-bezier(0.25, 0.1, 0.25, 1)";
  diceEl.style.transform = finalTransform;
  diceContainer.classList.add("bounce");

  setTimeout(() => {
    diceContainer.classList.remove("bounce");
    diceEl.style.transition = "none";
    diceEl.style.transform = finalTransform;

    if (result === "X") {
      human = "X"; ai = "O"; currentTurn = "X"; playerStartTime = Date.now();
      showStatus("Người chơi được đánh trước");
      setStatus("your-turn");
      commentaryDiv.textContent = "Có vẻ như bạn là một cao thủ";
    } else {
      human = "O"; ai = "X"; currentTurn = "X";
      showStatus("Người chơi được đánh sau");
      statusTop.textContent = "🤖 AI.GiaBao đang đi...";
      commentaryDiv.textContent = "Nói trước. Tôi sẽ không nhường đâu!";
    }
    setTimeout(() => {
      overlay.style.display = "none";
      boardDiv.classList.remove("disabled");
      if (currentTurn === ai) setTimeout(aiMove, 200);
    }, 1000);
  }, 3500);
}

function resetGame() {
  gameOver = false; lastCell = null;
  human = "X"; ai = "O"; currentTurn = "X";
  playerStartTime = 0; boardHash = 0; TT.clear();
  moveHistory = []; canUndo = false; undoUsed = false; pvpMode = false;
  drawMilestones.clear();
  drawPopup.style.display = "none";
  createBoard();
  showStatus("Tung xúc xắc để biết ai đi trước");
  statusTop.classList.remove("win");
  statusTop.textContent = "Đang chờ...";
  statusTop.innerHTML = "Đang chờ...";
  diceEl.style.transition = "none";
  diceEl.style.transform = "rotateX(0deg) rotateY(0deg)";
  diceContainer.classList.remove("bounce");
  document.getElementById("undolimit").style.display = "block";
  overlay.style.display = "flex";
  document.getElementById("startBtn").style.display = "inline-block";
  document.getElementById("pvpBtn").style.display = "inline-block";
  commentaryDiv.textContent = "Người chơi đã ấn chơi lại";
  resetBtn.textContent = "Chơi lại";
  undoLeft = maxUndo; updateUndoUI(); updateScore();
  aiThinking = false;
  boardDiv.classList.remove("disabled");
}

// ==================== CONFETTI ====================
const canvas = document.getElementById("confettiCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let confetti = [];
function randomColor() { return ["#ff4d4d","#00d4ff","#00ff88","#ffd700","#ff00ff","#ff8800","#ffffff","#a855f7"][Math.floor(Math.random()*8)]; }
function launchConfetti() {
  confetti = [];
  for (let i = 0; i < 200; i++) {
    const fromLeft = Math.random() < 0.5;
    confetti.push({
      x: fromLeft ? 0 : canvas.width, y: canvas.height,
      vx: (Math.random() * 6 + 2) * (fromLeft ? 1 : -1), vy: -(Math.random() * 7 + 3),
      gravity: 0.05, size: Math.random() * 9 + 2, color: randomColor(),
      angle: Math.random() * 360, spin: Math.random() * 15 - 5,
      shape: Math.random() < 0.5 ? "rect" : "line"
    });
  }
  animateConfetti();
}
function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  confetti.forEach(p => {
    p.vx *= 0.985; p.vy += p.gravity; p.x += p.vx; p.y += p.vy; p.angle += p.spin;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle * Math.PI / 180); ctx.fillStyle = p.color;
    if (p.shape === "rect") ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
    else ctx.fillRect(-p.size/2, -p.size/2, p.size * 0.2, p.size * 1.5);
    ctx.restore();
  });
  confetti = confetti.filter(p => p.y < canvas.height + 20);
  if (confetti.length > 0) requestAnimationFrame(animateConfetti);
}

// Khởi tạo
createBoard();
updateUndoButton();
