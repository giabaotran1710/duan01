<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trò Chơi Bóng & Ly</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #ffd700;
  --neon: #00f5ff;
  --pink: #ff3cac;
  --green: #39ff14;
  --red: #ff4444;
  --surface: rgba(255,255,255,0.06);
  --radius: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  background: radial-gradient(ellipse at 30% 20%, #2d0b5a 0%, #0d1a3a 50%, #000a1a 100%);
  font-family: 'Nunito', sans-serif;
  color: #fff;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* STARS */
.stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star {
  position:absolute; border-radius:50%; background:#fff;
  animation: twinkle var(--t) ease-in-out infinite; opacity:0;
}
@keyframes twinkle {
  0%,100% { opacity:0; transform:scale(0.5); }
  50%      { opacity:var(--o); transform:scale(1); }
}

/* PARTICLES */
.particle {
  position:fixed; pointer-events:none; border-radius:50%;
  animation: floatUp 2.5s ease-out forwards; z-index:999;
}
@keyframes floatUp {
  0%   { opacity:1; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-100px) scale(0.3); }
}

/* CONFETTI */
.confetti-piece {
  position:fixed; pointer-events:none; z-index:9999;
  animation: confettiFall 2s ease-in forwards;
}
@keyframes confettiFall {
  0%   { opacity:1; transform:translateY(0) rotate(0deg); }
  100% { opacity:0; transform:translateY(400px) rotate(720deg); }
}

.wrapper {
  position:relative; z-index:1;
  width:min(600px, 97vw);
  padding:20px 16px 40px;
  display:flex; flex-direction:column; align-items:center; gap:20px;
}

/* TITLE */
.game-title {
  font-family:'Boogaloo',cursive;
  font-size:clamp(2.6rem,10vw,4rem);
  line-height:1;
  background:linear-gradient(135deg,var(--gold) 0%,var(--pink) 50%,var(--neon) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 20px rgba(255,215,0,0.5));
  animation:titlePulse 3s ease-in-out infinite;
  text-align:center;
}
@keyframes titlePulse {
  0%,100% { filter:drop-shadow(0 0 20px rgba(255,215,0,0.5)); }
  50%     { filter:drop-shadow(0 0 35px rgba(255,60,172,0.7)); }
}
.title-sub {
  font-size:0.85rem; color:rgba(255,255,255,0.5);
  letter-spacing:3px; text-transform:uppercase; margin-top:4px; text-align:center;
}

/* STATS */
.stats { display:flex; gap:8px; justify-content:center; width:100%; }
.stat-card {
  flex:1;
  background:var(--surface); border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--radius); padding:8px 6px; text-align:center;
  backdrop-filter:blur(10px); position:relative; overflow:hidden;
  min-width:0;
}
.stat-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.stat-label { font-size:0.5rem; color:rgba(255,255,255,0.45); letter-spacing:1.5px; text-transform:uppercase; }
.stat-value { font-size:1.4rem; font-weight:900; color:var(--gold); line-height:1.1; }

/* LIVES HEARTS */
.lives-row { display:flex; gap:2px; justify-content:center; align-items:center; flex-wrap:nowrap; }
.heart { font-size:0.95rem; transition:all 0.3s; line-height:1; }
.heart.lost { filter:grayscale(1) opacity(0.3); transform:scale(0.8); }

/* DIFF BADGE */
.diff-row { display:flex; align-items:center; gap:8px; justify-content:center; }
.diff-badge {
  padding:5px 14px; border-radius:100px; font-size:0.7rem; font-weight:700;
  letter-spacing:1px; text-transform:uppercase; border:1px solid; transition:all 0.3s;
}
.diff-1 { color:#39ff14; border-color:#39ff1433; background:#39ff1410; }
.diff-2 { color:#ffd700; border-color:#ffd70033; background:#ffd70010; }
.diff-3 { color:#ff9500; border-color:#ff950033; background:#ff950010; }
.diff-4 { color:#ff3cac; border-color:#ff3cac33; background:#ff3cac10; }
.diff-5 { color:#00f5ff; border-color:#00f5ff33; background:#00f5ff10;
  animation:neonPulse 1.2s ease-in-out infinite alternate; }
@keyframes neonPulse {
  from { box-shadow:0 0 6px #00f5ff44; }
  to   { box-shadow:0 0 18px #00f5ffaa; }
}

/* STAGE */
.stage {
  width:100%;
  background:linear-gradient(180deg,rgba(255,255,255,0.03) 0%,rgba(0,0,0,0.2) 100%);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px; padding:28px 16px 20px;
  position:relative; overflow:hidden;
  min-height:260px;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
}

.stage::before {
  content:''; position:absolute; top:-40px; left:50%; transform:translateX(-50%);
  width:200px; height:200px;
  background:radial-gradient(circle,rgba(255,220,100,0.12) 0%,transparent 70%);
  pointer-events:none; animation:spotMove 4s ease-in-out infinite;
}
@keyframes spotMove {
  0%,100% { left:30%; }
  50%      { left:70%; }
}

.table-surface {
  width:100%; height:12px;
  background:linear-gradient(180deg,#3a2010 0%,#1a0d06 100%);
  border-radius:6px;
  box-shadow:0 4px 20px rgba(0,0,0,0.6),0 -2px 8px rgba(255,180,50,0.15);
  position:relative;
}
.table-surface::before {
  content:''; position:absolute; top:0; left:5%; right:5%; height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,180,80,0.4),transparent);
  border-radius:2px;
}

/* CUPS */
.cups-row {
  display:flex; justify-content:center; align-items:flex-end;
  gap:8px; width:100%; position:relative; margin-bottom:-2px;
  flex-wrap:nowrap;
}

.cup-slot {
  display:flex; flex-direction:column; align-items:center;
  position:relative; user-select:none;
  flex-shrink:1; min-width:0;
}

.ball {
  width:36px; height:36px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff8a0,#ffd700 40%,#cc8800 100%);
  box-shadow:0 4px 12px rgba(255,180,0,0.6),inset 0 -3px 6px rgba(0,0,0,0.25);
  position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
  z-index:1; transition:opacity 0.15s;
}
.ball.hidden { opacity:0; }
.ball.reveal { animation:ballBounce 0.5s cubic-bezier(0.36,0.07,0.19,0.97); }
@keyframes ballBounce {
  0%,100% { transform:translateX(-50%) scale(1); }
  30%     { transform:translateX(-50%) scale(1.3) translateY(-8px); }
  60%     { transform:translateX(-50%) scale(0.9) translateY(3px); }
}

.cup-wrap {
  position:relative; z-index:2;
  width:var(--cw); height:var(--ch);
  cursor:pointer; will-change:transform;
}

.cup-wrap.lifting { animation:liftCup 0.4s ease forwards; }
.cup-wrap.dropping { animation:dropCup 0.3s ease forwards; }
@keyframes liftCup {
  0%   { transform:translateY(0); }
  100% { transform:translateY(calc(var(--ch) * -1.1)); }
}
@keyframes dropCup {
  0%   { transform:translateY(calc(var(--ch) * -1.1)); }
  60%  { transform:translateY(6px); }
  100% { transform:translateY(0); }
}
.cup-wrap.correct-pick { animation:correctPop 0.6s ease forwards; }
@keyframes correctPop {
  0%   { transform:translateY(0); }
  30%  { transform:translateY(-65px) scale(1.1); }
  70%  { transform:translateY(-65px) scale(1.1); }
  100% { transform:translateY(0); }
}
.cup-wrap.wrong-pick { animation:wrongShiver 0.5s ease forwards; }
@keyframes wrongShiver {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-10px); }
  40%     { transform:translateX(10px); }
  60%     { transform:translateX(-7px); }
  80%     { transform:translateX(7px); }
}

svg.cup-svg { width:100%; height:100%; overflow:visible; }

/* MESSAGE */
.message-area {
  min-height:36px; display:flex; align-items:center; justify-content:center;
  font-size:1rem; font-weight:700; text-align:center; letter-spacing:0.5px; transition:all 0.3s;
}
.msg-info  { color:rgba(255,255,255,0.7); }
.msg-watch { color:var(--gold); font-size:1.1rem; }
.msg-pick  { color:var(--neon); }
.msg-correct { color:var(--green); font-size:1.15rem; }
.msg-wrong   { color:var(--red);   font-size:1.15rem; }

/* COUNTDOWN OVERLAY */
.countdown-overlay {
  position:absolute; inset:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.55);
  border-radius:24px;
  opacity:0; pointer-events:none;
  transition:opacity 0.2s;
}
.countdown-overlay.show { opacity:1; pointer-events:auto; }

.countdown-ring-wrap {
  position:relative;
  width:90px; height:90px;
  display:flex; align-items:center; justify-content:center;
}
.countdown-svg {
  position:absolute; inset:0;
  transform:rotate(-90deg);
}
.cd-bg  { fill:none; stroke:rgba(255,255,255,0.12); stroke-width:5; }
.cd-arc { fill:none; stroke:var(--gold); stroke-width:5; stroke-linecap:round;
  transition:stroke-dashoffset 0.95s linear; }
.countdown-num {
  position:relative; z-index:2;
  font-family:'Boogaloo',cursive;
  font-size:2.8rem; font-weight:900; color:var(--gold);
  text-shadow:0 0 20px rgba(255,215,0,0.8);
  line-height:1;
  animation:cdPop 0.35s cubic-bezier(0.36,0.07,0.19,0.97);
}
@keyframes cdPop {
  0%   { transform:scale(1.6); opacity:0; }
  60%  { transform:scale(0.9); opacity:1; }
  100% { transform:scale(1); }
}

/* TIMER BAR */
.timer-bar-wrap { width:100%; height:5px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
.timer-bar { height:100%; background:linear-gradient(90deg,var(--green),var(--gold),var(--red)); border-radius:3px; transition:width 0.1s linear; }

/* BUTTONS */
.btn-row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.btn {
  font-family:'Boogaloo',cursive; font-size:1.1rem; letter-spacing:1.5px;
  padding:12px 32px; border-radius:100px; border:none; cursor:pointer;
  transition:all 0.2s; text-transform:uppercase; position:relative; overflow:hidden;
}
.btn::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,0.15); opacity:0; transition:opacity 0.2s; }
.btn:hover::after { opacity:1; }
.btn:active { transform:scale(0.96); }
.btn-start {
  background:linear-gradient(135deg,#ffd700,#ff9500); color:#1a0533;
  box-shadow:0 4px 20px rgba(255,180,0,0.4);
}
.btn-start:hover { box-shadow:0 6px 28px rgba(255,180,0,0.6); transform:translateY(-2px); }
.btn-secondary { background:var(--surface); color:rgba(255,255,255,0.7); border:1px solid rgba(255,255,255,0.15); }

/* SCREENS */
.screen { display:none; flex-direction:column; align-items:center; gap:16px; width:100%; animation:fadeUp 0.4s ease; }
.screen.active { display:flex; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* START CARD */
.start-card {
  background:var(--surface); border:1px solid rgba(255,255,255,0.08);
  border-radius:24px; padding:28px 24px; width:100%; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:20px;
  backdrop-filter:blur(12px);
}
.ball-demo {
  width:60px; height:60px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff8a0,#ffd700 40%,#cc8800 100%);
  box-shadow:0 8px 24px rgba(255,180,0,0.5);
  animation:demoBounce 1.5s ease-in-out infinite;
}
@keyframes demoBounce {
  0%,100% { transform:translateY(0) scale(1); box-shadow:0 8px 24px rgba(255,180,0,0.5); }
  50%     { transform:translateY(-16px) scale(1.08); box-shadow:0 24px 40px rgba(255,180,0,0.3); }
}
.how-to { font-size:0.9rem; color:rgba(255,255,255,0.55); line-height:1.8; max-width:360px; }
.how-to strong { color:var(--gold); }
.diff-select { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
.diff-btn {
  padding:8px 18px; border-radius:100px; font-size:0.8rem; font-weight:700;
  letter-spacing:1px; text-transform:uppercase; cursor:pointer;
  border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.7); transition:all 0.2s;
}
.diff-btn:hover, .diff-btn.selected { background:rgba(255,215,0,0.15); border-color:var(--gold); color:var(--gold); }

/* GAME OVER CARD */
.gameover-card {
  background:var(--surface); border:1px solid rgba(255,255,255,0.1);
  border-radius:24px; padding:32px 24px; text-align:center; width:100%;
  display:flex; flex-direction:column; align-items:center; gap:16px;
  backdrop-filter:blur(12px);
}
.gameover-emoji { font-size:4rem; animation:emojiBounce 0.6s cubic-bezier(0.36,0.07,0.19,0.97); }
@keyframes emojiBounce {
  0%,100% { transform:scale(1); }
  30%     { transform:scale(1.4) rotate(-10deg); }
  60%     { transform:scale(0.9) rotate(5deg); }
}
.gameover-title { font-family:'Boogaloo',cursive; font-size:2.2rem; color:var(--red); text-shadow:0 0 20px var(--red); }
.gameover-score-big { font-size:3.5rem; font-weight:900; color:var(--gold); line-height:1; }
.gameover-detail { font-size:0.85rem; color:rgba(255,255,255,0.5); }

footer {
  position:fixed; bottom:6px; left:12px;
  font-size:9px; color:rgba(255,255,255,0.3); font-family:monospace; z-index:99;
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="wrapper">

  <div>
    <div class="game-title">🎩 Bóng &amp; Ly 🎩</div>
    <div class="title-sub">Shell Game • Tìm quả bóng vàng</div>
  </div>

  <!-- START SCREEN -->
  <div class="screen active" id="screen-start">
    <div class="start-card">
      <div class="ball-demo"></div>
      <p class="how-to">
        Quả bóng vàng được <strong>úp vào một chiếc ly</strong>.<br>
        Quan sát kỹ khi các ly xáo trộn, rồi <strong>chọn đúng chiếc ly</strong>!<br>
        Sai <strong>5 lần</strong> là thua. Độ khó <strong>tăng dần</strong> theo màn chơi.
      </p>
      <button class="btn btn-start" onclick="startGame()">🎮 START</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="screen-game">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Điểm số</div>
        <div class="stat-value" id="val-score">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Màn</div>
        <div class="stat-value" id="val-round">1</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Mạng</div>
        <div class="lives-row" id="lives-row"></div>
      </div>
    </div>

    <div class="diff-row">
      <span class="diff-badge diff-1" id="diff-badge">DỄ</span>
    </div>

    <div class="timer-bar-wrap" id="timer-bar-wrap" style="display:none">
      <div class="timer-bar" id="timer-bar" style="width:100%"></div>
    </div>

    <div class="stage" id="stage">
      <!-- Countdown overlay -->
      <div class="countdown-overlay" id="cd-overlay">
        <div class="countdown-ring-wrap">
          <svg class="countdown-svg" width="90" height="90" viewBox="0 0 90 90">
            <circle class="cd-bg" cx="45" cy="45" r="38"/>
            <circle class="cd-arc" id="cd-arc" cx="45" cy="45" r="38"
              stroke-dasharray="238.76" stroke-dashoffset="0"/>
          </svg>
          <div class="countdown-num" id="cd-num">3</div>
        </div>
      </div>

      <div class="cups-row" id="cups-row"></div>
      <div class="table-surface"></div>
    </div>

    <div class="message-area msg-info" id="message">Chuẩn bị...</div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goMenu()">🏠 Menu</button>
    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div class="screen" id="screen-over">
    <div class="gameover-card">
      <div class="gameover-emoji">💀</div>
      <div class="gameover-title">GAME OVER!</div>
      <div class="gameover-score-big" id="over-score">0</div>
      <div class="gameover-detail" id="over-detail">Màn 1 • Điểm số: 0</div>
      <div class="btn-row">
        <button class="btn btn-start" onclick="startGame()">🔄 PLAY AGAIN</button>
        <button class="btn btn-secondary" onclick="goMenu()">🏠 Menu</button>
      </div>
    </div>
  </div>

</div>
<footer>Bóng &amp; Ly v2.0 • Shell Game</footer>

<script>
// ── STARS ──
(function() {
  var c = document.getElementById('stars');
  for (var i = 0; i < 80; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var sz = Math.random()*2.5+0.5;
    s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;--t:'+(2+Math.random()*4)+'s;--o:'+(0.3+Math.random()*0.7)+';animation-delay:'+(Math.random()*4)+'s';
    c.appendChild(s);
  }
})();

// ── AUDIO ──
var audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq, type, dur, vol, delay) {
  try {
    var ctx = getAudio(), t = ctx.currentTime+(delay||0);
    var osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type||'sine';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol||0.3, t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
    osc.start(t); osc.stop(t+dur);
  } catch(e){}
}
function sndReveal()  { playTone(880,'sine',0.12,0.3); }
function sndHide()    { playTone(440,'triangle',0.1,0.2); }
function sndShuffle() { playTone(300+Math.random()*200,'triangle',0.07,0.12); }
function sndCorrect() { [523,659,784,1047].forEach(function(f,i){playTone(f,'sine',0.18,0.28,i*0.07);}); }
function sndWrong()   { [220,196,165].forEach(function(f,i){playTone(f,'sawtooth',0.22,0.35,i*0.08);}); }
function sndClick()   { playTone(800,'sine',0.05,0.2); }
function sndTick()    { playTone(1200,'sine',0.06,0.25); }
function sndGameOver(){ [180,160,140,110].forEach(function(f,i){playTone(f,'sawtooth',0.3,0.4,i*0.18);}); }

// ── CONFIG ──
// Ngưỡng vòng để tăng độ khó: vòng 1-3 = Dễ, 4-6 = Vừa, 7-10 = Khó, 11-15 = Siêu Khó, 16+ = Huyền Thoại
var DIFF_CONFIG = [
  null,
  { name:'GÀ MỜ',         cls:'diff-1', cups:3, swaps:3,  speed:1000, timer:0,  points:100 },
  { name:'TRUNG BÌNH',        cls:'diff-2', cups:3, swaps:6,  speed:700, timer:0,  points:150 },
  { name:'KHÓ',        cls:'diff-3', cups:4, swaps:10,  speed:400, timer:8,  points:220 },
  { name:'SIÊU KHÓ',   cls:'diff-4', cups:4, swaps:13, speed:250, timer:6,  points:320 },
  { name:'HUYỀN THOẠI',cls:'diff-5', cups:5, swaps:18, speed:200, timer:5,  points:500 },
];

function getDiffForRound(round) {
  if (round <= 2)  return 1;
  if (round <= 6)  return 2;
  if (round <= 10) return 3;
  if (round <= 15) return 4;
  return 5;
}

// ── STATE ──
var currentDiff = 1;
var gameRound   = 1;
var gameScore   = 0;
var lives       = 5;   // max 5 lives
var ballPos     = 0;
var gamePhase   = 'idle';
var timerInterval = null;
var cdInterval    = null;
var timerLeft   = 0;

// ── DIFF SELECT (kept for compatibility) ──
function selectDiff(d) {
  currentDiff = d;
  sndClick();
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-'+id).classList.add('active');
}
function goMenu() { clearTimer(); clearCountdown(); gamePhase='idle'; showScreen('start'); }

// ── CUP SIZE ──
function getCupSize(n) {
  var stageW = document.getElementById('stage').clientWidth || 320;
  var gap = 8;
  var padding = 24; // stage padding both sides
  var available = stageW - padding * 2 - gap * (n - 1);
  var w = Math.floor(Math.min(available / n, 90));
  var h = Math.floor(w * 1.1);
  return {w: w, h: h};
}

// ── BUILD CUPS — tất cả cùng màu ──
function buildCups(n) {
  var row = document.getElementById('cups-row');
  row.innerHTML = '';
  var sz = getCupSize(n);
  for (var i=0; i<n; i++) {
    var slot = document.createElement('div');
    slot.className = 'cup-slot';
    slot.dataset.idx = i;

    var ball = document.createElement('div');
    ball.className = 'ball hidden';
    ball.id = 'ball-'+i;
    slot.appendChild(ball);

    var wrap = document.createElement('div');
    wrap.className = 'cup-wrap';
    wrap.id = 'cup-'+i;
    wrap.dataset.idx = i;
    wrap.style.cssText = '--cw:'+sz.w+'px;--ch:'+sz.h+'px;width:'+sz.w+'px;height:'+sz.h+'px;';
    wrap.onclick = function(){ onPickCup(parseInt(this.dataset.idx)); };
    wrap.innerHTML = buildCupSVG(sz.w, sz.h);
    slot.appendChild(wrap);
    row.appendChild(slot);
  }
}

// Tất cả ly dùng màu hex cứng — KHÔNG gradient ID để tránh xung đột
function buildCupSVG(w, h) {
  var top = w*0.62, bot = w*0.95, rim = h*0.12;
  var body  = '#1e4d7a';
  var light = '#2a6aaa';
  var rimC  = '#255e90';
  return '<svg class="cup-svg" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">'
    // body
    +'<polygon points="'+((w-top)/2)+','+rim+' '+((w+top)/2)+','+rim+' '+((w+bot)/2)+','+h+' '+((w-bot)/2)+','+h+'" fill="'+body+'" class="cup-body"/>'
    // center light strip
    +'<polygon points="'+(w*0.3)+','+rim+' '+(w*0.7)+','+rim+' '+(w*0.72)+','+h+' '+(w*0.28)+','+h+'" fill="'+light+'" opacity="0.55"/>'
    // rim
    +'<rect x="'+((w-top)/2-4)+'" y="0" width="'+(top+8)+'" height="'+rim+'" rx="4" fill="'+rimC+'"/>'
    // shine
    +'<polygon points="'+((w-top)/2+5)+','+(rim+4)+' '+((w-top)/2+top*0.24)+','+(rim+4)+' '+((w-top)/2+top*0.20+(bot-top)*0.2)+','+(h-5)+' '+((w-top)/2+4)+','+(h-5)+'" fill="rgba(255,255,255,0.10)"/>'
    +'</svg>';
}

// ── LIVES UI ──
function updateLives() {
  var row = document.getElementById('lives-row');
  row.innerHTML = '';
  for (var i=0; i<5; i++) {
    var h = document.createElement('span');
    h.className = 'heart' + (i >= lives ? ' lost' : '');
    h.textContent = '❤️';
    row.appendChild(h);
  }
}

// ── GAME START ──
function startGame() {
  getAudio();
  gameRound   = 1;
  gameScore   = 0;
  lives       = 5;
  currentDiff = 1;
  showScreen('game');
  document.getElementById('val-score').textContent = 0;
  document.getElementById('val-round').textContent = 1;
  updateLives();
  beginRound();
}

// ── BEGIN ROUND ──
function beginRound() {
  clearTimer();
  clearCountdown();
  gamePhase = 'revealing';

  currentDiff = getDiffForRound(gameRound);
  var cfg = DIFF_CONFIG[currentDiff];
  var prevDiff = getDiffForRound(gameRound - 1);
  var levelUp = (gameRound > 1 && currentDiff > prevDiff);

  document.getElementById('val-round').textContent = gameRound;
  updateDiffBadge(cfg);
  buildCups(cfg.cups);

  ballPos = Math.floor(Math.random() * cfg.cups);
  if (levelUp) {
    setMsg('🆙 Lên cấp! Độ khó: ' + cfg.name, 'msg-correct');
    spawnConfetti();
    setTimeout(function() {
      setMsg('👀 Hãy quan sát... bóng ở đây!', 'msg-watch');
      revealBall(ballPos, afterReveal);
    }, 1200);
  } else {
    setMsg('👀 Hãy quan sát... bóng ở đây!', 'msg-watch');
    revealBall(ballPos, afterReveal);
  }

  function afterReveal() {
    setTimeout(function() {
      hideBall(ballPos, function() {
        setTimeout(function() {
          doShuffle(cfg, function() {
            setMsg('Bóng ở đâu? Hãy chọn!', 'msg-pick');
            gamePhase = 'picking';
            enableCups(true);
            if (cfg.timer > 0) startTimer(cfg.timer, cfg);
          });
        }, 300);
      });
    }, 900);
  }
}

// ── REVEAL / HIDE ──
function revealBall(idx, cb) {
  var cup  = document.getElementById('cup-'+idx);
  var ball = document.getElementById('ball-'+idx);
  sndReveal();
  cup.classList.add('lifting');
  setTimeout(function() {
    ball.classList.remove('hidden'); ball.classList.add('reveal');
    setTimeout(function() { ball.classList.remove('reveal'); if(cb)cb(); }, 500);
  }, 350);
}

function hideBall(idx, cb) {
  var cup  = document.getElementById('cup-'+idx);
  var ball = document.getElementById('ball-'+idx);
  sndHide();
  cup.classList.add('dropping'); cup.classList.remove('lifting');
  setTimeout(function() {
    ball.classList.add('hidden'); cup.classList.remove('dropping');
    if(cb)cb();
  }, 350);
}

// ── SHUFFLE ──
function doShuffle(cfg, cb) {
  gamePhase = 'shuffling';
  enableCups(false);
  setMsg('🔀 Xáo trộn...', 'msg-watch');
  var swaps=cfg.swaps, speed=cfg.speed, done=0;

  function doSwap() {
    if (done >= swaps) { if(cb)cb(); return; }
    var a, b;
    do { a=Math.floor(Math.random()*cfg.cups); b=Math.floor(Math.random()*cfg.cups); } while(a===b);
    swapCups(a, b, speed, function() {
      done++; sndShuffle();
      setTimeout(doSwap, speed*0.1 + Math.random()*speed*0.2);
    });
  }
  doSwap();
}

function swapCups(a, b, speed, cb) {
  var slots = document.querySelectorAll('.cup-slot');
  var sA = slots[a], sB = slots[b];
  var rA = sA.getBoundingClientRect(), rB = sB.getBoundingClientRect();
  var dx = rB.left-rA.left, dy = rB.top-rA.top;
  var half = speed/2;

  sA.style.transition = 'transform '+half+'ms ease-in-out';
  sB.style.transition = 'transform '+half+'ms ease-in-out';
  sA.style.zIndex = 10; sB.style.zIndex = 5;
  sA.style.transform = 'translate('+dx+'px,'+(dy-30)+'px)';
  sB.style.transform = 'translate('+(-dx)+'px,'+(-dy+30)+'px)';

  setTimeout(function() {
    sA.style.transition=''; sB.style.transition='';
    sA.style.transform='';  sB.style.transform='';
    sA.style.zIndex='';     sB.style.zIndex='';

    var parent = sA.parentNode;
    var children = Array.from(parent.children);
    var iA = children.indexOf(sA), iB = children.indexOf(sB);
    if (iA < iB) { parent.insertBefore(sB,sA); parent.insertBefore(sA,children[iB+1]||null); }
    else         { parent.insertBefore(sA,sB); parent.insertBefore(sB,children[iA+1]||null); }

    if (ballPos===a) ballPos=b; else if (ballPos===b) ballPos=a;

    document.querySelectorAll('.cup-slot').forEach(function(sl,idx){
      sl.dataset.idx=idx;
      var cup=sl.querySelector('.cup-wrap'); var ball=sl.querySelector('.ball');
      cup.dataset.idx=idx; cup.id='cup-'+idx; ball.id='ball-'+idx;
    });
    if(cb)cb();
  }, half+40);
}

// ── PICK ──
function onPickCup(idx) {
  if (gamePhase !== 'picking') return;
  clearTimer(); gamePhase='done'; enableCups(false); sndClick();

  var correct = (idx === ballPos);

  if (correct) {
    sndCorrect();
    var cup  = document.getElementById('cup-'+idx);
    var ball = document.getElementById('ball-'+idx);
    cup.classList.add('correct-pick');
    ball.classList.remove('hidden'); ball.classList.add('reveal');

    var cfg = DIFF_CONFIG[currentDiff];
    var pts = cfg.points + gameRound*10;
    gameScore += pts;
    document.getElementById('val-score').textContent = gameScore;

    spawnConfetti();
    spawnParticles(cup,'#ffd700');
    setMsg('✅ Chính xác! +'+pts+' điểm', 'msg-correct');

    gameRound++;
    startCountdown(3, function() { beginRound(); });

  } else {
    sndWrong();
    document.getElementById('cup-'+idx).classList.add('wrong-pick');
    setTimeout(function(){ revealBall(ballPos, null); }, 300);

    lives--;
    updateLives();
    document.getElementById('val-score').textContent = gameScore;

    if (lives <= 0) {
      setMsg('💀 Hết mạng! Game over!', 'msg-wrong');
      setTimeout(function() { sndGameOver(); showGameOver(); }, 1200);
    } else {
      setMsg('❌ Sai rồi! Còn '+lives+' mạng.', 'msg-wrong');
      gameRound++;
      startCountdown(3, function() { beginRound(); });
    }
  }
}

// ── COUNTDOWN 3-2-1 ──
function startCountdown(from, cb) {
  var overlay = document.getElementById('cd-overlay');
  var numEl   = document.getElementById('cd-num');
  var arc     = document.getElementById('cd-arc');
  var circumference = 238.76;
  var current = from;

  overlay.classList.add('show');

  function tick() {
    // Force re-trigger animation
    numEl.style.animation = 'none';
    void numEl.offsetWidth;
    numEl.style.animation = '';

    numEl.textContent = current;
    sndTick();

    // Arc progress: full at start, empty at 0
    arc.style.strokeDashoffset = circumference * (1 - current/from);

    if (current <= 0) {
      overlay.classList.remove('show');
      clearInterval(cdInterval);
      if(cb) cb();
      return;
    }
    current--;
    cdInterval = setTimeout(tick, 1000);
  }

  arc.style.strokeDashoffset = 0;
  tick();
}

function clearCountdown() {
  clearTimeout(cdInterval);
  document.getElementById('cd-overlay').classList.remove('show');
}

// ── TIMER ──
function startTimer(seconds, cfg) {
  var wrap = document.getElementById('timer-bar-wrap');
  var bar  = document.getElementById('timer-bar');
  wrap.style.display = 'block';
  timerLeft = seconds; bar.style.width='100%';
  clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    timerLeft -= 0.1;
    bar.style.width = Math.max(0, timerLeft/seconds*100)+'%';
    if (timerLeft <= 0) { clearInterval(timerInterval); timeUp(cfg); }
  }, 100);
}
function clearTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer-bar-wrap').style.display='none';
}
function timeUp(cfg) {
  if (gamePhase!=='picking') return;
  clearTimer(); gamePhase='done'; enableCups(false);
  sndWrong();
  setTimeout(function(){ revealBall(ballPos,null); }, 300);
  lives--;
  updateLives();
  if (lives<=0) {
    setMsg('⏱ Hết giờ! Game over!','msg-wrong');
    setTimeout(function(){ sndGameOver(); showGameOver(); }, 1200);
  } else {
    setMsg('⏱ Hết giờ! Còn '+lives+' mạng.','msg-wrong');
    gameRound++;
    startCountdown(3, function(){ beginRound(); });
  }
}

// ── GAME OVER ──
function showGameOver() {
  clearTimer(); clearCountdown();
  document.getElementById('over-score').textContent = gameScore;
  document.getElementById('over-detail').textContent = 'Màn '+gameRound+' • Điểm số: '+gameScore;
  showScreen('over');
}

// ── UI HELPERS ──
function setMsg(txt, cls) {
  var el = document.getElementById('message');
  el.textContent = txt;
  el.className = 'message-area '+(cls||'msg-info');
}

function enableCups(on) {
  document.querySelectorAll('.cup-wrap').forEach(function(c) {
    c.style.cursor = on ? 'pointer' : 'default';
    c.style.pointerEvents = on ? 'auto' : 'none';
    if (on) {
      c.onmouseenter = function(){ this.style.filter='brightness(1.3) drop-shadow(0 0 12px rgba(255,215,0,0.5))'; };
      c.onmouseleave = function(){ this.style.filter=''; };
    } else {
      c.onmouseenter = null; c.onmouseleave = null; c.style.filter='';
    }
  });
}

function updateDiffBadge(cfg) {
  var b = document.getElementById('diff-badge');
  b.textContent = cfg.name; b.className='diff-badge '+cfg.cls;
}

// ── PARTICLES & CONFETTI ──
function spawnParticles(el, color) {
  var rect=el.getBoundingClientRect(), cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for (var i=0;i<12;i++) {
    var p=document.createElement('div'); p.className='particle';
    var size=6+Math.random()*8;
    p.style.cssText='width:'+size+'px;height:'+size+'px;background:'+color+';left:'+(cx+(Math.random()-0.5)*60)+'px;top:'+cy+'px;animation-delay:'+(Math.random()*0.3)+'s;animation-duration:'+(1.5+Math.random())+'s;box-shadow:0 0 8px '+color;
    document.body.appendChild(p);
    setTimeout(function(e){document.body.removeChild(e);},3000,p);
  }
}

function spawnConfetti() {
  var colors=['#ffd700','#ff3cac','#00f5ff','#39ff14','#ff9500','#fff'];
  for (var i=0;i<40;i++) {
    var c=document.createElement('div'); c.className='confetti-piece';
    var color=colors[Math.floor(Math.random()*colors.length)];
    var size=6+Math.random()*10, shape=Math.random()>0.5?'50%':'0';
    c.style.cssText='left:'+(20+Math.random()*60)+'%;top:20px;width:'+size+'px;height:'+size+'px;background:'+color+';border-radius:'+shape+';animation-delay:'+(Math.random()*0.5)+'s;animation-duration:'+(1.5+Math.random())+'s';
    document.body.appendChild(c);
    setTimeout(function(e){document.body.removeChild(e);},3000,c);
  }
}
