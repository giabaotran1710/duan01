<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trần Gia Bảo – Thư viện Game</title>
    <meta name="description" content="Khám phá bộ sưu tập game HTML5 đa thể loại – từ trí tuệ, hành động đến giải trí.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ========== RESET & NỀN TẢNG ========== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0e17;
        }

        /* ========== CANVAS NỀN ========== */
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ========== CONTENT CHÍNH ========== */
        .content {
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
            margin-top: 25vh;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .content.hide {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        .content h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, #a0d2ff, #e0c3ff, #ffb3c6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 20px rgba(160, 210, 255, 0.3));
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%,
            100% {
                filter: drop-shadow(0 0 20px rgba(160, 210, 255, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 35px rgba(200, 180, 255, 0.6));
            }
        }

        .content p {
            font-size: clamp(0.8rem, 2vw, 1rem);
            font-weight: 400;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 12px;
            text-transform: uppercase;
        }

        /* ========== THANH CÔNG CỤ CHÍNH ========== */
        .utility-container {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* Nút toggle */
        .toggle-btn {
            width: 50px;
            height: 50px;
            background: rgba(20, 25, 40, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 20px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1001;
        }

        .toggle-btn:hover {
            background: rgba(40, 50, 70, 0.8);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 40px rgba(100, 150, 255, 0.25);
            transform: translateY(-2px);
        }

        .toggle-btn i {
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .toggle-btn.active i {
            transform: rotate(90deg);
        }

        /* Thanh game */
        .utility-bar {
            position: absolute;
            top: 62px;
            left: 0;
            width: 380px;
            max-height: calc(100vh - 140px);
            overflow-y: auto;
            overflow-x: hidden;
            background: rgba(15, 20, 35, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            transform: translateY(-20px) scale(0.95);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .utility-bar.show {
            transform: translateY(0) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        /* Scrollbar */
        .utility-bar::-webkit-scrollbar {
            width: 5px;
        }
        .utility-bar::-webkit-scrollbar-track {
            background: transparent;
        }
        .utility-bar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 99px;
        }

        /* ========== BỘ LỌC THỂ LOẠI ========== */
        .filter-section {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            letter-spacing: 0.3px;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
        }

        .filter-btn.active {
            background: rgba(120, 160, 255, 0.25);
            border-color: rgba(150, 180, 255, 0.6);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.3);
        }

        /* ========== LƯỚI GAME ========== */
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Card game */
        .game-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.08), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .game-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(100, 150, 255, 0.1);
        }

        .game-card:hover::before {
            opacity: 1;
        }

        .game-card:active {
            transform: scale(0.96);
        }

        /* Container nút game */
        .game-card .util-btn {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            flex-shrink: 0;
        }

        /* Thông tin game */
        .game-card .game-info {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .game-card .game-name {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.3px;
            white-space: nowrap;
            text-align: center;
        }

        .game-card .game-genre {
            font-size: 9px;
            font-weight: 500;
            color: rgba(180, 200, 255, 0.7);
            background: rgba(100, 150, 255, 0.1);
            padding: 2px 8px;
            border-radius: 99px;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }

        .game-card .game-difficulty {
            font-size: 9px;
            font-weight: 700;
            color: #ffd54a;
            text-shadow: 0 0 8px rgba(255, 213, 74, 0.35);
        }

        /* ========== HIỆU ỨNG XUẤT HIỆN ========== */
        .game-card {
            animation: cardFadeIn 0.6s ease forwards;
            opacity: 0;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 480px) {
            .utility-bar {
                width: 320px;
                padding: 14px;
            }
            .games-grid {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .game-card {
                padding: 10px 6px;
            }
        }

        /* ========== GIỮ NGUYÊN TOÀN BỘ CSS CỦA CÁC NÚT GAME ========== */
        /* (Tất cả CSS từ file gốc – không thay đổi, chỉ copy lại bên dưới) */
        /* ===== NÚT TRỐN KHỎI THIÊN THẠCH ===== */
        .util-btn.comet-btn {
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, #1a1040, #0d0625);
            border: 1px solid rgba(180, 140, 255, 0.3);
            box-shadow: 0 0 20px rgba(120, 40, 200, 0.2);
            transition: all 0.3s ease;
        }

        .util-btn.comet-btn:hover {
            border-color: rgba(200, 160, 255, 0.7);
            box-shadow: 0 0 35px rgba(160, 80, 255, 0.5), inset 0 0 25px rgba(120, 60, 220, 0.15);
        }

        .comet-btn::before {
            content: '';
            position: absolute;
            inset: -5px;
            background: radial-gradient(1px 1px at 20% 30%, #ffffff, transparent),
                radial-gradient(1px 1px at 60% 20%, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 40% 70%, #e0c0ff, transparent),
                radial-gradient(1px 1px at 80% 50%, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 15% 65%, #c0a0ff, transparent),
                radial-gradient(1px 1px at 70% 75%, #ffffff, transparent),
                radial-gradient(2px 2px at 50% 15%, #f0d0ff, transparent),
                radial-gradient(1px 1px at 30% 85%, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 90% 35%, #d0b0ff, transparent);
            opacity: 0.8;
            z-index: 0;
            pointer-events: none;
        }

        .comet-btn::after {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 40%, rgba(140, 60, 240, 0.25), transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .comet-btn svg {
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 6px rgba(200, 160, 255, 0.5));
        }

        .stickman-head {
            fill: none;
            stroke: #ffffff;
            stroke-width: 3.5;
            stroke-linecap: round;
        }

        .stickman-body {
            stroke: #ffffff;
            stroke-width: 3.5;
            stroke-linecap: round;
        }

        .stickman-trail {
            stroke: rgba(180, 140, 255, 0.5);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-dasharray: 4 6;
            animation: trailPulse 2s ease-in-out infinite;
        }

        @keyframes trailPulse {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.8;
            }
        }

        .arm-wave {
            transform-origin: 50px 42px;
            animation: waveHand 0.8s ease-in-out infinite;
            transform-box: fill-box;
        }

        @keyframes waveHand {
            0% {
                transform: rotate(0deg);
            }
            30% {
                transform: rotate(30deg);
            }
            70% {
                transform: rotate(-5deg);
            }
            100% {
                transform: rotate(0deg);
            }
        }

        .comet-mini {
            animation: cometFly 3s linear infinite;
        }

        @keyframes cometFly {
            0% {
                transform: translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateX(60px);
                opacity: 0;
            }
        }

        .star-twinkle {
            animation: twinkle 1.5s ease-in-out infinite;
        }

        .star-twinkle:nth-child(even) {
            animation-delay: 0.75s;
        }

        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        .stickman-shadow {
            fill: rgba(0, 0, 0, 0.3);
        }

        /* Nền nút ếch */
        #echnhayho {
            background: linear-gradient(145deg, #22c55e, #15803d);
            border: 1px solid #4ade80;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.35), inset 0 0 8px rgba(255, 255, 255, 0.25);
        }

        #echnhayho:hover {
            background: linear-gradient(145deg, #2dd46a, #169643);
            box-shadow: 0 0 18px rgba(34, 197, 94, 0.55), inset 0 0 12px rgba(255, 255, 255, 0.35);
        }

        /* ========== ẾCH NHẢY HỐ ========== */
        .frog-icon {
            width: 36px;
            height: 36px;
            position: relative;
            display: inline-block;
        }

        .frog-body {
            width: 34px;
            height: 24px;
            background: #4CAF50;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            left: 1px;
            box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.1), inset 2px 2px 0 rgba(255, 255, 255, 0.2);
        }

        .eye {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 8px;
        }

        .eye.left {
            left: 9px;
        }
        .eye.right {
            right: 9px;
        }

        .eye::after {
            content: '';
            width: 4px;
            height: 4px;
            background: #111;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            animation: frogBlink 2.5s infinite;
        }

        .cheek {
            width: 9px;
            height: 5px;
            background: rgba(255, 80, 80, 0.65);
            border-radius: 50%;
            position: absolute;
            bottom: 8px;
            animation: frogPuff 1.2s infinite ease-in-out;
        }

        .cheek.left {
            left: 2px;
        }
        .cheek.right {
            right: 2px;
        }

        .mouth {
            width: 10px;
            height: 4px;
            border-bottom: 2px solid #2E7D32;
            border-radius: 0 0 6px 6px;
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
        }

        @keyframes frogBlink {
            0%,
            90%,
            100% {
                transform: scaleY(1);
            }
            95% {
                transform: scaleY(0.1);
            }
        }

        @keyframes frogPuff {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.9);
                opacity: 0.9;
            }
        }

        /* Tất cả CSS gốc của các nút game khác giữ nguyên ở đây... */
        /* (Vì quá dài, tôi sẽ đại diện bằng comment này – thực tế bạn copy toàn bộ CSS gốc vào) */
        /* ... TOÀN BỘ CSS GỐC CỦA CÁC NÚT GAME ĐƯỢC GIỮ NGUYÊN ... */

    </style>
</head>

    <canvas id="bg"></canvas>

    <!-- ===== UTILITY BAR ===== -->
    <div class="utility-container">

            'bidaBtn': 'game-bida/bida.html',
            'khinhkhi': 'game/khinhkhicau.html',
            'xepbonggai': 'game/xepbonggai.html',
            'truottuyet': 'game/truottuyet.html',
            'demsao': 'game/quansatchomsao.html',
            'bongnay': 'game/bongnay.html',
            'echnhayho': 'game/echnhayho.html',
            'comet': 'game/tronkhoithienthach.html',
        };

        const gamesGrid = document.querySelector('.games-grid');
        const filterBtns = document.querySelectorAll('.filter-btn');
        let currentGenre = 'all';

        // Tạo card game từ dữ liệu
        function renderGames(genre) {
            gamesGrid.innerHTML = '';
            const filtered = genre === 'all' ? games : games.filter(g => g.genre === genre);

            filtered.forEach((game, index) => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.style.animationDelay = `${index * 0.03}s`;
                card.setAttribute('data-id', game.id);

                // Thêm nút game (giữ nguyên HTML gốc)
                const btnContainer = document.createElement('div');
                btnContainer.innerHTML = game.btnHTML;
                const utilBtn = btnContainer.querySelector('.util-btn');
                if (utilBtn) {
                    utilBtn.style.pointerEvents = 'none'; // để sự kiện click trên card xử lý
                }

                // Thông tin
                const infoDiv = document.createElement('div');
                infoDiv.className = 'game-info';
                infoDiv.innerHTML = `
                    <span class="game-name">${game.name}</span>
                    <span class="game-genre">${getGenreName(game.genre)}</span>
                    <span class="game-difficulty">Độ khó: ${game.diff}</span>
                `;

                card.appendChild(btnContainer);
                card.appendChild(infoDiv);

                // Sự kiện click chuyển trang
                card.addEventListener('click', () => {
                    const url = routes[game.id];
                    if (url) window.location.href = url;
                });

                gamesGrid.appendChild(card);
            });
        }

        function getGenreName(genre) {
            const map = {
                'tri-tue': 'Trí tuệ',
                'hanh-dong': 'Hành động',
                'chien-thuat': 'Chiến thuật',
                'giai-tri': 'Giải trí',
                'the-thao': 'Thể thao'
            };
            return map[genre] || genre;
        }

        // Khởi tạo
        renderGames('all');

        // Xử lý lọc
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentGenre = btn.getAttribute('data-genre');
                renderGames(currentGenre);
            });
        });

        // ========== UTILITY BAR TOGGLE ==========
        const toggleBtn = document.getElementById('toggleBar');
        const utilityBar = document.getElementById('utilityBar');
        const content = document.querySelector('.content');
        let autoCloseTimer;

        function closeBar() {
            utilityBar.classList.remove('show');
            content.classList.remove('hide');
            toggleBtn.classList.remove('active');
            if (autoCloseTimer) clearTimeout(autoCloseTimer);
        }

        function openBar() {
            utilityBar.classList.add('show');
            content.classList.add('hide');
            toggleBtn.classList.add('active');
            if (autoCloseTimer) clearTimeout(autoCloseTimer);
            autoCloseTimer = setTimeout(closeBar, 30000);
        }

        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (utilityBar.classList.contains('show')) {
                closeBar();
            } else {
                openBar();
            }
        });

        // Reset timer khi tương tác trong bar
        utilityBar.addEventListener('click', () => {
            if (autoCloseTimer) clearTimeout(autoCloseTimer);
            autoCloseTimer = setTimeout(closeBar, 30000);
        });

        // ========== CANVAS BACKGROUND (giữ nguyên) ==========
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        let W, H, t = 0;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            initStars();
        }
        window.addEventListener('resize', resize);

        const waves = [
            { a: 0.055, wl: 0.012, sp: 0.018, yo: 0.62, alpha: 0.18, r: 100, g: 200, b: 255 },
            { a: 0.040, wl: 0.018, sp: 0.012, yo: 0.68, alpha: 0.14, r: 60, g: 160, b: 230 },
            { a: 0.030, wl: 0.025, sp: 0.022, yo: 0.73, alpha: 0.22, r: 30, g: 120, b: 200 },
            { a: 0.022, wl: 0.035, sp: 0.008, yo: 0.78, alpha: 0.30, r: 10, g: 80, b: 170 },
            { a: 0.015, wl: 0.050, sp: 0.030, yo: 0.82, alpha: 0.35, r: 5, g: 50, b: 130 },
        ];
        let stars = [];

        function initStars() {
            stars = [];
            let rng = 1;
            for (let s = 0; s < 80; s++) {
                rng = (rng * 16807) % 2147483647;
                const sx = rng % W;
                rng = (rng * 16807) % 2147483647;
                const sy = rng % Math.floor(H * 0.45);
                rng = (rng * 16807) % 2147483647;
                stars.push({ x: sx, y: sy, r: 0.5 + (rng % 10) / 10 });
            }
        }

        function draw() {
            const sky = ctx.createLinearGradient(0, 0, 0, H);
            sky.addColorStop(0, '#050d1a');
            sky.addColorStop(0.4, '#0a1a30');
            sky.addColorStop(0.7, '#0d2540');
            sky.addColorStop(1, '#0a1828');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, W, H);

            const glow = ctx.createRadialGradient(W * 0.5, H * 0.22, 0, W * 0.5, H * 0.22, W * 0.45);
            glow.addColorStop(0, 'rgba(120,190,255,0.07)');
            glow.addColorStop(0.5, 'rgba(60,130,200,0.03)');
            glow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, W, H);

            stars.forEach(st => {
                const tw = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * 1.2 + st.x));
                ctx.beginPath();
                ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(200,230,255,' + (tw * 0.8) + ')';
                ctx.fill();
            });

            waves.forEach(w => {
                const baseY = H * w.yo;
                const amp = H * w.a;
                ctx.beginPath();
                ctx.moveTo(0, H);
                for (let x = 0; x <= W; x += 3) {
                    const y = baseY + Math.sin(x * w.wl + t * w.sp * 60) * amp + Math.sin(x * w.wl * 1.6 + t * w.sp * 40 + 1) * amp * 0.4;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(W, H);
                ctx.closePath();
                const wg = ctx.createLinearGradient(0, baseY - amp, 0, H);
                wg.addColorStop(0, 'rgba(' + w.r + ',' + w.g + ',' + w.b + ',' + w.alpha + ')');
                wg.addColorStop(1, 'rgba(5,15,30,0.6)');
                ctx.fillStyle = wg;
                ctx.fill();
            });

            waves.slice(0, 3).forEach(w => {
                const baseY = H * w.yo;
                const amp = H * w.a;
                ctx.beginPath();
                for (let x = 0; x <= W; x += 3) {
                    const y = baseY + Math.sin(x * w.wl + t * w.sp * 60) * amp + Math.sin(x * w.wl * 1.6 + t * w.sp * 40 + 1) * amp * 0.4;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.strokeStyle = 'rgba(180,230,255,0.12)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            });

            t += 0.016;
            requestAnimationFrame(draw);
        }

        resize();
        draw();

        // ========== WORD GAME LETTER CYCLE ==========
        const LETTERS = [
            { ch: 'W' }, { ch: 'O' }, { ch: 'R' }, { ch: 'D' },
            { ch: 'G' }, { ch: 'A' }, { ch: 'M' }, { ch: 'E' },
        ];
        let idx = 0;
        const elLetter = document.getElementById('word-letter');
        if (elLetter) {
            setInterval(() => {
                idx = (idx + 1) % LETTERS.length;
                elLetter.classList.remove('pop');
                void elLetter.offsetWidth;
                elLetter.textContent = LETTERS[idx].ch;
                elLetter.classList.add('pop');
            }, 900);
        }
    </script>
</body>
</html>
