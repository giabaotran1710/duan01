<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Sắp xếp từ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 2 bộ câu hỏi -->
<script src="question.js"></script>
<script src="question2.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#1e2a38;
  color:white;
  text-align:center;
  user-select: none;
}

.game{
  margin-top:80px;
}

h2{
  font-size:40px;
}

#modeToggle{
  position:relative;
  display:flex;
  width:180px;
  margin:20px auto;
  border-radius:12px;
  background:#333;
  overflow:hidden;
  font-weight:bold;
}

/* thanh trượt */
#slider{
  position:absolute;
  width:50%;
  height:100%;
  background:#0188ff;
  border-radius:12px;
  transition:0.35s cubic-bezier(0.4,0,0.2,1);
  z-index:0;
}

/* chữ */
#modeToggle span{
  flex:1;
  padding:10px;
  cursor:pointer;
  z-index:1;
  transition:0.3s;
}

/* màu chữ */
/* mặc định */
#modeToggle span{
  color:#bbb;
}

/* khi EASY */
.easyMode #easyBtn{
  color:white;
}

.easyMode #hardBtn{
  color:#bbb;
}

/* khi HARD */
.hardMode #hardBtn{
  color:black;
}

.hardMode #easyBtn{
  color:#bbb;
}

/* chế độ khó */
.hardMode #slider{
  left:50%;
  background:#ff4444;
}

.easyMode #slider{
  left:0;
  background:#0188ff;
}
/* bảng điểm */
#ui{
  margin:20px;
  font-size:22px;
  display:flex;
  justify-content:center;
  gap:40px;
}

#letters span{
  min-width:10px;
  min-height:30px;
  display:inline-block;
  padding:10px 14px;
  margin:6px;
  background:#0188ff;
  border-radius:8px;
  cursor:pointer;
  font-size:22px;
  transition:0.2s;
  border: 2px solid whitesmoke;
}

#letters span:hover{
  background:#feb200;
  transform:scale(1.2);
  color: black;
}

#answerArea{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  margin-top:25px;
}

#answer{
  font-size:28px;
  letter-spacing:3px;
  max-height: 40px;
  min-width:250px;
  min-height:40px;
  border:2px solid #ffffff55;
  padding:10px 15px;
  border-radius:8px;
}

#clearBtn{
  padding:8px 16px;
  font-size:16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#ff5555;
  color:white;
}

#clearBtn:hover{
  background:#ff7777;
}

#result{
  margin-top:20px;
  font-size:22px;
}

.used{
  opacity:0.3;
  pointer-events:none;
}

</style>
</head>

<body>

<div class="game">

<h2>GHÉP TỪ</h2>

<div id="modeToggle">
  <div id="slider"></div>
  <span id="easyBtn">Dễ</span>
  <span id="hardBtn">Khó</span>
</div>

<div id="ui">
⭐ Điểm: <b id="score">0</b>
⏱ Thời gian: <b id="time">10</b>
</div>

<div id="letters"></div>

<div id="answerArea">
<div id="answer"></div>
<button id="clearBtn">CLEAR</button>
</div>

<p id="result"></p>

</div>

<script>

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let currentWord="";
let answer="";
let score=0;
let timeLeft=10;
let timer;

/* mode */
let currentMode = "easy";

function shuffleWord(word){

let letters = word.replaceAll(" ","").split("");

for(let i = letters.length - 1; i > 0; i--){
const j = Math.floor(Math.random() * (i + 1));
[letters[i], letters[j]] = [letters[j], letters[i]];
}

return letters;

}

function renderLetters(letters){

const box=document.getElementById("letters");
box.innerHTML="";

letters.forEach(letter=>{

const span=document.createElement("span");
span.textContent=letter;

span.onclick=()=>{

if(span.classList.contains("used")) return;

answer+=letter;
document.getElementById("answer").textContent=answer;

span.classList.add("used");

checkAnswer();

};

box.appendChild(span);

});

}

function startTimer(){

clearInterval(timer);

timeLeft=20;
document.getElementById("time").textContent=timeLeft;

timer=setInterval(()=>{

timeLeft--;
document.getElementById("time").textContent=timeLeft;

if(timeLeft<=0){

clearInterval(timer);
document.getElementById("result").textContent="Hết giờ!";
setTimeout(newQuestion,1500);

}

},1000);

}

function newQuestion(){

answer="";
document.getElementById("answer").textContent="";
document.getElementById("result").textContent="";

/* chọn bộ câu hỏi */
let wordList = currentMode === "easy" ? words : words2;

currentWord = wordList[Math.floor(Math.random()*wordList.length)];

const letters=shuffleWord(currentWord);

renderLetters(letters);

startTimer();

}

function checkAnswer(){

const correct=currentWord.replaceAll(" ","");

if(answer.length===correct.length){

clearInterval(timer);

if(answer.toLowerCase()===correct.toLowerCase()){

score+=1;
document.getElementById("score").textContent=score;
document.getElementById("result").textContent="🎉 Chính xác!";

}else{

document.getElementById("result").textContent="❌ Không chính xác!";

}

setTimeout(newQuestion,2000);

}

}

/* clear */
document.getElementById("clearBtn").onclick=function(){

answer="";
document.getElementById("answer").textContent="";

document.querySelectorAll("#letters span").forEach(span=>{
span.classList.remove("used");
});

};

/* toggle mode */
const modeToggle = document.getElementById("modeToggle");
const easyBtn = document.getElementById("easyBtn");
const hardBtn = document.getElementById("hardBtn");

function updateUI(){

  if(currentMode === "easy"){
    modeToggle.classList.add("easyMode");
    modeToggle.classList.remove("hardMode");
  }
  else{
    modeToggle.classList.add("hardMode");
    modeToggle.classList.remove("easyMode");
  }

}

easyBtn.onclick = () => {

  if(currentMode === "easy") return;

  const confirmChange = confirm("Bạn sẽ mất toàn bộ điểm hiện tại. Tiếp tục?");

  if(!confirmChange) return;

  // reset điểm
  score = 0;
  document.getElementById("score").textContent = score;

  currentMode = "easy";
  updateUI();
  newQuestion();
};

hardBtn.onclick = () => {

  if(currentMode === "hard") return;

  const confirmChange = confirm("Bạn sẽ mất toàn bộ điểm hiện tại. Tiếp tục?");

  if(!confirmChange) return;

  // reset điểm
  score = 0;
  document.getElementById("score").textContent = score;

  currentMode = "hard";
  updateUI();
  newQuestion();
};

/* init */
updateUI();

function playClick(){

const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.frequency.setValueAtTime(700, audioCtx.currentTime);
osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);

gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

osc.start();
osc.stop(audioCtx.currentTime + 0.1);

}


newQuestion();



</script>

</body>
</html>
