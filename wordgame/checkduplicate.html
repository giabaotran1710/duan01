<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Check trùng question.js</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  padding:20px;

  background: linear-gradient(135deg,#0f172a,#1e3a8a,#4c1d95);
  background-size: 400% 700%;
  animation: bgMove 10s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== POPUP ===== */
#passwordPopup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  backdrop-filter: blur(8px);
  z-index:9999;
}

.box{
  background: rgba(30,42,56,0.85);
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,170,255,0.3);
}

/* ===== DISPLAY ===== */
#display{
  font-size:26px;
  letter-spacing:10px;
  margin-bottom:20px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
}

/* ===== KEYPAD ===== */
.keypad{
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

.key{
  padding:15px;
  font-size:20px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.key:hover{
  background:#00aaff;
  transform:scale(1.1);
}

.key:active{
  transform:scale(0.9);
}

/* special buttons */
.ok{
  background:#00aaff;
}

.clear{
  background:#ff4444;
}

/* ===== UI ===== */
h2{
  text-shadow:0 0 10px #00aaff;
}

.result{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
}

.duplicate{color:#ff5555;}
.okText{color:#00ff99;}

#display:empty::before{
  content: "Nhập mật khẩu...";
  color: rgba(255,255,255,0.3);
  letter-spacing: normal;
  font-size:16px;
}

@keyframes shakeError {
  0% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
  100% { transform: translateX(0); }
}

.shake-error{
  animation: shakeError 0.4s;
}


</style>
</head>

<body>

<!-- 🔐 PASSWORD -->
<div id="passwordPopup">
  <div class="box">
    <h3>🔐 Cần xác minh quyền truy cập</h3>

    <div id="display"></div>

    <div class="keypad">
      <button class="key">7</button>
      <button class="key">8</button>
      <button class="key">9</button>

      <button class="key">4</button>
      <button class="key">5</button>
      <button class="key">6</button>

      <button class="key">1</button>
      <button class="key">2</button>
      <button class="key">3</button>

      <button class="key clear">X</button>
      <button class="key">0</button>
    </div>
  </div>
</div>

<h2>🔍 Kiểm tra từ trùng (question.js)</h2>
<div id="status">⏳ Đang load...</div>
<div class="result" id="result"></div>
<script src="question.js"></script>

<script>

const correctPassword = "1724";
let inputPass = "";

function loadWordsAndCheck(){

  // xoá script cũ
  const oldScript = document.getElementById("wordScript");
  if(oldScript) oldScript.remove();

  // tạo script mới (chống cache)
  const script = document.createElement("script");
  script.src = "question.js?v=" + Date.now();
  script.id = "wordScript";

  script.onload = () => {
    startCheck(); // chạy sau khi load xong
  };

  document.body.appendChild(script);
}

/* ===== KEYPAD ===== */
document.querySelectorAll(".key").forEach(btn=>{
  btn.onclick = () => {
    const val = btn.textContent;

    if(val === "X"){
      inputPass = inputPass.slice(0,-1);
    }
    else{
      if(inputPass.length < 4){  // 🔥 giới hạn 4 số
        inputPass += val;
      }

      // 👉 đủ 4 số thì auto check
      if(inputPass.length === 4){
        checkPassword();
      }
    }

    updateDisplay();
  };
});

function updateDisplay(){
  document.getElementById("display").textContent = inputPass;
}

function checkPassword(){
  const display = document.getElementById("display");

  if(inputPass === correctPassword){
    document.getElementById("passwordPopup").style.display = "none";
    startCheck();
  }else{

    // 📳 rung
    display.classList.add("shake-error");

    // xoá pass
    inputPass = "";
    updateDisplay();

    // remove animation để dùng lại
    setTimeout(()=>{
      display.classList.remove("shake-error");
    },400);
  }
}

/* ===== CHECK DUPLICATE ===== */
function startCheck(){

  if(typeof words === "undefined"){
    document.getElementById("status").textContent = "❌ Không load được";
    return;
  }

  document.getElementById("status").textContent = "✅ ĐÃ KIỂM TRA";

  let map = {};
  let html = "";
  let found = false;

  // 👉 lấy text gốc từ file (QUAN TRỌNG)
  fetch("question.js?v=" + Date.now())
    .then(res => res.text())
    .then(text => {

      const lines = text.split("\n");

      lines.forEach((line, lineIndex) => {

        // tìm chuỗi trong ""
        const matches = line.match(/"(.*?)"/g);

        if(!matches) return;

        matches.forEach(str => {
          let word = str
            .replace(/"/g,"")
            .toLowerCase()
            .trim()
            .replace(/\s+/g," ");

          if(!map[word]) map[word] = [];
          map[word].push(lineIndex + 1); // 👈 dòng thật
        });

      });

      for(let w in map){
        if(map[w].length > 1){
          found = true;
          html += `
            <div class="duplicate">
              ❌ "${w}" → dòng: ${map[w].join(", ")}
            </div>
          `;
        }
      }

      if(!found){
        html = `<div class="okText">✅ Không có từ nào bị trùng</div>`;
      }

      document.getElementById("result").innerHTML = html;

    });
}
</script>

</body>
</html>
