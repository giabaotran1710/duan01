<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Check trùng question.js</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  padding:20px;
  background: linear-gradient(135deg,#0f172a,#1e3a8a,#4c1d95);
  background-size: 400% 700%;
  animation: bgMove 10s ease infinite;
}
@keyframes bgMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

/* ===== POPUP ===== */
#passwordPopup{
  position:fixed; inset:0;
  background:rgba(0,0,0,0.7);
  display:flex; justify-content:center; align-items:center;
  backdrop-filter: blur(8px);
  z-index:9999;
}
.box{
  background: rgba(30,42,56,0.85);
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,170,255,0.3);
}

/* ===== DISPLAY ===== */
#display{
  font-size:26px;
  letter-spacing:10px;
  margin-bottom:20px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
}
#display:empty::before{
  content: "Nhập mật khẩu...";
  color: rgba(255,255,255,0.3);
  letter-spacing: normal;
  font-size:16px;
}

/* ===== KEYPAD ===== */
.keypad{
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}
.key{
  padding:15px;
  font-size:20px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  transition:0.2s;
}
.key:hover{background:#00aaff; transform:scale(1.1);}
.key:active{transform:scale(0.9);}
.ok{background:#00aaff;}
.clear{background:#ff4444;}

/* ===== UI ===== */
h2{ text-shadow:0 0 10px #00aaff; }

#loaderWrap{
  position:fixed; top:15px; right:15px;
  width:80px; height:80px;
  display:flex; justify-content:center; align-items:center;
}
#loader{ transform: rotate(-90deg); }
#progress{ stroke-dasharray: 188; stroke-dashoffset: 0; animation: countdown 30s linear forwards; stroke-linecap: round; }
#timeText{ position:absolute; font-size:16px; font-weight:500; }

.result{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
}
.duplicate{color:#ff5555;}
.okText{color:#00ff99;}

@keyframes shakeError {
  0% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
  100% { transform: translateX(0); }
}
.shake-error{ animation: shakeError 0.4s; }

@keyframes countdown{from{stroke-dashoffset:0;} to{stroke-dashoffset:188;}}
</style>
</head>

<body>

<!-- 🔐 PASSWORD -->
<div id="passwordPopup">
  <div class="box">
    <h3>🔐 Cần xác minh quyền truy cập</h3>
    <div id="display"></div>
    <div class="keypad">
      <button class="key">7</button><button class="key">8</button><button class="key">9</button>
      <button class="key">4</button><button class="key">5</button><button class="key">6</button>
      <button class="key">1</button><button class="key">2</button><button class="key">3</button>
      <button class="key clear">X</button><button class="key">0</button>
    </div>
  </div>
</div>

<h2>🔍 Kiểm tra từ trùng (question.js)</h2>
<div id="status">⏳ Đang load...</div>
<div id="loaderWrap">
  <svg id="loader" width="80" height="80">
    <circle cx="40" cy="40" r="30" stroke="#ffffff22" stroke-width="8" fill="none"/>
    <circle id="progress" cx="40" cy="40" r="30" stroke="#00aaff" stroke-width="8" fill="none"/>
  </svg>
  <div id="timeText">30</div>
</div>
<div class="result" id="result"></div>

<script src="question.js"></script>
<script>
const correctPassword = "1724";
let inputPass = "";
let isUnlocked = false;
let circleInterval = null;

const display = document.getElementById("display");
const progress = document.getElementById("progress");
const text = document.getElementById("timeText");
const totalTime = 30;
const circumference = 314;

// ===== KEYPAD =====
document.querySelectorAll(".key").forEach(btn => {
  btn.onclick = () => {
    const val = btn.textContent;
    if(val === "X"){ inputPass = inputPass.slice(0,-1); }
    else if(inputPass.length < 4){ inputPass += val; }

    updateDisplay();

    if(inputPass.length === 4) checkPassword();
  };
});

function updateDisplay(){ display.textContent = inputPass; }

function checkPassword(){
  if(inputPass === correctPassword){
    document.getElementById("passwordPopup").style.display = "none";
    isUnlocked = true;
    startCheck();
    startCircleTimer();
  } else {
    display.classList.add("shake-error");
    inputPass = "";
    updateDisplay();
    setTimeout(()=>display.classList.remove("shake-error"),400);
  }
}

// ===== TIMER =====
function startCircleTimer() {
  if (circleInterval) clearInterval(circleInterval);

  let time = totalTime;
  progress.style.strokeDashoffset = 0;
  text.textContent = totalTime;

  circleInterval = setInterval(() => {
    time--;
    text.textContent = time;

    // cập nhật offset mượt
    const offset = circumference * (1 - time / totalTime);
    progress.style.strokeDashoffset = offset;

    if (time <= 0) {
      clearInterval(circleInterval);
      progress.style.strokeDashoffset = 0; // reset vòng tròn

      if (isUnlocked) {
        loadWordsAndCheck();
        startCircleTimer(); // start lại timer
      }
    }
  }, 1000);
}

// ===== LOAD FILE =====
function loadWordsAndCheck(){
  const oldScript = document.getElementById("wordScript");
  if(oldScript) oldScript.remove();

  const script = document.createElement("script");
  script.src = "question.js?v=" + Date.now();
  script.id = "wordScript";
  script.onload = startCheck;
  document.body.appendChild(script);
}

// ===== CHECK DUPLICATE =====
function startCheck(){
  if(typeof words === "undefined"){
    document.getElementById("status").textContent = "❌ Không load được";
    return;
  }

  document.getElementById("status").textContent = "✅ ĐÃ KIỂM TRA";
  let map = {}, html = "", found = false;

  fetch("question.js?v=" + Date.now())
    .then(res => res.text())
    .then(text=>{
      text.split("\n").forEach((line,lineIndex)=>{
        const matches = line.match(/"(.*?)"/g);
        if(!matches) return;
        matches.forEach(str=>{
          let word = str.replace(/"/g,"").toLowerCase().trim().replace(/\s+/g," ");
          if(!map[word]) map[word]=[];
          map[word].push(lineIndex+1);
        });
      });

      for(let w in map){
        if(map[w].length>1){
          found=true;
          html += `<div class="duplicate">❌ "${w}" → dòng: ${map[w].join(", ")}</div>`;
        }
      }
      if(!found) html = `<div class="okText">✅ Không có từ nào bị trùng</div>`;
      document.getElementById("result").innerHTML = html;
    });
}
</script>

</body>
</html>
