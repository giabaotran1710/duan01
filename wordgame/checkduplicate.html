<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Check trùng question.js</title>

<style>
body{
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
  padding:20px;
}

h2{
  color:#00aaff;
}

.result{
  margin-top:20px;
  line-height:1.6;
}

.duplicate{
  color:#ff5555;
}

.ok{
  color:#00ff99;
}
</style>
</head>

<body>

<h2>🔍 Kiểm tra từ trùng (question.js)</h2>

<div id="status">⏳ Đang load dữ liệu...</div>
<div class="result" id="result"></div>

<script>

// chuẩn hoá từ
function normalize(word){
  return word
    .toLowerCase()
    .replace(/["',]/g,"")
    .trim();
}

// load file và check
window.onload = () => {
  fetch("question.js")
    .then(res => res.text())
    .then(text => {
      document.getElementById("status").textContent = "✅ Đã load question.js";
      checkDuplicate(text);
    })
    .catch(()=>{
      document.getElementById("status").textContent =
        "❌ Không tìm thấy question.js (kiểm tra đường dẫn)";
    });
};

// check trùng
function checkDuplicate(text){
  const lines = text.split("\n");

  let map = {};
  let resultHTML = "";
  let found = false;

  lines.forEach((line,i)=>{
    let word = normalize(line);

    if(!word) return;

    if(!map[word]) map[word] = [];
    map[word].push(i+1);
  });

  for(let w in map){
    if(map[w].length > 1){
      found = true;
      resultHTML += `
        <div class="duplicate">
          ❌ "${w}" → dòng: ${map[w].join(", ")}
        </div>
      `;
    }
  }

  if(!found){
    resultHTML = `<div class="ok">✅ Không có từ trùng</div>`;
  }

  document.getElementById("result").innerHTML = resultHTML;
}

</script>

</body>
</html>
