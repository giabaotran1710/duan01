<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Check trùng question.js</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  padding:20px;

  background: linear-gradient(135deg,#0f172a,#1e3a8a,#4c1d95);
  background-size: 400% 700%;
  animation: bgMove 10s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== POPUP ===== */
#passwordPopup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  backdrop-filter: blur(8px);
  z-index:9999;
}

.box{
  background: rgba(30,42,56,0.85);
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,170,255,0.3);
}

/* ===== DISPLAY ===== */
#display{
  font-size:26px;
  letter-spacing:10px;
  margin-bottom:20px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
}

/* ===== KEYPAD ===== */
.keypad{
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

.key{
  padding:15px;
  font-size:20px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.key:hover{
  background:#00aaff;
  transform:scale(1.1);
}

.key:active{
  transform:scale(0.9);
}

/* special buttons */
.ok{
  background:#00aaff;
}

.clear{
  background:#ff4444;
}

/* ===== UI ===== */
h2{
  text-shadow:0 0 10px #00aaff;
}

.result{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
}

.duplicate{color:#ff5555;}
.okText{color:#00ff99;}

#display:empty::before{
  content: "Nhập mật khẩu...";
  color: rgba(255,255,255,0.3);
  letter-spacing: normal;
  font-size:16px;
}
</style>
</head>

<body>

<!-- 🔐 PASSWORD -->
<div id="passwordPopup">
  <div class="box">
    <h3>🔐 Nhập mật khẩu</h3>

    <div id="display"></div>

    <div class="keypad">
      <button class="key">7</button>
      <button class="key">8</button>
      <button class="key">9</button>

      <button class="key">4</button>
      <button class="key">5</button>
      <button class="key">6</button>

      <button class="key">1</button>
      <button class="key">2</button>
      <button class="key">3</button>

      <button class="key clear">X</button>
      <button class="key">0</button>
      <button class="key ok">OK</button>
    </div>
  </div>
</div>

<h2>🔍 Kiểm tra từ trùng (question.js)</h2>
<div id="status">⏳ Đang load...</div>
<div class="result" id="result"></div>

<script>

const correctPassword = "1234";
let inputPass = "";

/* ===== KEYPAD ===== */
document.querySelectorAll(".key").forEach(btn=>{
  btn.onclick = () => {
    const val = btn.textContent;

    if(val === "X"){
      inputPass = inputPass.slice(0,-1);
    }
    else if(val === "OK"){
      checkPassword();
      return;
    }
    else{
      if(inputPass.length < 6){
        inputPass += val;
      }
    }

    updateDisplay();
  };
});

function updateDisplay(){
  document.getElementById("display").textContent = inputPass;
}

function checkPassword(){
  if(inputPass === correctPassword){
    document.getElementById("passwordPopup").style.display = "none";
  }else{
    alert("❌ Sai mật khẩu!");
    inputPass = "";
    updateDisplay();
  }
}

/* ===== CHECK DUP ===== */
function normalize(word){
  return word.toLowerCase().replace(/["',]/g,"").trim();
}

window.onload = () => {
  fetch("question.js")
    .then(res => res.text())
    .then(text => {
      document.getElementById("status").textContent = "✅ Đã kiểm tra";
      checkDuplicate(text);
    });
};

function checkDuplicate(text){
  let words;

  try{
    // lấy nội dung trong dấu []
    const match = text.match(/const\s+words\s*=\s*\[([\s\S]*?)\]/);
    if(!match) throw "Không tìm thấy words";

    // chuyển thành JSON hợp lệ
    const jsonText = "[" + match[1] + "]";
    words = JSON.parse(jsonText);

  }catch(e){
    document.getElementById("result").innerHTML =
      "❌ Không đọc được question.js (format sai)";
    return;
  }

  let map = {};
  let html = "";
  let found = false;

  words.forEach((w,i)=>{
    let word = w.toLowerCase().trim();

    if(!map[word]) map[word] = [];
    map[word].push(i+1);
  });

  for(let w in map){
    if(map[w].length > 1){
      found = true;
      html += `
        <div class="duplicate">
          ❌ "${w}" → vị trí: ${map[w].join(", ")}
        </div>
      `;
    }
  }

  if(!found){
    html = `<div class="okText">✅ Không trùng</div>`;
  }

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
